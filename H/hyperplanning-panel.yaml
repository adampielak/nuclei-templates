id: hyperplanning-panel

info:
  name: HYPERPLANNING Login Panel - Detect
  author: righettod
  severity: info
  description: |
    HYPERPLANNING products was detected.
  reference:
    - https://www.index-education.com/fr/presentation-hyperplanning.php
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)HYPERPLANNING"})
    max-request: 1
    shodan-query: http.title:"HYPERPLANNING"
  tags: panel,hyperplanning,login,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_any(to_lower(body), "hyperplanning</title>", "content=\"hyperplanning\"")'
        condition: and

    extractors:
      - type: regex
        part: header
        group: 1
        regex:
          - '(?i)Server:\s+HYPERPLANNING\s+([0-9.\s\-]+)'

