id: vbulletin-backdoor
info:
  name: vBulletin Backdoor - Detect
  author: MaStErCho
  severity: high
  reference:
    - https://github.com/OWASP/vbscan
    - https://blog.sucuri.net/2017/01/vbulletin-malware-hackers-compete-backdoor-control.html
  classification:
    cwe-id:
      - CWE-78
  metadata:
    max-request: 21
  tags: backdoor,php,rce,vbulletin,vuln
variables:
  num: "999999999"
flow: http(1) && http(2)
http:
  - matchers:
      - condition: or
        internal: true
        part: body
        type: word
        words:
          - content="vBulletin
          - id="vbulletin_css
          - clientscript/vbulletin
          - vBulletin_init
    method: GET
    path:
      - '{{BaseURL}}'
  - host-redirects: true
    matchers:
      - condition: and
        # digest: 4a0a0047304502210081d30ca62ebadd13ddcc3211df58100e30151ecf11316b3b55ec08d0f990e4140220307df182652d100e6f09c9c10b4266fe7c4099c21a65e615ccc54e8e89e6ee1b:922c64590222798bb761d5b6d8e72950

        dsl:
          - contains(body, '{{md5(num)}}')
          - status_code == 200
        type: dsl
    max-redirects: 3
    method: GET
    path:
      - '{{BaseURL}}/faq.php?cmd=echo%20-n%20{{num}}|md5sum'
      - '{{BaseURL}}/forum.php?x=shell_exec&y=echo%20-n%20{{num}}|md5sum'
      - '{{BaseURL}}/{{paths}}/faq.php?cmd=echo%20-n%20{{num}}|md5sum'
      - '{{BaseURL}}/{{paths}}/forum.php?x=shell_exec&y=echo%20-n%20{{num}}|md5sum'
    payloads:
      paths:
        - boards
        - board
        - forum
        - forums
        - vb
    stop-at-first-match: true
