id: vmware-aria-panel

info:
  name: VMware Aria Operations Login - Detect
  author: rxerium
  severity: info
  description: |
    Detects VMware Aria Operations Panel.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)VMware Aria Operations"})
    verified: true
    max-request: 1
    shodan-query: title:"VMware Aria Operations"
  tags: panel,aria,login,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/ui/login.action"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>VMware Aria Operations</title>"

      - type: status
        status:
          - 200

