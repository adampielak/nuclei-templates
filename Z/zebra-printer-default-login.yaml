id: zebra-default-login
info:
  name: Zebra - Default Login
  author: y0no
  severity: high
  description: |
    Zebra default login credentials was discovered.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "Zebra"}) || service["http.body"] matches "Zebra Technologies"
    max-request: 4
    shodan-query: title:"Zebra"
    verified: true
  tags: default-login,misconfig,printer,vuln,zebra
http:
  - attack: pitchfork
    matchers:
      - part: body
        type: word
        words:
          - '>Access Granted. This IP Address now'
      - status:
          - 200
        type: status
    matchers-condition: and
    payloads:
      password:
        - ""
        - 1234
      username:
        - 1234
        - admin
    raw:
      - |
        POST /authorize HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        0={{username}}&1={{password}}
