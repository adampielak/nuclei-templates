id: filestash-installer
info:
  name: Filestash - Installer Exposure
  author: DhiyaneshDk
  severity: high
  description: |
    FreeScout is susceptible to the Installation page exposure due to misconfiguration.
  classification:
    cpe: cpe:2.3:a:filestash:filestash:*:*:*:*:*:*:*:*
  metadata:
    max-request: 1
    product: filestash
    shodan-query: html:"Admin Console" html:"component-loader"
    vendor: filestash
    verified: true
  tags: exposure,filestash,install,misconfig,vuln
http:
  - method: GET
    path:
      - "{{BaseURL}}/admin/setup"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Admin Console</title>"
          - "component-loader"
        condition: and
      - type: status
        status:
          - 200
