id: pterodactyl-panel
info:
  name: Pterodactyl game server - Panel
  author: darses
  severity: info
  description: |
    Detects Pterodactyl game server management panel.
  reference:
    - https://github.com/pterodactyl/panel
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Pterodactyl"}) || service["favicon.ico.image.mmh3"] == "-456405319" || service["favicon.ico.image.mmh3"] == "846001371"
    fofa-query:
      - title="Pterodactyl"
      - icon_hash="-456405319"
      - icon_hash="846001371"
      - 'Set-Cookie: pterodactyl_session='
    max-request: 1
    product: panel
    shodan-query:
      - title:"Pterodactyl"
      - http.favicon.hash:-456405319
      - http.favicon.hash:846001371
      - 'Set-Cookie: pterodactyl_session='
    vendor: pterodactyl
    verified: true
  tags: detect,discovery,oos,panel,pterodactyl
http:
  - matchers:
      - status:
          - 200
        type: status
      - part: header
        type: word
        words:
          - pterodactyl_session=
      - part: body
        type: word
        words:
          - window.SiteConfiguration
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/auth/login'
