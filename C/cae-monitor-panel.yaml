id: cae-monitor-panel
info:
  name: CAE Monitoring - Login Panel
  author: biero-el-corridor
  severity: info
  description: |
    Identified an exposed CAE Monitoring login panel.
  metadata:
    max-request: 1
    shodan-query: http.favicon.hash:-268676052
    verified: true
  tags: cae,detect,discovery,login,panel
http:
  - matchers:
      - condition: or
        part: body
        type: word
        words:
          - title="CAE Home Page"
          - alt="CAE"
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/index.html'
