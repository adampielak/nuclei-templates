id: citrix-netscaler-version

info:
  name: Citrix Netscaler - Version
  severity: info
  author: darses
  metadata:
    vendor: citrix
    product: netscaler
    shodan-query:
      - http.favicon.hash:1418494345
    fofa-query:
      - icon_hash="1418494345"
    references:
      - https://github.com/fox-it/citrix-netscaler-triage
  tags: detect,citrix,netscaler

http:
  - method: GET
    path:
      - "{{BaseURL}}/logon/LogonPoint/workspaceUI.tar"

    matchers-condition: and
    matchers:
      # - type: word
      #   part: header
      #   words:
      #     - "Content-Type: application/x-tar"

      - type: status
        status:
          - 200

      - type: dsl
        dsl:
         - to_number(unix_timestamp) < to_number(to_unix_time('2026-03-01'))

    extractors:
      - type: dsl
        name: unix_timestamp
        dsl:
          - to_string(gzip_mtime(body))
