id: couchdb-default-login
info:
  name: CouchDB - Default Login
  author: thefoggiest
  severity: high
  description: |
    CouchDB weak admin credentials were discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:C/C:L/I:L/A:L
    cvss-score: 8.3
    cwe-id: CWE-522
    cpe: cpe:2.3:a:apache:couchdb:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: service["http.head.server"] matches `^CouchDB/`
    fofa-query: app="APACHE-CouchDB"
    max-request: 16
    product: couchdb
    vendor: apache
    verified: true
  tags: couchdb,default-login,misconfig,vuln
http:
  - attack: clusterbomb
    matchers:
      - condition: and
        part: body
        type: word
        words:
          - '{"ok":true'
          - '"name":"'
          - '"roles":['
      - condition: and
        part: header
        type: word
        words:
          - application/json
          - AuthSession=
      - status:
          - 200
        type: status
    matchers-condition: and
    payloads:
      password:
        - admin
        - test
        - password
        - couchdb
      username:
        - admin
        - administrator
        - couchdb
        - root
    raw:
      - |
        POST /_session HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        name={{username}}&password={{password}}
    stop-at-first-match: true
