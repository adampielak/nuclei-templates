id: cyberpanel-panel
info:
  name: Cyberpanel Login Panel - Detect
  author: mailler
  severity: info
  description: |
    Cyberpanel login panel was detected.
  reference:
    - https://cyberpanel.net/KnowledgeBase/
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    runzero-match: service["http.body"] matches "(?i)cyberpanel"
    fofa-query: app="Cyberpanel"
    max-request: 1
    product: cyberpanel
    shodan-query: html:"cyberpanel"
  tags: cyberpanel,detect,discovery,login,panel
http:
  - matchers:
      - part: body
        regex:
          - <title>(.*)CyberPanel(.*)</title>
        type: regex
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}'
