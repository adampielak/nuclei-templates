id: caprover-default-login

info:
  name: Caprover Default Credentials
  author: ritikchaddha
  severity: high
  description: Caprover default login credentials were discovered.
  metadata:
    runzero-match: service["favicon.ico.image.mmh3"] == "988422585"
    verified: true
    max-request: 1
    shodan-query: http.favicon.hash:988422585
  tags: caprover,default-login,misconfig,vuln

variables:
  password: captain42

http:
  - raw:
      - |
        POST /api/v2/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        x-namespace: captain

        {"password":"{{password}}"}

    matchers:
      - type: dsl
        dsl:
          - contains_all(body, "status\":100", "Login succeeded", "token\":")
          - contains(header, "application/json")
          - status_code == 200
        condition: and

