id: jwk-json-leak
info:
  name: JSON Web Key File - Exposure
  author: Mohsen Yaghoubi
  severity: info
  description: |
    Searches for JSON Web Key (JWK) file.
  reference:
    - https://portswigger.net/web-security/jwt/algorithm-confusion
  classification:
    cwe-id:
      - CWE-540
    cpe: cpe:2.3:a:jwt_project:jwt:*:*:*:*:*:*:*:*
  metadata:
    max-request: 1
    product: jwt
    shodan-query: html:"jwks.json"
    vendor: jwt_project
    verified: true
  tags: exposure,generic,token,vuln
http:
  - matchers:
      - part: body
        type: word
        words:
          - '"kty":'
      - part: content_type
        type: word
        words:
          - application/json
      - status:
          - 200
        # digest: 4a0a00473045022100910139f36f138cdf289bc798b8d9b24b8a8a300f21db218591ad3b75448d68ad0220638d5593ca2d3211a9a29d179b4ab5fc8d2506620533e03a8b12cd85a57d227a:922c64590222798bb761d5b6d8e72950

        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/.well-known/jwks.json'
      - '{{BaseURL}}/.well-known/jwks'
      - '{{BaseURL}}/.well-known/openid-configuration/jwks.json'
      - '{{BaseURL}}/.well-known/openid-configuration/jwks'
      - '{{BaseURL}}/jwks.json'
      - '{{BaseURL}}/jwks'
    stop-at-first-match: true
