http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "ISSymbol1.ProductName = \"AVEVA Edge\"", "GENERATOR\" content=\"AVEVA
      Edge")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: aveva-edge-panel
info:
  author: rxerium
  description: 'AVEVA Edge SCADA web interface panel has been detected.

    '
  metadata:
    max-request: 1
    product: aveva-edge
    shodan-query: http.html:"Aveva Edge"
    vendor: AVEVA
    verified: true
  name: AVEVA Edge SCADA - Login Panel
  reference:
  - https://www.aveva.com/
  severity: info
  tags: panel,aveva,edge,scada,ics,discovery
