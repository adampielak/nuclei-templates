http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Argilla</title>
  - condition: or
    part: body
    type: word
    words:
    - argilla.io
    - __NUXT__
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: argilla-panel
info:
  author: rxerium
  description: 'Argilla is an open-source data labelling platform for AI and LLM fine-tuning
    workflows.

    It provides a web interface for annotating datasets used in machine learning model
    training.

    '
  metadata:
    max-request: 1
    product: Argilla
    shodan-query: http.title:"Argilla"
    vendor: Argilla
    verified: true
  name: Argilla Panel - Detect
  reference:
  - https://github.com/argilla-io/argilla
  - https://argilla.io
  severity: info
  tags: panel,argilla,llm,ai,data-labelling,detect,discovery
