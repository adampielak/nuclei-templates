http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "AppName", "OnClickConnect", "ericom", "InTouch")
    - contains_any(body, "Access Anywhere", "AccessAnywhere")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/AccessAnywhere/start.html'
id: aveva-intouch-access-anywhere-panel
info:
  author: rxerium
  description: 'Detected AVEVA InTouch Access Anywhere was a secure gateway that provided
    browser-based remote access to InTouch HMI applications over the internet. It
    was widely used in industrial process control, utilities, and manufacturing environments.
    Exposed instances may have provided access to industrial HMI displays and SCADA
    interfaces.

    '
  metadata:
    max-request: 1
    product: aveva-intouch-access-anywhere
    runzero-match: service["http.body"] matches "(?i)InTouch Access Anywhere Server"
    shodan-query: http.html:"InTouch Access Anywhere"
    vendor: AVEVA
    verified: true
  name: AVEVA InTouch Access Anywhere - Panel
  reference:
  - https://www.aveva.com/en/products/intouch-hmi/
  - https://www.aveva.com/en/products/intouch-access-anywhere/
  severity: info
  tags: aveva,discovery,hmi,ics,intouch,panel,scada
