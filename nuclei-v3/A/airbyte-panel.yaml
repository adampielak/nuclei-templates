http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - contains_any(to_lower(body), "<title>airbyte", "name=\"airbyte:")
    - status_code == 200
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/api/v1/health'
  stop-at-first-match: true
id: airbyte-panel
info:
  author: ChrisJr404
  description: 'Airbyte panel was detected. Airbyte is a popular open-source data
    integration platform.

    '
  metadata:
    fofa-query: title="Airbyte"
    max-request: 2
    product: airbyte
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Airbyte"})
    shodan-query: http.title:"Airbyte"
    vendor: airbyte
    verified: true
  name: Airbyte Panel - Detect
  reference:
  - https://github.com/airbytehq/airbyte
  - https://airbyte.com/
  - https://docs.airbyte.com/api-documentation
  severity: info
  tags: airbyte,detect,login,panel
