http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - AnythingLLM | Your personal LLM trained on anything
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: anythingllm-panel
info:
  author: rxerium
  description: 'Detects the AnythingLLM web interface.

    '
  metadata:
    max-request: 1
    product: anything-llm
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)AnythingLLM \\|
      Your personal LLM trained on anything"})
    shodan-query: http.title:"AnythingLLM | Your personal LLM trained on anything"
    vendor: mintplex-labs
    verified: true
  name: AnythingLLM Panel - Detect
  reference:
  - https://github.com/Mintplex-Labs/anything-llm
  - https://anythingllm.com/
  severity: info
  tags: ai,anythingllm,detect,discovery,llm,panel
