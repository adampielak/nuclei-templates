http:
- matchers:
  - condition: and
    type: word
    words:
    - application="Polaris"
    - org.apache.polaris
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/q/metrics'
id: apache-polaris-metrics-exposure
info:
  author: icarot
  classification:
    cpe: cpe:2.3:a:apache:polaris:*:*:*:*:*:*:*:*
  description: 'Detects a Apache Polaris server, the interoperable, open source catalog
    for Apache Iceberg.

    '
  metadata:
    product: polaris
    runzero-match: service["http.body"] matches "(?i)org\\.apache\\.polaris"
    shodan-query: http.html:"org.apache.polaris"
    vendor: apache
  name: Apache Polaris - Information Disclosure
  reference:
  - https://github.com/apache/polaris
  severity: medium
  tags: apache,polaris,exposure,metrics,misconfig
