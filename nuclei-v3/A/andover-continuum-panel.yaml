http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - Andover Continuum
    - Andover Continuum Embedded WebServer
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: andover-continuum-panel
info:
  author: rxerium
  description: 'Andover Continuum Building Management System panel has been detected.

    '
  metadata:
    max-request: 1
    product: andover-continuum
    runzero-match: service["http.body"] matches "(?i)Andover Continuum"
    shodan-query: http.html:"Andover Continuum"
    vendor: Andover
    verified: true
  name: Andover Continuum BMS - Login Panel
  reference:
  - https://www.carrier.com/
  severity: info
  tags: andover,bms,continuum,discovery,ics,panel
