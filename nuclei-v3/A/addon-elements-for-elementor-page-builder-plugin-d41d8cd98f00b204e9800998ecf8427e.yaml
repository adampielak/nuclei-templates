  description: 'The Elementor Addon Elements plugin for WordPress is vulnerable to
    Cross-Site Request Forgery in versions up to, and including, 1.11.7. This is due
    to missing or incorrect nonce validation on the eae_review() and fv_download_box()
    functions. This makes it possible for unauthenticated attackers to gain administrative
    access and force unwanted actions on other users via a forged request granted
    they can trick a site administrator into performing an action such as clicking
    on a link.

