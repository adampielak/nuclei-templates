http:
- matchers:
  - condition: and
    part: body
    regex:
    - (?i)window\.apos\s*=
    - (?i)/modules/apostrophe-
    type: regex
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: apostrophecms-detect
info:
  author: Shivam Kamboj
  description: 'Detected the presence of ApostropheCMS, a full-stack content management
    system built on Node.js and MongoDB.

    '
  metadata:
    max-request: 1
    shodan-query: html:"window.apos"
    verified: true
  name: ApostropheCMS - Detect
  reference:
  - https://apostrophecms.com/
  severity: info
  tags: tech,cms,apostrophe,discovery
