http:
- attack: pitchfork
  cookie-reuse: true
  host-redirects: true
  matchers:
  - status:
    - 200
    - 302
    - 303
    type: status
  - part: header
    regex:
    - 'Location: .*?/home'
    type: regex
  matchers-condition: and
  payloads:
    password:
    - apc
    username:
    - apc
  raw:
  - 'POST /Forms/login1 HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    login_username={{username}}&login_password={{password}}&submit=Log+On

    '
  stop-at-first-match: true
id: apc-pdu-default-login
info:
  author: tdiderich
  description: 'APC Rack PDU with default administrator credentials discovered.

    '
  metadata:
    runzero-match: asset["hw"] matches `Schneider\s+Electric` || asset["os"] matches
      `Schneider\s+Electric\s+AOS` || any(each(service["html.titles"]), {# matches
      `APC \| Log On`})
  name: APC Rack PDU Default Login
  reference:
  - https://iportal2.schneider-electric.com/Contents/docs/UPS-PMAR-9LLJMN_R0_EN.PDF
  severity: high
  tags: default-login,apc,pdu,runzero
