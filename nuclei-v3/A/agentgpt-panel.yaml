http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>AgentGPT</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: agentgpt-panel
info:
  author: rxerium
  description: 'AgentGPT was detected. AgentGPT was a browser-based autonomous AI
    agent platform that allows users to create, configure and deploy AI agents directly
    in the browser.

    '
  metadata:
    max-request: 1
    product: agentgpt
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)AgentGPT"})
    shodan-query: http.title:"AgentGPT"
    vendor: reworkd
    verified: true
  name: AgentGPT Panel - Detect
  reference:
  - https://github.com/reworkd/AgentGPT
  - https://agentgpt.reworkd.ai/
  severity: info
  tags: agent,agentgpt,ai,detect,discovery,panel
