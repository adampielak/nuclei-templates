id: agentgpt-panel
info:
  name: AgentGPT Panel - Detect
  author: rxerium
  severity: info
  description: |
    AgentGPT was detected. AgentGPT was a browser-based autonomous AI agent platform that allows users to create, configure and deploy AI agents directly in the browser.
  reference:
    - https://github.com/reworkd/AgentGPT
    - https://agentgpt.reworkd.ai/
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)AgentGPT"})
    max-request: 1
    product: agentgpt
    shodan-query: 'http.title:"AgentGPT"'
    vendor: reworkd
    verified: true
  tags: agent,agentgpt,ai,detect,discovery,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>AgentGPT</title>"
      - type: status
        status:
          - 200
