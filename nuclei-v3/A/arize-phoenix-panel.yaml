http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - Arize Phoenix
    - <title>Phoenix
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: arize-phoenix-panel
info:
  author: rxerium
  description: 'Arize Phoenix is an open-source AI observability and evaluation platform
    for monitoring,

    debugging, and evaluating LLM applications.

    '
  metadata:
    max-request: 1
    product: phoenix
    runzero-match: service["http.body"] matches `(?i)Arize Phoenix`
    shodan-query: http.title:"Phoenix" port:6006 http.html:"arize"
    vendor: Arize-ai
    verified: true
  name: Arize Phoenix - Detect
  reference:
  - https://github.com/Arize-ai/phoenix
  - https://phoenix.arize.com
  severity: info
  tags: ai,arize,detect,discovery,llm,observability,panel,phoenix
