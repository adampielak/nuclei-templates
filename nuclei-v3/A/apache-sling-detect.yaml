http:
- matchers:
  - condition: and
    type: word
    words:
    - Apache Sling
    - sling.apache
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/starter.html'
id: apache-sling-detect
info:
  author: icarot
  description: 'Detects a Apache Sling, a Java-based web framework designed for content-centric
    applications, using a RESTful approach to map URL requests directly to resources
    in a Java Content Repository (JCR).

    '
  metadata:
    max-request: 1
    product: sling
    shodan-query: title:"Apache Sling"
    vendor: apache
  name: Apache Sling - Detect
  reference:
  - https://github.com/apache/sling
  severity: info
  tags: apache,detect,sling
