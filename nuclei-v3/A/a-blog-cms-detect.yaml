http:
- extractors:
  - group: 1
    part: body
    regex:
    - (?i)content="a-blog cms (?:Ver\.|v)?([0-9.]+)
    type: regex
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - a-blog cms
    - acms-js
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: a-blog-cms-detect
info:
  author: Shivam Kamboj
  description: 'Detects the presence of a-blog cms, a Content Management System.

    '
  metadata:
    max-request: 1
    shodan-query: html:"a-blog cms"
    verified: true
  name: a-blog cms - Detect
  reference:
  - https://www.a-blogcms.jp/
  severity: info
  tags: tech,discovery,cms,a-blog-cms
