http:
- matchers:
  - condition: and
    type: word
    words:
    - title>Apache SkyWalking
    - /css/monaco-editor
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'GET /dashboard/list HTTP/1.1

    Host: {{Hostname}}

    '
id: apache-skywalking-dashboard
info:
  author: icarot
  description: 'Apache SkyWalking server, an APM, Application Performance Monitoring
    System, exposed the backend monitoring dashboard. An attacker can execute unauthorized
    operations.

    '
  metadata:
    max-request: 9
    product: skywalking
    shodan-query: title:"Apache SkyWalking"
    vendor: apache
  name: Apache SkyWalking - Dashboard
  reference:
  - https://github.com/apache/skywalking
  - https://github.com/apache/skywalking-ui
  severity: high
  tags: apache,exposure,misconfig,skywalking
