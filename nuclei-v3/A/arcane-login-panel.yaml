http:
- matchers:
  - condition: and
    dsl:
    - contains_any(tolower(body), "/arcane.png", "Sign in to Arcane", "alt=\"Arcane")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/auth/login'
id: arcane-login-panel
info:
  author: Kazgangap
  description: 'Detects the presence of the Arcane login panel, a modern Docker management
    platform.

    '
  metadata:
    fofa-query: icon_hash=="-313371739"
    max-request: 1
    runzero-match: service["favicon.ico.image.mmh3"] == "-313371739"
    shodan-query: http.favicon.hash:-313371739
    verified: true
  name: Arcane Login Panel - Detect
  severity: info
  tags: arcane,login-panel,docker
