http:
- host-redirects: true
  matchers:
  - condition: or
    type: word
    words:
    - <title>Apache Syncope
    - org.apache.syncope
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/syncope-enduser/'
  - '{{BaseURL}}/syncope-wa/'
  - '{{BaseURL}}/syncope-console/'
  stop-at-first-match: true
id: apache-syncope-detect
info:
  author: icarot
  description: 'Detected an Apache Syncope server, an enterprise digital identity
    management platform built with Java EE and licensed under Apache 2.0.

    '
  metadata:
    max-request: 3
    product: syncope
    vendor: apache
    verified: true
  name: Apache Syncope - Detect
  reference:
  - https://github.com/apache/syncope
  severity: info
  tags: tech,apache,syncope,detect
