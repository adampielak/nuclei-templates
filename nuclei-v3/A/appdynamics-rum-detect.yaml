http:
- matchers:
  - condition: or
    part: body
    type: word
    words:
    - adrum-config
    - adrum-start-time
    - adrumExtUrlHttp
    - adrumExtUrlHttps
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: appdynamics-rum-detect
info:
  author: Shivam Kamboj
  description: 'Detects AppDynamics (Cisco) End User Monitoring (EUM) artifacts.

    '
  metadata:
    max-request: 1
    shodan-query: html:"adrum"
    verified: true
  name: AppDynamics (Cisco) RUM - Detect
  reference:
  - https://docs.appdynamics.com/appd/24.x/latest/en/end-user-monitoring/browser-monitoring/browser-real-user-monitoring
  severity: info
  tags: tech,discovery,rum,appdynamics
