http:
- extractors:
  - json:
    - .version
    name: version
    part: body
    type: json
  matchers:
  - condition: and
    type: word
    words:
    - '"service": "mcp-gateway"'
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/health'
id: apache-casbin-mcp-gateway-detect
info:
  author: icarot
  description: 'Detects an Apache Casbin MCP Gateway server, a lightweight gateway
    service that instantly transforms existing MCP Servers and APIs into MCP servers
    with zero code changes.

    '
  metadata:
    product: casbin-mcp-gateway
    vendor: apache
  name: Apache Casbin MCP Gateway - Detection
  reference:
  - https://github.com/apache/casbin-mcp-gateway
  severity: info
  tags: apache,casbin-mcp-gateway,detect,tech
