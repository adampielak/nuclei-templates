http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_any(body, "<title>aaPanel Linux panel", "Login with aaPanel Mobile",
      "aaPanel Linux panel")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/'
  - '{{BaseURL}}/login'
  stop-at-first-match: true
id: aapanel-linux-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'Detected aaPanel Linux management panel login interface.

    '
  metadata:
    fofa-query: title="aaPanel Linux panel"
    max-request: 2
    product: aapanel
    runzero-match: service["http.body"] matches "(?i)aaPanel Linux panel"
    shodan-query: html:"aaPanel Linux panel"
    vendor: aapanel
    verified: true
  name: aaPanel Linux Panel - Detect
  severity: info
  tags: aapanel,detect,linux,panel
