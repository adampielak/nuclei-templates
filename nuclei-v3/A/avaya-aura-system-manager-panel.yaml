id: avaya-aura-system-manager-panel
info:
  name: Avaya Aura System Manager Login - Panel Detect
  author: princechaddha
  severity: info
  description: Avaya Aura System Manager login panel was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
    cpe: cpe:2.3:a:avaya:aura_system_manager:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: service["http.body"] matches `Avaya Aura\s*<sup>.{1,8}<\/sup>\s*System Manager`
    max-request: 1
    product: aura_system_manager
    vendor: avaya
  tags: avaya,discovery,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/network-login/"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Avaya Aura"
          - "System Manager"
        condition: and
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - "</sup> System Manager ([a-z0-9.]+)</h1>"
