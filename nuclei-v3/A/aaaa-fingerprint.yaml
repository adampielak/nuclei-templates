dns:
- extractors:
  - group: 1
    regex:
    - "IN\tAAAA\t([0-9a-fA-F:]+)"
    type: regex
  matchers:
  - part: answer
    regex:
    - "IN\tAAAA\t(.+)$"
    type: regex
  name: '{{FQDN}}'
  type: AAAA
id: aaaa-fingerprint
info:
  author: rxerium
  classification:
    cwe-id: CWE-200
  description: 'An AAAA record was detected. AAAA records are used to map domain names
    to IPv6 addresses.

    '
  metadata:
    max-request: 1
  name: AAAA Record - IPv6 Detection
  reference:
  - https://www.cloudflare.com/learning/dns/dns-records/dns-aaaa-record/
  - https://en.wikipedia.org/wiki/IPv6_address
  severity: info
  tags: dns,aaaa,ipv6,discovery
