http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Activepieces</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: activepieces-panel
info:
  author: rxerium
  description: 'Activepieces was detected. Activepieces was an open-source automation
    platform with AI and LLM integrations. Exposed instances may allow access to workflow
    automation configurations and connected integrations.

    '
  metadata:
    max-request: 1
    product: activepieces
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Activepieces"})
    shodan-query: http.title:"Activepieces"
    vendor: Activepieces
    verified: true
  name: Activepieces Panel - Detect
  reference:
  - https://github.com/activepieces/activepieces
  - https://www.activepieces.com/
  severity: info
  tags: activepieces,ai,automation,detect,discovery,panel
