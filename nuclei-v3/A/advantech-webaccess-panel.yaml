id: advantech-webaccess-panel
info:
  name: Advantech WebAccess/SCADA - Panel
  author: 0x_Akoko
  severity: info
  description: |
    Detected Advantech WebAccess/SCADA login panel, a web-browser-based HMI/SCADA software used in critical manufacturing, energy, and water systems.
  reference:
    - https://www.advantech.com/en-us/products/webaccess-scada/sub_a7b4308c-a3d0-446c-8f03-0d098d4b2c31
    - https://www.cisa.gov/news-events/ics-advisories/icsa-23-150-01
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Advantech WebAccess"}) and service["favicon.ico.image.mmh3"] == "2047556588"
    fofa-query: title="Advantech WebAccess" || body="broadWeb"
    max-request: 1
    product: webaccess_scada
    shodan-query: http.title:"Advantech WebAccess"
    vendor: advantech
    verified: true
  tags: advantech,discovery,hmi,ics,panel,scada,webaccess
http:
  - method: GET
    path:
      - "{{BaseURL}}/broadWeb/bwRoot.asp"
    host-redirects: true
    max-redirects: 2
    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_all(body, "broadWeb", "WebAccess")'
          - 'contains_any(body, "Advantech", "bw_templete1.dwt", "WebAccessClientSetup")'
        condition: and
    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '(?:Software Build|版本號)\s*:\s*([0-9]+\.[0-9]+[^\s<"]*)'
