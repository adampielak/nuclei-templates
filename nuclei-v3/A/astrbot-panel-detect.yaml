http:
- matchers:
  - part: body
    type: word
    words:
    - <title>AstrBot
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/'
id: astrbot-panel-detect
info:
  author: theamanrawat
  description: 'Astrbot WebUI login panel was detected.

    '
  metadata:
    fofa-query: title="AstrBot"
    google-query: intitle:"AstrBot"
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)AstrBot"})
    shodan-query:
    - http.title:"AstrBot"
    - http.title:"AstrBot"
    verified: true
  name: AstrBot WebUI Login Panel - Detect
  reference:
  - https://github.com/AstrBotDevs/AstrBot
  severity: info
  tags: astrbot,login,panel
