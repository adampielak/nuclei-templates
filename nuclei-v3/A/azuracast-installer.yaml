http:
- matchers:
  - condition: and
    type: word
    words:
    - Set Up AzuraCast
    - SetupRegister
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/setup/register'
id: azuracast-installer
info:
  author: DhiyaneshDk
  description: 'Detected exposed AzuraCast setup wizard that allows unauthorized superuser
    account creation.An unfinished AzuraCast installation exposes setup endpoints
    that enable attackers to create

    administrator accounts and gain full control of the application.

    '
  metadata:
    max-request: 1
    shodan-query: html:"Set Up AzuraCast"
    verified: true
  name: AzuraCast - Unfinished Installation
  reference:
  - https://github.com/AzuraCast/AzuraCast
  - https://docs.azuracast.com/en/getting-started/installation
  severity: high
  tags: azuracast,exposure,misconfig,unauth
