id: nuuo-network-login
info:
  name: NUUO Network Video Recorder Login Panel - Detect
  author: dhiyaneshDK
  severity: info
  description: NUUO Network Video Recorder login panel was detected.
  reference:
    - https://www.exploit-db.com/ghdb/6840
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cvss-score: 0
    cwe-id: CWE-200
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^NUUO Network Video Recorder Login$"})
    max-request: 1
  tags: discovery,edb,iot,nuuo,panel
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>NUUO Network Video Recorder Login</title>'
        part: body
      - type: status
        status:
          - 200
