id: netbios-udp-detect
info:
  author: pussycat0x
  classification:
    cwe-id: CWE-200
  description: 'Detects NetBIOS Name Service on UDP port 137 using an NBTStat query
    to identify Windows network hosts.

    '
  metadata:
    max-request: 1
    shodan-query: port:137
    verified: true
  name: NetBIOS Name Service (NBTStat) - Detect
  reference:
  - https://github.com/CiscoCXSecurity/udp-proto-scanner
  - https://www.rfc-editor.org/rfc/rfc1002
  - https://nmap.org/nsedoc/scripts/nbstat.html
  severity: info
  tags: detection,js,nbstat,nbt,netbios,network,smb,udp,windows
javascript:
- args:
    Host: '{{Host}}'
    Port: 137
  code: 'const c = require("nuclei/net");

    // NBTStat query - NBSTAT wildcard name query (*<00>)

    const payload = "80f00010000100000000000020434b4141414141414141414141414141414141414141414141414141414141410000210001";

    const conn = c.Open(''udp'', `${Host}:${Port}`);

    conn.SendHex(payload);

    let resp = conn.RecvString(2048);

    resp;

    '
  extractors:
  - dsl:
    - '"NetBIOS Name Service Detected"'
    type: dsl
  matchers:
  - condition: and
    dsl:
    - success == true
    - len(response) > 0
    type: dsl
  matchers-condition: and
  pre-condition: 'isUDPPortOpen(Host, Port);

    '
