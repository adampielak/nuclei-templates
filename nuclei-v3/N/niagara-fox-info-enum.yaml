id: niagara-fox-info-enum
info:
  author: pussycat0x
  description: 'Niagara Fox Protocol is a building automation protocol used between
    the Niagara software systems by Tridium.

    '
  metadata:
    shodan-query: product:"Niagara Fox"
    verified: true
  name: Niagara Fox Protocol Information Enumeration
  reference:
  - https://nmap.org/nsedoc/scripts/fox-info.html
  severity: info
  tags: network,fox,niagara
network:
- extractors:
  - regex:
    - fox.version=s:([0-9.]+)
    - hostName=s:([0-9.]+)
    - hostAddress=s:([0-9.]+)
    - app.name=s:([A-Za-z0-9]+)
    - app.version=s:([0-9.]+)
    - vm.name=s:([A-Za-z ()0-9]+)
    - vm.version=s:([0-9._-a-z]+)
    - os.name=s:([A-Z]+)
    - os.version=s:([0-9.]+)
    type: regex
  host:
  - '{{Hostname}}'
  - '{{Host}}:1911'
  inputs:
  - data: 'fox a 1 -1 fox hello

      {

      fox.version=s:1.0

      id=i:1

      };;

      '
  matchers:
  - type: word
    words:
    - fox.version
