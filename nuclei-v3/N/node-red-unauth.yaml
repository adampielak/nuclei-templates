http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - '"id"'
    - '"type"'
    - '"wires"'
  - part: header
    type: word
    words:
    - application/json
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/flows'
id: node-red-unauth
info:
  author: 0xBassia
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-306
  description: 'Node-RED flow editor is accessible without authentication. Node-RED
    is a flow-based programming tool that can execute arbitrary system commands, read/write
    files, and make network requests. Unauthenticated access leads to remote code
    execution.

    '
  impact: 'An attacker can create flows that execute system commands on the server,
    read sensitive files, establish reverse shells, or pivot to internal networks.
    Node-RED''s exec node provides direct OS command execution.

    '
  metadata:
    max-request: 1
    shodan-query: title:"Node-RED"
    verified: true
  name: Node-RED - Unauthenticated Access
  reference:
  - https://nodered.org/docs/user-guide/runtime/securing-node-red
  - https://nodered.org/docs/user-guide/runtime/configuration
  remediation: 'Enable authentication in Node-RED settings.js by configuring adminAuth
    with username and bcrypt-hashed password. Restrict network access to trusted IPs
    only.

    '
  severity: high
  tags: misconfig,nodered,rce,unauth
