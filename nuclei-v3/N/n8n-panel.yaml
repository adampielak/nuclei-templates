http:
- extractors:
  - group: 1
    internal: true
    name: base64_content
    regex:
    - <meta name="n8n:config:sentry" content="([A-Za-z0-9+/=]+)"
    type: regex
  - dsl:
    - replace_regex(base64_decode(base64_content), ".*n8n@([0-9]+\\.[0-9]+\\.[0-9]+).*",
      "$1")
    internal: true
    name: version
    type: dsl
  - dsl:
    - '"n8n Version: " + version'
    type: dsl
  matchers:
  - case-insensitive: true
    part: body
    type: word
    words:
    - <title>n8n.io
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/signin'
id: n8n-panel
info:
  author: userdehghani,rxerium
  classification:
    cpe: cpe:2.3:a:n8n:n8n:*:*:*:*:node.js:*:*:*
  description: 'The worlds most popular workflow automation platform for technical
    teams

    '
  metadata:
    max-request: 1
    product: n8n
    runzero-match: service["favicon.ico.image.mmh3"] == "-831756631"
    shodan-query: http.favicon.hash:-831756631
    vendor: n8n
    verified: true
  name: n8n Panel - Detect
  reference:
  - https://n8n.io/
  severity: info
  tags: panel,n8n,login,detect,discovery,ai
