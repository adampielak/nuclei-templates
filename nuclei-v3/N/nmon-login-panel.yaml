http:
- matchers:
  - part: body
    type: word
    words:
    - <title>nMon</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/?route=signin'
id: nmon-login-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'nMon login interface was discovered.

    '
  metadata:
    max-request: 1
    shodan-query: title:"nMon"
    verified: true
  name: nMon Panel - Detect
  severity: info
  tags: panel,login,nmon,detect
