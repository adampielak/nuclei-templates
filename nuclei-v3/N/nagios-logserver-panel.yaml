id: nagios-logserver-panel
info:
  name: Nagios Log Server - Detect
  author: ritikchaddha
  severity: info
  description: |
    Detects the presence of Nagios Log Server by identifying specific response patterns, HTTP headers, or unique page elements.
  metadata:
    runzero-match: service["favicon.ico.image.mmh3"] == "1460499495"
    fofa-query: icon_hash="1460499495"
    max-request: 1
    shodan-query: http.favicon.hash:1460499495
    verified: true
  tags: detect,discovery,login,nagios,nagios-logserver,panel
http:
  - matchers:
      - condition: or
        part: response
        type: word
        words:
          - Nagios Log Server
          - /nagioslogserver/
    method: GET
    path:
      - '{{BaseURL}}'
