http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "<title>Nginx test page for OpenCloudOS</title>")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
id: nginx-opencloudos-test-page
info:
  author: pussycat0x
  description: 'OpenCloudOS test page was discovered.

    '
  metadata:
    shodan-query: http.title:"OpenCloudOS"
    verified: true
  name: Nginx Test Page for OpenCloudOS
  severity: info
  tags: nginx,opencloudos,tech
