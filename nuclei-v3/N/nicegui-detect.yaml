http:
- extractors:
  - group: 1
    part: body
    regex:
    - /_nicegui/([0-9.]+)/
    type: regex
  matchers:
  - case-insensitive: true
    part: header
    type: word
    words:
    - x-nicegui-content
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: nicegui-detect
info:
  author: theamanrawat
  description: 'An instance running NiceGUI is detected by looking for specific HTTP
    headers.

    '
  metadata:
    max-request: 1
    shodan-query: x-nicegui-content
  name: NiceGUI Detection
  severity: info
  tags: detect,nicegui,tech
