http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>Unitronics</title>
    - Logo-Unitronics.svg
    - unitronics.com
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: unitronics-plc-panel
info:
  author: rxerium
  description: 'Unitronics PLC web interface panel has been detected.

    '
  metadata:
    max-request: 1
    product: plc
    runzero-match: any(each(service["html.titles"]), {# matches "^Unitronics"})
    shodan-query: http.html:"Unitronics"
    vendor: Unitronics
    verified: true
  name: Unitronics PLC - Login Panel
  reference:
  - https://www.unitronicsplc.com/
  severity: info
  tags: discovery,ics,panel,plc,unitronics
