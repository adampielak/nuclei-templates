http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "<title>OpenCode</title>", "opencode-theme-id")
    - status_code == 200
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/Lw/session/'
  redirects: true
id: unauthenticated-opencode-web
info:
  author: Kazgangap
  description: 'Unauthenticated network access to the OpenCode web interface was detected.
    When the OpenCode web server is started without setting the OPENCODE_SERVER_PASSWORD
    environment variable, the server is completely unsecured.

    '
  metadata:
    fofa-query: body="opencode"
    max-request: 1
    product: opencode
    shodan-query: http.html:"opencode"
    vendor: opencode
    verified: true
  name: OpenCode Web - Unauthenticated Access
  reference:
  - https://opencode.ai/docs/tr/web/
  severity: medium
  tags: config,misconfig,opencode,unauth,vuln
