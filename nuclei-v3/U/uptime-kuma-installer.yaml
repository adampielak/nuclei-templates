http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "\"needSetup\":true", "runningSetup", "isEnabledEmbeddedMariaDB")
    - contains(content_type, "application/json")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/setup-database-info'
id: uptime-kuma-installer
info:
  author: 0x_Akoko
  description: 'Detected Uptime Kuma setup page is publicly accessible with needSetup
    enabled, allowing unauthenticated users to complete installation and gain full
    admin access by access /setup-database.

    '
  metadata:
    fofa-query: app="Uptime-Kuma"
    max-request: 1
    product: uptime-kuma
    shodan-query: http.title:"Uptime Kuma"
    vendor: louislam
    verified: true
  name: Uptime Kuma - Installer
  reference:
  - https://github.com/louislam/uptime-kuma
  severity: high
  tags: exposure,installer,setup,uptime-kuma
