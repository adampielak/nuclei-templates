http:
- matchers:
  - part: body
    type: word
    words:
    - <title>UISP Fiber - Login</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/login.html'
id: uisp-fiber-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'UISP Fiber login interface was discovered.

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches `^UISP\s*Fiber\s*-\s*Login`})
    shodan-query: html:"UISP Fiber - Login"
    verified: true
  name: UISP Fiber Panel - Detect
  severity: info
  tags: discovery,fiber,login,panel,uisp
