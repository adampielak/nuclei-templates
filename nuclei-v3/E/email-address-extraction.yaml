# gap: email-address-extraction
id: email-address-extraction

info:
  name: Email Address Disclosure in Response Body
  author: TyrusRC
  severity: info
  description: |
    Extracts email addresses disclosed in the response body for
    triage. Information-only; many email disclosures are intentional
    (contact pages, footers, support@), and the operator must judge
    sensitivity based on context (e.g. internal-employee addresses
    on a public surface, or credentials/password-reset leaks).
  reference:
    - https://github.com/panch0r3d/nuclei-templates/blob/master/email-extraction.yaml
    - https://owasp.org/www-project-web-security-testing-guide/stable/4-Web_Application_Security_Testing/01-Information_Gathering/
  tags: custom,exposure,disclosure,email,pii

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: regex
        part: body
        regex:
          - '[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}'
    extractors:
      - type: regex
        part: body
        regex:
          - '[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}'
