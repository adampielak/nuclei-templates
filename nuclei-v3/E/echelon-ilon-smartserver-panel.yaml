http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - i.LON SmartServer
    - Echelon
    - SmartServer
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: echelon-ilon-smartserver-panel
info:
  author: rxerium
  description: 'Echelon (now Adesto/Dialog Semiconductor) i.LON SmartServer is a LonWorks/IP-852

    building automation controller used in HVAC, lighting, and energy management systems.

    The embedded web interface is frequently exposed on standard and non-standard
    ports.

    '
  metadata:
    max-request: 1
    product: ilon-smartserver
    shodan-query: http.title:"i.LON SmartServer"
    vendor: Echelon
    verified: true
  name: Echelon i.LON SmartServer - Login Panel
  reference:
  - https://www.echelon.com/products/ilon-smartserver/
  severity: info
  tags: panel,echelon,ilon,lonworks,scada,ics,ot,building-automation,discovery
