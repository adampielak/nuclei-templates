file:
- extensions:
  - xml
  matchers:
  - condition: and
    negative: true
    type: word
    words:
    - <webgui>
    - <protocol>https</protocol>
  - condition: and
    type: word
    words:
    - <pfsense>
    - <system>
  matchers-condition: and
id: enable-https-protocol
info:
  author: pussycat0x
  description: 'Web Admin Management Portal should only be accessed using HTTPS Protocol.HTTP
    transmits all data (including passwords) in clear text over the network and

    provides no assurance of the identity of the hosts involved.

    '
  metadata:
    verified: true
  name: Enable HTTPS on Web Management
  reference: 'https://docs.netgate.com/pfsense/en/latest/config/advanced-admin.html

    '
  severity: info
  tags: firewall,config,audit,pfsense,file
