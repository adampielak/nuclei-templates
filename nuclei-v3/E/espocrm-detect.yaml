http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - title="Powered by EspoCRM"
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: espocrm-detect
info:
  author: theamanrawat
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: EspoCRM panel was detected.
  metadata:
    fofa-query: body="Powered by EspoCRM"
    max-request: 1
    product: espocrm
    runzero-match: service["favicon.ico.image.mmh3"] == "-197006674" || service["http.body"]
      matches "(?i)Powered by EspoCRM"
    shodan-query: html:"Powered by EspoCRM"
    vendor: espocrm
    verified: true
  name: EspoCRM - Detect
  severity: info
  tags: detect,discovery,espocrm,panel
