http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - Emoncms - user login
  - part: header
    type: word
    words:
    - EMONCMS_SESSID
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: emoncms-panel
info:
  author: rxerium
  description: 'emonCMS is an open-source energy monitoring web application by OpenEnergyMonitor,

    used in homes and small businesses to track electricity, gas, and temperature.

    The login page is commonly exposed on port 80, 443, or 8010.

    '
  metadata:
    max-request: 1
    product: emoncms
    runzero-match: any(each(service["html.titles"]), {# matches "^Emoncms - user login"})
    shodan-query: http.title:"Emoncms - user login"
    vendor: OpenEnergyMonitor
    verified: true
  name: OpenEnergyMonitor emonCMS - Login Panel
  reference:
  - https://emoncms.org/
  - https://github.com/emoncms/emoncms
  severity: info
  tags: discovery,emoncms,energy,ics,iot,monitoring,panel
