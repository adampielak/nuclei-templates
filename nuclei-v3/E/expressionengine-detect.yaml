http:
- extractors:
  - name: version
    part: body
    regex:
    - ExpressionEngine ([0-9.]+)
    - Powered by ExpressionEngine ([0-9.]+)
    type: regex
  - name: expressionengine_id
    part: body
    regex:
    - expressionengine-site-id=([a-z0-9]+)
    - expressionengine\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - ExpressionEngine
    - Powered by ExpressionEngine
    - expressionengine.com
    - X-Powered-By-ExpressionEngine
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/system/'
  - '{{BaseURL}}/themes/'
  - '{{BaseURL}}/index.php'
  - '{{BaseURL}}/admin.php'
  - '{{BaseURL}}/cp/'
  stop-at-first-match: true
id: expressionengine-detect
info:
  author: Chirag Mistry
  description: 'An instance running ExpressionEngine is detected by looking for specific
    HTTP headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 9
  name: ExpressionEngine Detection
  severity: info
  tags: expressionengine,detect,tech
