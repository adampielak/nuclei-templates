id: evidently-ai-panel
info:
  name: Evidently AI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Evidently AI is an ML/LLM observability platform for monitoring data drift and model performance.
  reference:
    - https://github.com/evidentlyai/evidently
    - https://www.evidentlyai.com
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "Evidently"})
    max-request: 1
    product: evidently
    shodan-query: 'http.title:"Evidently"'
    vendor: evidently-ai
    verified: true
  tags: ai,detect,discovery,evidently,ml,monitoring,observability,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '(?i)<title>[^<]*Evidently[^<]*</title>'
      - type: status
        status:
          - 200
