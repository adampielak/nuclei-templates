http:
- host-redirects: true
  matchers:
  - part: body
    regex:
    - (?i)<title>[^<]*Evidently[^<]*</title>
    type: regex
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: evidently-ai-panel
info:
  author: rxerium
  description: 'Evidently AI is an ML/LLM observability platform for monitoring data
    drift and model performance.

    '
  metadata:
    max-request: 1
    product: evidently
    shodan-query: http.title:"Evidently"
    vendor: evidently-ai
    verified: true
  name: Evidently AI Panel - Detect
  reference:
  - https://github.com/evidentlyai/evidently
  - https://www.evidentlyai.com
  severity: info
  tags: panel,evidently,ai,ml,monitoring,observability,detect,discovery
