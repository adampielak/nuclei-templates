http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Easy Diffusion</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: easydiffusion-panel
info:
  author: rxerium
  description: 'Easy Diffusion (formerly Stable Diffusion UI) was detected. Easy Diffusion
    is a one-click, self-hosted Stable Diffusion web application focused on accessibility
    and ease of use for AI image generation. Exposed instances allow unauthenticated
    access to image generation capabilities and stored outputs.

    '
  metadata:
    max-request: 1
    product: easydiffusion
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Easy Diffusion"})
    shodan-query: http.title:"Easy Diffusion"
    vendor: easydiffusion
    verified: true
  name: Easy Diffusion Panel - Detect
  reference:
  - https://github.com/easydiffusion/easydiffusion
  - https://easydiffusion.github.io/
  severity: info
  tags: ai,detect,discovery,easydiffusion,image-generation,panel,stable-diffusion
