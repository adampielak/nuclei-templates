http:
- cookie-reuse: true
  host-redirects: true
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - logout
    - Logout
    - dashboard
    - Dashboard
    - Link 150
    - Link150
  matchers-condition: and
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    Authorization: Basic {{base64(''Administrator:Gateway'')}}

    Accept: */*

    '
  stop-at-first-match: true
id: ecostruxure-link150-default-login
info:
  author: Vincent Bouvier
  classification:
    cwe-id: CWE-1392
  description: 'Schneider Electric EcoStruxure Link150 Ethernet Gateway with default
    administrator credentials discovered.

    '
  metadata:
    max-request: 1
    product: EcoStruxure Link 150
    runzero-match: asset["hw_product"] matches `LINK150` || any(each(service["html.titles"]),
      {# matches `Schneider Electric`}) && any(each(service["vscan.technologies"]),
      {# matches `schneider-electric-ecostruxure`})
    vendor: Schneider Electric
  name: Schneider Electric EcoStruxure Link150 Default Login
  reference:
  - https://www.se.com/uk/en/product-range/63423-ecostruxure-link150/#overview
  - https://www.se.com/ww/en/product/TCSEGLA23F14F/ecostruxure-link150-application
  severity: high
  tags: default-login,schneider-electric,ecostruxure,link150,iot,runzero
