http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - FaceFusion
    - _app.config.js
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: facefusion-panel
info:
  author: rxerium
  description: 'FaceFusion panel was detected. FaceFusion is a next-generation face
    swapper and enhancer.

    '
  metadata:
    max-request: 1
    product: facefusion
    shodan-query: http.title:"FaceFusion"
    vendor: facefusion
    verified: true
  name: FaceFusion Panel - Detect
  reference:
  - https://github.com/facefusion/facefusion
  - https://facefusion.io
  severity: info
  tags: panel,facefusion,ai,face-swap,deepfake,detect,discovery
