http:
- matchers:
  - part: body
    type: word
    words:
    - <title>Feast Feature Store
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/p/automl_pipeline'
id: feast-detect
info:
  author: rxerium
  description: 'Detected Feast, an open-source feature store for managing and serving
    ML features.

    '
  metadata:
    max-request: 1
    product: feast
    shodan-query: http.title:"Feast Feature Store"
    vendor: feast
    verified: true
  name: Feast Feature Store - Detect
  reference:
  - https://github.com/feast-dev/feast
  - https://feast.dev/
  severity: info
  tags: tech,feast,feature-store,ml,detect,discovery
