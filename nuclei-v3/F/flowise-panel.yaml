http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Flowise - Build AI Agents, Visually</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: flowise-panel
info:
  author: rxerium
  description: 'Flowise panel was detected. Flowise is an open-source drag-and-drop
    LLM flow builderand AI agent platform. Exposed instances may reveal AI workflow
    configurations, API keys, and connected data sources.

    '
  metadata:
    max-request: 1
    product: flowise
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Flowise - Build
      AI Agents, Visually"})
    shodan-query: http.title:"Flowise - Build AI Agents, Visually"
    vendor: FlowiseAI
    verified: true
  name: Flowise Panel - Detect
  reference:
  - https://github.com/FlowiseAI/Flowise
  - https://flowiseai.com/
  severity: info
  tags: ai,detect,discovery,flowise,llm,panel
