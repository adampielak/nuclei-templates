http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>FUXA</title>
    - assets/lib/svgeditor
    - FUXA
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: fuxa-scada-panel
info:
  author: rxerium
  description: 'FUXA is an open-source web-based SCADA/HMI platform built on Node.js.

    It supports Modbus, OPC-UA, BACnet, MQTT, and Siemens S7 protocols and

    is widely self-hosted for small industrial deployments. Instances are

    frequently exposed to the internet without authentication.

    '
  metadata:
    max-request: 1
    product: fuxa
    runzero-match: service["http.body"] matches `(?i)powered by (?:frangoteam|<span><b>frango</b>team</span>)`
    shodan-query: http.title:"FUXA"
    vendor: frangoteam
    verified: true
  name: FUXA - SCADA/HMI Panel
  reference:
  - https://github.com/frangoteam/FUXA
  severity: info
  tags: discovery,fuxa,hmi,ics,modbus,nodejs,opc-ua,open-source,panel,scada
