http:
- matchers:
  - part: body
    type: word
    words:
    - <title>FastMile 5G Gateway</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/web_whw/'
  - '{{BaseURL}}/web_whw/overview'
  stop-at-first-match: true
id: fastmile-5g-gateway-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'FastMile 5G Gateway web interface was discovered.

    '
  metadata:
    max-request: 2
    runzero-match: service["http.body"] matches "(?i)FastMile 5G Gateway"
    shodan-query: html:"FastMile 5G Gateway"
    verified: true
  name: FastMile 5G Gateway Panel - Detect
  severity: info
  tags: 5g,detect,discovery,login,panel,router
