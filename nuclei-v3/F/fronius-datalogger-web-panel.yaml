http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Fronius Datalogger Web
    - Fronius
    - datalogger
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: fronius-datalogger-web-panel
info:
  author: rxerium
  description: 'Fronius Datalogger Web is a web interface for Fronius solar inverter
    data loggers, providing real-time monitoring and configuration of photovoltaic
    systems.

    '
  metadata:
    max-request: 1
    product: fronius-datalogger-web
    shodan-query: http.title:"Fronius Datalogger Web"
    vendor: Fronius
    verified: true
  name: Fronius Datalogger Web - Login Panel
  reference:
  - https://www.fronius.com/en/solar-energy/installers-partners/technical-data/all-products/system-monitoring/hardware/fronius-datamanager-2-0
  severity: info
  tags: panel,fronius,ics,scada,solar,discovery
