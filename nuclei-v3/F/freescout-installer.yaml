http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - FreeScout Installer
    - Easy Installation and Setup Wizard
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/install'
id: freescout-installer
info:
  author: DhiyaneshDk
  classification:
    cpe: cpe:2.3:a:freescout:freescout:*:*:*:*:*:*:*:*
  description: 'FreeScout is susceptible to the Installation page exposure due to
    misconfiguration.

    '
  metadata:
    max-request: 1
    product: freescout
    shodan-query: http.title:"FreeScout Installer"
    vendor: freescout
    verified: true
  name: FreeScout Installer Exposure
  severity: high
  tags: exposure,freescout,install,misconfig,vuln
