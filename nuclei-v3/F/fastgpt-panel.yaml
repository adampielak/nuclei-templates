id: fastgpt-panel
info:
  name: FastGPT Panel - Detect
  author: rxerium
  severity: info
  description: |
    FastGPT is a knowledge-based platform built on the LLM, offering out-of-the-box
    data processing and model invocation capabilities.
  reference:
    - https://github.com/labring/FastGPT
    - https://fastgpt.in
  metadata:
    runzero-match: service["http.body"] matches "(?i)FastGPT 是一个"
    max-request: 1
    product: fastgpt
    shodan-query: 'http.title:"FastGPT"'
    vendor: labring
    verified: true
  tags: ai,detect,discovery,fastgpt,llm,panel,rag
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "FastGPT"
      - type: status
        status:
          - 200
