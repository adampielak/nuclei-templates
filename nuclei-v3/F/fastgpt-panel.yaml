http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - FastGPT
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: fastgpt-panel
info:
  author: rxerium
  description: 'FastGPT is a knowledge-based platform built on the LLM, offering out-of-the-box

    data processing and model invocation capabilities.

    '
  metadata:
    max-request: 1
    product: fastgpt
    shodan-query: http.title:"FastGPT"
    vendor: labring
    verified: true
  name: FastGPT Panel - Detect
  reference:
  - https://github.com/labring/FastGPT
  - https://fastgpt.in
  severity: info
  tags: panel,fastgpt,llm,ai,rag,detect,discovery
