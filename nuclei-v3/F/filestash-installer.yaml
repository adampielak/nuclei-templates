http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - <title>Admin Console</title>
    - component-loader
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/admin/setup'
id: filestash-installer
info:
  author: DhiyaneshDk
  classification:
    cpe: cpe:2.3:a:filestash:filestash:*:*:*:*:*:*:*:*
  description: 'FreeScout is susceptible to the Installation page exposure due to
    misconfiguration.

    '
  metadata:
    max-request: 1
    product: filestash
    shodan-query: html:"Admin Console" html:"component-loader"
    vendor: filestash
    verified: true
  name: Filestash - Installer Exposure
  severity: high
  tags: exposure,filestash,install,misconfig,vuln
