http:
- extractors:
  - group: 1
    part: body
    regex:
    - ver=([0-9_.]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(to_lower(body), "flexnet", "login", "forgotpassword.do")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/flexnet/logon.do'
id: flexnet-operations-panel
info:
  author: righettod
  description: "FlexNet Operations was detected \u2014 a software monetization platform.\n"
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)FlexNet Login"})
    shodan-query: http.title:"FlexNet Login"
    verified: true
  name: FlexNet Operations Panel - Detect
  reference:
  - https://resources.flexera.com/web/media/documents/Datasheet-FNO-Overview.pdf
  - https://www.flexera.com
  severity: info
  tags: panel,flexnet,login,detect
