http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - FreshRSS API endpoints
    - Fever compatible API
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/api/'
id: freshrss-fever-api
info:
  author: ritikchaddha
  description: 'Detected an exposed FreshRSS instance with the Fever API enabled,
    which could allow unauthorized access to RSS feed data and user-related information
    via accessible Fever-compatible API endpoints.

    '
  metadata:
    max-request: 1
    runzero-match: service["http.body"] matches "(?i)FreshRSS"
    shodan-query: http.html:"FreshRSS"
    verified: true
  name: FreshRSS Fever API - Exposure
  reference:
  - https://freshrss.github.io/FreshRSS/en/developers/06_Fever_API.html
  severity: low
  tags: exposure,freshrss,fever,api
