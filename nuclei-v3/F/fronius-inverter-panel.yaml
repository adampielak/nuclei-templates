http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>Fronius Inverter</title>
    - Fronius
    - inverter
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: fronius-inverter-panel
info:
  author: rxerium
  description: 'Fronius Inverter is the web interface for Fronius GEN24 and Symo series
    solar inverters, providing real-time monitoring, configuration, and energy management
    for photovoltaic systems.

    '
  metadata:
    max-request: 1
    product: fronius-inverter
    shodan-query: http.title:"Fronius Inverter"
    vendor: Fronius
    verified: true
  name: Fronius Inverter - Login Panel
  reference:
  - https://www.fronius.com/en/solar-energy/private-customers/products-solutions/solar-inverters
  severity: info
  tags: panel,fronius,ics,scada,solar,discovery
