http:
- extractors:
  - name: version
    part: body
    regex:
    - Flask ([0-9.]+)
    - Powered by Flask ([0-9.]+)
    type: regex
  - name: flask_id
    part: body
    regex:
    - flask-site-id=([a-z0-9]+)
    - flask\.palletsprojects\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by Flask
    - flask.palletsprojects.com
    - X-Powered-By-Flask
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/index.php'
  - '{{BaseURL}}/static/'
  - '{{BaseURL}}/flask/'
  - '{{BaseURL}}/health/'
  stop-at-first-match: true
id: flask-detect
info:
  author: Chirag Mistry
  description: 'An instance running Flask is detected by looking for specific HTTP
    headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    shodan-query: http.component:"Flask"
  name: Flask Detection
  severity: info
  tags: flask,detect,tech
