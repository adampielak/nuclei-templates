http:
- host-redirects: true
  matchers:
  - case-insensitive: true
    condition: or
    part: body
    type: word
    words:
    - <title>FortiSandbox</title>
    - <span>FortiSandbox
    - fsa_login_logo
    - /images/fsa_logo
    - FortiSandbox
  - part: header
    regex:
    - 'Set-Cookie: FSA_SESSION_ID='
    type: regex
  matchers-condition: or
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/fsa/login'
  - '{{BaseURL}}/ng/login?returnUrl=%2F'
  stop-at-first-match: true
id: fortinet-fortisandbox-panel
info:
  author: "Umut \xD6ZEN,rxerium"
  classification:
    cpe: cpe:2.3:a:fortinet:fortisandbox:*:*:*:*:*:*:*:*
  description: 'Fortinet FortiSandbox login panel was discovered.

    '
  metadata:
    max-request: 1
    product: fortisandbox
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)FortiSandbox"})
    shodan-query: title:"FortiSandbox"
    vendor: fortinet
    verified: true
  name: Fortinet FortiSandbox Panel - Detect
  reference:
  - https://www.fortinet.com/products/sandbox/fortisandbox
  - https://www.fortinet.com/content/dam/fortinet/assets/data-sheets/FortiSandbox.pdf
  severity: info
  tags: discovery,fortinet,fortisandbox,login,panel,tech
