http:
- matchers:
  - status:
    - 200
    type: status
  - condition: and
    part: body
    type: word
    words:
    - PhotoPrism
    - '"public":true'
    - '"authMode":"public"'
  - part: header
    type: word
    words:
    - application/json
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/api/v1/config'
id: photoprism-unauth-exposure
info:
  author: pussycat0x
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-306
  description: 'PhotoPrism instance is running in public mode with authentication
    disabled (PHOTOPRISM_AUTH_MODE=public), exposing all photos, albums, GPS locations,
    face recognition data, and server configuration to unauthenticated users.

    '
  metadata:
    fofa-query: title="PhotoPrism"
    google-query: intitle:"PhotoPrism" inurl:"/library/browse"
    max-request: 1
    product: photoprism
    shodan-query: title:"PhotoPrism"
    vendor: photoprism
    verified: true
  name: PhotoPrism - Unauthenticated Exposure
  reference:
  - https://docs.photoprism.app/getting-started/config-options/#authentication
  - https://docs.photoprism.app/getting-started/
  severity: high
  tags: exposure,misconfig,photoprism,unauth
