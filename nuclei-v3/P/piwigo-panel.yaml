http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - <body id=theIdentificationPage>
    - piwigo.org">Piwigo</a>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/identification.php'
  redirects: true
id: piwigo-panel
info:
  author: daffainfo
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cvss-score: 0.0
    cwe-id: CWE-200
  description: Piwigo login panel was detected.
  metadata:
    fofa-query: title="piwigo"
    google-query: Powered by Piwigo
    max-request: 1
    verified: true
  name: Piwigo Login Panel - Detect
  severity: info
  tags: panel,piwigo
