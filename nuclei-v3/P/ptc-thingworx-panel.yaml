id: ptc-thingworx-panel
info:
  name: PTC ThingWorx - Panel
  author: rxerium
  severity: info
  description: |
    PTC ThingWorx is an Industrial IoT (IIoT) platform for building and deploying
    connected industrial applications, machine monitoring, and remote service solutions.
    Exposed instances may provide unauthenticated access to IIoT dashboards and
    connected device management interfaces.
  reference:
    - https://www.ptc.com/en/products/thingworx
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^Thingworx"})
    max-request: 1
    product: thingworx
    shodan-query: 'http.title:"Thingworx"'
    vendor: PTC
    verified: true
  tags: discovery,ics,iot,panel,ptc,thingworx
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Thingworx</title>'
          - '/Thingworx/Home'
          - 'thingworx.com'
        condition: or
      - type: status
        status:
          - 200
