http:
- matchers:
  - part: body
    regex:
    - sk_(live|test)_[0-9a-zA-Z]{50,}
    type: regex
  - case-insensitive: true
    condition: or
    type: word
    words:
    - paystack
    - secret_key
    - sk_live
    - sk_test
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: paystack-secret-live
info:
  author: Lloydcoder
  description: 'Detected exposed Paystack secret keys (test or live) found in application
    source code, configuration files, or client-side assets.

    '
  name: Paystack Secret/Live Key - Exposure
  reference:
  - https://support.paystack.com/en/articles/2123458
  severity: info
  tags: exposure,token,paystack,fintech,tinlance
