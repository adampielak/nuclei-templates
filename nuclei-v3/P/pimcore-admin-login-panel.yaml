http:
- matchers:
  - part: body
    type: word
    words:
    - <title>Welcome to Pimcore!</title>
    - Pimcore GmbH
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/admin/login'
id: pimcore-admin-login-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'Pimcore admin login interface was discovered.

    '
  metadata:
    max-request: 1
    runzero-match: service["http.body"] matches "(?i)Welcome to Pimcore!"
    shodan-query: html:"Welcome to Pimcore!"
    verified: true
  name: Pimcore Admin Login - Panel Detect
  severity: info
  tags: admin,discovery,login,panel,pimcore
