id: platypus-termite

info:
  name: WangYihang Platypus Termite - Detect
  severity: info
  author: darses
  description: |
    WangYihang Platypus Termite C2 implant API download endpoint was detected.
  classification:
    cve-id: todo
  metadata:
    verified: true
    max-requests: 1
    vendor: wangyihang
    product: platypus
  reference:
    - https://github.com/WangYihang/Platypus
  tags: wangyihang,platypus,termite,c2,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/termite/127.0.0.1"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "github.com/WangYihang/Platypus"

      - type: word
        part: header
        words:
          - "Content-Type: application/octet-stream"

      - type: status
        status:
          - 200
