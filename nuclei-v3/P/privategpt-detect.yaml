id: privategpt-detect
info:
  name: PrivateGPT - Detect
  author: ritikchaddha
  severity: info
  description: |
    PrivateGPT panel has been detected.
  reference:
    - https://github.com/zylon-ai/private-gpt
  metadata:
    runzero-match: service["http.body"] matches "(?i)private gpt"
    max-request: 1
    product: private-gpt
    shodan-query: html:"private gpt"
    verified: true
  tags: ai,detect,discovery,panel,privategpt
http:
  - matchers:
      - condition: or
        part: body
        type: word
        words:
          - alt=PrivateGPT
          - title":"My Private GPT
          - content="My Private GPT
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}'
