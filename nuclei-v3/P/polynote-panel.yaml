http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Polynote</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: polynote-panel
info:
  author: rxerium
  description: 'Polynote is a polyglot notebook supporting Scala, Python, SQL, and
    Spark with a rich UI

    '
  metadata:
    max-request: 1
    product: polynote
    shodan-query: http.title:"Polynote"
    vendor: polynote
    verified: true
  name: Polynote Panel - Detect
  reference:
  - https://github.com/polynote/polynote
  - https://polynote.org
  severity: info
  tags: panel,polynote,notebook,scala,python,detect,discovery
