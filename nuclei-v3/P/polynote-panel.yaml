id: polynote-panel
info:
  name: Polynote Panel - Detect
  author: rxerium
  severity: info
  description: |
    Polynote is a polyglot notebook supporting Scala, Python, SQL, and Spark with a rich UI
  reference:
    - https://github.com/polynote/polynote
    - https://polynote.org
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^Polynote"})
    max-request: 1
    product: polynote
    shodan-query: 'http.title:"Polynote"'
    vendor: polynote
    verified: true
  tags: detect,discovery,notebook,panel,polynote,python,scala
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Polynote</title>"
      - type: status
        status:
          - 200
