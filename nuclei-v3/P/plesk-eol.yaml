http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - (?i)<title>Plesk Obsidian ([0-9.]+)
    - (?i)Plesk Obsidian ([0-9.]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - len(version) > 0
    - compare_versions(version, "<18.0.75")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/login_up.php'
  stop-at-first-match: true
id: plesk-eol
info:
  author: Shivam Kamboj
  description: 'Detected Plesk versions that have reached End-of-Life (EOL) and no
    longer receive security updates.

    '
  metadata:
    max-request: 2
    runzero-match: service["http.head.xPoweredByPlesk"] != ""
    shodan-query: Plesk
    verified: true
  name: Plesk End-of-Life - Detect
  reference:
  - https://endoflife.date/plesk
  - https://docs.plesk.com/release-notes/obsidian/change-log/
  severity: info
  tags: tech,plesk,eol
