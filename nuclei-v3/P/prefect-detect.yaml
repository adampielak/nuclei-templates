http:
- matchers:
  - condition: and
    dsl:
    - contains(tolower(header), "www-authenticate")
    - contains(header, "Prefect UI - Restricted Access")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
id: prefect-detect
info:
  author: rxerium
  description: 'Detected Prefect, a modern workflow orchestration platform with Orion
    UI for managing data pipelines.

    '
  metadata:
    max-request: 1
    shodan-query: '"Prefect" port:4200'
    verified: true
  name: Prefect - Detect
  reference:
  - https://github.com/PrefectHQ/prefect
  - https://www.prefect.io/
  severity: info
  tags: tech,prefect,workflow,orchestration,detect,discovery
