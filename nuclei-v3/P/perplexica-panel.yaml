http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - Perplexica
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: perplexica-panel
info:
  author: rxerium
  description: 'Perplexica is an open-source AI-powered search engine that uses SearXNG
    to search

    the web and provides AI-generated answers.

    '
  metadata:
    max-request: 1
    product: perplexica
    runzero-match: any(each(service["html.titles"]), {# matches "Perplexica"})
    shodan-query: http.title:"Perplexica"
    vendor: perplexica
    verified: true
  name: Perplexica Panel - Detect
  reference:
  - https://github.com/ItzCrazyKns/Perplexica
  severity: info
  tags: ai,detect,discovery,llm,panel,perplexica,search
