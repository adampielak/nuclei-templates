http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>PocketBase
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}'
id: pocketbase-detect
info:
  author: aykutgokbulut
  description: 'Detected the presence of the PocketBase backend.

    '
  metadata:
    max-request: 1
    product: pocketbase
    shodan-query: http.favicon.hash:981081715
    vendor: pocketbase
    verified: true
  name: PocketBase Detection
  reference:
  - https://pocketbase.io/
  severity: info
  tags: tech,pocketbase,detect,discovery
