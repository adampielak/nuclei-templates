http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Portkey AI
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/login'
id: portkey-ai-detect
info:
  author: rxerium
  description: 'Detected Portkey AI interface. Portkey was an AI gateway that provided
    observability, governance, and reliability for LLM applications.

    '
  metadata:
    max-request: 1
    shodan-query: html:"Portkey AI"
    verified: true
  name: Portkey AI Detection
  reference:
  - https://portkey.ai/
  - https://github.com/Portkey-AI/gateway
  severity: info
  tags: tech,portkey,ai,llm,gateway
