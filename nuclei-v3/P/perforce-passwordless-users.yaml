flow: tcp(1) && javascript(1)
id: perforce-passwordless-users
info:
  author: Morgan Robertson
  classification:
    cpe: 'cpe:2.3:a:perforce:perforce_server:*:*:*:*:*:*:*:*

      cpe:2.3:a:perforce:helix_core:*:*:*:*:*:*:*

      '
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-306
  description: 'This template checks for Perforce user accounts that have no password
    set. Accounts without passwords allow unauthenticated access as that user. This
    template works on both ASCII and unicode servers by sending an ASCII compatible
    request and if that fails, a unicode compatible request. This template will not
    work on servers that enforce SSL. This template emulates the perforce binary protocol
    and uses the tagged output format (tag parameter) to detect the presence or absence
    of the Password field in user records.

    '
  metadata:
    fofa-query: port="1666" && protocol="unknown"
    max-requests: 3
    product: P4 (FKA "Helix Core", FKA "Perforce")
    vendor: perforce
  name: Perforce Users With No Password
  reference:
  - https://morganrobertson.net/p4wned/
  - https://www.keysight.com/blogs/en/tech/nwvs/2022/06/08/a-sneak-peek-into-the-protocol-behind-perforce
  - https://help.perforce.com/helix-core/release-notes/current/relnotes.txt
  remediation: 'Set dm.user.noautocreate=2 to prevent unauthenticated account creation.

    Require all users to set passwords and enforce security=3 or higher.

    '
  severity: critical
  tags: perforce,helixcore,scm,unauth,default-login,passwordless
javascript:
- args:
    Host: '{{Host}}'
    Port: '1666'
  code: "var net = require(\"nuclei/net\");\n\n// --- HEX HELPERS ---\nfunction strToHex(str)\
    \ {\n    var hex = \"\";\n    for (var i = 0; i < str.length; i++) {\n       \
    \ var h = str.charCodeAt(i).toString(16);\n        if (h.length < 2) h = \"0\"\
    \ + h;\n        hex += h;\n    }\n    return hex;\n}\n\nfunction numToHexLE(num)\
    \ {\n    var b1 = (num & 0xFF), b2 = ((num >> 8) & 0xFF), b3 = ((num >> 16) &\
    \ 0xFF), b4 = ((num >> 24) & 0xFF);\n    return [b1, b2, b3, b4].map(function(b)\
    \ {\n        var s = b.toString(16);\n        return (s.length < 2 ? \"0\" + s\
    \ : s);\n    }).join(\"\");\n}\n\nfunction packParamHex(name, value) {\n    return\
    \ strToHex(name) + \"00\" + numToHexLE(value.length) + strToHex(value) + \"00\"\
    ;\n}\n\nfunction buildPacketHex(params) {\n    var payloadHex = \"\";\n    for\
    \ (var i = 0; i < params.length; i++) {\n        payloadHex += packParamHex(params[i][0],\
    \ params[i][1]);\n    }\n    var totalLen = payloadHex.length / 2;\n    var lenLow\
    \ = totalLen & 0xFF;\n    var lenHigh = (totalLen >> 8) & 0xFF;\n    var xor =\
    \ lenLow ^ lenHigh;\n    var headerHex = [xor, lenLow, lenHigh, 0, 0].map(function(b)\
    \ {\n        var s = b.toString(16); return (s.length < 2 ? \"0\" + s : s);\n\
    \    }).join(\"\");\n    return headerHex + payloadHex;\n}\n\n// --- PARSER ---\n\
    function parsePerforceResponse(dataStr) {\n    var offset = 0;\n    var results\
    \ = [];\n    while (offset < dataStr.length) {\n        if (offset + 5 > dataStr.length)\
    \ break;\n        var lenLow = dataStr.charCodeAt(offset + 1);\n        var lenHigh\
    \ = dataStr.charCodeAt(offset + 2);\n        var bodyLen = lenLow | (lenHigh <<\
    \ 8);\n        var totalPacketSize = 5 + bodyLen;\n        if (offset + totalPacketSize\
    \ > dataStr.length) break;\n\n        var body = dataStr.substring(offset + 5,\
    \ offset + totalPacketSize);\n        var packetObj = {};\n        var bodyOffset\
    \ = 0;\n\n        while (bodyOffset < body.length) {\n            var nameEnd\
    \ = body.indexOf('\\u0000', bodyOffset);\n            if (nameEnd === -1) break;\n\
    \            var key = body.substring(bodyOffset, nameEnd);\n            bodyOffset\
    \ = nameEnd + 1;\n\n            if (bodyOffset + 4 > body.length) break;\n   \
    \         var v0 = body.charCodeAt(bodyOffset);\n            var v1 = body.charCodeAt(bodyOffset\
    \ + 1);\n            var v2 = body.charCodeAt(bodyOffset + 2);\n            var\
    \ v3 = body.charCodeAt(bodyOffset + 3);\n            var valLen = (v0 | (v1 <<\
    \ 8) | (v2 << 16) | (v3 << 24)) >>> 0;\n            bodyOffset += 4;\n\n     \
    \       if (bodyOffset + valLen > body.length) break;\n            var value =\
    \ body.substring(bodyOffset, bodyOffset + valLen);\n            packetObj[key]\
    \ = value;\n            bodyOffset += valLen + 1;\n        }\n        results.push(packetObj);\n\
    \        offset += totalPacketSize;\n    }\n    return results;\n}\n\n// --- LOGIC:\
    \ Find Passwordless Users ---\n// Uses user-users with tag parameter, which switches\
    \ the server to tagged\n// (client-FstatInfo) output format. The Password field\
    \ is \"enabled\" for\n// users with passwords, and absent entirely for passwordless\
    \ users.\nfunction findPasswordlessUsers(host, port, useUnicode) {\n    var address\
    \ = host + \":\" + port;\n\n    // Packet 1: Protocol Handshake\n    var p1 =\
    \ [\n        [\"cmpfile\", \"\"], [\"altSync\", \"\"], [\"client\", \"76\"], [\"\
    api\", \"99999\"],\n        [\"enableStreams\", \"\"], [\"enableGraph\", \"\"\
    ], [\"expandAndmaps\", \"\"], [\"chunking\", \"\"],\n        [\"host\", \"localhost\"\
    ], [\"port\", address], [\"sndbuf\", \"1969919\"], [\"rcvbuf\", \"98304\"],\n\
    \        [\"autoTune\", \"1\"], [\"func\", \"protocol\"]\n    ];\n\n    // Packet\
    \ 2: user-users with tag parameter for tagged output\n    var p2 = [\n       \
    \ [\"version\", \"2024.2/LINUX26X86_64/2697822\"], [\"autoLogin\", \"\"], [\"\
    prog\", \"p4\"],\n        [\"client\", \"localhost\"], [\"cwd\", \"/tmp\"], [\"\
    host\", \"localhost\"],\n        [\"os\", \"UNIX\"], [\"locale\", \"C\"], [\"\
    user\", \"temp\"]\n    ];\n\n    if (useUnicode) {\n        p2.push([\"unicode\"\
    , \"\"]);\n    }\n\n    p2.push([\"charset\", \"1\"]);\n    p2.push([\"utf8bom\"\
    , \"1\"]);\n    p2.push([\"clientCase\", \"0\"]);\n    p2.push([\"tag\", \"\"\
    ]);\n    p2.push([\"func\", \"user-users\"]);\n\n    var p3 = [[\"func\", \"release\"\
    ]];\n\n    var payloadHex = buildPacketHex(p1) + buildPacketHex(p2);\n    var\
    \ releaseHex = buildPacketHex(p3);\n    var rawBuffer = \"\";\n\n    try {\n \
    \       var conn = net.Open(\"tcp\", address);\n        conn.SendHex(payloadHex);\n\
    \        conn.SetTimeout(5);\n\n        for (var loop = 0; loop < 10; loop++)\
    \ {\n            try {\n                var bytes = conn.Recv(4096);\n       \
    \         if (bytes && bytes.length > 0) {\n                    for (var i = 0;\
    \ i < bytes.length; i++) {\n                        rawBuffer += String.fromCharCode(bytes[i]);\n\
    \                    }\n                    if (rawBuffer.indexOf('func\\u0000\\\
    u0007\\u0000\\u0000\\u0000release\\u0000') !== -1) {\n                       \
    \ break;\n                    }\n                } else {\n                  \
    \  break;\n                }\n            } catch (e) { break; }\n        }\n\
    \        try { conn.SendHex(releaseHex); } catch(e) {}\n        conn.Close();\n\
    \    } catch (e) { return []; }\n\n    var packets = parsePerforceResponse(rawBuffer);\n\
    \    var passwordlessUsers = [];\n\n    for (var i = 0; i < packets.length; i++)\
    \ {\n        var pkt = packets[i];\n        // Tagged output uses client-FstatInfo\
    \ with capitalized field names.\n        // Passwordless users have no Password\
    \ field in their packet.\n        if (pkt['func'] === 'client-FstatInfo' && pkt['User']\
    \ && pkt['Email'] && !pkt['Password']) {\n            passwordlessUsers.push({\n\
    \                \"user\": pkt['User'],\n                \"email\": pkt['Email'],\n\
    \                \"fullName\": pkt['FullName']\n            });\n        }\n \
    \   }\n    return passwordlessUsers;\n}\n\n// --- EXECUTION ---\n// 1. Try ASCII\n\
    var users = findPasswordlessUsers(Host, Port, false);\n\n// 2. If empty, try Unicode\n\
    if (users.length === 0) {\n    users = findPasswordlessUsers(Host, Port, true);\n\
    }\n\nJSON.stringify(users);\n"
  extractors:
  - json:
    - .[].user
    name: passwordless_users
    type: json
  - json:
    - .[].email
    name: emails
    type: json
  - json:
    - .[].fullName
    name: full_names
    type: json
  matchers:
  - type: word
    words:
    - '"user":'
tcp:
- host:
  - '{{Host}}:1666'
  inputs:
  - data: 
    type: hex
  matchers:
  - condition: and
    encoding: hex
    internal: true
    part: data
    type: word
    words:
    - xfiles
    - server
  read-size: 4096
