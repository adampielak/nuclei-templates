file:
- extensions:
  - xml
  matchers:
  - condition: or
    negative: true
    type: word
    words:
    - <disableconsolemenu>
    - <disableconsolemenu>1</disableconsolemenu>
  - condition: and
    type: word
    words:
    - <pfsense>
    - <webgui>
    - <system>
  matchers-condition: and
id: password-protected-consolemenu
info:
  author: pussycat0x
  description: "An unattended computer with an open Console Menu session to the device\
    \ could allow an unauthorized user access to the firewall\u2019s management.\n"
  metadata:
    verified: true
  name: Configure Password Protected on Console Menu
  reference: 'https://docs.netgate.com/pfsense/en/latest/config/advanced-admin.html

    '
  severity: info
  tags: firewall,config,audit,pfsense,file
