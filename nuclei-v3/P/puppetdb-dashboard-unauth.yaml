flow: http(1) && http(2)
http:
- matchers:
  - condition: and
    dsl:
    - 'contains(body, "PuppetDB: Dashboard")'
    - contains_any(body, "metrics","population","puppetdb")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/pdb/dashboard/index.html'
  - '{{BaseURL}}/dashboard/index.html'
  stop-at-first-match: null
- matchers:
  - condition: and
    dsl:
    - contains(header, "application/json")
    - contains_all(body, "certname","environment","value")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/pdb/query/v4/facts'
id: puppetdb-dashboard-unauth
info:
  author: DhiyaneshDk,pussycat0x
  classification:
    cpe: cpe:2.3:a:puppet:puppetdb:*:*:*:*:*:*:*:*
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-306
  description: 'PuppetDB dashboard and API endpoints were found accessible without
    authentication. PuppetDB stores infrastructure configuration data including node
    facts, catalogs, and reports. Unauthenticated access exposes sensitive infrastructure
    details such as hostnames, IP addresses, OS versions, installed packages, Puppet
    classes, and configuration parameters across the entire managed environment.

    '
  impact: 'An attacker can enumerate the entire Puppet-managed infrastructure, extract
    node facts (hostnames, IPs, OS details, hardware specs), read catalogs containing
    configuration secrets, and gather intelligence for lateral movement or targeted
    attacks.

    '
  metadata:
    fofa-query: 'title="PuppetDB: Dashboard"'
    max-request: 5
    product: puppetdb
    shodan-query: 'title:"PuppetDB: Dashboard"'
    vendor: puppet
    verified: true
  name: PuppetDB Dashboard - Unauthenticated Access
  reference:
  - https://puppet.com/docs/puppetdb/latest/configure.html
  - https://puppet.com/docs/puppetdb/latest/api/index.html
  - https://puppet.com/security/cve/CVE-2020-7943
  remediation: 'Restrict access to PuppetDB by configuring certificate-based authentication
    (mutual TLS) in the jetty.ini or webserver.conf. Use firewall rules to limit access
    to trusted Puppet infrastructure hosts only. Disable the dashboard in production
    or place it behind an authenticated reverse proxy.

    '
  severity: high
  tags: dashboard,exposure,misconfig,puppetdb,unauth
