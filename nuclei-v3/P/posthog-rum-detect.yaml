http:
- matchers:
  - condition: or
    part: body
    regex:
    - window\.posthog
    - api_host["']?\s*:\s*["'][^"']*posthog
    - posthog\.init\s*\(
    type: regex
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: posthog-rum-detect
info:
  author: Shivam Kamboj
  description: 'Detects PostHog Product Analytics & RUM (Real User Monitoring) SDK
    artifacts in HTML responses.

    '
  metadata:
    max-request: 1
    shodan-query: html:"posthog.init"
    verified: true
  name: PostHog Browser RUM - Detect
  reference:
  - https://posthog.com/docs/integrate/client/js
  - https://github.com/PostHog/posthog-js
  - https://www.npmjs.com/package/posthog-js
  severity: info
  tags: tech,discovery,rum,posthog
