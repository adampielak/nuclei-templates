flow: http(1) && http(2)
http:
- matchers:
  - dsl:
    - contains_any(tolower(body), "alt=\"phpMyAdmin", "name=\"pma_username", "/pmahomme/")
    internal: true
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}{{paths}}'
  payloads:
    paths:
    - ''
    - /phpmyadmin/
    - /admin/phpmyadmin/
    - /_phpmyadmin/
    - /administrator/components/com_joommyadmin/phpmyadmin/
    - /apache-default/phpmyadmin/
    - /blog/phpmyadmin/
    - /forum/phpmyadmin/
    - /php/phpmyadmin/
    - /typo3/phpmyadmin/
    - /web/phpmyadmin/
    - /xampp/phpmyadmin/
    - /phpMyAdmin/
    - /phpma/
    - /phpMyAdmin/index.php
  stop-at-first-match: true
- matchers:
  - condition: and
    dsl:
    - status_code == 200 || status_code == 500
    - contains(body, "phpmyadmin")
    - contains_any(body, "Fatal error", "require_once", "Error")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/phpmyadmin/libraries/advisory_rules_generic.php'
  - '{{BaseURL}}/phpmyadmin/libraries/phpseclib/Crypt/AES.php'
  - '{{BaseURL}}/phpmyadmin/libraries/phpseclib/Crypt/Rijndael.php'
  stop-at-first-match: true
id: phpmyadmin-fpd
info:
  author: DhiyaneshDk
  description: 'Detected potential Full Path Disclosure (FPD) via directly accessible
    phpMyAdmin files that may throw PHP errors revealing filesystem paths when error
    display is enabled.

    '
  metadata:
    max-request: 1
    runzero-match: service["product"] contains "phpMyAdmin:phpMyAdmin"
    shodan-query: html:"phpmyadmin"
    verified: true
  name: phpMyAdmin - Full Path Disclosure
  severity: low
  tags: exposure,fpd,phpmyadmin,php
