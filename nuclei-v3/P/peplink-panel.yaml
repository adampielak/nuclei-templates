id: peplink-panel
info:
  name: Peplink Login Panel - Detect
  author: pussycat0x
  severity: info
  description: peplink login panel was detected.
  metadata:
    product: balance_two_firmware
    shodan-query: html:"PEPLINK"
    vendor: peplink
    verified: true
  tags: discovery,login,panel,peplink,router
http:
  - matchers:
      - condition: and
        part: body
        type: word
        words:
          - init_company_name = "Peplink"
          - <title>Web Admin | Welcome
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/cgi-bin/MANGA/index.cgi'
