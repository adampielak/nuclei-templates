http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "Paperless-ngx", "Paperless-ngx project and contributors")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/accounts/login/'
id: paperless-ngx-panel
info:
  author: ChrisJr404
  description: 'Detected Paperless-ngx was a self-hosted document management platform
    for scanning, OCR-ing and tagging paper documents.

    '
  metadata:
    fofa-query: title="Paperless-ngx"
    max-request: 1
    product: paperless-ngx
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Paperless-ngx"})
    shodan-query: http.title:"Paperless-ngx"
    vendor: paperless-ngx
    verified: true
  name: Paperless-ngx Panel - Detect
  reference:
  - https://github.com/paperless-ngx/paperless-ngx
  - https://docs.paperless-ngx.com/
  severity: info
  tags: detect,discovery,panel,paperless,paperless-ngx
