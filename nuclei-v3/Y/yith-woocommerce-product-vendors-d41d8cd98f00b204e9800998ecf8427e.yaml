id: yith-woocommerce-product-vendors-d41d8cd98f00b204e9800998ecf8427e
info:
  author: topscoder
  classification:
    cve-id: null
    cvss-metrics: null
    cvss-score: null
  description: "The YITH WooCommerce Multi Vendor plugin for WordPress is vulnerable\
    \ to Reflected Cross-Site Scripting via the \u2018page\u2019 parameter in versions\
    \ up to, and including, 3.8.0 due to insufficient input sanitization and output\
    \ escaping. This makes it possible for unauthenticated attackers to inject arbitrary\
    \ web scripts in pages that execute if they can successfully trick a user into\
    \ performing an action such as clicking on a link."
  metadata:
    fofa-query: wp-content/plugins/yith-woocommerce-product-vendors/
