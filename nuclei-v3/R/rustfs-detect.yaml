http:
- matchers:
  - condition: or
    type: word
    words:
    - <title>RustFS</title>
    - title":"RustFS
    - /rustfs/console/_nuxt
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/rustfs/console/auth/login'
id: rustfs-detect
info:
  author: icarot
  classification:
    cpe: cpe:2.3:a:rustfs:rustfs:*:*:*:*:*:rust:*:*
  description: 'Detects a Rustfs server, a high-performance, distributed object storage
    system built in Rust.

    '
  metadata:
    product: rustfs
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)RustFS"})
    shodan-query: title:"RustFS"
    vendor: rustfs
  name: Rustfs - Detect
  reference:
  - https://github.com/rustfs/rustfs
  severity: info
  tags: tech,rustfs,rustfs,detect
