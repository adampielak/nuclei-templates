http:
- matchers:
  - regex:
    - merchantId["']?\s*[:=]\s*["']?\d{10,}["']?
    type: regex
  - case-insensitive: true
    condition: or
    type: word
    words:
    - remita
    - merchantId
    - publicKey
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: remita-credentials
info:
  author: Lloydcoder
  description: 'Detected exposed Remita merchant IDs, API keys, and secret hashes
    in application source code, configuration files, or publicly accessible assets.

    '
  name: Remita Merchant ID & API Key - Exposure
  reference:
  - https://api.remita.net/
  severity: low
  tags: exposure,remita,fintech,tinlance,lloydcoder,token
