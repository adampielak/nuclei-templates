id: rpc-udp-detect
info:
  author: pussycat0x
  classification:
    cwe-id: CWE-200
  description: 'Detects Sun RPC Portmapper (rpcbind) service on UDP port 111 using
    amap and Nmap RPC probes for reliable identification. An exposed Portmapper may
    reveal RPC services like NFS or NIS and enable further enumeration or attacks.

    '
  metadata:
    max-request: 1
    shodan-query: port:111
    verified: true
  name: RPC Portmapper (UDP) - Detect
  reference:
  - https://github.com/CiscoCXSecurity/udp-proto-scanner
  - https://www.rfc-editor.org/rfc/rfc1833
  - https://nmap.org/nsedoc/scripts/rpcinfo.html
  - https://book.hacktricks.xyz/pentesting/pentesting-rpcbind
  severity: info
  tags: detection,js,network,nfs,portmapper,rpc,rpcbind,udp
javascript:
- args:
    Host: '{{Host}}'
    Port: 111
  code: "const c = require(\"nuclei/net\");\nlet results = [];\n\n// Probe 1: amap\
    \ RPC portmapper probe (40 bytes)\nconst amapPayload = \"039b65420000000000000002000f4243000000000000000000000000000000000000000000000000\"\
    ;\nlet conn = c.Open('udp', `${Host}:${Port}`);\nconn.SendHex(amapPayload);\n\
    let amapResp = conn.RecvHex(4096);\nconn.Close();\nif (amapResp && amapResp.length\
    \ > 16) {\n  results.push(\"RPC Portmapper responded to amap probe\");\n}\n\n\
    // Probe 2: nmap RPCCheck probe (40 bytes)\nconst nmapPayload = \"72FE1D130000000000000002000186A00001977C0000000000000000000000000000000000000000\"\
    ;\nconn = c.Open('udp', `${Host}:${Port}`);\nconn.SendHex(nmapPayload);\nlet nmapResp\
    \ = conn.RecvHex(4096);\nconn.Close();\nif (nmapResp && nmapResp.length > 16)\
    \ {\n  results.push(\"RPC Portmapper responded to nmap RPCCheck probe\");\n}\n\
    \nresults.join(\"\\n\");\n"
  extractors:
  - dsl:
    - '"RPC Portmapper UDP Detected"'
    type: dsl
  matchers:
  - condition: and
    dsl:
    - success == true
    - len(response) > 0
    type: dsl
  matchers-condition: and
  pre-condition: 'isUDPPortOpen(Host, Port);

    '
