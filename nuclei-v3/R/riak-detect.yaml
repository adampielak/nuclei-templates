id: riak-detect
info:
  author: pussycat0x
  description: Riak is a distributed NoSQL key-value data store that offers high availability,
    fault tolerance, operational simplicity, and scalability.
  metadata:
    max-request: 2
    shodan-query: product:"Riak"
    verified: true
  name: Riak Detection
  severity: info
  tags: network,oss
tcp:
- extractors:
  - regex:
    - riak@([0-9.]+)..([0-9.]+([a-z]+[0-9]))
    type: regex
  host:
  - '{{Hostname}}'
  - '{{Host}}:8087'
  inputs:
  - data: 71
    type: hex
  matchers:
  - type: word
    words:
    - riak
  read-size: 2048
