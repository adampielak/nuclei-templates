http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - RecoverPoint Wizard
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/#!/welcome'
id: recoverpoint-panel
info:
  author: rxerium
  description: 'Dell EMC RecoverPoint management panel was detected.

    '
  metadata:
    max-request: 1
    product: emc_recoverpoint
    runzero-match: service["favicon.ico.image.mmh3"] == "-742276344"
    shodan-query: http.favicon.hash:-742276344
    vendor: dell
    verified: true
  name: Dell EMC RecoverPoint Panel - Detect
  reference:
  - https://www.delltechnologies.com/en-us/data-protection/recoverpoint-for-virtual-machines.htm
  severity: info
  tags: panel,recoverpoint,dell,emc,login,discovery
