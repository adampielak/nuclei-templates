http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - RAGFlow
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: ragflow-panel
info:
  author: rxerium
  description: 'RAGFlow is an open-source RAG (Retrieval-Augmented Generation) engine
    based on deep

    document understanding.

    '
  metadata:
    max-request: 1
    product: ragflow
    runzero-match: any(each(service["html.titles"]), {# matches "RAGFlow"})
    shodan-query: http.title:"RAGFlow"
    vendor: infiniflow
    verified: true
  name: RAGFlow Panel - Detect
  reference:
  - https://github.com/infiniflow/ragflow
  - https://ragflow.io
  severity: info
  tags: ai,detect,discovery,llm,panel,rag,ragflow
