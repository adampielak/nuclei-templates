id: ragflow-panel
info:
  name: RAGFlow Panel - Detect
  author: rxerium
  severity: info
  description: |
    RAGFlow is an open-source RAG (Retrieval-Augmented Generation) engine based on deep
    document understanding.
  reference:
    - https://github.com/infiniflow/ragflow
    - https://ragflow.io
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "RAGFlow"})
    max-request: 1
    product: ragflow
    shodan-query: 'http.title:"RAGFlow"'
    vendor: infiniflow
    verified: true
  tags: ai,detect,discovery,llm,panel,rag,ragflow
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "RAGFlow"
      - type: status
        status:
          - 200
