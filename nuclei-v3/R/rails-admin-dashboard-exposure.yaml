http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "Settings</a>", "rails_admin_sidebar", "rails_admin_content")
    - '!contains_any(body, "Sign in", "Log in", "login_form", "devise")'
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/admin'
  - '{{BaseURL}}/rails_admin'
  stop-at-first-match: true
id: rails-admin-dashboard-exposure
info:
  author: 0x_Akoko
  description: 'Detected RailsAdmin dashboard was exposed without proper authentication,
    allowing unauthorized access to data management interface.

    '
  metadata:
    fofa-query: body="RailsAdmin"
    max-request: 2
    runzero-match: service["http.body"] matches "(?i)RailsAdmin"
    shodan-query: http.html:"RailsAdmin"
    verified: true
  name: RailsAdmin Dashboard Exposure
  reference:
  - https://github.com/railsadminteam/rails_admin
  severity: high
  tags: rails,admin,exposure,misconfig,panel
