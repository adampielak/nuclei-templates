http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - 'Product: Raritan PDU'
    - PDU G2
    - responsive-gui
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: raritan-pdu-panel
info:
  author: rxerium
  description: 'Raritan intelligent PDU web interface panel has been detected.

    '
  metadata:
    max-request: 1
    product: pdu
    shodan-query: http.html:"Raritan" http.html:"PDU"
    vendor: Raritan
    verified: true
  name: Raritan PDU - Login Panel
  reference:
  - https://www.raritan.com/
  severity: info
  tags: panel,raritan,pdu,ics,power,discovery
