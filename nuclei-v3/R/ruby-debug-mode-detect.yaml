http:
- matchers:
  - condition: and
    type: word
    words:
    - ActionController::RoutingError
    - No route matches
  method: GET
  path:
  - '{{BaseURL}}/Th3Fir_thispagedoesnotexist_Th3Fir'
id: ruby-debug-mode-detect
info:
  author: thefir,vulnspace
  description: Enabled debug mode in Ruby on Rails allows to call a stacktrace when
    accessing a non-existent endpoint.
  metadata:
    max-request: 3
  name: Enabled debug mode in a Ruby on Rails application detection
  severity: Medium
  tags:
  - ruby
  - rails
  - debug
  - stacktrace
  - error
