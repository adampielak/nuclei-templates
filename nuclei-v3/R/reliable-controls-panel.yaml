http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Reliable Controls
    - Reliable Controls Embedded Web Server
    - mpw-sw
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: reliable-controls-panel
info:
  author: rxerium
  description: 'Reliable Controls MACH-ProWebSys is a web-based building controller
    for

    HVAC, lighting, and energy management using BACnet/IP. These controllers

    are widely deployed in commercial buildings across North America and are

    often directly internet-facing with no VPN protection.

    '
  metadata:
    max-request: 1
    product: mach-system
    runzero-match: any(each(service["html.titles"]), {# matches "Reliable Controls"})
    shodan-query: http.title:"Reliable Controls"
    vendor: Reliable Controls
    verified: true
  name: Reliable Controls MACH-Pro - Login Panel
  reference:
  - https://reliablecontrols.com/products/mach-prowebsys/
  severity: info
  tags: bacnet,bms,building-automation,discovery,ics,mach-pro,panel,reliable-controls
