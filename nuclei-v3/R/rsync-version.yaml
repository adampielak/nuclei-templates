id: rsync-version
info:
  author: DhiyaneshDK
  description: 'Identify the Version of the Rsync Protocol

    '
  metadata:
    max-request: 1
    shodan-query: port:"873"
    verified: true
  name: Rsync Version - Detect
  severity: info
  tags: js,network,rsync,enum
javascript:
- args:
    Host: '{{Host}}'
    Port: '873'
  code: 'let m = require(''nuclei/rsync'');

    let c = m.RsyncClient();

    let response = c.IsRsync(Host,Port);

    Export(response);

    '
  extractors:
  - json:
    - .Banner
    type: json
