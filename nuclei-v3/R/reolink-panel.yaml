id: reolink-panel
info:
  name: Reolink Panel - Detect
  author: s4e-io
  severity: info
  description: |
    Reolink panel was discovered.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Reolink"})
    fofa-query: Reolink
    max-request: 1
    shodan-query: title:"Reolink"
    verified: true
  tags: detect,discovery,login,panel,reolink
http:
  - host-redirects: true
    matchers:
      - condition: and
        dsl:
          - contains(body, "Reolink</title>")
          - status_code == 200
        type: dsl
    max-redirects: 2
    method: GET
    path:
      - '{{BaseURL}}'
