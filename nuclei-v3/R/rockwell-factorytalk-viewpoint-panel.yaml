http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - /ftvp/ViewPoint.aspx
    - <title>FTVP</title>
    - /ftvp/Images/favicon.ico
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: rockwell-factorytalk-viewpoint-panel
info:
  author: rxerium
  description: 'Rockwell Automation FactoryTalk ViewPoint is a web-based HMI that
    allows remote

    monitoring and control of industrial automation systems from a browser. It provides

    access to FactoryTalk View Machine Edition and Site Edition displays. Exposed

    instances may allow unauthorised access to industrial control system visualisations.

    '
  metadata:
    max-request: 1
    product: factorytalk-viewpoint
    shodan-query: http.title:"FactoryTalk ViewPoint"
    vendor: Rockwell Automation
    verified: true
  name: Rockwell Automation FactoryTalk ViewPoint - Panel
  reference:
  - https://www.rockwellautomation.com/en-us/products/software/factorytalk/operationsuite/view/factorytalk-viewpoint.html
  severity: info
  tags: panel,ics,scada,rockwell,factorytalk,discovery
