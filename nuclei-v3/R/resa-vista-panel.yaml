http:
- extractors:
  - group: 1
    part: body
    regex:
    - v=([0-9.]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(to_lower(body), "vista", "resa airport", "login")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/account/login'
id: resa-vista-panel
info:
  author: righettod
  description: "RESA Vista was detected \u2014 an automated multimedia display system\
    \ for airports.\n"
  metadata:
    max-request: 1
    verified: true
  name: RESA Vista Panel - Detect
  reference:
  - https://resa.aero/en/solutions-operations-billing/vista-staff-fids/
  severity: info
  tags: panel,resa,login,detect
