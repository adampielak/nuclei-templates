http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Red Lion Controls
    - www.redlion.net
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: redlion-hmi-panel
info:
  author: rxerium
  description: 'Red Lion HMI web interface panel has been detected.

    '
  metadata:
    max-request: 1
    product: hmi
    shodan-query: http.html:"Red Lion"
    vendor: Red Lion Controls
    verified: true
  name: Red Lion HMI - Login Panel
  reference:
  - https://www.redlion.net/
  severity: info
  tags: panel,redlion,hmi,ics,discovery
