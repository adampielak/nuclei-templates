http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - '"gitVersion":"v?([0-9]+\.[0-9.]+)"'
    type: regex
  matchers:
  - dsl:
    - len(version) > 0 && compare_versions(version, "<2.0")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
id: jaeger-eol
info:
  author: Shivam Kamboj
  description: 'Detected Jaeger versions that have reached End-of-Life (EOL) and no
    longer receive security updates.

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Jaeger UI"})
    shodan-query: title:"Jaeger UI"
    verified: true
  name: Jaeger End-of-Life - Detect
  reference:
  - https://endoflife.date/jaeger
  - https://github.com/jaegertracing/jaeger/issues/6321
  severity: info
  tags: tech,jaeger,eol
