id: jway-products-detect
info:
  name: JWay Products - Detect
  author: righettod
  severity: info
  description: |
    JWay products was detected.
  reference:
    - https://www.jway.eu/produits-services
  metadata:
    max-request: 1
    verified: true
  tags: detect,discovery,jway,panel
http:
  - extractors:
      - group: 1
        part: body
        regex:
          - (?i)Produced\s+by\s+Form([a-z]+)
        type: regex
      - group: 1
        part: body
        regex:
          - Form(?:[a-zA-Z]+)\s+v([0-9.]+)
        type: regex
    matchers:
      - condition: and
        dsl:
          - status_code == 200
          - contains_any(to_lower(body), "jway.footer.url.help", "jway.footer.url.contact", "jway.footer.url.legal")
        type: dsl
    method: GET
    path:
      - '{{BaseURL}}/generatedHomepage.html'
