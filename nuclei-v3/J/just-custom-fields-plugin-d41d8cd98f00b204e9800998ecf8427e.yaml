    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:N
    cvss-score: 4.3
  description: 'The Just Custom Fields plugin for WordPress is vulnerable to Cross-Site
    Request Forgery in all versions up to, and including, 3.3.2. This is due to missing
    or incorrect nonce validation on multiple AJAX actions. This makes it possible
    for unauthenticated attackers to create, modify, and delete custom fields via
    a forged request granted they can trick a site administrator into performing an
    action such as clicking on a link.

    '
