id: joplin-panel
info:
  name: Joplin Server Login - Panel
  author: pussycat0x
  severity: info
  description: |
    Joplin Server login panel detected.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Joplin Server"})
    max-request: 1
    shodan-query: title:"Joplin Server"
    verified: true
  tags: discovery,joplin,login,panel
http:
  - matchers:
      - part: body
        type: word
        words:
          - <title>Joplin Server - Login</title>
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/login'
