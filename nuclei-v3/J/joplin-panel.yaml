http:
- matchers:
  - part: body
    type: word
    words:
    - <title>Joplin Server - Login</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/login'
id: joplin-panel
info:
  author: pussycat0x
  description: 'Joplin Server login panel detected.

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Joplin Server"})
    shodan-query: title:"Joplin Server"
    verified: true
  name: Joplin Server Login - Panel
  severity: info
  tags: discovery,joplin,login,panel
