http:
- host-redirects: true
  matchers:
  - part: body
    regex:
    - (?i)<title>[^<]*JupyterHub[^<]*</title>
    type: regex
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/hub/login'
id: jupyterhub-panel
info:
  author: rxerium
  description: 'JupyterHub is a multi-user server for Jupyter notebooks

    '
  metadata:
    max-request: 1
    product: jupyterhub
    shodan-query: http.title:"JupyterHub"
    vendor: jupyter
    verified: true
  name: JupyterHub Panel - Detect
  reference:
  - https://github.com/jupyterhub/jupyterhub
  - https://jupyter.org/hub
  severity: info
  tags: panel,jupyterhub,jupyter,ml,ai,detect,discovery
