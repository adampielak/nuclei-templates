http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>GridVis</title>
    - /landingpage/img/favicon.ico
    - gve-8janitza.energy.security
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/landingpage'
  - '{{BaseURL}}/landingpage/'
id: janitza-gridvis-detect
info:
  author: rxerium
  description: 'Janitza GridVis is an energy monitoring and management software platform
    by Janitza Electronics GmbH.

    It provides real-time power quality analysis, energy data logging, and grid visualisation
    for industrial facilities.

    '
  metadata:
    max-request: 1
    product: gridvis
    runzero-match: any(each(service["html.titles"]), {# matches "^GridVis"})
    shodan-query: http.title:"GridVis"
    vendor: janitza
    verified: true
  name: Janitza GridVis Energy Management - Detect
  reference:
  - https://www.janitza.com/gridvis.html
  severity: info
  tags: detect,energy,ics,janitza,panel,scada,tech
