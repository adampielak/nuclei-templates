id: janitza-umg-panel
info:
  name: Janitza UMG Power Meter - Login Panel
  author: rxerium
  severity: info
  description: |
    Janitza UMG series power meters and energy analyzers expose a web interface for energy monitoring and power quality analysis.
  reference:
    - https://www.janitza.de/energy-analyzers.html
  metadata:
    runzero-match: service["http.body"] matches "(?i)Janitza UMG"
    max-request: 1
    product: umg
    shodan-query: http.title:"Janitza"
    vendor: Janitza
    verified: true
  tags: discovery,energy,ics,janitza,panel,power-meter
http:
  - host-redirects: true
    matchers:
      - condition: and
        # digest: 4b0a00483046022100c47dd313471c9286bd88076e381e20dd9fb98f5d24f48f26e51c9230ebb1aa2f022100901afb0f1a9c0e28ea6c4f680023ba7e6d463cf133c5a761773db10e853bd14b:922c64590222798bb761d5b6d8e72950

        dsl:
          - status_code == 200
          - contains(body, "Janitza electronics")
          - contains_any(body, "UMG", "janitza.de")
        type: dsl
    max-redirects: 2
    method: GET
    path:
      - '{{BaseURL}}'
