id: jeedom-default-login
info:
  name: Jeedom - Default Login
  author: ritikchaddha
  severity: high
  description: |
    Jeedom default login has been detected.
  classification:
    cpe: cpe:2.3:a:jeedom:jeedom:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "Jeedom"})
    max-request: 2
    product: jeedom
    shodan-query: title:"Jeedom"
    vendor: jeedom
    verified: true
  tags: default-login,jeedom,misconfig,vuln
variables:
  password: admin
  username: admin
http:
  - matchers:
      - condition: and
        part: body_1
        type: word
        words:
          - state":"ok
          - 'result":'
      - condition: and
        part: body_2
        type: word
        words:
          - logout=1
          - Plugins</span>
    matchers-condition: and
    raw:
      - |
        POST /core/ajax/user.ajax.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        action=login&username={{username}}&password={{password}}&twoFactorCode=&storeConnection=0
      - |
        GET /index.php?v=d&p=dashboard HTTP/1.1
        Host: {{Hostname}}
