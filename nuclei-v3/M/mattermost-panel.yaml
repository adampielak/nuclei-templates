id: mattermost-panel
info:
  name: Mattermost Login - Panel
  author: darses
  severity: info
  description: |
    Mattermost Login Panel was discovered.
  metadata:
    runzero-match: service["http.body"] matches "(?i)'content=\"Mattermost\"'"
    fofa-query: content="Mattermost"
    max-requests: 1
    shodan-query: html:'content="Mattermost"'
    vendor: mattermost
    verified: true
  tags: discovery,login,mattermost,panel
http:
  - extractors:
      - group: 1
        name: version
        part: header
        regex:
          - 'X-Version-Id: (\d+\.\d+\.\d+)'
        type: regex
    matchers:
      - case-insensitive: true
        part: body
        type: word
        words:
          - content="Mattermost"
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/login'
