http:
- matchers:
  - case-insensitive: true
    condition: and
    type: word
    words:
    - ModX Revolution
    - installer-steps
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/setup/'
id: modx-installer
info:
  author: DhiyaneshDk
  description: 'Detected accessible ModX CMS installation or setup pages that indicated
    an incomplete installation.An exposed installation interface allowed attackers
    to complete the setup process and gain administrative access.

    '
  metadata:
    max-request: 1
    shodan-query: title:"MODX Revolution"
    verified: true
  name: ModX CMS - Unfinished Installation
  reference:
  - https://modx.com/
  - https://docs.modx.com/3.x/en/getting-started/installation
  severity: high
  tags: exposure,install,misconfig,modx
