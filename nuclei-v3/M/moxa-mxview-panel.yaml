http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - MXview One Central Manager
    - MXview
    - Central Manager
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: moxa-mxview-panel
info:
  author: rxerium
  description: 'Moxa MXview One is a network management platform for industrial Ethernet

    infrastructure, OT network monitoring, and topology visualisation. It is

    widely used in manufacturing, energy, and transportation to manage industrial

    switches and routers.

    '
  metadata:
    max-request: 1
    product: mxview
    runzero-match: any(each(service["html.titles"]), {# matches "MXview One Central
      Manager"})
    shodan-query: http.title:"MXview One Central Manager"
    vendor: Moxa
    verified: true
  name: Moxa MXview One - Network Management Panel
  reference:
  - https://www.moxa.com/en/products/industrial-network-infrastructure/network-management-software/mxview-series/
  severity: info
  tags: discovery,ics,industrial-ethernet,moxa,mxview,networking,ot,panel
