http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>Prostar MPPT - Live Data</title>
    - ProstarMPPTLive
    - morningstarcorp.com
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: morningstar-prostar-mppt-detect
info:
  author: rxerium
  description: 'Morningstar ProStar MPPT is a solar charge controller with a built-in
    web server providing

    live data monitoring for off-grid and industrial solar installations.

    The exposed interface displays real-time array, battery, and load data without
    authentication.

    '
  metadata:
    max-request: 1
    product: prostar-mppt
    shodan-query: http.title:"Prostar MPPT - Live Data"
    vendor: morningstar
    verified: true
  name: Morningstar ProStar MPPT Solar Charge Controller - Detect
  reference:
  - https://www.morningstarcorp.com/products/prostar-mppt/
  severity: info
  tags: tech,panel,morningstar,ics,solar,energy,scada,detect
