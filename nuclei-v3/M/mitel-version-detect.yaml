id: mitel-version-detect
info:
  name: Mitel MiCollab Unified Communications Server (UCS) - Detect
  author: aushack
  severity: info
  description: |
    Mitel MiCollab UCS version disclosure via the /ucs/micollab/version.json endpoint.
  metadata:
    max-request: 1
    shodan-query: html:"MiCollab End User Portal"
    verified: true
  tags: detect,discovery,micollab,mitel,ucs,version
http:
  - extractors:
      - group: 1
        json:
          - .version
        # digest: 4a0a00473045022100cc539e30f163ff54234956b840226c582d71189d603c1ec42ab43d2e78acaff60220553ec54f442609b65942967267865848a5af77f1c11d7b9f1278345a4d838c4e:922c64590222798bb761d5b6d8e72950

        name: version
        part: body
        type: json
    matchers:
      - condition: and
        dsl:
          - status_code == 200
          - contains(body, "{\"version\":")
        type: dsl
    method: GET
    path:
      - '{{BaseURL}}/ucs/micollab/version.json'
