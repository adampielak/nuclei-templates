id: maverick-ssh-detect
info:
  author: johnk3r
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'Maverick SSH service was detected.

    '
  metadata:
    max-request: 1
    shodan-query: Maverick_SSHD
    verified: true
  name: Maverick SSH Service - Detect
  reference:
  - https://github.com/sshtools/maverick-synergy
  severity: info
  tags: network,ssh,detect,detection,tcp,discovery
tcp:
- extractors:
  - regex:
    - (?i)SSH-(.*)-Maverick_[^\r]+
    type: regex
  host:
  - '{{Hostname}}'
  matchers:
  - regex:
    - (?i)Maverick
    type: regex
  port: 22
