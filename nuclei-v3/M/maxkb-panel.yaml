id: maxkb-panel
info:
  name: MaxKB Panel - Detect
  author: rxerium
  severity: info
  description: |
    MaxKB, an open-source RAG-based knowledge base and LLM chatbot platform, was detected.
  reference:
    - https://github.com/1Panel-dev/MaxKB
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^MaxKB$"})
    max-request: 1
    product: maxkb
    shodan-query: http.title:"MaxKB"
    vendor: 1panel
    verified: true
  tags: ai,detect,discovery,llm,maxkb,panel,rag
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>MaxKB</title>"
      - type: status
        status:
          - 200
