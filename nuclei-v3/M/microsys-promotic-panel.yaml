http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>PROMOTIC Redirection</title>
  - part: header
    type: word
    words:
    - 'Server: Promotic'
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: microsys-promotic-panel
info:
  author: rxerium
  description: 'Microsys Promotic is a SCADA/HMI software platform widely deployed
    in central European

    industrial and building automation applications. The embedded web server exposes
    a

    runtime panel accessible over HTTP on non-standard ports.

    '
  metadata:
    max-request: 1
    product: promotic
    runzero-match: any(each(service["html.titles"]), {# matches "PROMOTIC"})
    shodan-query: http.title:"PROMOTIC"
    vendor: MicroSys
    verified: true
  name: Microsys Promotic SCADA - Login Panel
  reference:
  - https://www.microsys.cz/en/products/promotic/
  severity: info
  tags: discovery,ics,microsys,ot,panel,promotic,scada
