id: moxa-vpn-router-panel
info:
  name: Moxa OnCell VPN - Login Panel
  author: biero-el-corridor
  severity: info
  description: |
    Moxa OnCell VPN panel was discovered.
  metadata:
    max-request: 1
    shodan-query: http.favicon.hash:-234487373
    verified: true
  tags: discovery,login,moxo,oncel,panel,vpn
http:
  - matchers:
      - condition: and
        part: body
        type: word
        words:
          - <title>Moxa OnCell
          - Login
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/Login.asp'
