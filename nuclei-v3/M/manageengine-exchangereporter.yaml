id: manageengine-exchangereporter
info:
  name: ZOHO ManageEngine Exchange Reporter Plus Panel - Detect
  author: darses
  severity: info
  description: |
    ZOHO ManageEngine Exchange Reporter Plus panel was detected.
  reference:
    - https://www.manageengine.com/products/exchange-reports/
  classification:
    cpe: cpe:2.3:a:zohocorp:manageengine_exchange_reporter_plus:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)ManageEngine - Exchange Reporter Plus"}) || service["favicon.ico.image.mmh3"] == "230963457"
    fofa-query:
      - title="ManageEngine - Exchange Reporter Plus"
      - icon_hash="230963457"
    max-request: 1
    product: manageengine_exchange_reporter_plus
    shodan-query:
      - title:"ManageEngine - Exchange Reporter Plus"
      - http.favicon.hash:230963457
    vendor: zohocorp
    verified: true
  tags: discovery,login,manageengine,panel,zoho,zohocorp
http:
  - extractors:
      - group: 1
        name: version
        part: body
        regex:
          - src="js/div-util.js\?v=(\d+)"
        type: regex
    matchers:
      - part: body
        type: word
        words:
          - Exchange Reporter Plus
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/exchange/index.html'
