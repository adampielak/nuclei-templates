http:
- extractors:
  - group: 1
    name: version
    part: header
    regex:
    - (?i)X-Owa-Version:\s*([0-9.]+)
    - (?i)X-Owa-Version["\']?\s*[:=]\s*["\']?([0-9.]+)
    type: regex
  - group: 1
    name: version
    part: body
    regex:
    - (?i)/owa/([0-9.]+)/
    - (?i)data-owa-version=["\']([0-9.]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - len(version) > 0
    - compare_versions(version, "<15.2.2562")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/owa/'
  - '{{BaseURL}}/owa/auth/logon.aspx'
  stop-at-first-match: true
id: msexchange-eol
info:
  author: Shivam Kamboj
  description: 'Detected Microsoft Exchange Server versions that have reached End-of-Life
    (EOL) and no longer receive security updates.

    '
  metadata:
    max-request: 2
    runzero-match: service["product"] contains "Microsoft:Outlook Web Access"
    shodan-query: X-OWA-Version
    verified: true
  name: Microsoft Exchange Server End-of-Life - Detect
  reference:
  - https://endoflife.date/msexchange
  - https://learn.microsoft.com/en-us/exchange/new-features/build-numbers-and-release-dates
  severity: info
  tags: tech,msexchange,eol
