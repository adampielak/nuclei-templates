http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    regex:
    - (?i)href=["'][^"']*materialize(?:[\.-]min)?\.css
    - (?i)src=["'][^"']*materialize(?:[\.-]min)?\.js
    - (?i)class=["'][^"']*waves-effect
    - (?i)class=["'][^"']*materialize-textarea
    type: regex
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: materialize-css-detect
info:
  author: Shivam Kamboj
  description: 'Detected the presence of Materialize, a modern responsive front-end
    framework based on Material Design.

    '
  metadata:
    max-request: 1
    shodan-query: html:"materialize.min.css"
    verified: true
  name: Materialize CSS - Detect
  reference:
  - https://materializecss.com/
  severity: info
  tags: tech,materialize,discovery
