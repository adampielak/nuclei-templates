id: mbilling-panel
info:
  name: MagnusBilling - Login Panel
  author: DhiyaneshDK
  severity: info
  description: |
    Identified an exposed MagnusBilling login panel.
  metadata:
    runzero-match: service["http.body"] matches "(?i)MagnusBilling"
    max-request: 1
    shodan-query: html:"MagnusBilling"
    verified: true
  tags: discovery,login,magnusbilling,mbilling,panel
http:
  - matchers:
      - condition: and
        part: body
        type: word
        words:
          - MagnusBilling
          - Voip System
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/mbilling/'
