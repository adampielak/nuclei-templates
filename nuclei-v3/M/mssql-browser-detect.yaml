id: mssql-browser-detect
info:
  author: pussycat0x
  description: 'Detects Microsoft SQL Server Browser service on UDP port 1434 by triggering
    an SVR_RESP response with a 0x02 probe.Extracts instance details such as ServerName,
    InstanceName, SQL version, clustering status, and TCP port information.

    '
  metadata:
    max-request: 1
    shodan-query: port:1434
    verified: true
  name: MS-SQL Browser Service - Detect
  reference:
  - https://github.com/CiscoCXSecurity/udp-proto-scanner
  - https://learn.microsoft.com/en-us/sql/tools/configuration-manager/sql-server-browser-service
  - https://nmap.org/nsedoc/scripts/ms-sql-info.html
  severity: info
  tags: database,detection,js,microsoft,mssql,network,sql,udp
javascript:
- args:
    Host: '{{Host}}'
    Port: 1434
  code: "const c = require(\"nuclei/net\");\n// 0x02 = CLNT_UCAST_EX \u2014 client\
    \ unicast request for all instances\nconst payload = \"02\";\nconst conn = c.Open('udp',\
    \ `${Host}:${Port}`);\nconn.SendHex(payload);\nlet resp = conn.RecvString(4096);\n\
    conn.Close();\nresp;\n"
  extractors:
  - group: 1
    name: ServerName
    regex:
    - ServerName;([^;]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - success == true
    - len(response) > 10
    type: dsl
  - condition: and
    part: response
    type: word
    words:
    - ServerName
    - InstanceName
  matchers-condition: and
  pre-condition: 'isUDPPortOpen(Host, Port);

    '
