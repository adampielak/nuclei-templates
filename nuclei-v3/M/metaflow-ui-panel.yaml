http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Metaflow UI</title>
  - condition: or
    part: body
    type: word
    words:
    - webpackJsonpmetaflow-ui
    - metaflow-ui
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: metaflow-ui-panel
info:
  author: rxerium
  description: 'Metaflow is an open-source ML platform created by Netflix for building
    and managing real-life data science projects.

    The Metaflow UI provides a web interface for monitoring and managing Metaflow
    runs and flows.

    '
  metadata:
    max-request: 1
    product: Metaflow UI
    shodan-query: http.title:"Metaflow UI"
    vendor: Netflix
    verified: true
  name: Metaflow UI Panel - Detect
  reference:
  - https://github.com/Netflix/metaflow-ui
  - https://metaflow.org
  severity: info
  tags: panel,metaflow,netflix,mlops,ai,detect,discovery
