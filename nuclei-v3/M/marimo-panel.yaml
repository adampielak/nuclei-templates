http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - data-marimo="true"
    - marimo-version
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: marimo-panel
info:
  author: rxerium
  description: 'Marimo is an open-source reactive Python notebook and app framework
    that replaces Jupyter

    with git-friendly, reproducible notebooks.

    '
  metadata:
    max-request: 1
    product: marimo
    shodan-query: http.title:"marimo"
    vendor: marimo-team
    verified: true
  name: Marimo Panel - Detect
  reference:
  - https://github.com/marimo-team/marimo
  - https://marimo.io
  severity: info
  tags: panel,marimo,notebook,python,ai,detect,discovery
