http:
- host-redirects: true
  matchers:
  - condition: or
    dsl:
    - status_code == 200 && contains(to_lower(body), "<title>mage</title>")
    - status_code == 200 && contains_all(body, "status\":\"OK", "\"is_instance_healthy\":true")
    - status_code == 200 && contains_all(body, "statuses\":", "is_instance_manager\":",
      "scheduler_status\":")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/api/status'
  stop-at-first-match: true
id: mageai-panel
info:
  author: ChrisJr404
  description: 'Mage AI (mage.ai / github.com/mage-ai/mage-ai) is an open-source data
    pipeline + orchestration platform with a notebook-style UI. Self-hosted instances
    default to TCP 6789 and historically have shipped without authentication. Exposed
    instances may reveal pipeline source, secrets, and provide an authenticated path
    to arbitrary code execution via custom blocks.

    '
  metadata:
    fofa-query: title="Mage"
    max-request: 2
    product: mage-ai
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Mage"})
    shodan-query: http.title:"Mage"
    vendor: mage_ai
    verified: true
  name: Mage AI Panel - Detect
  reference:
  - https://github.com/mage-ai/mage-ai
  - https://docs.mage.ai/
  severity: info
  tags: detect,mageai,panel
