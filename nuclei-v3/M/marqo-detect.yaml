http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - '"version":"([^"]+)"'
    type: regex
  matchers:
  - part: body
    type: word
    words:
    - Welcome to Marqo
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: marqo-detect
info:
  author: rxerium
  description: 'Marqo vector search engine was detected. Marqo is an open-source tensor
    search and vector database that combines vector search with filtering and text/image
    search for AI applications.

    '
  metadata:
    max-request: 1
    product: marqo
    shodan-query: http.html:"Welcome to Marqo"
    vendor: marqo-ai
    verified: true
  name: Marqo Vector Search Engine - Detect
  reference:
  - https://github.com/marqo-ai/marqo
  - https://www.marqo.ai/
  severity: info
  tags: ai,detect,discovery,marqo,search,tech,vector-db
