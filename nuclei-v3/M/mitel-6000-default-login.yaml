http:
- extractors:
  - dsl:
    - '"Username: " + username + " Password: " + password'
    type: dsl
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "Mitel", "System Information", "logout.html")
    type: dsl
  raw:
  - 'GET /sysinfo.html HTTP/1.1

    Host: {{Hostname}}

    Authorization: Basic {{base64(''{{username}}:{{password}}'')}}

    '
id: mitel-6000-default-login
info:
  author: matejsmycka
  description: 'This template detects the use of default credentials (admin:22222)
    on Mitel 6000 devices, which may allow unauthorized access to system information.

    '
  metadata:
    max-request: 1
    runzero-match: service["http.head.server"] matches "Aragorn Mitel"
    shodan-query: 'Server: Aragorn Mitel'
    verified: true
  name: Mitel 6000 - Default Login
  reference:
  - https://wiki.bicomsystems.com/UADs/Mitel_6930
  severity: high
  tags: mitel,mitel-6000,default-login,vuln
variables:
  password: '22222'
  username: admin
