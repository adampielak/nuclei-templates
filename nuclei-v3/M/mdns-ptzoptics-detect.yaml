id: mdns-ptzoptics-detect
info:
  author: rxerium
  description: 'Detects PTZOptics camera devices exposed via mDNS (Multicast DNS)
    on port 5353. PTZOptics cameras broadcast mDNS service advertisements including
    SSH, SFTP, and NDI streaming services. These devices are commonly used for video
    conferencing and broadcast production.

    '
  metadata:
    max-request: 1
    shodan-query: port:5353 ptzoptics
    verified: true
  name: PTZOptics Device via mDNS - Detect
  severity: info
  tags: camera,exposure,iot,js,mdns,ptzoptics,udp
javascript:
- args:
    Host: '{{Host}}'
    Port: 5353
  code: 'let c = require("nuclei/net");

    let conn = c.Open(''udp'', `${Host}:${Port}`);

    // Query for _services._dns-sd._udp.local PTR records

    // This queries for all advertised mDNS services

    let packet = "e3bc01200001000000000001095f7365727669636573075f646e732d7364045f756470056c6f63616c00000c000100002904d000000000000c000a00083e6e072b14fd0be3";

    conn.SendHex(packet);

    let resp = conn.Recv(512);

    resp;

    '
  extractors:
  - group: 1
    name: device_name
    regex:
    - "Name=([^\n\r]+)"
    type: regex
  - name: services
    regex:
    - _ndi\._tcp
    - _ssh\._tcp
    - _sftp-ssh\._tcp
    type: regex
  - group: 1
    name: ip_address
    regex:
    - Address=([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})
    type: regex
  matchers:
  - dsl:
    - success == true
    - len(response) > 0
    type: dsl
  - condition: and
    type: word
    words:
    - _ndi
    - _ssh
  matchers-condition: and
  pre-condition: 'isUDPPortOpen(Host,Port);

    '
