http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - MLflow
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: mlflow-panel
info:
  author: rxerium
  description: 'MLflow is an open-source platform for managing the end-to-end machine
    learning

    lifecycle including experimentation, reproducibility, and deployment. This template

    detects exposed MLflow tracking server UI instances.

    '
  metadata:
    max-request: 1
    product: mlflow
    runzero-match: any(each(service["html.titles"]), {# matches "MLflow"})
    shodan-query: http.title:"MLflow"
    vendor: databricks
    verified: true
  name: MLflow Panel - Detect
  reference:
  - https://github.com/mlflow/mlflow
  - https://mlflow.org
  severity: info
  tags: ai,detect,discovery,ml,mlflow,mlops,panel
