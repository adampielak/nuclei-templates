http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - cdn.mxpnl.com
    - window.mixpanel
    - mixpanel-2-latest.min.js
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: mixpanel-detect
info:
  author: Shivam Kamboj
  description: 'Detected the presence of Mixpanel, a business analytics service.

    '
  metadata:
    max-request: 1
    shodan-query: html:"cdn.mxpnl.com"
    verified: true
  name: Mixpanel Analytics - Detect
  reference:
  - https://mixpanel.com/
  - https://developer.mixpanel.com/docs/javascript-quickstart
  severity: info
  tags: tech,discovery,mixpanel
