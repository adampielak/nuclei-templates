http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - MistServer
    - Management Interface
  - condition: or
    part: body
    type: word
    words:
    - Create new account
    - No account has been created yet
    - Select other host
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: mistserver-installer
info:
  author: DhiyaneshDk
  description: 'MistServer installation/setup wizard is publicly accessible, allowing
    unauthorized users to create admin accounts and take full control of the streaming
    server. This is a first-user-wins vulnerability.

    '
  impact: 'An attacker can create an admin account on unconfigured MistServer instances,

    gaining full control over the streaming server configuration and content.

    '
  metadata:
    fofa-query: title="MistServer"
    max-request: 1
    product: mistserver
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)MistServer"})
    shodan-query: http.title:"MistServer"
    vendor: ddvtech
    verified: true
  name: MistServer Installation Wizard - Exposure
  reference:
  - https://docs.mistserver.org/mistserver/configuration
  - https://mistserver.org/
  severity: high
  tags: misconfig,mistserver,install,exposure
