http:
- matchers:
  - case-insensitive: true
    condition: or
    type: word
    words:
    - powered by Mezzanine
    - Welcome to Mezzanine
    - Mezzanine version
  - regex:
    - (?i)mezzanine\s+(v[0-9.]+)
    - (?i)<title>Mezzanine CMS
    type: regex
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}'
  payloads:
    paths:
    - /
    - /admin/login/
    - /admin/dashboard/
    - /static/js/mezzanine.js
    - /settings.py
    - /mezzanine/
  stop-at-first-match: true
id: mezzanine-cms-detect
info:
  author: Chirag Mistry
  description: 'Detects instances of Mezzanine CMS based on unique fingerprints and
    identifiers.

    '
  metadata:
    shodan-query:
    - http.component:"Mezzanine"
    - http.component:"mezzanine"
    - cpe:"cpe:2.3:a:mezzanine:mezzanine"
  name: Mezzanine CMS - Detect
  severity: info
  tags: detect,mezzanine,cms,tech
