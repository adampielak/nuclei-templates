http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>Digi Router</title>
    - __meteor_runtime_config__
    - meteorRelease
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: digi-router-panel
info:
  author: rxerium
  description: 'Digi International cellular routers expose a web management interface
    used in industrial IoT and remote connectivity applications.

    '
  metadata:
    max-request: 1
    product: digi-router
    shodan-query: http.title:"Digi Router"
    vendor: Digi International
    verified: true
  name: Digi International Router - Login Panel
  reference:
  - https://www.digi.com/products/networking/cellular-routers
  severity: info
  tags: panel,ics,digi,router,industrial,discovery
