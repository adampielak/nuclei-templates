http:
- extractors:
  - name: version
    part: body
    regex:
    - Django ([0-9.]+)
    - Powered by Django ([0-9.]+)
    type: regex
  - name: django_id
    part: body
    regex:
    - django-site-id=([a-z0-9]+)
    - django\.org/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: body
    type: word
    words:
    - Powered by Django
    - django-project
    - Django Software Foundation
  - condition: or
    status:
    - 200
    - 403
    - 404
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/admin/'
  - '{{BaseURL}}/static/'
  - '{{BaseURL}}/media/'
  - '{{BaseURL}}/index.php'
  - '{{BaseURL}}/django-admin/'
  stop-at-first-match: true
id: django-detect
info:
  author: Chirag Mistry
  description: 'An instance running Django is detected by looking for specific HTTP
    headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 9
    shodan-query: http.component:"django"
    verified: true
  name: Django Detection
  severity: info
  tags: django,detect,tech
