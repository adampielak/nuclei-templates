id: drupal_module-permissions_by_term-access-bypass
info:
  author: Bishopfox
  description: The Permissions by Term module extends Drupal by functionality for
    restricting access to single nodes via taxonomy terms. The module doesnt sufficiently
    restrict access to node previews, when the Search API module is used to display
    nodes in search result lists.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/permissions_by_term/
    google-query: inurl:'/sites/all/modules/permissions_by_term/
    impact: medium
    security-risk: "Moderately critical 13\u221525 AC:None/A:None/CI:Some/II:None/E:Theoretical/TD:Uncommon"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-permissions_by_term-access-bypass
