http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>DSE 855</title>
    - tab-view.css
    - gui.css
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: deep-sea-electronics-dse855-detect
info:
  author: rxerium
  description: 'Deep Sea Electronics DSE 855 is a generator/mains automatic transfer
    switch (ATS) controller

    with a built-in HTTP web server for remote monitoring and configuration of generator
    control systems.

    The interface is commonly exposed on port 8090 and requires no authentication
    by default.

    '
  metadata:
    max-request: 1
    product: dse855
    runzero-match: any(each(service["html.titles"]), {# matches "DSE 855"})
    shodan-query: http.title:"DSE 855"
    vendor: deep-sea-electronics
    verified: true
  name: Deep Sea Electronics DSE 855 Generator Controller - Detect
  reference:
  - https://www.deepseaelectronics.com/products/auto-mains-failure-modules/855.html
  severity: info
  tags: detect,dse,energy,generator,ics,panel,scada,tech
