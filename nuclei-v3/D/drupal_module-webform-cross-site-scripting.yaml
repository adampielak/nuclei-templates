id: drupal_module-webform-cross-site-scripting
info:
  author: Bishopfox
  description: The Webform module  uses the CKEditor, library for WYSIWYG editing.
    CKEditor has released a security update that impacts Webform. An attacker that
    can create or edit content (even without access to CKEditor themselves) may be
    able to exploit one or more Cross-Site Scripting (XSS) vulnerabilities to target
    users with access to the WYSIWYG CKEditor, including site admins with privileged
    access. For more information, see CKEditors announcement of the release.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/webform/
    google-query: inurl:'/sites/all/modules/webform/
    impact: medium
    security-risk: "Moderately critical 12\u221525 AC:Basic/A:User/CI:Some/II:Some/E:Theoretical/TD:Uncommon"
    type: indicator
    vulnerability: cross-site-scripting
  name: drupal_module-webform-cross-site-scripting
  reference:
  - https://www.drupal.org/sa-contrib-2021-026
  severity: medium
  tags: drupal
