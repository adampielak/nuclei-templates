http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - dsl:
    - compare_versions(version, '8.x-1.3')
    - compare_versions(version, '8.x-1.2')
    - compare_versions(version, '8.x-1.1')
    - compare_versions(version, '8.x-1.0')
    type: dsl
  matchers:
  - part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - status:
    - 200
    type: status
  - part: body
    type: word
    words:
    - opigno_learning_path
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/sites/all/modules/opigno_learning_path/opigno_learning_path.info'
  redirects: true
id: drupal_module-opigno_learning_path-access-bypass
info:
  author: Bishopfox
  description: In certain configuration cases, when a learning path is configured
    as semi-private, anonymous users are allowed to join a learning path when they
    should not.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/opigno_learning_path/
    google-query: inurl:'/sites/all/modules/opigno_learning_path/
    impact: medium
    security-risk: "Moderately critical 10\u221525 AC:Basic/A:User/CI:Some/II:None/E:Theoretical/TD:Default"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-opigno_learning_path-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2019-047
  severity: medium
  tags: drupal
