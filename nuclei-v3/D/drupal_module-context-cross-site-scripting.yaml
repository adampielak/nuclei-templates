http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - dsl:
    - compare_versions(version, '7.x-3.9')
    - compare_versions(version, '7.x-3.8')
    - compare_versions(version, '7.x-3.7')
    - compare_versions(version, '7.x-3.6')
    - compare_versions(version, '7.x-3.5')
    - compare_versions(version, '7.x-3.4')
    - compare_versions(version, '7.x-3.3')
    - compare_versions(version, '7.x-3.2')
    - compare_versions(version, '7.x-3.1')
    - compare_versions(version, '7.x-3.0')
    type: dsl
  matchers:
  - part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - status:
    - 200
    type: status
  - part: body
    type: word
    words:
    - context
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/sites/all/modules/context/context.info'
  redirects: true
id: drupal_module-context-cross-site-scripting
info:
  author: Bishopfox
  description: This module enables you to manage contextual conditions and reactions
    for different portions of your site. The module doesnt sufficiently sanitize user
    output when displayed leading to a Cross Site Scripting (XSS) vulnerability. This
    vulnerability is mitigated by the fact that an attacker must have the ability
    to store malicious markup in the site (e.g. permission to create a node with a
    field that accepts filtered html).
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/context/
    google-query: inurl:'/sites/all/modules/context/
    impact: medium
    security-risk: "Moderately critical 14\u221525 AC:Basic/A:User/CI:Some/II:Some/E:Theoretical/TD:All"
    type: indicator
    vulnerability: cross-site-scripting
  name: drupal_module-context-cross-site-scripting
  reference:
  - https://www.drupal.org/sa-contrib-2019-028
  severity: medium
  tags: drupal
