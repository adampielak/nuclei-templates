dns:
- extractors:
  - group: 1
    regex:
    - "IN\tTXT\t(.+)"
    type: regex
  name: _dmarc.{{FQDN}}
  type: TXT
id: dmarc-detect
info:
  author: juliosmelo
  description: 'DMARC is an open email authentication protocol that provides domain-level
    protection of the email channel. DMARC authentication detects and prevents email
    spoofing techniques used in phishing, business email compromise (BEC) and other
    email-based attacks.

    '
  name: DNS DMARC Detection
  reference:
  - https://dmarc.org/
  - https://dmarc.org/wiki/FAQ#Why_is_DMARC_important.3F
  severity: info
  tags: dns,dmarc
