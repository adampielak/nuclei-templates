http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - dsl:
    - compare_versions(version, '7.x-2.1')
    - compare_versions(version, '7.x-2.0')
    type: dsl
  matchers:
  - part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - status:
    - 200
    type: status
  - part: body
    type: word
    words:
    - config_perms
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/sites/all/modules/config_perms/config_perms.info'
  redirects: true
id: drupal_module-config_perms-access-bypass
info:
  author: Bishopfox
  description: This module enables the user to set custom permissions per path. The
    module doesnt perform sufficient checks on paths with dynamic arguments (like
    node/1 or user/2), thereby allowing the site administrator to save custom permissions
    for paths that wont be protected. This could lead to an access bypass vulnerability
    if the site is relying on the Custom Permissions module to protect those paths.
    This vulnerability is mitigated by the fact that it only occurs on sites which
    attempted to use the Custom Permissions module to protect dynamic paths.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/config_perms/
    google-query: inurl:'/sites/all/modules/config_perms/
    impact: medium
    security-risk: "Moderately critical 14\u221525 AC:None/A:User/CI:Some/II:Some/E:Theoretical/TD:Uncommon"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-config_perms-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2018-010
  severity: medium
  tags: drupal
