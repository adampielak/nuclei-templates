id: drupal_module-addtoany-cross-site-scripting
info:
  author: Bishopfox
  description: This module enables you to add social media share buttons on your website
    to its content and pages. The module doesnt sufficiently mark its administration
    permission restricted, allowing cross site scripting vulnerabilities to users
    who have access to its admin settings. This vulnerability is mitigated by the
    fact that an attacker must have a role with the permission administer addtoany.
    This advisory was edited on March 25th to add the affected 8.x-1.11 release.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/addtoany/
    google-query: inurl:'/sites/all/modules/addtoany/
    impact: medium
    security-risk: "Moderately critical 13\u221525 AC:Basic/A:Admin/CI:Some/II:Some/E:Theoretical/TD:All"
    type: indicator
    vulnerability: cross-site-scripting
  name: drupal_module-addtoany-cross-site-scripting
  reference:
  - https://www.drupal.org/sa-contrib-2019-039
  severity: medium
  tags: drupal
