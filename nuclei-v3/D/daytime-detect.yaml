id: daytime-detect
info:
  author: pussycat0x
  description: 'Detects the Daytime service on UDP port 13 by requesting the current
    date and time in ASCII format as defined in RFC 867. This legacy protocol can
    expose system information and should be disabled to reduce attack surface.

    '
  metadata:
    max-request: 1
    shodan-query: port:13
    verified: true
  name: Daytime Service - Detect
  reference:
  - https://github.com/CiscoCXSecurity/udp-proto-scanner
  - https://www.rfc-editor.org/rfc/rfc867
  severity: info
  tags: daytime,legacy,network,js,udp
javascript:
- args:
    Host: '{{Host}}'
    Port: 13
  code: 'const c = require("nuclei/net");

    const payload = "313233";

    const conn = c.Open(''udp'', `${Host}:${Port}`);

    conn.SendHex(payload);

    let resp = conn.RecvString(256);

    conn.Close();

    resp;

    '
  matchers:
  - condition: and
    dsl:
    - success == true
    - len(response) > 10
    type: dsl
  - part: response
    regex:
    - \d{2}[:\-]\d{2}[:\-]\d{2}
    type: regex
  matchers-condition: and
  pre-condition: 'isUDPPortOpen(Host, Port);

    '
