  redirects: true
id: drupal_module-eu_cookie_compliance-cross-site-scripting
info:
  author: Bishopfox
  description: This module addresses the General Data Protection Regulation (GDPR)
    that came into effect 25th May 2018, and the EU Directive on Privacy and Electronic
    Communications from 2012. It provides a banner where you can gather consent from
    the user when the website stores cookies on their computer or otherwise handles
    their personal information. The module doesnt sufficiently sanitize data for some
    interface labels and strings shown in the cookie policy banner, opening up possibility
    of Cross Site Scripting exploits that can be created by somebody that has access
    to the admin interface of the module. This vulnerability is mitigated by the fact
    that an attacker must have a role with the permission Administer EU Cookie Compliance
    banner. For Drupal 8, the vulnerability also requires access to a text format
    that doesnt sanitize data.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/eu_cookie_compliance/
    google-query: inurl:'/sites/all/modules/eu_cookie_compliance/
    impact: medium
    security-risk: "Critical 15\u221525 AC:None/A:Admin/CI:Some/II:Some/E:Theoretical/TD:All"
    type: indicator
    vulnerability: cross-site-scripting
  name: drupal_module-eu_cookie_compliance-cross-site-scripting
  reference:
  - https://www.drupal.org/sa-contrib-2019-033
  severity: medium
  tags: drupal
