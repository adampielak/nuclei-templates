code:
- args:
  - -ExecutionPolicy
  - Bypass
  engine:
  - powershell
  - powershell.exe
  matchers:
  - type: word
    words:
    - 'True'
  pattern: '*.ps1'
  pre-condition: 'IsWindows();

    '
  source: '$admin = Get-LocalUser -Name ''Administrator'' -ErrorAction SilentlyContinue;
    if ($admin -and $admin.Enabled) { ''True'' } else { ''False'' }

    '
id: default-admin-account-enabled
info:
  author: boonchuan
  description: 'Detected built-in Administrator account was enabled, which is a common
    target for brute-force and credential stuffing attacks.

    '
  impact: 'The default Administrator account has a well-known SID and is frequently
    targeted by attackers. Leaving it enabled increases the attack surface.

    '
  metadata:
    verified: false
  name: Default Administrator Account Enabled
  reference:
  - https://www.cyber.gov.au/acsc/view-all-content/publications/essential-eight-maturity-model
  - https://learn.microsoft.com/en-us/windows/security/identity-protection/access-control/local-accounts
  remediation: 'Disable the built-in Administrator account and use a separate named
    admin account for administrative tasks. Run: net user Administrator /active:no

    '
  severity: medium
  tags: admin,code,compliance,essential-eight,privileges,windows,windows-audit
