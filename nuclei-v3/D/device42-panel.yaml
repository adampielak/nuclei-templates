http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_any(to_lower(body), "device42</title>", "<title>device42")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/admin/login/?next=/'
  - '{{BaseURL}}'
  stop-at-first-match: true
id: device42-panel
info:
  author: righettod
  description: "Device42 was detected \u2014 a Discovery, Asset Management and Dependency\
    \ Mapping for Data Center and Cloud.\n"
  metadata:
    max-request: 2
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)device42"})
    shodan-query: http.title:"device42"
    verified: true
  name: Device42 Panel - Detect
  reference:
  - https://www.device42.com/
  severity: info
  tags: device42,discovery,login,panel
