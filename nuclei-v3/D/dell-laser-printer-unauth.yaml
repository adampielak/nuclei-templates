id: dell-laser-printer-unauth
info:
  name: Dell Laser Printer - Unauthenticated Detect
  author: pussycat0x
  severity: high
  description: |
    The Dell Laser Printer web interface was accessible without authentication.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Laser Printer"})
    max-request: 1
    shodan-query: title="Laser Printer"
    verified: true
  tags: dell,discovery,iot,misconfig,printer,unauth,vuln
flow: http(1) && http(2)
http:
  - extractors:
      - name: printer_version
        part: body
        regex:
          - Dell([ 0-9A-Za-z]+).*Laser Printer
        type: regex
    matchers:
      - condition: and
        dsl:
          - status_code == 200
          - contains_all(body, '<TITLE>Dell','Laser Printer</TITLE>')
        type: dsl
    method: GET
    path:
      - '{{BaseURL}}'
  - matchers:
      - condition: and
        dsl:
          - status_code == 200
          - contains_all(body, 'Security','Security')
        internal: true
        type: dsl
    method: GET
    path:
      - '{{BaseURL}}/cgi-bin/dynamic/config/secure/security.html'
