  redirects: true
id: drupal_module-services-access-bypass
info:
  author: Bishopfox
  description: This module provides a standardized solution for building APIs so that
    external clients can communicate with Drupal. The Services module has an access
    bypass vulnerability in its attach_file resource that allows users who have access
    to create or update nodes that include file fields to arbitrarily reference files
    they do not have access to, which can expose private files. This vulnerability
    is mitigated by the fact that an attacker must have a role with permission to
    create or edit a node.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/services/
    google-query: inurl:'/sites/all/modules/services/
    impact: medium
    security-risk: "Less critical 9\u221525 AC:Complex/A:User/CI:Some/II:None/E:Theoretical/TD:Default"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-services-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2019-043
  severity: medium
  tags: drupal
