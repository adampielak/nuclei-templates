    type: regex
  - status:
    - 200
    type: status
  - part: body
    type: word
    words:
    - social
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/sites/all/modules/social/social.info'
  redirects: true
id: drupal_module-social-access-bypass
info:
  author: Bishopfox
  description: The Social User Export module enables users within Open Social to create
    an export of users and download this to a CSV file. The module doesnt sufficiently
    check access when building the CSV file, allowing logged-in users without the
    manage members permission to be able to export all data from a selected user in
    certain scenarios. This vulnerability is mitigated by the fact that an attacker
    must have the authenticated user role and the site must have the configuration
    set in such a way a logged in user is able to export users.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/social/
    google-query: inurl:'/sites/all/modules/social/
    impact: medium
    security-risk: "Moderately critical 10\u221525 AC:Basic/A:User/CI:Some/II:None/E:Theoretical/TD:Default"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-social-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2021-002
  severity: medium
  tags: drupal
