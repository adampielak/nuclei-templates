http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - dsl:
    - compare_versions(version, '8.x-1.2')
    - compare_versions(version, '8.x-1.1')
    - compare_versions(version, '8.x-1.0')
    type: dsl
  matchers:
  - part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - status:
    - 200
    type: status
  - part: body
    type: word
    words:
    - facets
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/sites/all/modules/facets/facets.info'
  redirects: true
id: drupal_module-facets-cross-site-scripting
info:
  author: Bishopfox
  description: This module enables you to create facet-filters for results of a search
    query and exposes them as blocks The module doesnt sufficiently escape HTML under
    the scenario leading to a Cross Site Scripting (XSS) vulnerability. This vulnerability
    is mitigated by two factors. First, an attacker must have a way to insert results
    in the dataset that is exposed as a facet before this can happen. The permission
    to inject malicious strings depends on the sites search configuration but could
    be available to any user who can create content in a site. Second, the site must
    be using the Javascript-based dropdown widget.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/facets/
    google-query: inurl:'/sites/all/modules/facets/
    impact: medium
    security-risk: "Moderately critical 13\u221525 AC:Basic/A:User/CI:Some/II:Some/E:Theoretical/TD:Default"
    type: indicator
    vulnerability: cross-site-scripting
  name: drupal_module-facets-cross-site-scripting
  reference:
  - https://www.drupal.org/sa-contrib-2019-030
  severity: medium
  tags: drupal
