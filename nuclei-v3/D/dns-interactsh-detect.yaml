dns:
- matchers:
  - internal: true
    type: word
    words:
    - 169.254.169.254
  name: aws.{{FQDN}}
  type: A
- matchers:
  - internal: true
    type: word
    words:
    - 100.100.100.200
  name: alibaba.{{FQDN}}
  type: A
- matchers:
  - internal: true
    type: word
    words:
    - 192.0.0.192
  name: oracle.{{FQDN}}
  type: A
- matchers:
  - type: word
    words:
    - ns1
  name: '{{FQDN}}'
  type: SOA
flow: dns(1) && dns(2) && dns(3) && dns(4)
id: dns-interactsh-detect
info:
  author: darses
  classification:
    cpe: cpe:2.3:a:projectdiscovery:interactsh:*:*:*:*:*:*:*:*
  description: 'Detect Interactsh DNS service. Interactsh is used for Out-of-band
    Application Security Testing (OAST).

    '
  metadata:
    max-request: 4
    product: interactsh
    vendor: projectdiscovery
    verified: true
  name: Interactsh DNS server - Detect
  reference: https://github.com/projectdiscovery/interactsh
  severity: low
  tags: dns,detect,discovery,interactsh
