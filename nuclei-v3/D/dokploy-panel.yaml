http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - Dokploy</title>
    - dokploy
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: dokploy-panel
info:
  author: theamanrawat
  classification:
    cpe: cpe:2.3:a:dokploy:dokploy:*:*:*:*:*:*:*:*
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: Dokploy login panel was detected.
  metadata:
    max-request: 1
    product: dokploy
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)dokploy"})
    shodan-query: title:dokploy
    vendor: dokploy
  name: Dokploy Login Panel - Detect
  severity: info
  tags: panel,dokploy,discovery
