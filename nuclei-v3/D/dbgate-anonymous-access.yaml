http:
- extractors:
  - json:
    - .accessToken
    name: access_token
    part: body
    type: json
  matchers:
  - part: body
    type: word
    words:
    - '{"accessToken":"'
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /auth/login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"amoid":"none"}

    '
id: dbgate-anonymous-access
info:
  author: benharvey-sage
  classification:
    cwe-id: CWE-1188
  description: 'Detected DbGate instances that allowed anonymous access due to insecure
    default authentication settings, where unauthenticated users could obtain a valid
    JWT token and access database management APIs.

    '
  metadata:
    max-request: 1
    product: dbgate
    shodan-query:
    - http.title:"DbGate"
    - http.favicon.hash:-1320884137,1198579728,361029891,-1421367029,1377130137,-1258062033
    vendor: dbgate
    verified: true
  name: DbGate Anonymous Access - Detection
  reference:
  - https://github.com/dbgate/dbgate
  - https://dbgate.io/
  - https://docs.dbgate.io/
  severity: high
  tags: anonymous,dbgate,exposure,misconfig,unauth
