http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_any(content_type, "application/json", "text/plain")
    - contains_all(body, "AWSEBDockerrunVersion", "containerDefinitions", "image")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/Dockerrun.aws.json'
  - '{{BaseURL}}/static/Dockerrun.aws.json'
  stop-at-first-match: true
id: dockerrun-aws-json-exposure
info:
  author: 0x_Akoko
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-200
  description: 'Detected AWS Elastic Beanstalk Dockerrun.aws.json configuration file
    was publicly accessible, potentially revealing Docker container definitions, image
    names, hostnames, port mappings, and infrastructure details.

    '
  metadata:
    fofa-query: body="AWSEBDockerrunVersion"
    max-request: 2
    runzero-match: service["http.body"] matches "(?i)AWSEBDockerrunVersion"
    shodan-query: html:"AWSEBDockerrunVersion"
    verified: true
  name: AWS Elastic Beanstalk Dockerrun.aws.json - Exposure
  reference:
  - https://docs.aws.amazon.com/elasticbeanstalk/latest/dg/create_deploy_docker_v2config.html
  severity: medium
  tags: aws,docker,config,exposure,misconfig
