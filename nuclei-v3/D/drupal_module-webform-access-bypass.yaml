id: drupal_module-webform-access-bypass
info:
  author: Bishopfox
  description: The Webform module for Drupal 8/9 includes a default Contact webform,
    which sends a notification email to the site owner and a confirmation email to
    the email address supplied via the form. The confirmation email can be used as
    an open mail relay to send an email to any email address.   This vulnerability
    is mitigated by the fact that the site owners email address is also receiving
    a notification email, which should alert the site owner to the exploitation. If
    the site owners mailbox is not monitored, the open mail relay can be more easily
    exploited. With the Webform modules latest release, the default Contacts confirmation
    email will only be sent to an authenticated users email address. Anonymous users
    will no longer receive a confirmation email.   If anonymous users need to receive
    a confirmation email, we recommend you add SPAM protection to the form and update
    the email handler.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/webform/
    google-query: inurl:'/sites/all/modules/webform/
    impact: medium
    security-risk: "Moderately critical 12\u221525 AC:Basic/A:None/CI:None/II:None/E:Exploit/TD:Default"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-webform-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2021-004
  severity: medium
  tags: drupal
