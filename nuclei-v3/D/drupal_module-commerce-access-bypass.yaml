http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - dsl:
    - compare_versions(version, '8.x-2.8')
    - compare_versions(version, '8.x-2.7')
    - compare_versions(version, '8.x-2.6')
    - compare_versions(version, '8.x-2.5')
    - compare_versions(version, '8.x-2.4')
    - compare_versions(version, '8.x-2.3')
    - compare_versions(version, '8.x-2.2')
    - compare_versions(version, '8.x-2.1')
    - compare_versions(version, '8.x-2.0')
    type: dsl
  matchers:
  - part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - status:
    - 200
    type: status
  - part: body
    type: word
    words:
    - commerce
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/sites/all/modules/commerce/commerce.info'
  redirects: true
id: drupal_module-commerce-access-bypass
info:
  author: Bishopfox
  description: This module enables you to build eCommerce websites and applications
    with Drupal. The module doesnt sufficiently check access for some of its entity
    types.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/commerce/
    google-query: inurl:'/sites/all/modules/commerce/
    impact: medium
    security-risk: "Moderately critical 14\u221525 AC:Basic/A:None/CI:Some/II:Some/E:Theoretical/TD:Uncommon"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-commerce-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2018-057
  severity: medium
  tags: drupal
