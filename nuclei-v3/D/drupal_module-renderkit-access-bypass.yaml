  redirects: true
id: drupal_module-renderkit-access-bypass
info:
  author: Bishopfox
  description: This module, typically in combination with cfr:cfrplugin, allows to
    compose behaviors from granular components. One of such behaviors is to display
    a list of related entities, for a given source entity and a given entity relation
    (e.g. an entity reference field). The components that display related content
    do not check if the user has access to view the related entities. This way e.g.
    unpublished nodes may be displayed to anonymous visitors. This vulnerability is
    mitigated by the facts that - a site builder must have used the component that
    displays related entities for a source entity, using cfr:cfrplugin, OR a programmer
    has used one of the affected components in code. - a source entity displayed this
    way must reference access-restricted content.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/renderkit/
    google-query: inurl:'/sites/all/modules/renderkit/
    impact: medium
    security-risk: "Moderately critical 11\u221525 AC:Basic/A:None/CI:Some/II:None/E:Theoretical/TD:Uncommon"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-renderkit-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2018-060
  severity: medium
  tags: drupal
