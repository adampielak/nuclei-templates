http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - dsl:
    - compare_versions(version, '7.x-2.13')
    - compare_versions(version, '7.x-2.12')
    - compare_versions(version, '7.x-2.11')
    - compare_versions(version, '7.x-2.10')
    - compare_versions(version, '7.x-2.9')
    - compare_versions(version, '7.x-2.8')
    - compare_versions(version, '7.x-2.7')
    - compare_versions(version, '7.x-2.6')
    - compare_versions(version, '7.x-2.5')
    - compare_versions(version, '7.x-2.4')
    - compare_versions(version, '7.x-2.3')
    - compare_versions(version, '7.x-2.2')
    - compare_versions(version, '7.x-2.1')
    - compare_versions(version, '7.x-2.0')
    type: dsl
  matchers:
  - part: body
    regex:
    - version = "([0-9]+\.x-[0-9]+\.[0-9]+)"
    type: regex
  - status:
    - 200
    type: status
  - part: body
    type: word
    words:
    - s3fs
  matchers-condition: and
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/sites/all/modules/s3fs/s3fs.info'
  redirects: true
id: drupal_module-s3fs-access-bypass
info:
  author: Bishopfox
  description: This module enables you to utilize S3-compatible storage as a Drupal
    filesystem. The module doesnt sufficiently prevent file access across multiple
    filesystem schemes stored in the same bucket. This vulnerability is mitigated
    by the fact that an attacker must obtain a method to access arbitrary file paths,
    the site must have public or private takeover enabled, and the file metadata cache
    must be ignored.
  metadata:
    created_at: '0001-01-01T00:00:00Z'
    fofa-query: /sites/all/modules/s3fs/
    google-query: inurl:'/sites/all/modules/s3fs/
    impact: medium
    security-risk: "Moderately critical 10\u221525 AC:Complex/A:None/CI:Some/II:None/E:Theoretical/TD:Uncommon"
    type: indicator
    vulnerability: access-bypass
  name: drupal_module-s3fs-access-bypass
  reference:
  - https://www.drupal.org/sa-contrib-2022-057
  severity: medium
  tags: drupal
