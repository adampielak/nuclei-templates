http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - divi-form-builder[^"']*\?ver=([0-9.]+)
    type: regex
  matchers:
  - part: body
    type: word
    words:
    - wp-content/plugins/divi-form-builder
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/'
id: divi-form-builder-detect
info:
  author: rxerium
  description: 'Divi Form Builder is a premium WordPress form plugin by Divi Engine.

    '
  metadata:
    max-request: 1
    shodan-query: http.html:"wp-content/plugins/divi-form-builder"
    verified: true
  name: Divi Form Builder - Detect
  reference:
  - https://diviengine.com/product/divi-form-builder/
  severity: info
  tags: divi,divi-form-builder,tech,wordpress,wp-plugin
