http:
- matchers:
  - part: body
    regex:
    - (?i)foundation(?:\.min)?\.(?:css|js)
    type: regex
  method: GET
  path:
  - '{{BaseURL}}'
id: zurb-foundation-detect
info:
  author: Shivam Kamboj
  description: 'Detects the presence of ZURB Foundation, a responsive front-end framework.

    '
  metadata:
    max-request: 1
    shodan-query: html:"foundation.min.css"
    verified: true
  name: ZURB Foundation Framework - Detect
  reference:
  - https://get.foundation/
  severity: info
  tags: tech,discovery,zurb
