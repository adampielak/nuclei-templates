id: zoneminder-system-log
info:
  name: ZoneMinder System Log - Detect
  author: pussycat0x
  severity: low
  description: |
    ZoneMinder system log file exposed.
  reference:
    - https://www.exploit-db.com/ghdb/6926
  classification:
    cpe: cpe:2.3:a:zoneminder:zoneminder:*:*:*:*:*:*:*:*
  metadata:
    max-request: 2
  tags: discovery,exposure,logs,zoneminder
http:
  - method: GET
    path:
      - "{{BaseURL}}/?view=log"
      - "{{BaseURL}}/zm/?view=log"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>ZM - System Log</title>"
      - type: status
        status:
          - 200
