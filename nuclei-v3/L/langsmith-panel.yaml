http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>LangSmith</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: langsmith-panel
info:
  author: rxerium
  description: 'LangSmith panel was detected. LangSmith is LangChain''s platform for
    debugging, testing, evaluating, and monitoring LLM applications.

    '
  metadata:
    max-request: 1
    product: langsmith
    runzero-match: any(each(service["html.titles"]), {# matches "^LangSmith"})
    shodan-query: http.title:"LangSmith"
    vendor: langchain
    verified: true
  name: LangSmith Panel - Detect
  reference:
  - https://smith.langchain.com/
  - https://docs.smith.langchain.com/
  severity: info
  tags: ai,detect,discovery,langchain,langsmith,llm,observability,panel
