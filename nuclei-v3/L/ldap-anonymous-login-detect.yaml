id: ldap-anonymous-login-detect
info:
  author: pussycat0x,s0obi
  description: 'Detects whether an LDAP server allows anonymous bind (login without
    credentials). Anonymous access can expose sensitive directory information and
    should be restricted

    unless explicitly intended.

    '
  metadata:
    max-request: 1
    shodan-query: ldap
    verified: true
  name: LDAP Anonymous Login - Detect
  reference:
  - https://ldap.com/ldapv3-wire-protocol-reference-bind/#anonymous
  - https://docs.projectdiscovery.io/templates/protocols/javascript/modules/ldap.Client#getadgroups
  severity: medium
  tags: enum,js,ldap,network,vuln
javascript:
- args:
    Host: '{{Host}}'
    Realm: anonymous
    TargetPort: '{{Port}}'
  code: "try {\n  let ldap = require('nuclei/ldap');\n\n  let port = TargetPort ?\
    \ TargetPort : \"389\";\n  let host = \"ldap://\" + Host + \":\" + port;\n\n \
    \ let cfg = ldap.Config();\n  cfg.Upgrade = true;\n\n  let client = ldap.Client(host,\
    \ Realm, cfg);\n  let result = client.Authenticate('', '');\n  let metadata =\
    \ client.CollectMetadata();\n\n  Export(metadata);\n\n} catch (e) {\n  // ignore\
    \ errors\n}\n"
  matchers:
  - dsl:
    - success == true
    type: dsl
