http:
- host-redirects: true
  matchers:
  - condition: or
    type: word
    words:
    - content="Laravel"
    - Laravel Login
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/admin/login'
  - '{{BaseURL}}/authentication/login'
  - '{{BaseURL}}/login'
  stop-at-first-match: true
id: laravel-login-panel
info:
  author: ProjectDiscoveryAI
  description: 'A Laravel login panel was detected.

    '
  metadata:
    max-request: 3
    runzero-match: any(each(service["html.titles"]), {# matches `(?i)Login\s*[\p{Pd}|]?\s*Laravel`})
    shodan-query: title:"Login Laravel"
    verified: true
  name: Laravel Login - Panel Detection
  severity: info
  tags: laravel,login,panel
