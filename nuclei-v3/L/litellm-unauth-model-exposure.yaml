http:
- extractors:
  - json:
    - .data[].model_name
    name: models
    part: body
    type: json
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(content_type, "application/json")
    - contains_all(body, "\"data\":", "\"litellm_params\":", "\"model_info\":")
    type: dsl
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/model/info'
id: litellm-unauth-model-exposure
info:
  author: DevamShah
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:L
    cvss-score: 6.5
    cwe-id: CWE-862
  description: "LiteLLM proxy was detected with anonymous access to the model listing\
    \ API. LiteLLM proxies that ship without `general_settings.master_key` (or with\
    \ the key disabled) expose the configured upstream model catalog via /v1/models\
    \ and /model/info \u2014 revealing which OpenAI / Anthropic / Azure / Bedrock\
    \ / local-LLM endpoints are wired in, often along with their litellm_params routing\
    \ config, and frequently leaving /chat/completions and /embeddings reachable without\
    \ any bearer token.\n"
  impact: 'Attackers can enumerate the proxy''s full model catalog and abuse the upstream
    accounts for free inference (cost amplification), exfiltrate any prompt logs cached
    locally, or pivot to internal-only model endpoints exposed via the proxy''s routing
    config.

    '
  metadata:
    fofa-query: title="LiteLLM API"
    max-request: 1
    product: litellm
    shodan-query:
    - http.title:"LiteLLM API - Swagger UI"
    - http.html:"LiteLLM"
    vendor: berriai
    verified: true
  name: LiteLLM Proxy - Model Exposure
  reference:
  - https://docs.litellm.ai/docs/proxy/virtual_keys
  - https://docs.litellm.ai/docs/proxy/configs
  - https://github.com/BerriAI/litellm
  remediation: 'Set `general_settings.master_key: sk-...` in the LiteLLM config, or
    pass `--api_key` on startup. Enforce per-user virtual keys via the LiteLLM admin
    API and place the proxy behind authenticated reverse proxy or service mesh.

    '
  severity: medium
  tags: ai,exposure,litellm,llm,misconfig
