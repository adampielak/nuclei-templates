http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - '"__meta":'
    - '"toolbar":'
  - part: content_type
    type: word
    words:
    - application/json
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/__clockwork'
id: laravel-clockwork-exposure
info:
  author: moamenbasel
  description: 'Laravel Clockwork (itsgoingd/clockwork) was detected as enabled and
    publicly accessible. When left active in production, it exposes SQL queries, request
    data, session variables, mail logs, and application internals to any visitor.

    '
  metadata:
    max-request: 1
    shodan-query: html:"clockwork" html:"laravel"
    verified: true
  name: Laravel Clockwork - Sensitive Information Exposure
  reference:
  - https://github.com/itsgoingd/clockwork
  - https://underground.works/clockwork/
  remediation: 'Disable Clockwork in production by setting CLOCKWORK_ENABLE=false
    in the .env file or removing the package from production dependencies.

    '
  severity: medium
  tags: laravel,clockwork,misconfig,exposure
