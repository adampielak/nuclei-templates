http:
- matchers:
  - part: header
    type: word
    words:
    - XSRF-TOKEN
  - condition: and
    part: header
    regex:
    - (?i)access-control-allow-origin:\s*https?://evil\.oast\.pro
    - (?i)access-control-allow-credentials:\s*true
    type: regex
  - status:
    - 200
    - 204
    type: status
  matchers-condition: and
  raw:
  - 'GET /sanctum/csrf-cookie HTTP/1.1

    Host: {{Hostname}}

    Origin: https://evil.oast.pro

    Referer: https://evil.oast.pro

    '
id: laravel-sanctum-misconfig
info:
  author: moamenbasel
  description: 'Laravel Sanctum''s SPA authentication uses cookie-based session authentication
    for first-party single-page applications. The /sanctum/csrf-cookie endpoint issues
    XSRF-TOKEN cookies to requesting origins. When SANCTUM_STATEFUL_DOMAINS is misconfigured
    with wildcard or overly permissive values, the application responds with CORS
    headers that permit arbitrary external origins to make credentialed cross-origin
    requests.

    '
  impact: 'An attacker can host a malicious page that performs authenticated actions
    on behalf of any logged-in user who visits it. Exploitable actions include reading
    sensitive user data, modifying account settings, changing email or password, initiating
    transactions, or any other operation exposed by Sanctum-protected API endpoints.
    The attack requires no prior authentication and only needs the victim to visit
    an attacker-controlled URL while logged in.

    '
  metadata:
    max-request: 1
    shodan-query: html:"sanctum.csrf-cookie"
    verified: true
  name: Laravel Sanctum - Stateful Domain CSRF Misconfiguration
  reference:
  - https://laravel.com/docs/11.x/sanctum#spa-authentication
  - https://laravel.com/docs/11.x/sanctum#cors-and-cookies
  remediation: 'Restrict SANCTUM_STATEFUL_DOMAINS and SESSION_DOMAIN to only trusted
    application domains, and configure session cookies with SameSite=Lax or SameSite=Strict
    to reduce unauthorized cross-site requests. Additionally, ensure config/cors.php
    does not use wildcard (*) origins when supports_credentials is enabled, allowing
    only trusted origins for credentialed requests.

    '
  severity: medium
  tags: cors,csrf,laravel,misconfig,sanctum
