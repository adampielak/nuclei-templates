http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - LocalGPT
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: localgpt-panel
info:
  author: rxerium
  description: 'LocalGPT is an open-source project that allows users to chat with
    their documents

    locally using LLMs with no data leaving their device

    '
  metadata:
    max-request: 1
    product: localgpt
    runzero-match: any(each(service["html.titles"]), {# matches "LocalGPT"})
    shodan-query: http.title:"LocalGPT"
    vendor: promptengineer
    verified: true
  name: LocalGPT Panel - Detect
  reference:
  - https://github.com/PromtEngineer/localGPT
  severity: info
  tags: ai,detect,discovery,llm,localgpt,panel,rag
