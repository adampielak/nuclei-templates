http:
- matchers:
  - condition: or
    part: body
    type: word
    words:
    - Nova.booting
    - nova-resources
  - negative: true
    part: body
    type: word
    words:
    - nova-login
    - /nova/login
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/nova/dashboards/main'
  - '{{BaseURL}}/nova/resources'
  stop-at-first-match: true
id: laravel-nova-unauth
info:
  author: moamenbasel
  description: 'Laravel Nova admin panel is accessible without authentication. Nova
    provides full CRUD access to application models and database records, making unauthenticated
    access a critical security risk.

    '
  metadata:
    max-request: 2
    shodan-query: html:"nova-resources" html:"laravel"
    verified: true
  name: Laravel Nova - Unauthenticated Admin Panel Access
  reference:
  - https://nova.laravel.com/docs/4.0/installation.html#authorizing-nova
  remediation: 'Configure Nova''s gate method in the NovaServiceProvider to restrict
    access. Ensure the Gate::define callback in app/Providers/NovaServiceProvider.php
    properly validates user authorization.

    '
  severity: high
  tags: laravel,nova,admin,unauth,exposure
