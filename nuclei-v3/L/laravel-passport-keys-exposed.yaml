http:
- matchers:
  - condition: or
    part: body
    type: word
    words:
    - '-----BEGIN RSA PRIVATE KEY-----'
    - '-----BEGIN PUBLIC KEY-----'
  - negative: true
    part: body
    type: word
    words:
    - <html
    - <!DOCTYPE
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/storage/oauth-private.key'
  - '{{BaseURL}}/storage/oauth-public.key'
  stop-at-first-match: true
id: laravel-passport-keys-exposed
info:
  author: moamenbasel
  description: 'Laravel Passport OAuth2 RSA private or public keys are publicly accessible
    at default storage paths. Exposed private keys allow attackers to forge OAuth2
    access tokens and impersonate any user.

    '
  metadata:
    max-request: 2
    verified: true
  name: Laravel Passport - OAuth2 Keys Exposed
  reference:
  - https://laravel.com/docs/10.x/passport#installation
  remediation: 'Ensure the storage directory is not publicly accessible. Move Passport
    keys outside the web root or configure the web server to deny access to the storage
    directory.

    '
  severity: high
  tags: laravel,passport,oauth,exposure,keys
