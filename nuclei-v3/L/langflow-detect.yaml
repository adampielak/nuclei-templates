http:
- extractors:
  - group: 1
    part: body
    regex:
    - '"version"\s*:\s*"([0-9\.]+)"'
    type: regex
  matchers:
  - part: body
    type: word
    words:
    - '"package":"Langflow"'
  - part: body
    type: word
    words:
    - <title>Langflow</title>
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}/api/v1/version'
  - '{{BaseURL}}'
  stop-at-first-match: true
id: langflow-detect
info:
  author: rxerium
  description: 'Langflow was detected. Langflow is an open-source visual LLM flow
    builder built on LangChain, providing a drag-and-drop interface for building AI
    pipelines and agents. Exposed instances may allow access to AI workflow configurations
    and API keys.

    '
  metadata:
    max-request: 2
    product: langflow
    shodan-query: http.title:"Langflow"
    vendor: langflow-ai
    verified: true
  name: Langflow - Detect
  reference:
  - https://github.com/langflow-ai/langflow
  - https://docs.langflow.org/
  severity: info
  tags: ai,detect,discovery,langflow,llm,tech
