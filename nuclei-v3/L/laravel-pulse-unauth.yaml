http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - Laravel Pulse
    - livewire
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/pulse'
id: laravel-pulse-unauth
info:
  author: moamenbasel
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-306
  description: 'Laravel Pulse monitoring dashboard is accessible without authentication.
    Pulse displays server performance metrics, slow queries, user activity, cache
    hit rates, and exception logs that could aid attackers in reconnaissance.

    '
  metadata:
    max-request: 1
    shodan-query: html:"Laravel Pulse"
    verified: true
  name: Laravel Pulse - Unauthenticated Dashboard Access
  reference:
  - https://laravel.com/docs/11.x/pulse#dashboard-authorization
  - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
  remediation: 'Configure Pulse''s gate method in the PulseServiceProvider to restrict
    access. Add proper authorization checks using Gate::define in app/Providers/PulseServiceProvider.php.

    '
  severity: medium
  tags: laravel,misconfig,monitoring,pulse,unauth
