http:
- host-redirects: true
  matchers:
  - condition: or
    dsl:
    - status_code == 200 && contains(to_lower(body), "<title>langfuse")
    - status_code == 200 && contains(to_lower(header), "x-langfuse-")
    - status_code == 200 && contains_all(body, "\"status\":\"OK\"", "version") &&
      contains(to_lower(content_type), "application/json") && contains(path, "/api/public/health")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/api/public/health'
  stop-at-first-match: true
id: langfuse-panel
info:
  author: ChrisJr404
  description: 'Langfuse panel was detected. Langfuse is an open-source LLM engineering
    platform for observability, evaluations, prompt management and analytics. Exposed
    instances may reveal LLM prompts, traces, evaluations, and connected API keys.

    '
  metadata:
    fofa-query: title="Langfuse"
    max-request: 2
    product: langfuse
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Langfuse"})
    shodan-query: http.title:"Langfuse"
    vendor: langfuse
    verified: true
  name: Langfuse Panel - Detect
  reference:
  - https://github.com/langfuse/langfuse
  - https://langfuse.com/
  severity: info
  tags: ai,detect,langfuse,llm,login,panel
