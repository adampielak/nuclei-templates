http:
- extractors:
  - group: 1
    name: version
    regex:
    - <meta name="leantime-version" content="(?<leantime_version>\d+\.\d+\.\d+)">
    type: regex
  matchers:
  - condition: or
    type: word
    words:
    - content="Leantime
    - name="leantime-version
    - window.leantime.currentProject
    - .leantimeLogo {
    - class="leantimeLogo
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/auth/login'
id: leantime-detect
info:
  author: icarot
  classification:
    cpe: cpe:2.3:a:leantime:leantime:*:*:*:*:*:*:*:*
  description: 'Detects a Leantime server, a project management system for non-project
    managers.

    '
  metadata:
    product: leantime
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Leantime"})
    shodan-query: title:"Leantime"
    vendor: leantime
  name: Leantime - Detect
  reference:
  - https://github.com/Leantime/leantime
  severity: info
  tags: tech,leantime,detect
