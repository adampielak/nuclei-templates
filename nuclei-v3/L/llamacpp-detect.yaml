http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - '"status":"ok"'
  - condition: and
    dsl:
    - contains(header, "llama.cpp")
    - status_code == 200
    type: dsl
  matchers-condition: and
  max-redirects: 2
  raw:
  - 'GET /health HTTP/1.1

    Host: {{Hostname}}

    '
id: llamacpp-detect
info:
  author: rxerium
  description: 'Detected llama.cpp, a lightweight C/C++ inference engine for running
    GGUF-format large language models locally. Exposed instances serve an OpenAI-compatible
    REST API and a built-in web chat interface with no authentication by default.

    '
  metadata:
    fofa-query: server="llama.cpp"
    max-request: 1
    product: llama.cpp
    shodan-query: http.headers.server:"llama.cpp"
    vendor: ggerganov
    verified: true
  name: llama.cpp - Detect
  reference:
  - https://github.com/ggerganov/llama.cpp
  severity: info
  tags: ai,detect,discovery,llamacpp,llm,tech
