id: luma
info:
  name: Luma User Name Information - Detect
  author: rxerium
  severity: info
  description: |
    Luma user name information check was conducted.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cvss-score: 0
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
  tags: discovery,luma,osint,osint-social
http:
  - matchers:
      - condition: and
        part: body
        type: word
        words:
          - ' Luma</title>'
          - username
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - https://lu.ma/user/{{user}}
self-contained: true
