http:
- extractors:
  - group: 1
    part: body
    regex:
    - '"version"\s*:\s*"([^"]+)"'
    - '"edition"\s*:\s*"([^"]+)"'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "\"services\"")
    - contains(body, "\"edition\"") || contains(body, "\"version\"")
    - contains(to_lower(header), "application/json")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/_localstack/health'
id: localstack-detect
info:
  author: ChrisJr404
  description: 'LocalStack (localstack.cloud / github.com/localstack/localstack) is
    a local AWS cloud-service emulator widely used in development and CI. It typically
    listens on TCP 4566 and exposes an unauthenticated /_localstack/health endpoint
    that lists every emulated service and its enabled state. An exposed LocalStack
    on a non-loopback interface gives an attacker a fully-functional fake AWS account,
    including S3, SQS, IAM, SecretsManager and Lambda execution.

    '
  metadata:
    fofa-query: body="LocalStack"
    max-request: 1
    product: localstack
    shodan-query: '"localstack"'
    vendor: localstack
    verified: true
  name: LocalStack - Detect
  reference:
  - https://github.com/localstack/localstack
  - https://docs.localstack.cloud/references/internal-endpoints/
  severity: info
  tags: aws,cloud,detect,discovery,localstack,tech
