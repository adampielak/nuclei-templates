http:
- matchers:
  - part: body
    type: word
    words:
    - debugbar
  - part: content_type
    type: word
    words:
    - application/json
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/_debugbar/open'
id: laravel-debugbar-exposure
info:
  author: moamenbasel
  description: 'Laravel Debugbar (barryvdh/laravel-debugbar) was detected as enabled
    and publicly accessible. When left active in production, it exposes SQL queries,
    request data, session variables, mail logs, and application internals to any visitor.

    '
  metadata:
    max-request: 1
    shodan-query: html:"_debugbar"
    verified: true
  name: Laravel Debugbar - Sensitive Information Exposure
  reference:
  - https://github.com/barryvdh/laravel-debugbar
  - https://laravel.com/docs/10.x/configuration#environment-configuration
  remediation: 'Disable Laravel Debugbar in production by setting DEBUGBAR_ENABLED=false
    in the .env file or removing the package from production dependencies.

    '
  severity: medium
  tags: laravel,debugbar,misconfig,exposure
