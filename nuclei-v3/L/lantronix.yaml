id: lantronix

info:
  name: Lantronix Product - Detect
  severity: info
  author: darses
  description: |
    Lantronix Product was detected.
  classification:
    cve-id: todo
  metadata:
    verified: false
    max-requests: 1
    vendor: lantronix
    product: product
    shodan-query:
      - html:"Lantronix" html:"luci" -http.favicon.hash:882208493
  reference:
    - https://www.lantronix.com
  tags: lantronix

http:
  - method: GET
    path:
      - "{{BaseURL}}/cgi-bin/luci/"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Lantronix"
          - "/luci-static/"

      - type: status
        status:
          - 403
          - 200
        condition: or

    extractors:
      - type: regex
        group: 1
        regex:
          - '"application-name" content="([^"]+)"'

      - type: regex
        group: 2
        regex:
          - '>Powered by (Lantronix|LuCI) ([^<]+)</a>'

      - type: regex
        group: 1
        regex:
          - '\?v=([^"]+)"'
