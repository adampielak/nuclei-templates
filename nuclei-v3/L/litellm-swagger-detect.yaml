http:
- matchers:
  - part: body
    type: word
    words:
    - <title>LiteLLM API - Swagger UI
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: litellm-swagger-detect
info:
  author: rxerium
  description: 'Detects exposed LiteLLM API Swagger UI interface. LiteLLM is a unified
    API for 100+ LLM providers (OpenAI, Azure, Anthropic, etc.).

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)LiteLLM API -
      Swagger UI"})
    shodan-query: http.title:"LiteLLM API - Swagger UI"
    verified: true
  name: LiteLLM API - Swagger UI Detection
  reference:
  - https://github.com/BerriAI/litellm
  - https://docs.litellm.ai/
  severity: info
  tags: tech,litellm,swagger,api,ai,llm
