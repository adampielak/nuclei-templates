http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "leantime-version", "create an administrator account")
    - contains(content_type, "text/html")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/install'
id: leantime-install-page-exposed
info:
  author: 0x_Akoko
  description: 'Detected a Leantime instance identified with the setup installation
    page accessible at /install, enabling unauthenticated users to create the first
    administrator account and configure the database.

    '
  metadata:
    fofa-query: title="Leantime" && body="leantime-version"
    max-request: 1
    product: leantime
    shodan-query: html:"Leantime" http.title:"Leantime"
    vendor: leantime
    verified: true
  name: Leantime - Unfinished Installation
  reference:
  - https://github.com/leantime/leantime
  - https://docs.leantime.io/installation/package-installation
  severity: high
  tags: exposure,install,leantime,misconfig
