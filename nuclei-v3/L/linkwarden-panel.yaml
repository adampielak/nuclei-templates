http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(to_lower(body), "<title>linkwarden</title>")
    type: dsl
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "linkwarden", "_next")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: linkwarden-panel
info:
  author: ChrisJr404
  description: 'Linkwarden (linkwarden.app / github.com/linkwarden/linkwarden) is
    a popular open-source self-hosted bookmark and link archiving manager. Default
    Docker port 3000. Exposed instances may reveal users'' archived link collections,
    screenshots, and PDFs.

    '
  metadata:
    fofa-query: title="Linkwarden"
    max-request: 1
    product: linkwarden
    runzero-match: service["favicon.ico.image.mmh3"] == "1726765983" || any(each(service["html.titles"]),
      {# matches "(?i)Linkwarden"})
    shodan-query: http.title:"Linkwarden"
    vendor: linkwarden
    verified: true
  name: Linkwarden Panel - Detect
  reference:
  - https://github.com/linkwarden/linkwarden
  - https://linkwarden.app/
  severity: info
  tags: bookmarks,detect,discovery,linkwarden,panel,selfhosted
