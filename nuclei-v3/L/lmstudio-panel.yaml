http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - LM Studio
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: lmstudio-panel
info:
  author: rxerium
  description: 'LM Studio is a desktop application for discovering, downloading, and
    running local

    LLMs

    '
  metadata:
    max-request: 1
    product: lmstudio
    shodan-query: http.title:"LM Studio Chat"
    vendor: lmstudio
    verified: true
  name: LM Studio Panel - Detect
  reference:
  - https://lmstudio.ai
  severity: info
  tags: panel,lmstudio,llm,ai,detect,discovery
