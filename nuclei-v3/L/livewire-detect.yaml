http:
- matchers:
  - condition: or
    part: body
    type: word
    words:
    - wire:id=
    - wire:initial-data=
    - window.livewire_app_url
    - window.livewire_token
    - livewire.js
    - livewire.min.js
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: livewire-detect
info:
  author: Shivam Kamboj
  description: 'Detects the presence of Laravel Livewire, a full-stack framework for
    Laravel that builds dynamic interfaces.

    '
  metadata:
    max-request: 1
    product: livewire
    shodan-query: html:"wire:id"
    vendor: laravel
    verified: true
  name: Laravel Livewire - Detect
  reference:
  - https://livewire.laravel.com/
  severity: info
  tags: tech,discovery,livewire
