id: letta-panel
info:
  name: Letta Panel - Detect
  author: rxerium
  severity: info
  description: |
    Letta (formerly MemGPT) is an open-source framework for building stateful LLM agents with long-term memory.
  reference:
    - https://github.com/letta-ai/letta
    - https://www.letta.com
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^Letta$"})
    max-request: 1
    product: Letta
    shodan-query: 'http.title:"Letta"'
    vendor: Letta AI
    verified: true
  tags: ai,detect,discovery,letta,llm,memgpt,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Letta</title>"
      - type: status
        status:
          - 200
