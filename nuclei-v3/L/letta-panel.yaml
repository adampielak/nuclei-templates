http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Letta</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: letta-panel
info:
  author: rxerium
  description: 'Letta (formerly MemGPT) is an open-source framework for building stateful
    LLM agents with long-term memory.

    '
  metadata:
    max-request: 1
    product: Letta
    runzero-match: any(each(service["html.titles"]), {# matches "^Letta$"})
    shodan-query: http.title:"Letta"
    vendor: Letta AI
    verified: true
  name: Letta Panel - Detect
  reference:
  - https://github.com/letta-ai/letta
  - https://www.letta.com
  severity: info
  tags: ai,detect,discovery,letta,llm,memgpt,panel
