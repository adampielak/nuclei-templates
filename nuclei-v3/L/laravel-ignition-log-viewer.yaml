http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - '{"log_messages"'
    - exception
  - part: content_type
    type: word
    words:
    - application/json
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/_ignition/logs'
id: laravel-ignition-log-viewer
info:
  author: moamenbasel
  description: 'Laravel Ignition''s log viewer endpoint is publicly accessible and
    exposes application logs. These logs may contain stack traces, SQL queries, environment
    variables, API keys, user data, and other sensitive information.

    '
  impact: 'An attacker can access application logs without authentication, potentially
    exposing stack traces, database queries, environment variables, API keys, session
    tokens, user credentials, and internal application paths. This information can
    be leveraged for further attacks such as credential theft, privilege escalation,
    or direct system compromise.

    '
  metadata:
    max-request: 1
    shodan-query: title:"Laravel"
    verified: true
  name: Laravel Ignition - Log Viewer Information Disclosure
  reference:
  - https://github.com/spatie/laravel-ignition
  - https://laravel.com/docs/10.x/errors#configuration
  remediation: 'Disable Ignition in production by setting APP_DEBUG=false. If Ignition
    must remain enabled, configure it to disable the log viewer endpoint via the ignition
    config file.

    '
  severity: medium
  tags: exposure,ignition,laravel,logs
