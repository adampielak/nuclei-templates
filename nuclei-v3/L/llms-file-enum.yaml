http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "# ", "- ")
    - contains(content_type, "text/plain")
    type: dsl
  - negative: true
    part: response
    type: word
    words:
    - MongoDB over HTTP on the native
    - application/javascript
    - application/x-javascript
    - application/json
    - application/xml
    - text/xml
    - <html
    - <!doctype
    - <script
    - <meta
    - image/
    - Response xmlns
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/llms.txt'
id: llms-file-enum
info:
  author: ritikchaddha
  description: 'Detects the presence of a /llms.txt file on the server. This file
    may be used for internal documentation, configuration, or as a placeholder for
    third-party integrations. Enumerating such files could reveal sensitive or valuable
    information if misconfigured or publicly exposed.

    '
  metadata:
    max-requests: 1
    runzero-review: REJECT/2026-02-04/potentially noisy template
    shodan-query: html:"/llms.txt"
    verified: true
  name: llms.txt - Enumeration
  severity: info
  tags: enum,llms,config,ai
