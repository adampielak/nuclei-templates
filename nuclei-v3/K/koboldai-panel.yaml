http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>KoboldAI Lite</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: koboldai-panel
info:
  author: rxerium
  description: 'KoboldAI was detected. KoboldAI was an AI text adventure and story
    generation interface that supports multiple local and remote language models including
    koboldcpp and AI Horde.

    '
  metadata:
    max-request: 1
    product: koboldai
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)KoboldAI Lite"})
    shodan-query: http.title:"KoboldAI Lite"
    vendor: KoboldAI
    verified: true
  name: KoboldAI Panel - Detect
  reference:
  - https://github.com/LostRuins/koboldcpp
  - https://github.com/KoboldAI/KoboldAI-Client
  severity: info
  tags: ai,detect,discovery,koboldai,llm,panel
