file:
- extensions:
  - xml
  matchers:
  - condition: and
    type: word
    words:
    - <name>admin</name>
    - <descr><![CDATA[System Administrator]]></descr>
    - <priv>user-shell-access</priv>
  matchers-condition: and
id: known-default-account
info:
  author: pussycat0x
  description: 'In order to attempt access to known devices'' platforms, attackers
    use the available database of the known default accounts for each platform or
    Operating System.

    The known default accounts are often (without limiting to) the following: ''admin''.

    '
  name: Known Default Account - Detect
  reference: '- https://docs.netgate.com/pfsense/en/latest/usermanager/defaults.html

    '
  remediation: 'Deletes the known default accounts configured.

    '
  severity: info
  tags: audit,config,file,firewall,pfsense
