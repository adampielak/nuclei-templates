http:
- matchers:
  - condition: and
    dsl:
    - contains(body, "SIGMA AIR MANAGER")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/HMI/login.html'
id: kaeser-sigma-air-manager-panel
info:
  author: Th3l0newolf
  description: Detected exposed Kaeser Sigma Air Manager login panel
  metadata:
    shodan-query: http.title:"SIGMA AIR MANAGER"
    verified: true
  name: Kaeser Sigma Air Manager - Panel
  reference:
  - https://www.kaeser.com/
  severity: info
  tags: kaeser,login,panel,detect,discovery
