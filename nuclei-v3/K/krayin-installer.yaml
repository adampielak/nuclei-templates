http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - <title>Krayin Installer
    - Welcome to Installation
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/install'
id: krayin-installer
info:
  author: theamanrawat
  description: 'Krayin CRM installer page was detected.

    '
  metadata:
    fofa-query: body="Krayin Installer"
    max-request: 1
    verified: true
  name: Krayin CMS - Installer
  severity: high
  tags: crm,exposure,install,krayin,misconfig
