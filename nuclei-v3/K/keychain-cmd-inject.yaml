id: keychain-cmd-inject

info:
  name: OpenClaw macOS Keychain Command Injection (CVE-2026-27487)
  author: lobster-guard
  severity: high
  description: |
    OpenClaw before 2026.2.14 on macOS: the keychain credential refresh path
    constructs a shell command to write updated JSON via security
    add-generic-password -w with user-controlled OAuth tokens, enabling
    OS command injection.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2026-27487
  classification:
    cvss-score: 8.0
    cve-id: CVE-2026-27487
    cwe-id: CWE-78
  tags: openclaw,cve2026,rce,command-injection,macos,keychain

http:
  - raw:
      - |
        GET /healthz HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "darwin"
          - "macos"
          - "Darwin"
        condition: or
