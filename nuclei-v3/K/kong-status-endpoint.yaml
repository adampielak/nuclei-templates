flow: http(1) || http(2)
http:
- extractors:
  - group: 1
    part: header
    regex:
    - 'Server: kong/([0-9.]+)'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "\"connections_reading\"", "\"workers_lua_vms\"", "\"lua_shared_dicts\"")
    - contains(content_type, "application/json")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/status'
- attack: clusterbomb
  extractors:
  - group: 1
    part: header
    regex:
    - 'Server: kong/([0-9.]+)'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "\"connections_reading\"", "\"workers_lua_vms\"", "\"lua_shared_dicts\"")
    - contains(content_type, "application/json")
    type: dsl
  payloads:
    header:
    - X-Forwarded-For
    - X-Real-IP
    - X-Client-IP
    - True-Client-IP
  raw:
  - 'GET /status HTTP/1.1

    Host: {{Hostname}}

    {{header}}: 127.0.0.1

    '
  stop-at-first-match: true
id: kong-status-endpoint
info:
  author: Amjad Ali
  description: 'Kong API Gateway''s internal /status endpoint is publicly accessible
    either directly or via IP restriction bypass using spoofed headers. The endpoint
    exposes server metrics including active connections, request counts, database
    reachability, worker Lua VM memory usage, and shared dictionary allocation details.

    '
  metadata:
    fofa-query: 'header="Server: kong"'
    max-request: 5
    product: kong-gateway
    shodan-query: 'http.title:"Kong" || "Server: kong"'
    vendor: konghq
    verified: true
  name: Kong API Gateway - Internal Status Endpoint
  reference:
  - https://docs.konghq.com/gateway/latest/production/monitoring/status-api/
  severity: info
  tags: kong,misconfig,exposure,api-gateway,konghq
