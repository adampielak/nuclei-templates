id: kestra-panel
info:
  name: Kestra Login - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    Kestra login interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^Kestra$"})
    max-request: 1
    shodan-query: html:"Kestra"
    verified: true
  tags: discovery,kestra,login,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/ui/login?from=/dashboards"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Kestra</title>"
          - 'window.KESTRA_UI_PATH = "/ui/";'
        condition: and
      - type: status
        status:
          - 200
