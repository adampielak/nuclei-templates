# gap: kubelet-anonymous-exec-enabled
id: kubelet-anonymous-exec-enabled

info:
  name: Kubernetes Kubelet Anonymous API Accessible
  author: TyrusRC
  severity: critical
  description: |
    Detects Kubernetes kubelets configured with --anonymous-auth=true and
    permissive --authorization-mode where the read-only and exec API is
    reachable without authentication. An unauthenticated GET /pods returns
    HTTP 200 with a PodList JSON body, indicating the operator can also
    reach /run, /exec, and /attach to execute arbitrary commands inside
    running containers on the node.

    Target the kubelet HTTPS port directly, e.g.
    `nuclei -u https://node.example.com:10250 -t templates/cloud/kubelet-anonymous-exec-enabled.yaml`.
    Kubelets typically present a self-signed cert; pair with `-insecure`.
  reference:
    - https://raw.githubusercontent.com/HackTricks-wiki/hacktricks-cloud/master/src/pentesting-cloud/kubernetes-security/pentesting-kubernetes-services/kubelet-authentication-and-authorization.md
    - https://kubernetes.io/docs/reference/access-authn-authz/kubelet-authn-authz/
  tags: custom,cloud,kubernetes,kubelet,k8s

http:
  - method: GET
    path:
      - "{{BaseURL}}/pods"
      - "{{BaseURL}}/runningpods/"
      - "{{BaseURL}}/configz"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - 'contains(body, "\"kind\":\"PodList\"") && contains(body, "\"items\"")'
          - 'contains(body, "\"kind\":\"KubeletConfiguration\"") || contains(body, "\"kubeletconfig\"")'
        condition: or
