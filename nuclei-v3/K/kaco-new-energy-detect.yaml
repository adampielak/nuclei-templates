http:
- headers:
    Accept-Encoding: gzip
  host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "KACO inverter web page")
    - contains(body, "<title>KACO new energy</title>")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: kaco-new-energy-detect
info:
  author: rxerium
  description: 'KACO new energy is a solar inverter manufacturer. Their inverters
    include a built-in web server

    that serves compressed HTML over HTTP for monitoring inverter status and energy
    production data.

    Devices are commonly deployed on residential and commercial solar installations.

    '
  metadata:
    max-request: 1
    product: solar-inverter
    runzero-match: service["favicon.ico.image.mmh3"] == "-890342445" || any(each(service["html.titles"]),
      {# matches "KACO new energy"})
    shodan-query: http.title:"KACO new energy"
    vendor: kaco
    verified: true
  name: KACO New Energy Solar Inverter - Detect
  reference:
  - https://kaco-newenergy.com/
  severity: info
  tags: detect,energy,ics,inverter,kaco,panel,solar,tech
