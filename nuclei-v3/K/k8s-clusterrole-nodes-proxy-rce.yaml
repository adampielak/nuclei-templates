code:
- engine:
  - sh
  - bash
  extractors:
  - internal: true
    json:
    - .items[]
    name: items
    type: json
  source: kubectl get clusterrole --output=json
flow: "code(1);\nfor (let role of template.items) {\n  set(\"role\", role)\n  javascript(1);\n\
  }\n"
id: k8s-clusterrole-nodes-proxy-rce
info:
  author: princechaddha
  description: 'Detects Kubernetes ClusterRoles that grant GET permission on nodes/proxy
    resource.

    Due to an authorization inconsistency in Kubelet, the nodes/proxy GET permission
    allows

    execution of commands in any container via WebSocket connections to the Kubelet
    API.

    The Kubelet authorizes based on the initial HTTP GET method of WebSocket handshake

    rather than the actual operation (exec/run/attach) which should require CREATE
    permission.

    '
  impact: 'Service accounts with nodes/proxy GET permission can potentially execute
    commands in any

    container if they have network access to the Kubelet API (port 10250). This bypasses

    expected RBAC controls and audit logging.

    '
  name: ClusterRoles with Risky nodes/proxy GET Permission
  reference:
  - https://grahamhelton.com/blog/nodes-proxy-rce
  remediation: 'Remove nodes/proxy GET permissions from ClusterRoles unless absolutely
    necessary.

    Restrict network access to Kubelet port 10250 and implement network policies.

    '
  severity: high
  tags: cloud,devops,kubernetes,devsecops,rbac,k8s,k8s-cluster-security
javascript:
- code: "let role = JSON.parse(template.role);\nlet riskyRules = 0;\nif (role.rules)\
    \ {\n  role.rules.forEach(rule => {\n    let apiGroups = rule.apiGroups || [];\n\
    \    let resources = rule.resources || [];\n    let verbs = rule.verbs || [];\n\
    \    let isCoreApiGroup = apiGroups.includes(\"\") || apiGroups.includes(\"*\"\
    );\n    let hasNodesProxy = resources.includes(\"nodes/proxy\") || resources.includes(\"\
    *\");\n    let hasGetVerb = verbs.includes(\"get\") || verbs.includes(\"*\");\n\
    \    if (isCoreApiGroup && hasNodesProxy && hasGetVerb) {\n      riskyRules++;\n\
    \    }\n  });\n}\nif (riskyRules > 0) {\n  let result = (`ClusterRole '${role.metadata.name}'\
    \ has ${riskyRules} rule(s) granting 'nodes/proxy' GET permission in core API\
    \ group, allowing potential RCE via Kubelet.`);\n  Export(result);\n}\n"
  extractors:
  - dsl:
    - response
    type: dsl
self-contained: true
