http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Kubeflow Pipelines</title>
  - condition: or
    part: body
    type: word
    words:
    - window.KFP_FLAGS
    - KFP_FLAGS
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: kubeflow-pipelines-panel
info:
  author: rxerium
  description: 'Kubeflow Pipelines is an open-source platform for building and deploying
    portable, scalable ML workflows.

    It provides a web UI for managing ML pipelines, experiments, and runs on Kubernetes.

    '
  metadata:
    max-request: 1
    product: Kubeflow Pipelines
    runzero-match: any(each(service["html.titles"]), {# matches "^Kubeflow Pipelines"})
    shodan-query: http.title:"Kubeflow Pipelines"
    vendor: Kubeflow
    verified: true
  name: Kubeflow Pipelines Panel - Detect
  reference:
  - https://github.com/kubeflow/pipelines
  - https://www.kubeflow.org
  severity: info
  tags: ai,detect,discovery,kubeflow,kubernetes,mlops,panel
