id: outsystems-servicecenter-panel
info:
  name: OutSystems Service Center Login Panel - Detect
  author: righettod
  severity: info
  description: |
    OutSystems Service Center login panel was detected.
  reference:
    - https://www.outsystems.com/
  classification:
    cpe: cpe:2.3:a:outsystems:platform_server:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: service["http.body"] matches "(?i)outsystems"
    max-request: 2
    product: platform_server
    shodan-query: http.html:"outsystems"
    vendor: outsystems
    verified: true
  tags: detect,discovery,login,outsystems,panel
http:
  - extractors:
      - group: 1
        part: body
        regex:
          - environmentName:.?([a-z0-9A-Z\s]+).?
        # digest: 490a0046304402201c62a144a9e449e5230c4430527af17d687c230b0cf2f0db47e456f1bc369d2c022061cd536efda992a1626fcd95e239da32874db417e10b0972633c4baea4cf18ae:922c64590222798bb761d5b6d8e72950

        type: regex
    host-redirects: true
    matchers:
      - condition: and
        dsl:
          - status_code == 200
          - contains(body, "Enter your OutSystems credentials")
        type: dsl
      - condition: or
        part: set_cookie
        type: word
        words:
          - osVisitor=
          - osVisit=
    max-redirects: 2
    method: GET
    path:
      - '{{BaseURL}}/Login.aspx'
      - '{{BaseURL}}/ServiceCenter/Login.aspx'
    stop-at-first-match: true
