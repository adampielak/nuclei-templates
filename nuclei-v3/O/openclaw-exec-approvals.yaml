id: openclaw-exec-approvals-exposed

info:
  name: OpenClaw Exec Approvals Policy Exposed
  author: lobster-guard
  severity: high
  description: Detects if exec approval policy is readable/writable — attacker can auto-approve all commands
  tags: openclaw,exec,approval,policy
  remediation: Restrict exec approval API to authenticated admin sessions. Never expose allowAll=true in production.
  classification:
    cwe-id: CWE-862
  metadata:
    max-request: 2
    verified: false
    product: openclaw
    vendor: openclaw

http:
  - method: POST
    path:
      - "{{BaseURL}}/__openclaw/a2ui/api/exec/approvals"
      - "{{BaseURL}}/__openclaw__/a2ui/api/exec/approvals"
    headers:
      Content-Type: "application/json"
    body: '{}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "allowAll"
          - "approvals"
          - "rules"
        condition: or
