http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>Outback Power</title>
    - status_tab
    - meters_tab
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: outback-power-detect
info:
  author: rxerium
  description: 'OutBack Power Mate3s is a system hub and gateway for OutBack FX-series
    inverter-chargers

    used in off-grid, grid-hybrid, and battery backup solar power systems.

    The built-in web interface exposes system status, battery metrics, and inverter
    data.

    '
  metadata:
    max-request: 1
    product: mate3s
    runzero-match: any(each(service["html.titles"]), {# matches "Outback Power"})
    shodan-query: http.title:"Outback Power"
    vendor: outback-power
    verified: true
  name: OutBack Power Mate3s Gateway - Detect
  reference:
  - https://www.outbackpower.com/outback-products/communications/detail/mate3s
  severity: info
  tags: detect,energy,ics,outback,panel,scada,solar,tech
