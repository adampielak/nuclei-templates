id: openclaw-detect

info:
  name: OpenClaw Gateway Detection
  author: lobster-guard
  severity: info
  description: |
    Detects OpenClaw Gateway instances via multiple endpoint fingerprinting.
    Checks health endpoint, OpenClaw-specific UI paths, and WebSocket gateway.
  tags: openclaw,detect,fingerprint
  remediation: If this instance should not be publicly accessible, restrict network access via firewall rules or bind to localhost only.
  classification:
    cwe-id: CWE-200
  metadata:
    max-request: 3
    verified: false
    product: openclaw
    vendor: openclaw
    shodan-query: port:18789
    fofa-query: port="18789"

http:
  - method: GET
    path:
      - "{{BaseURL}}/__openclaw/control-ui-config.json"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "serverVersion"
          - "assistantName"
        condition: and
    extractors:
      - type: json
        json:
          - ".serverVersion"
        part: body

  - method: GET
    path:
      - "{{BaseURL}}/healthz"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "openclaw"
          - "gateway"
          - "version"
        condition: or
    extractors:
      - type: json
        json:
          - ".version"
        part: body

  - method: GET
    path:
      - "{{BaseURL}}/__openclaw/canvas/"
      - "{{BaseURL}}/__openclaw__/canvas/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 301
          - 302
          - 401
      - type: word
        words:
          - "openclaw"
          - "canvas"
          - "Unauthorized"
        condition: or
