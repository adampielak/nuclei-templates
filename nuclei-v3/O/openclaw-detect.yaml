http:
- extractors:
  - json:
    - .serverVersion
    part: body
    type: json
  matchers:
  - status:
    - 200
    type: status
  - condition: and
    part: body
    type: word
    words:
    - serverVersion
    - assistantName
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/__openclaw/control-ui-config.json'
- extractors:
  - json:
    - .version
    part: body
    type: json
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - openclaw
    - gateway
    - version
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/healthz'
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 401
    type: status
  - condition: or
    type: word
    words:
    - openclaw
    - canvas
    - Unauthorized
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/__openclaw/canvas/'
  - '{{BaseURL}}/__openclaw__/canvas/'
id: openclaw-detect
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-200
  description: 'Detects OpenClaw Gateway instances via multiple endpoint fingerprinting.

    Checks health endpoint, OpenClaw-specific UI paths, and WebSocket gateway.

    '
  metadata:
    fofa-query: port="18789"
    max-request: 3
    product: openclaw
    shodan-query: port:18789
    vendor: openclaw
    verified: false
  name: OpenClaw Gateway Detection
  remediation: If this instance should not be publicly accessible, restrict network
    access via firewall rules or bind to localhost only.
  severity: info
  tags: openclaw,detect,fingerprint
