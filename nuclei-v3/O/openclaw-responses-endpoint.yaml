http:
- body: '{"model":"probe","input":"test"}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    - 400
    type: status
  - part: body
    regex:
    - '"(output|choices|id|object)"'
    type: regex
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/v1/responses'
id: openclaw-responses-endpoint
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-306
  description: 'Detects exposed /v1/responses endpoint (OpenAI Responses API compat).

    This endpoint allows creating and managing agent responses, potentially

    enabling unauthorized task execution.

    '
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Responses API Endpoint Exposed
  remediation: Require authentication for /v1/responses. Set auth.mode=token in Gateway
    config.
  severity: medium
  tags: openclaw,api,responses
