id: openclaw-ws-no-auth
info:
  author: LobsterGuard
  classification:
    cwe-id: CWE-306
  description: "OpenClaw Gateway WebSocket accepts connections without authentication\
    \ \u2014 full control plane access"
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw WebSocket No Authentication
  remediation: Set auth.mode=token and require Bearer token for WebSocket handshake.
  severity: critical
  tags: openclaw,misconfig,websocket
websocket:
- address: '{{Host}}:{{Port}}'
  inputs:
  - data: '{"id":1,"method":"health"}'
  matchers:
  - condition: and
    type: word
    words:
    - '"result"'
    - '"id":1'
