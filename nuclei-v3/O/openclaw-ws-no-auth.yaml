id: openclaw-ws-no-auth
info:
  name: OpenClaw WebSocket No Authentication
  author: LobsterGuard
  severity: critical
  description: OpenClaw Gateway WebSocket accepts connections without authentication — full control plane access
  tags: openclaw,misconfig,websocket
  remediation: Set auth.mode=token and require Bearer token for WebSocket handshake.
  classification:
    cwe-id: CWE-306
  metadata:
    max-request: 1
    verified: false
    product: openclaw
    vendor: openclaw

websocket:
  - address: "{{Host}}:{{Port}}"
    inputs:
      - data: '{"id":1,"method":"health"}'
    matchers:
      - type: word
        words:
          - '"result"'
          - '"id":1'
        condition: and
