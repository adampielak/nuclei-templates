http:
- matchers:
  - status:
    - 200
    - 201
    - 204
    type: status
  - condition: and
    negative: true
    type: word
    words:
    - 429 Too Many Requests
    - rate limit exceeded
    - Rate Limit
  matchers-condition: and
  race: true
  race_count: 15
  raw:
  - 'GET /api/status HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /api/status HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /api/status HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /healthz HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /healthz HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /healthz HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /v1/models HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /v1/models HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /v1/models HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw/api/config HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw/api/config HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw/api/config HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw__/api/config HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw__/api/config HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw__/api/config HTTP/1.1

    Host: {{Hostname}}

    '
id: openclaw-ratelimit-scope-bypass
info:
  author: LobsterGuard
  description: "Tests whether the rate limiter enforces per-scope isolation correctly.\n\
    Sends rapid requests across multiple endpoint scopes to determine if\nrate limit\
    \ counters are shared or isolated. If significantly fewer 429\nresponses are returned\
    \ than expected when hitting different scopes,\nthe per-scope isolation is bypassable\
    \ \u2014 an attacker can distribute\nrequests across scopes to avoid throttling.\n"
  metadata:
    chain_id: 38
  name: OpenClaw Rate Limiter Scope Isolation Bypass
  reference:
  - https://github.com/lobster-guard/openclaw-security
  severity: high
  tags: openclaw,ratelimit,bypass,scope
