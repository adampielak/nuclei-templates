id: opnsense-panel

info:
  name: OPNsense Panel - Detect
  author: Splint3r7,johnk3r
  severity: info
  description: |
    OPNsense panel was detected.
  classification:
    cwe-id: CWE-200
  metadata:
    runzero-match: service["favicon.ico.image.mmh3"] == "-1148190371" || service["favicon.ico.image.mmh3"] == "-1068289244" || any(each(service["html.titles"]), {# matches "(?i)\\| OPNsense"}) || service["http.head.server"] matches "OPNsense"
    max-request: 1
    verified: true
    vendor: opnsense
    product: opnsense
    shodan-query:
      - http.favicon.hash:-1148190371
      - http.favicon.hash:-1068289244
      - title:"| OPNsense"
      - "Server: OPNsense"
    fofa-query:
      - icon_hash="-1148190371"
      - icon_hash="-1068289244"
      - title="| OPNsense"
      - server=="OPNsense"
  tags: panel,login,detect,opnsense,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: dsl
        dsl:
          - 'contains(body, "| OPNsense</title>")'
          - 'status_code == 200'
        condition: and

