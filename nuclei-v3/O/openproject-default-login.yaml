flow: http(1) && http(2) && http(3)
http:
- extractors:
  - group: 1
    internal: true
    name: csrf_token
    part: body
    regex:
    - <meta name="csrf-token" content="([^"]+)"
    type: regex
  matchers:
  - dsl:
    - status_code == 200 && contains(body, "OpenProject")
    internal: true
    type: dsl
  raw:
  - 'GET /login HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - dsl:
    - status_code == 302
    internal: true
    type: dsl
  max-redirects: 3
  raw:
  - 'POST /login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    authenticity_token={{url_encode(csrf_token)}}&username={{username}}&password={{password}}&login=Sign+in

    '
  redirects: true
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "\"_type\":\"User\"", "\"admin\":true", "\"login\":\"admin\"")
    - status_code == 200
    type: dsl
  raw:
  - 'GET /api/v3/users/me HTTP/1.1

    Host: {{Hostname}}

    '
id: openproject-default-login
info:
  author: 0x_Akoko
  description: 'Detected OpenProject was found using the default administrator credentials
    admin:admin. An attacker could gain full administrative control, including user
    management, project data, and system configuration.

    '
  metadata:
    fofa-query: app="OpenProject"
    max-request: 3
    shodan-query: http.title:"OpenProject"
    verified: true
  name: OpenProject - Default Admin Credentials
  reference:
  - https://www.openproject.org/docs/installation-and-operations/installation/manual/
  - https://www.openproject.org/docs/api/introduction/
  - https://github.com/opf/openproject
  severity: high
  tags: openproject,default-login,auth,misconfig
variables:
  password: admin
  username: admin
