http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Loading - groov View
    - groovVersion
    - groov View
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: opto22-groov-panel
info:
  author: rxerium
  description: 'Opto 22 groov is an IIoT and industrial automation platform providing
    browser-based

    HMI and edge computing capabilities. The groov View and groov Admin interfaces
    allow

    control of industrial devices and data acquisition systems. Exposed instances
    may

    provide unauthenticated access to industrial control panels.

    '
  metadata:
    max-request: 1
    product: groov
    runzero-match: service["http.body"] matches `(?i)<i>groov</i> is a registered
      trademark of Opto 22.`
    shodan-query: http.title:"groov"
    vendor: Opto 22
    verified: true
  name: Opto 22 groov - Panel
  reference:
  - https://www.opto22.com/products/product-container/groov-epic
  - https://www.opto22.com/products/product-container/groov-rio
  severity: info
  tags: discovery,groov,ics,iot,opto22,panel
