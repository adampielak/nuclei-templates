http:
- matchers:
  - part: header
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)?(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
    type: regex
  method: GET
  path:
  - '{{BaseURL}}/web/login?db=asdf&redirect=http://interact.sh'
id: odoo-login-redirect
info:
  author: DhiyaneshDk
  description: 'Detected an open redirect vulnerability in Odoo where the redirect
    parameter in web/login was abused to redirect users to an attacker-controlled
    external URL after the authentication flow.

    '
  metadata:
    max-request: 1
    runzero-review: 'REJECT/2026-04-16/auto: interactsh (OAST callback)'
    shodan-query: http.component:"Odoo" html:"web/login"
    verified: true
  name: Reflected Odoo - Open Redirect
  reference:
  - https://github.com/odoo/odoo/issues/13812
  severity: low
  tags: odoo,redirect,vuln
