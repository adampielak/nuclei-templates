id: openclaw-rogue-node
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-287
  description: "Tests if node.pair.request accepts rogue node registration \u2014\
    \ attacker can register fake nodes to intercept system.run commands"
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Rogue Node Registration
  remediation: Require manual approval for node pairing. Disable auto-approve in node.pair
    config.
  severity: critical
  tags: openclaw,node,pairing,rce
websocket:
- address: '{{Host}}/gateway'
  inputs:
  - data: '{"jsonrpc":"2.0","id":1,"method":"node.pair.request","params":{"nodeId":"nuclei-probe","displayName":"Nuclei
      Probe","platform":"linux","commands":["system.run"],"caps":["exec"]}}'
  matchers:
  - condition: or
    type: word
    words:
    - pairingCode
    - pairingId
    - id
  - negative: true
    type: word
    words:
    - unknown method
    - not found
    - unauthorized
  matchers-condition: and
