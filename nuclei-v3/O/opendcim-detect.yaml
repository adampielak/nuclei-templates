http:
- matchers:
  - type: word
    words:
    - <title>openDCIM Data Center Inventory
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: opendcim-detect
info:
  author: rxerium
  description: 'openDCIM is a web-based data centre infrastructure management application.

    '
  metadata:
    max-request: 1
    shodan-query: title:"openDCIM Data Center Inventory"
  name: openDCIM - Detect
  reference:
  - https://opendcim.org
  - https://github.com/opendcim/openDCIM
  severity: info
  tags: dcim,detect,opendcim,tech
