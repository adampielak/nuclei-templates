http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>OpenHands</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: openhands-panel
info:
  author: rxerium
  description: 'OpenHands (formerly OpenDevin) was detected. OpenHands is an open-source
    AI software engineering agent platform that can write code, run commands, and
    perform development tasks autonomously. Exposed instances may allow unauthenticated
    access to the agent.

    '
  metadata:
    max-request: 1
    product: openhands
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)OpenHands"})
    shodan-query: http.title:"OpenHands"
    vendor: All-Hands-AI
    verified: true
  name: OpenHands Panel - Detect
  reference:
  - https://github.com/All-Hands-AI/OpenHands
  - https://www.all-hands.dev/
  severity: info
  tags: agent,ai,detect,discovery,opendevin,openhands,panel
