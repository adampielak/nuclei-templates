http:
- attack: sniper
  body: '{"model":"probe","messages":[]}'
  headers:
    Authorization: "Bearer \xA7token\xA7"
    Content-Type: application/json
  matchers:
  - status:
    - 200
    type: status
  - status:
    - 400
    type: status
  matchers-condition: or
  method: POST
  path:
  - '{{BaseURL}}/v1/chat/completions'
  payloads:
    token:
    - change-me-to-a-long-random-token
    - openclaw
    - OpenClaw
    - test
    - test123
    - admin
    - admin123
    - password
    - token
    - secret
    - 123456
    - default
    - gateway
    - lobster
    - demo
    - changeme
  stop-at-first-match: true
id: openclaw-weak-tokens
info:
  author: LobsterGuard
  classification:
    cwe-id: CWE-521
  description: OpenClaw Gateway uses a weak/common token
  metadata:
    max-request: 16
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Gateway Weak Token Brute Force
  remediation: Use a strong random token (openssl rand -hex 32) and enable rate limiting.
  severity: high
  tags: openclaw,brute,auth
