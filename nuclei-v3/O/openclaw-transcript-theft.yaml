http:
- body: '{}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - sessionId
    - sessionKey
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/__openclaw/a2ui/api/sessions/list'
  - '{{BaseURL}}/__openclaw__/a2ui/api/sessions/list'
- body: '{"limit":100}'
  headers:
    Content-Type: application/json
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - messages
    - transcript
  matchers-condition: and
  method: POST
  path:
  - '{{BaseURL}}/__openclaw/a2ui/api/sessions/get'
  - '{{BaseURL}}/__openclaw__/a2ui/api/sessions/get'
id: openclaw-transcript-theft
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-200
  description: "Tests if session endpoints expose unredacted conversation history.\n\
    Step 1: sessions/list reveals session IDs without auth.\nStep 2: sessions/get\
    \ returns conversation transcripts including tool outputs,\nsecrets, file contents,\
    \ and command results.\nNote: These are independent checks \u2014 each request\
    \ is self-contained.\n"
  metadata:
    max-request: 4
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Session Transcript Theft
  remediation: Require authentication for session API endpoints. Redact sensitive
    tool outputs (secrets, file contents) from stored transcripts.
  severity: high
  tags: openclaw,sessions,transcript,theft
