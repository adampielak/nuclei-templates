http:
- extractors:
  - json:
    - .token
    - .accessToken
    type: json
  matchers:
  - status:
    - 200
    - 201
    type: status
  - condition: or
    part: body
    type: word
    words:
    - token
    - paired
    - accessToken
    - session
  matchers-condition: and
  raw:
  - 'POST /api/auth/pair HTTP/1.1

    Host: {{Hostname}}

    User-Agent: curl/8.0

    Content-Type: application/json


    {"deviceName":"nuclei-probe","deviceType":"cli","clientId":"nuclei-test-{{randstr}}"}

    '
  - 'POST /__openclaw/api/auth/pair HTTP/1.1

    Host: {{Hostname}}

    User-Agent: curl/8.0

    Content-Type: application/json


    {"deviceName":"nuclei-probe","deviceType":"cli","clientId":"nuclei-test-{{randstr}}"}

    '
  - 'POST /__openclaw__/api/auth/pair HTTP/1.1

    Host: {{Hostname}}

    User-Agent: curl/8.0

    Content-Type: application/json


    {"deviceName":"nuclei-probe","deviceType":"cli","clientId":"nuclei-test-{{randstr}}"}

    '
id: openclaw-silent-local-pairing
info:
  author: LobsterGuard
  description: 'Tests whether OpenClaw allows silent device pairing for non-browser

    clients (e.g. curl, CLI tools) without user confirmation. The local

    pairing endpoint should require browser-based interactive approval,

    but if a CLI User-Agent without an Origin header is accepted, any

    local process can silently obtain an authentication token and gain

    full API access.

    '
  metadata:
    chain_id: 40
  name: OpenClaw Non-Browser Local Client Auto-Pairing
  reference:
  - https://github.com/lobster-guard/openclaw-security
  severity: high
  tags: openclaw,auth,pairing,local
