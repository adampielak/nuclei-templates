id: openremote-detect
info:
  name: OpenRemote IoT Platform - Detection
  author: pussycat0x
  severity: info
  description: |
    Detects exposed OpenRemote IoT platform instances by checking login page titles, API endpoints, and specific OpenRemote UI artifacts. OpenRemote isan open-source IoT platform with a Keycloak-backed auth system.
  reference:
    - https://github.com/openremote/openremote
    - https://openremote.io
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cvss-score: 0.0
    cwe-id: CWE-200
  metadata:
    runzero-match: service["favicon.ico.image.mmh3"] == "690482597" || service["http.body"] matches `content="OpenRemote[^"]*"` 
    fofa-query: 'title="OpenRemote"'
    max-request: 2
    shodan-query: 'http.title:"OpenRemote"'
    verified: true
  tags: detect,iot,openremote,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/manager/"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "OpenRemote"
          - "openremote"
        condition: or
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "openremote"
        case-insensitive: true
