http:
- matchers:
  - condition: and
    dsl:
    - contains(location, '/genbas/')
    - contains(set_cookie, 'CAKEPHP=')
    type: dsl
  raw:
  - 'POST /users/login HTTP/1.1

    Host: {{Hostname}}

    Origin: {{RootURL}}

    Content-Type: application/x-www-form-urlencoded

    Referer: {{RootURL}}/users/login


    _method=POST&data[User][loginid]=1234&data[User][passwd]=1234

    '
id: osasi-default-login
info:
  author: biero-el-corridor
  description: 'Detected OSASI PLC web interface accessible with default credentials,
    potentially allowing unauthorized administrative access to industrial control
    systems.

    '
  metadata:
    max-request: 1
    runzero-match: service["favicon.ico.image.mmh3"] == "-268676052"
    shodan-query: http.favicon.hash:-268676052
    verified: true
  name: OSASI PLC - Default Login
  severity: high
  tags: default-login,osasi,plc,vuln
