http:
- extractors:
  - group: 1
    part: body
    regex:
    - <meta name="outline-version" content="([^"]+)"
    type: regex
  host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(to_lower(body), "<title>outline</title>") || contains(body, "data-outline-team")
    - contains(body, "outline")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: outline-panel
info:
  author: ChrisJr404
  description: 'Outline (getoutline.com / github.com/outline/outline) is a popular
    open-source team knowledge base / wiki, often self-hosted as a Notion alternative.
    Exposed self-hosted instances may reveal team documents and provide a path to
    login enumeration if SSO is misconfigured.

    '
  metadata:
    fofa-query: title="Outline"
    max-request: 1
    product: outline
    runzero-match: service["favicon.ico.image.mmh3"] == "811213058" || any(each(service["html.titles"]),
      {# matches "(?i)Outline"})
    shodan-query: http.title:"Outline"
    vendor: outline
    verified: true
  name: Outline Panel - Detect
  reference:
  - https://github.com/outline/outline
  - https://www.getoutline.com/
  severity: info
  tags: detect,discovery,knowledge-base,outline,panel,wiki
