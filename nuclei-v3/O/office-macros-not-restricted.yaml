code:
- args:
  - -ExecutionPolicy
  - Bypass
  engine:
  - powershell
  - powershell.exe
  matchers:
  - type: word
    words:
    - 'True'
  pattern: '*.ps1'
  pre-condition: 'IsWindows();

    '
  source: '$apps = @(''Word'',''Excel'',''PowerPoint''); $unrestricted = $false; foreach
    ($app in $apps) { $val = (Get-ItemProperty -Path "HKCU:\Software\Policies\Microsoft\Office\16.0\$app\Security"
    -Name ''VBAWarnings'' -ErrorAction SilentlyContinue).VBAWarnings; if ($null -eq
    $val -or $val -lt 3) { $unrestricted = $true } }; if ($unrestricted) { ''True''
    } else { ''False'' }

    '
id: office-macros-not-restricted
info:
  author: boonchuan
  description: 'Detected Microsoft Office macro restrictions were not configured,
    increasing the risk of macro-based malware delivery through Office documents.

    '
  impact: 'Unrestricted macros allow attackers to deliver malware through Office documents,
    a common initial access vector.

    '
  metadata:
    verified: false
  name: Microsoft Office Macros Not Restricted
  reference:
  - https://www.cyber.gov.au/acsc/view-all-content/publications/essential-eight-maturity-model
  - https://learn.microsoft.com/en-us/deployoffice/security/internet-macros-blocked
  remediation: 'Configure Group Policy to disable macros: User Configuration > Administrative
    Templates > Microsoft Office > Security > VBA Macro Notification Settings > Disable
    all without notification (VBAWarnings = 4).

    '
  severity: high
  tags: code,compliance,essential-eight,macros,office,windows,windows-audit
