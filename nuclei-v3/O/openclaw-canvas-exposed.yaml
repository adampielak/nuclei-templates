http:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/__openclaw/canvas/'
  - '{{BaseURL}}/__openclaw__/canvas/'
  - '{{BaseURL}}/__openclaw/a2ui/'
  - '{{BaseURL}}/__openclaw__/a2ui/'
id: openclaw-canvas-exposed
info:
  author: LobsterGuard
  classification:
    cwe-id: CWE-200
  description: OpenClaw Canvas or A2UI web interface is publicly accessible
  metadata:
    max-request: 4
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Canvas/A2UI Exposed
  remediation: Restrict Canvas/A2UI access to internal networks or require authentication.
  severity: medium
  tags: openclaw,misconfig,exposure
