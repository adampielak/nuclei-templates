http:
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - approval
    - token
    - pending
    - rules
    - allowAll
  matchers-condition: and
  raw:
  - 'GET /__openclaw/api/exec/approvals HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw__/api/exec/approvals HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - status:
    - 200
    - 101
    type: status
  - condition: or
    part: body
    type: word
    words:
    - socket
    - websocket
    - upgrade
  - condition: or
    part: header
    type: word
    words:
    - 'Upgrade: websocket'
    - 'Connection: Upgrade'
  matchers-condition: or
  raw:
  - 'GET /__openclaw/api/exec/socket HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw__/api/exec/socket HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - approval
    - token
    - socket
    - pending
  matchers-condition: and
  raw:
  - 'GET /__openclaw/a2ui/api/exec/approvals HTTP/1.1

    Host: {{Hostname}}

    '
  - 'GET /__openclaw__/a2ui/api/exec/approvals HTTP/1.1

    Host: {{Hostname}}

    '
id: openclaw-exec-socket-permission
info:
  author: LobsterGuard
  description: 'Tests whether the exec approval and socket endpoints are accessible

    without authentication. The approval endpoint may leak pending

    approval tokens, and the exec socket endpoint may accept connections

    without proper auth. Also tests environment variable case sensitivity

    bypass where OPENCLAW_AUTH_TOKEN vs openclaw_auth_token may be handled

    differently on case-insensitive systems.

    '
  metadata:
    chain_id: 47
  name: OpenClaw Exec Socket Token Leak and Env Case Bypass
  reference:
  - https://github.com/lobster-guard/openclaw-security
  severity: high
  tags: openclaw,exec,socket,token-leak,auth
