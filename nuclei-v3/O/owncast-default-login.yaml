flow: http(1) && http(2)
http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "versionNumber", "online")
    - contains(content_type, "application/json")
    internal: true
    type: dsl
  raw:
  - 'GET /api/status HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "instanceDetails", "ffmpegPath")
    - contains(content_type, "application/json")
    type: dsl
  raw:
  - 'GET /api/admin/serverconfig HTTP/1.1

    Host: {{Hostname}}

    Authorization: Basic {{base64(username + ":" + password)}}

    '
id: owncast-default-login
info:
  author: 0x_Akoko
  description: 'Detected Owncast using default admin credentials admin:abc123. The
    admin API was accessible via HTTP Basic authentication, allowing full server configuration
    access.

    '
  metadata:
    fofa-query: app="Owncast"
    max-request: 2
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Owncast"})
    shodan-query: http.title:"Owncast"
    verified: true
  name: Owncast - Default Credentials
  reference:
  - https://owncast.online/docs/configuration/
  - https://owncast.online/quickstart/configure/
  severity: high
  tags: admin,default-login,owncast,streaming,vuln
variables:
  password: abc123
  username: admin
