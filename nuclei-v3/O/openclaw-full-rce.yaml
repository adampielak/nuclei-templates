id: openclaw-full-rce
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-78
  description: "Tests the OpenClaw RCE attack surface via two independent checks:\n\
    1. nodes.list \u2014 verifies if node enumeration is accessible (prerequisite\
    \ for RCE)\n2. exec.approval.request \u2014 tests if command approval can be requested\
    \ without auth\nNote: Each check runs independently. For the full 4-step kill\
    \ chain\n(nodes.list \u2192 exec.approval.request \u2192 self-approve \u2192 node.invoke),\n\
    use the LobsterGuard CLI exploit module which maintains WS session state.\n"
  metadata:
    max-request: 2
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Full RCE Chain (Self-Approve + node.invoke)
  remediation: Enable sandbox mode (agents.defaults.sandbox.mode=all). Disable exec.approval
    self-approve. Restrict node.invoke to authenticated admin sessions.
  severity: critical
  tags: openclaw,rce,exec,approval,critical
websocket:
- address: '{{Host}}/gateway'
  inputs:
  - data: '{"jsonrpc":"2.0","id":1,"method":"nodes.list","params":null}'
  matchers:
  - condition: or
    type: word
    words:
    - nodeId
    - platform
    - commands
  - negative: true
    type: word
    words:
    - unknown method
    - unauthorized
  matchers-condition: and
- address: '{{Host}}/gateway'
  inputs:
  - data: '{"jsonrpc":"2.0","id":2,"method":"exec.approval.request","params":{"command":"echo
      nuclei_rce_probe","nodeId":"*","host":"node","twoPhase":true}}'
  matchers:
  - condition: or
    type: word
    words:
    - id
    - approval
  - negative: true
    type: word
    words:
    - unknown method
  matchers-condition: and
