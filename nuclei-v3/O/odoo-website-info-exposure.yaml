http:
- matchers:
  - part: body
    type: word
    words:
    - instance of Odoo, the <a target="_blank" href="https://www.odoo.com">Open Source
      ERP</a>
    - Installed Applications
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/website/info'
id: odoo-website-info-exposure
info:
  author: aushack
  description: 'Detected exposure of the Odoo website info page, which discloses installed
    applications and extensions that could aid reconnaissance.

    '
  metadata:
    fofa-query: title="odoo"
    google-query: intitle:"odoo"
    max-request: 1
    product: odoo
    shodan-query:
    - title:"Odoo"
    - http.title:"odoo"
    - cpe:"cpe:2.3:a:odoo:odoo"
    vendor: odoo
    verified: true
  name: Odoo Website - Information Disclosure
  severity: info
  tags: discovery,info,odoo
