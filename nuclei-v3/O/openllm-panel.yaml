http:
- host-redirects: true
  matchers:
  - part: body
    regex:
    - (?i)<title>[^<]*OpenLLM[^<]*</title>
    type: regex
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: openllm-panel
info:
  author: rxerium
  description: 'OpenLLM is an open-source platform for running and deploying LLMs
    in production. It is built by BentoML

    and provides an OpenAI-compatible API server with a web UI for model management.

    '
  metadata:
    max-request: 1
    product: OpenLLM
    runzero-review: REJECTED/2026-05-28/Too generic
    shodan-query: http.title:"OpenLLM"
    vendor: BentoML
    verified: true
  name: OpenLLM Panel - Detect
  reference:
  - https://github.com/bentoml/OpenLLM
  - https://bentoml.com
  severity: info
  tags: ai,bentoml,detect,discovery,llm,openllm,panel
