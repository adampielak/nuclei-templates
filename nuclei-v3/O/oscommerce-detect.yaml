http:
- extractors:
  - name: version
    part: body
    regex:
    - osCommerce ([0-9.]+)
    - Powered by osCommerce ([0-9.]+)
    type: regex
  - name: oscommerce_id
    part: body
    regex:
    - oscommerce-site-id=([a-z0-9]+)
    - oscommerce\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by osCommerce
    - oscommerce.com
    - X-Powered-By-osCommerce
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/admin'
  - '{{BaseURL}}/includes/modules/'
  - '{{BaseURL}}/catalog/includes/javascript/oscommerce.js'
  - '{{BaseURL}}/checkout_payment.php'
  stop-at-first-match: true
id: oscommerce-detect
info:
  author: Chirag Mistry
  description: 'An instance running osCommerce is detected by looking for specific
    HTTP headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    shodan-query: http.component:"osCommerce"
  name: osCommerce Detection
  severity: info
  tags: oscommerce,detect,tech
