id: openclaw-control-detect
info:
  name: OpenClaw Control - Detect
  author: pbuff07
  severity: info
  description: |
    Detected OpenClaw Control, a web-based control interface.
  reference:
    - https://github.com/openclaw/openclaw
  metadata:
    max-request: 1
    product: openclaw
    shodan-query: http.title:"OpenClaw Control"
    vendor: openclaw
    verified: true
  tags: discovery,exposed-panel,openclaw
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>OpenClaw Control'
          - '<openclaw-app>'
      - type: status
        status:
          - 200
