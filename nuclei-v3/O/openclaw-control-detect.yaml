http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>OpenClaw Control
    - <openclaw-app>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: openclaw-control-detect
info:
  author: pbuff07
  description: 'Detected OpenClaw Control, a web-based control interface.

    '
  metadata:
    max-request: 1
    product: openclaw
    shodan-query: http.title:"OpenClaw Control"
    vendor: openclaw
    verified: true
  name: OpenClaw Control - Detect
  reference:
  - https://github.com/openclaw/openclaw
  severity: info
  tags: discovery,exposed-panel,openclaw
