  - '{{BaseURL}}/go.php?url={{redirect}}'
  - '{{BaseURL}}/cgi-bin/redirect.cgi?{{redirect}}'
  - '{{BaseURL}}/checkcookie?redir={{redirect}}'
  - '{{BaseURL}}/#/path///{{redirect}}/'
  - '{{BaseURL}}/api/v2/redirect?url={{redirect}}'
  - '{{BaseURL}}/api/v1/redirect?url={{redirect}}'
  - '{{BaseURL}}/proxy.php?url={{redirect}}'
  - '{{BaseURL}}/goto.asp?Url={{redirect}}'
  - '{{BaseURL}}/auth.php?redirect_uri={{redirect}}'
  payloads:
    redirect: redirect.txt
  redirects: false
  stop-at-first-match: true
- attack: clusterbomb
  method: GET
  path:
  - '{{BaseURL}}/?{{param}}={{redirect}}'
  payloads:
    param:
    - targetOrigin
    - fallback
    - query
    - redirection_url
    - next
    - ref_url
    - state
    - 1
    - redirect_uri
    - forum_reg
    - return_to
    - redirect_url
    - return_url
    - host
    - url
    - redirectto
    - return
    - prejoin_data
    - callback_url
    - path
    - authorize_callback
    - email
    - origin
    - continue
    - domain_name
    - redir
    - wp_http_referer
    - endpoint
    - shop
    - qpt_question_url
    - checkout_url
    - redirect_to
    - succUrl
    - file
    - link
    - referrer
    - recipient
    - redirect
    - u
    - hostname
    - returnTo
    - return_path
    - image
    - requestTokenAndRedirect
    - retURL
    - next_url
    - view
    - target
    - rurl
    - dest
    - destination
    - image_url
    - go
    - returnUrl
    - forward
    - forward_url
    - redirection
    - out
    - outUrl
    - next_page
    - redirectUrl
    - RedirectUrl
    - REDIRECT_URL
    - _redirect
    - data
    - jump
    - jump_url
    - click
    - navigate
    - navigateTo
    - window
    - windowUrl
    redirect: redirect.txt
  redirects: false
  stop-at-first-match: true
id: open-redirect-comprehensive
info:
  author: pdteam,custom
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 6.1
    cwe-id: CWE-601
  description: "\u064A\u0643\u062A\u0634\u0641 \u062B\u063A\u0631\u0627\u062A Open\
    \ Redirect \u0639\u0646 \u0637\u0631\u064A\u0642 \u0627\u062E\u062A\u0628\u0627\
    \u0631 \u0645\u0633\u0627\u0631\u0627\u062A \u062B\u0627\u0628\u062A\u0629 \u0634\
    \u0627\u0626\u0639\u0629\u060C \u0648\u062F\u0645\u062C \u0642\u0627\u0626\u0645\
    \u0629 \u0634\u0627\u0645\u0644\u0629 \n\u0645\u0646 \u0627\u0644\u0628\u0627\u0631\
    \u0627\u0645\u064A\u062A\u0631\u0627\u062A \u0645\u0639 \u0628\u0627\u064A\u0644\
    \u0648\u062F\u0627\u062A \u0627\u0644\u0627\u0644\u062A\u0641\u0627\u0641 \u0645\
    \u0646 \u0645\u0644\u0641 \u062E\u0627\u0631\u062C\u064A (redirect.txt) \u0628\
    \u0627\u0633\u062A\u062E\u062F\u0627\u0645 clusterbomb.\n"
  name: Open Redirect - Comprehensive Param & Path Fuzzing
  severity: medium
  tags: redirect,generic,vuln,fuzz
matchers:
- condition: or
  status:
  - 300
  - 301
  - 302
  - 303
  - 307
  - 308
  type: status
- condition: or
  part: header
  regex:
  - (?im)^\s*location\s*:\s*(?:https?:)?//(?:[A-Za-z0-9](?:[A-Za-z0-9._-]*[A-Za-z0-9])?\.)*(?:oast\.me|oastify\.com|google\.com|example\.com|attacker\.com|evil\.com|bing\.com)(?:$|[:/?\s#\r\n])
  - (?im)^\s*location\s*:\s*javascript\s*:.*?(?:alert\(|confirm\(|prompt\(|void\()
  type: regex
matchers-condition: and
