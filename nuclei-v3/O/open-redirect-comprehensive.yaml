extractors:
- name: location_value
  part: header
  regex:
  - (?im)^location\s*:\s*(https?://|//)?([^\r\n]+)
  type: regex
http:
- method: GET
  path:
  - '{{BaseURL}}/https://{{redirect}}/'
  - '{{BaseURL}}//https://{{redirect}}//'
  - '{{BaseURL}}/%09/https://{{redirect}}/'
  - '{{BaseURL}}/%5c{{redirect}}/'
  - '{{BaseURL}}/%2F/{{redirect}}/'
  - '{{BaseURL}}//{{redirect}}%E3%80%82com'
  - '{{BaseURL}}/%0D{{redirect}}'
  - '{{BaseURL}}//{{redirect}}/%2f%2e%2e'
  - '{{BaseURL}}//{{redirect}}/%2e%2e'
  - '{{BaseURL}}//{{redirect}}/%2f..'
  - '{{BaseURL}}/login?next={{redirect}}'
  - '{{BaseURL}}/login?to={{redirect}}'
  - '{{BaseURL}}/login?ReturnURL={{redirect}}'
  - '{{BaseURL}}/logout?backUrl={{redirect}}'
  - '{{BaseURL}}/logout={{redirect}}'
  - '{{BaseURL}}/login={{redirect}}'
  - '{{BaseURL}}/out?{{redirect}}'
  - '{{BaseURL}}/out/https://{{redirect}}/'
  - '{{BaseURL}}/success={{redirect}}'
  - '{{BaseURL}}/form-complete?return={{redirect}}'
  - '{{BaseURL}}/click?u={{redirect}}'
  - '{{BaseURL}}/visit?ref={{redirect}}'
  - '{{BaseURL}}/visit?url={{redirect}}'
  - '{{BaseURL}}/originUrl={{redirect}}'
  - '{{BaseURL}}/page={{redirect}}'
  - '{{BaseURL}}/action_url={{redirect}}'
  - '{{BaseURL}}/src={{redirect}}'
  - '{{BaseURL}}/linkAddress={{redirect}}'
  - '{{BaseURL}}/location={{redirect}}'
  - '{{BaseURL}}/request={{redirect}}'
  - '{{BaseURL}}/backurl={{redirect}}'
  - '{{BaseURL}}/ReturnUrl={{redirect}}'
  - '{{BaseURL}}/silentsignin?returnUrl={{redirect}}'
  - '{{BaseURL}}/open-external-link?url={{redirect}}'
  - '{{BaseURL}}/search/url?url={{redirect}}'
  - '{{BaseURL}}/partner?url={{redirect}}'
  - '{{BaseURL}}/redirect/{{redirect}}'
  - '{{BaseURL}}/redirect?url={{redirect}}'
  - '{{BaseURL}}/redirect.php?url={{redirect}}'
  - '{{BaseURL}}/redirect.php?goto={{redirect}}'
  - '{{BaseURL}}/redirect.html?url={{redirect}}'
  - '{{BaseURL}}/redirect.html?link={{redirect}}'
  - '{{BaseURL}}/redirect-to/?redirect={{redirect}}'
  - '{{BaseURL}}/redirect/?g={{redirect}}'
  - '{{BaseURL}}/p/redirect.html?url={{redirect}}'
