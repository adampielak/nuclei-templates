http:
- matchers:
  - part: body
    type: word
    words:
    - SpeedTest by OpenSpeedTest
  method: GET
  path:
  - '{{BaseURL}}'
id: openspeedtest-speedtest
info:
  author: DhiyaneshDk
  description: 'Detected the exposed default page of the OpenSpeedTest service.

    '
  metadata:
    max-request: 1
    shodan-query: html:"Openspeedtest"
    verified: true
  name: OpenSpeedTest - Detect
  severity: info
  tags: tech,openspeedtest,discovery
