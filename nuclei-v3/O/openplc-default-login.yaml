flow: http(1) || http(2)
http:
- extractors:
  - group: 1
    internal: true
    name: csrf
    part: body
    regex:
    - (?i)<input[^>]+name=["']csrf_token["'][^>]*value=["']([^"']+)["']
    - (?i)<input[^>]+value=["']([^"']+)["'][^>]*name=["']csrf_token["']
    type: regex
  matchers:
  - condition: and
    part: body_3
    type: word
    words:
    - Dashboard
    - Runtime Logs
    - Logout</p>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 3
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    '
  - 'POST /login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    username={{username}}&password={{password}}&csrf_token={{csrf}}

    '
  - 'GET /dashboard HTTP/1.1

    Host: {{Hostname}}

    '
  redirects: true
- matchers:
  - condition: and
    part: body_2
    type: word
    words:
    - Dashboard
    - Runtime Logs
    - Logout</p>
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /login HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/x-www-form-urlencoded


    username={{username}}&password={{password}}

    '
  - 'GET /dashboard HTTP/1.1

    Host: {{Hostname}}

    '
id: openplc-default-login
info:
  author: machevalia,shriyanss
  description: 'Identifies default credentials (openplc:openplc) on OpenPLC Webserver
    v3, allowing unauthorized access to the web interface.

    '
  metadata:
    max-request: 2
    runzero-match: service["http.body"] matches "(?i)OpenPLC"
    shodan-query: html:"OpenPLC"
    verified: true
  name: OpenPLC Webserver v3 - Default Login
  severity: high
  tags: openplc,default-login,iot,vuln
variables:
  password: openplc
  username: openplc
