http:
- extractors:
  - name: version
    part: body
    regex:
    - OpenCart ([0-9.]+)
    - Powered by OpenCart ([0-9.]+)
    type: regex
  - name: opencart_id
    part: body
    regex:
    - opencart-store-id=([a-z0-9]+)
    - oc-admin/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by OpenCart
    - X-Powered-By-OpenCart
    - OpenCart Store
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/admin'
  - '{{BaseURL}}/catalog/view/javascript/opencart.js'
  - '{{BaseURL}}/index.php?route=common/home'
  - '{{BaseURL}}/oc-admin'
  stop-at-first-match: true
id: opencart-detect
info:
  author: Chirag Mistry
  description: 'An instance running OpenCart is detected by looking for specific HTTP
    headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    shodan-query: http.component:"OpenCart"
  name: OpenCart Detection
  severity: info
  tags: opencart,detect,tech
