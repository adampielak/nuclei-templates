http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - contains_all(body, 'GuestUser','true')
    - contains_any(body, 'Filr', 'filr', 'Vibe')
    - status_code == 200
    type: dsl
  max-redirects: 3
  method: GET
  path:
  - '{{BaseURL}}/ssf/a/do?p_name=ss_forum&p_action=1&action=__login'
id: opentext-filr-guest-access
info:
  author: pussycat0x
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-284
  description: 'OpenText Filr (formerly Micro Focus/Novell Filr) had guest access
    enabled, allowing unauthenticated users to access the system as a Guest, exposing
    GuestUser: ''true'' and an "Enter as Guest" option on the SSF login page.

    '
  impact: 'Anonymous users can access publicly shared files and folders without authentication,
    potentially exposing sensitive internal documents.

    '
  metadata:
    max-request: 1
    product: filr
    shodan-query: html:"OpenText Filr"
    vendor: opentext
    verified: true
  name: OpenText Filr - Guest Access Enabled
  reference:
  - https://www.microfocus.com/documentation/filr/filr-23.2/filr-admin/access.html
  - https://www.microfocus.com/documentation/filr/filr-23.2/filr-inst/bjm9tb7.html
  - https://opentext.com/products/filr
  remediation: 'Disable guest access via Admin Console (Port 8443) > System > Web
    Application > uncheck "Allow Guest access".

    Ensure Filr instances exposed to the internet do not have guest access enabled.

    '
  severity: medium
  tags: exposure,filr,misconfig,opentext
