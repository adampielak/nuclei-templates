http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>OpenBao
    - Welcome to OpenBao
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/ui'
id: openbao-webui-detect
info:
  author: ritikchaddha
  description: 'Detects the presence of the OpenBao web console.

    '
  metadata:
    fofa-query: title="OpenBao"
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)OpenBao"})
    shodan-query: http.title:"OpenBao"
    verified: true
  name: OpenBao Web UI Panel - Detect
  reference:
  - https://github.com/openbao/openbao
  severity: info
  tags: detect,openbao,panel,ui
