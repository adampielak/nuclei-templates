id: openclaw-openai-compat

info:
  name: OpenClaw OpenAI Compatible API Endpoint
  author: lobster-guard
  severity: info
  description: |
    Detects OpenClaw's OpenAI-compatible API endpoints (/v1/chat/completions, /v1/responses).
    Confirms by checking for OpenClaw-specific error messages or model listing behavior.
  tags: openclaw,detect,api,openai
  remediation: Restrict API access with auth.mode=token and a strong random token.
  classification:
    cwe-id: CWE-200
  metadata:
    max-request: 2
    verified: false
    product: openclaw
    vendor: openclaw

http:
  - method: POST
    path:
      - "{{BaseURL}}/v1/chat/completions"
    headers:
      Content-Type: application/json
    body: '{"model":"nonexistent-probe","messages":[{"role":"user","content":"ping"}]}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 400
          - 200
      - type: word
        part: body
        words:
          - "model"
          - "messages"
          - "completions"
          - "openclaw"
        condition: or
