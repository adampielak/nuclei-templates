http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>OpenSCADA
    - OpenSCADA
    - WorkStation
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: openscada-panel
info:
  author: rxerium
  description: 'OpenSCADA is an open-source SCADA (Supervisory Control and Data Acquisition)

    system. Exposed instances may provide access to industrial control interfaces

    and operational technology (OT) data without authentication.

    '
  metadata:
    max-request: 1
    product: openscada
    runzero-match: any(each(service["html.titles"]), {# matches "^OpenSCADA"})
    shodan-query: http.title:"OpenSCADA" port:10002
    vendor: OpenSCADA
    verified: true
  name: OpenSCADA - Panel
  reference:
  - https://oscada.org
  - https://sourceforge.net/projects/oscada/
  severity: info
  tags: discovery,ics,openscada,panel,scada
