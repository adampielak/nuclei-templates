http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "<title>PI Vision</title>")
    - contains_any(body, "PI Vision User Guide", "PI Vision display", "project=PIVISION")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: osisoft-pi-vision-panel
info:
  author: rxerium
  description: 'OSIsoft PI Vision (now AVEVA PI Vision) is a web-based data visualisation

    platform for the PI System, widely used in energy, utilities, oil and gas,

    and manufacturing for real-time operational data monitoring. Exposed instances

    may provide access to sensitive operational technology data.

    '
  metadata:
    max-request: 2
    product: pi-vision
    runzero-match: any(each(service["html.titles"]), {# matches "^PI Vision"})
    shodan-query: http.title:"PI Vision"
    vendor: OSIsoft
    verified: true
  name: OSIsoft PI Vision - Login Panel
  reference:
  - https://www.aveva.com/en/products/pi-vision/
  - https://docs.aveva.com/bundle/pi-vision/
  severity: info
  tags: aveva,discovery,energy,historian,ics,osisoft,panel,pi-system,pi-vision,scada
