http:
- body: '{"model":"probe","messages":[]}'
  headers:
    Authorization: Bearer change-me-to-a-long-random-token
    Content-Type: application/json
  matchers:
  - status:
    - 200
    type: status
  - name: past-auth-bad-body
    status:
    - 400
    type: status
  matchers-condition: or
  method: POST
  path:
  - '{{BaseURL}}/v1/chat/completions'
id: openclaw-default-token
info:
  author: LobsterGuard
  classification:
    cwe-id: CWE-1392
  description: OpenClaw Gateway uses the default token from .env.example
  metadata:
    max-request: 1
    product: openclaw
    vendor: openclaw
    verified: false
  name: OpenClaw Gateway Default Token
  remediation: "Replace the default token with a strong random value \u2014 openssl\
    \ rand -hex 32."
  severity: critical
  tags: openclaw,misconfig,default-creds
