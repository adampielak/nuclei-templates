id: openclaw-marker-homoglyph-spoof
info:
  author: LobsterGuard
  description: 'Tests whether OpenClaw''s external content marker system can be spoofed

    using Cyrillic and Greek homoglyph characters. The markers

    <<<EXTERNAL_UNTRUSTED_CONTENT>>> use ASCII letters, but visually

    identical characters from Cyrillic (e.g. U+0415 for E) and Greek

    (e.g. U+0391 for A) alphabets may bypass the marker detection while

    appearing legitimate to the LLM, enabling prompt injection via

    trusted-looking content boundaries.

    '
  metadata:
    chain_id: 48
  name: OpenClaw External Content Marker Homoglyph Spoofing
  reference:
  - https://github.com/lobster-guard/openclaw-security
  severity: high
  tags: openclaw,homoglyph,marker,prompt-injection,spoof
websocket:
- address: '{{scheme}}://{{Hostname}}/ws'
  inputs:
  - data: '{"jsonrpc":"2.0","id":1,"method":"skills.list","params":{}}

      '
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - skills
    - scanner
    - markers
