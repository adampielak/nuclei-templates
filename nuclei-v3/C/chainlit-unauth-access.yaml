flow: http(1) && http(2)
http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, 'Chainlit/chainlit')
    internal: true
    type: dsl
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    Accept: application/json

    '
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, 'userEnv','ui','mcp')
    type: dsl
  raw:
  - 'GET /project/settings HTTP/1.1

    Host: {{Hostname}}

    Accept: application/json

    '
id: chainlit-unauth-access
info:
  author: pussycat0x
  description: 'Detects Chainlit AI chatbot instances with no authentication, leaving
    the entire app publicly accessible by default.

    '
  metadata:
    max-request: 3
    shodan-query: title:"Chainlit"
    verified: true
  name: Chainlit - Unauthenticated Access
  reference:
  - https://github.com/chainlit/chainlit
  - https://docs.chainlit.io/authentication/overview
  severity: low
  tags: ai,chainlit,exposure,llm,misconfig,unauth
