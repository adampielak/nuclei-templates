http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "boss_logo", "System administration", "Login")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/boss/'
id: carel-boss-mini-panel
info:
  author: Kazgangap
  description: 'CAREL Boss Mini login panel was detected. Boss Mini is a local supervisor
    solution by CAREL used for monitoring and managing HVAC/R systems in commercial
    facilities. Exposed panels may indicate misconfigured network segmentation.

    '
  metadata:
    fofa-query: icon_hash=="1092427843"
    max-request: 1
    product: boss-mini
    runzero-match: service["favicon.ico.image.mmh3"] == "1092427843"
    vendor: carel
    verified: true
  name: CAREL Boss Mini - Login Panel Detected
  reference:
  - https://www.carel.com/
  severity: info
  tags: panel,carel,boss-mini,ics,login,detect
