http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "ClearML", "automate and orchestrate your ML stack")
    type: dsl
  max-redirects: 2
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    '
  redirects: true
id: clearml-panel
info:
  author: rxerium
  description: 'ClearML was detected. ClearML is an open-source MLOps platform for
    experiment tracking, model management, and pipeline orchestration. Exposed instances
    may allow access to ML experiments, models, and infrastructure configurations.

    '
  metadata:
    max-request: 1
    product: clearml
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)ClearML"})
    shodan-query: http.title:"ClearML"
    vendor: allegro
    verified: true
  name: ClearML Panel - Detect
  reference:
  - https://github.com/allegroai/clearml
  - https://clear.ml/
  severity: info
  tags: ai,clearml,detect,discovery,mlops,panel
