http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - (?i)content=["']CMSimple ([0-9.]+)
    type: regex
  matchers:
  - part: body
    regex:
    - (?i)content=["']CMSimple(?:["'\s>])
    type: regex
  - condition: or
    part: body
    type: word
    words:
    - cmsimpleLocatorElement
    - Welcome_to_CMSimple
    - templates/__cmsimple_
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}'
id: cmsimple-detect
info:
  author: Shivam Kamboj
  description: 'Detects the presence of CMSimple, a simple content management system
    that requires no database (flat-file).

    '
  metadata:
    max-request: 1
    shodan-query: html:"CMSimple"
    verified: true
  name: CMSimple - Detect
  reference:
  - https://www.cmsimple.org/
  severity: info
  tags: tech,cmsimple,discovery
