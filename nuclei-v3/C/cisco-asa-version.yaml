    - last_modified
    part: header
    type: kval
  matchers:
  - condition: or
    part: header
    type: word
    words:
    - 'Content-Type: application/java-archive'
    - 'Content-Type: application/x-java-archive'
  - part: body
    type: word
    words:
    - /cisco/webvpn/
