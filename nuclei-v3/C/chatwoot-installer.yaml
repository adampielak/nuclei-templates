http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "SuperAdmin | Chatwoot", "Howdy, Welcome to Chatwoot", "Finish
      Setup")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/installation/onboarding'
id: chatwoot-installer
info:
  author: 0x_Akoko
  description: 'Detected chatwoot instance with the initial installation onboarding
    page accessible at /installation/onboarding, enabling unauthenticated users to
    create the first Super Admin account and gain full platform control.

    '
  metadata:
    fofa-query: title="SuperAdmin | Chatwoot"
    max-request: 1
    product: chatwoot
    shodan-query: http.title:"SuperAdmin | Chatwoot"
    vendor: chatwoot
    verified: true
  name: Chatwoot - Installation
  reference:
  - https://github.com/chatwoot/chatwoot
  - https://www.chatwoot.com/docs/self-hosted/monitoring/super-admin-sidekiq
  severity: high
  tags: chatwoot,exposure,install,misconfig,unauth
