http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "configuration_json","hnsw_configuration","log_position")
    type: dsl
  raw:
  - 'GET /api/v2/tenants/default_tenant/databases/default_database/collections HTTP/1.1

    Host: {{Hostname}}

    Accept: application/json

    '
  - 'GET /api/v1/collections HTTP/1.1

    Host: {{Hostname}}

    Accept: application/json

    '
  stop-at-first-match: true
id: chroma-api-exposure
info:
  author: pussycat0x,DevamShah
  description: 'ChromaDB runs without authentication by default, exposing the API
    edpoint to anyone and allowing unauthorized access to read.

    '
  metadata:
    max-request: 2
    product: chromadb
    shodan-query: '"ChromaDB"'
    vendor: chroma-core
    verified: true
  name: ChromaDB - Unauthenticated API Exposure
  reference:
  - https://github.com/chroma-core/chroma
  - https://docs.trychroma.com/docs/run-chroma/chroma-server/security
  severity: medium
  tags: ai,chromadb,exposure,misconfig,ml,unauth,vectordb
