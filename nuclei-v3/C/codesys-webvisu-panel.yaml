id: codesys-webvisu-panel
info:
  name: CODESYS WebVisu - Panel
  author: rxerium
  severity: info
  description: |
    CODESYS WebVisu is the web-based HMI (Human-Machine Interface) component of the
    CODESYS industrial automation runtime. It provides browser-based access to PLC
    visualizations and industrial control interfaces. Exposed instances may reveal
    real-time process data and control functions without authentication.
  reference:
    - https://www.codesys.com/products/codesys-runtime/web-visualization.html
  metadata:
    runzero-match: service["http.body"] matches "(?i)WEBVISU LOGIN"
    max-request: 1
    product: webvisu
    shodan-query: 'html:"WEBVISU LOGIN"'
    vendor: CODESYS
    verified: true
  tags: codesys,discovery,ics,panel,scada,webvisu
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'WebVisu Authentication'
          - 'WEBVISU LOGIN'
          - '4Tredir'
        condition: or
      - type: status
        status:
          - 200
