http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - WebVisu Authentication
    - WEBVISU LOGIN
    - 4Tredir
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: codesys-webvisu-panel
info:
  author: rxerium
  description: 'CODESYS WebVisu is the web-based HMI (Human-Machine Interface) component
    of the

    CODESYS industrial automation runtime. It provides browser-based access to PLC

    visualizations and industrial control interfaces. Exposed instances may reveal

    real-time process data and control functions without authentication.

    '
  metadata:
    max-request: 1
    product: webvisu
    shodan-query: html:"WEBVISU LOGIN"
    vendor: CODESYS
    verified: true
  name: CODESYS WebVisu - Panel
  reference:
  - https://www.codesys.com/products/codesys-runtime/web-visualization.html
  severity: info
  tags: panel,ics,scada,codesys,webvisu,discovery
