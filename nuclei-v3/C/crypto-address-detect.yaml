http:
- matchers:
  - condition: and
    dsl:
    - regex("([13][a-km-zA-HJ-NP-Z1-9]{25,34})", body)
    - status_code == 200
    name: bitcoin-address
    type: dsl
  - condition: and
    dsl:
    - regex("(4[0-9AB][1-9A-HJ-NP-Za-km-z]{93})", body)
    - status_code == 200
    name: monero-address
    type: dsl
  - condition: and
    dsl:
    - regex("(0x[a-fA-F0-9]{40})", body)
    - status_code == 200
    name: ethereum-address
    type: dsl
  - condition: and
    dsl:
    - regex("(r[0-9a-zA-Z]{24,34})", body)
    - status_code == 200
    name: xrp-address
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
id: crypto-address-detect
info:
  author: rxerium
  description: 'Detected Bitcoin, Monero, Ethereum, or XRP wallet addresses were identified
    in webpage content.

    '
  metadata:
    max-request: 1
    verified: true
  name: Exposed Cryptocurrency Wallet Address
  reference:
  - https://bitcoin.org/
  - https://xrpl.org/
  - https://www.getmonero.org/
  - https://en.wikipedia.org/wiki/Ethereum
  severity: info
  tags: bitcoin,crypto,discovery,ethereum,monero,osint,ripple,xrp
