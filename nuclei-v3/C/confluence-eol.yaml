http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - Atlassian Confluence</a>.*?<span[^>]*id=["\']footer-build-information["\'][^>]*>([0-9.]+)
    - <meta[^>]*name=["\']ajs-version-number["\'][^>]*content=["\']([0-9.]+)["\']
    type: regex
  matchers:
  - condition: or
    part: body
    regex:
    - (?i)Atlassian Confluence
    - id=["\']footer-build-information["\']
    type: regex
  - dsl:
    - compare_versions(version, "<= 8.8.99")
    type: dsl
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/login.action'
  - '{{BaseURL}}'
  stop-at-first-match: true
id: confluence-eol
info:
  author: Shivam Kamboj
  description: 'Detected Atlassian Confluence instances versions that have reached
    End-of-Life (EOL) and no longer receive security updates.

    '
  metadata:
    max-request: 2
    runzero-match: service["product"] contains "Atlassian:Confluence"
    shodan-query: http.component:"Atlassian Confluence"
    verified: true
  name: Atlassian Confluence End-of-Life - Detect
  reference:
  - https://endoflife.date/confluence
  - https://confluence.atlassian.com/support/atlassian-support-end-of-life-policy-201851003.html
  severity: info
  tags: tech,confluence,eol
