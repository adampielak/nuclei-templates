http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Chatbot UI</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: chatbot-ui-panel
info:
  author: rxerium
  description: 'Chatbot UI is an open-source AI chat app

    '
  metadata:
    max-request: 1
    product: chatbot-ui
    shodan-query: http.title:"Chatbot UI"
    vendor: mckaywrigley
    verified: true
  name: Chatbot UI Panel - Detect
  reference:
  - https://github.com/mckaywrigley/chatbot-ui
  severity: info
  tags: panel,chatbot-ui,llm,ai,detect,discovery
