flow: http(1) && http(2)
http:
- extractors:
  - group: 1
    internal: true
    name: endpoint
    part: header
    regex:
    - Location:\s(.*)\?
    type: regex
  max-redirects: 5
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
- matchers:
  - condition: and
    dsl:
    - status_code == 302
    - contains_all(to_lower(header), "set-cookie", "auth_", "index.py")
    type: dsl
  raw:
  - 'POST {{endpoint}} HTTP/1.1

    Host: {{Hostname}}

    Content-Type: multipart/form-data; boundary=----WebKitFormBoundary0FYqMzKWywSgTEcE


    ------WebKitFormBoundary0FYqMzKWywSgTEcE

    Content-Disposition: form-data; name="filled_in"


    login

    ------WebKitFormBoundary0FYqMzKWywSgTEcE

    Content-Disposition: form-data; name="_login"


    1

    ------WebKitFormBoundary0FYqMzKWywSgTEcE

    Content-Disposition: form-data; name="_origtarget"


    index.py

    ------WebKitFormBoundary0FYqMzKWywSgTEcE

    Content-Disposition: form-data; name="_username"


    cmkadmin

    ------WebKitFormBoundary0FYqMzKWywSgTEcE

    Content-Disposition: form-data; name="_password"


    cmkadmin

    ------WebKitFormBoundary0FYqMzKWywSgTEcE

    Content-Disposition: form-data; name="_login"


    Login

    ------WebKitFormBoundary0FYqMzKWywSgTEcE--

    '
id: checkmk-default-login
info:
  author: 0xBassia
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-798
  description: 'Checkmk monitoring instance is accessible with default credentials
    (cmkadmin/cmkadmin). This provides full administrative access to the monitoring
    platform, including the ability to view all monitored hosts, execute commands
    on agents, and access stored credentials.

    '
  impact: 'An attacker with admin access to Checkmk can view the entire monitored
    infrastructure, access stored SNMP community strings and SSH credentials, execute
    commands on monitored hosts via the agent, and gain visibility into the organization''s
    network topology.

    '
  metadata:
    max-request: 2
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Check_MK"})
    shodan-query: http.title:"Check_MK"
    verified: true
  name: Checkmk - Default Login
  reference:
  - https://docs.checkmk.com/latest/en/intro_setup.html
  - https://docs.checkmk.com/latest/en/wato_user.html
  remediation: 'Change the default cmkadmin password immediately after installation
    using ''cmk-passwd cmkadmin'' or through the web interface.

    '
  severity: high
  tags: checkmk,default-login,monitoring
