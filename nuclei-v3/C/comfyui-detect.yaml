http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>ComfyUI
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: comfyui-detect
info:
  author: rxerium
  description: 'Detected ComfyUI, a node-based Stable Diffusion workflow editor. Custom
    nodes can execute arbitrary code without authentication.

    '
  metadata:
    max-request: 1
    product: comfyui
    shodan-query: http.title:"ComfyUI"
    vendor: comfyanonymous
    verified: true
  name: ComfyUI - Detect
  reference:
  - https://github.com/comfyanonymous/ComfyUI
  severity: info
  tags: tech,comfyui,discovery
