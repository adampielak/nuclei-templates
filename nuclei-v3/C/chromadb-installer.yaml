http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "<title>Chromadb Admin","Chroma connection string</label>","Authentication
      Type</div>")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/setup'
id: chromadb-installer
info:
  author: pussycat0x
  description: 'Detects the presence of the ChromaDB admin interface.The endpoint
    reveals connection details and authentication type.

    '
  metadata:
    product: chromadb
    shodan-query: ChromaDB
    vendor: chroma-core
    verified: true
  name: ChromaDB Installer - Detected
  severity: info
  tags: admin,ai,chromadb,ml
