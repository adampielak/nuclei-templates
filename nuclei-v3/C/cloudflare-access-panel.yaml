http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - "<title>Sign in \u30FB Cloudflare Access"
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: cloudflare-access-panel
info:
  author: rxerium
  description: 'Detected exposed Cloudflare Access login pages.

    '
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Cloudflare Access"})
  name: Cloudflare Access - Login Panel Detection
  reference:
  - https://developers.cloudflare.com/cloudflare-one/applications/configure-apps/
  - https://developers.cloudflare.com/cloudflare-one/
  - https://developers.cloudflare.com/cloudflare-one/identity/idp-integration/
  remediation: '- Ensure Cloudflare Access policies are properly configured to restrict
    access to authorized users only

    - Review and enforce appropriate authentication rules and multi-factor authentication
    requirements

    - Limit exposure of Access login pages to necessary endpoints only

    '
  severity: info
  tags: cloudflare,panel,discovery
