http:
- matchers:
  - part: body
    type: word
    words:
    - '@cloudflare/speedtest'
  method: GET
  path:
  - '{{BaseURL}}'
id: cloudflare-speedtest
info:
  author: DhiyaneshDk
  description: 'Detected the exposed default page of the Cloudflare Speedtest service.

    '
  metadata:
    max-request: 1
    shodan-query: html:"cloudflare/speedtest"
    verified: true
  name: Cloudflare Speedtest - Detect
  severity: info
  tags: tech,cloudflare,speedtest,discovery
