http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "Install Craft", "Create your account", "/cpresources/")
    - contains(header, "CRAFT_CSRF_TOKEN")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/admin/install'
id: craftcms-install-exposure
info:
  author: 0x_Akoko
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-284
  description: 'Detected Craft CMS installation wizard was exposed, allowing attackers
    to complete the installation process and gain administrative access to the CMS.

    '
  metadata:
    fofa-query: body="Craft CMS"
    max-request: 1
    runzero-match: service["product"] contains "CraftCMS:Craft CMS"
    shodan-query: http.html:"Craft CMS"
  name: Craft CMS Installation Wizard Exposure
  reference:
  - https://craftcms.com/docs/4.x/installation.html
  - https://craftcms.com/knowledge-base/securing-craft
  severity: high
  tags: craftcms,install,exposure,misconfig
