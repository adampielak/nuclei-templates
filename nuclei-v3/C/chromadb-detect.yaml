http:
- extractors:
  - name: version
    part: body
    regex:
    - '"nanosecond heartbeat":\s*([0-9]+)'
    type: regex
  host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - nanosecond heartbeat
  - condition: and
    dsl:
    - status_code == 200
    - contains(content_type, "application/json")
    type: dsl
  matchers-condition: and
  max-redirects: 2
  raw:
  - 'GET /api/v1/heartbeat HTTP/1.1

    Host: {{Hostname}}

    '
id: chromadb-detect
info:
  author: rxerium
  description: 'Detected ChromaDB vector database instance publicly exposed. ChromaDB
    is an open-source AI-native vector database. Unauthenticated instances expose
    stored embeddings, collections, and metadata to unauthorized access.

    '
  metadata:
    fofa-query: body="nanosecond heartbeat"
    max-request: 1
    product: chromadb
    shodan-query: http.html:"nanosecond heartbeat"
    vendor: chroma-core
    verified: true
  name: ChromaDB Vector Database - Detect
  reference:
  - https://docs.trychroma.com/
  severity: info
  tags: ai,chromadb,detect,discovery,exposure,vector-database
