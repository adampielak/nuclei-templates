http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Computer Vision Annotation Tool</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: cvat-panel
info:
  author: rxerium
  description: 'CVAT (Computer Vision Annotation Tool) was detected. CVAT is a widely
    used open-source annotation platform for labelling images, video, and 3D point
    clouds used to train AI/ML computer vision models.

    '
  metadata:
    max-request: 1
    product: cvat
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Computer Vision
      Annotation Tool"})
    shodan-query: http.title:"Computer Vision Annotation Tool"
    vendor: cvat-ai
    verified: true
  name: CVAT Computer Vision Annotation Tool - Detect
  reference:
  - https://github.com/cvat-ai/cvat
  - https://cvat.ai/
  severity: info
  tags: ai,annotation,cvat,detect,discovery,ml,panel
