http:
- matchers:
  - condition: or
    part: body
    type: word
    words:
    - docker run
    - kubeadm init
    - kubeadm join
    - --client-name
    - --token
  - condition: or
    part: header
    type: word
    words:
    - text/plain
    - bytes
    - octet-stream
  - condition: or
    status:
    - 200
    - 206
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/cheatset'
id: cheatset-disclosure
info:
  author: SirBugs
  description: This Template checks disclosing secret information via /cheatset
  name: cheatset Disclosure
  severity: critical
  tags: config,exposed,bounty,cloud
