  description: The Cache Images plugin for WordPress is vulnerable to authorization
    bypass due to a missing capability check on the cache_images_ajax() function in
    versions up to, and including, 3.1. This makes it possible for authenticated low-level
    attackers to upload image files to a site without the upload_files capabilities.
