http:
- matchers:
  - condition: or
    part: body
    type: word
    words:
    - 'webAppName: "ucmuser"'
    - webAppName="ucmuser"
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/ucmuser/'
id: cisco-ucm-selfcare-portal
info:
  author: Morgan Robertson
  description: 'Detected the presence of the Cisco Unified Communications User Management
    Panel.

    '
  metadata:
    fofa-query: title="Unified Communications Self Care Portal"
    product: unified_communications_manager
    runzero-match: service["product"] contains "Cisco:Unified Communications Manager"
    shodan-query: http.title:"Unified Communications Self Care Portal"
    vendor: cisco
    verified: true
  name: Cisco Unified Communications Self-Service User Portal - Detection
  severity: info
  tags: detect,cisco,ucm,panel
