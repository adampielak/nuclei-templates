http:
- extractors:
  - json:
    - .version
    type: json
  matchers:
  - status:
    - 200
    type: status
  - condition: or
    type: word
    words:
    - version
    - ok
  matchers-condition: and
  raw:
  - 'GET /healthz HTTP/1.1

    Host: {{Hostname}}

    '
- matchers:
  - status:
    - 101
    type: status
  - condition: and
    part: header
    type: word
    words:
    - Upgrade
    - websocket
  matchers-condition: and
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    Origin: https://evil.com

    Upgrade: websocket

    Connection: Upgrade

    Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==

    Sec-WebSocket-Version: 13

    '
id: clawjacked-ws-token-theft
info:
  author: lobster-guard
  classification:
    cve-id: CVE-2026-25253
    cvss-score: 8.8
    cwe-id: CWE-669
  description: 'OpenClaw before 2026.1.29 automatically connects via WebSocket to
    a gatewayUrl

    from a query string and sends the auth token without user confirmation.

    A malicious website can steal the token and achieve full RCE.

    '
  name: OpenClaw ClawJacked WebSocket Token Theft (CVE-2026-25253)
  reference:
  - https://nvd.nist.gov/vuln/detail/CVE-2026-25253
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g8p2-7wf7-98mq
  severity: high
  tags: openclaw,cve2026,websocket,token-theft,rce
