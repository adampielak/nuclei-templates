http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - DataHub Web Server
    - dhwebserver.css
    - Cogent
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: cogent-datahub-panel
info:
  author: rxerium
  description: 'Cogent DataHub (OPC DataHub) is an industrial middleware platform
    for OPC connectivity,

    data bridging, and SCADA integration. The embedded web server is commonly exposed
    on

    port 80 or 443.

    '
  metadata:
    max-request: 1
    product: cogent-datahub
    shodan-query: http.title:"DataHub Web Server"
    vendor: Cogent Real-Time Systems
    verified: true
  name: Cogent DataHub (OPC DataHub) - Panel
  reference:
  - https://www.cogentdatahub.com/products/datahub/
  - https://www.opcdatahub.com/
  severity: info
  tags: panel,cogent,datahub,opc,scada,ics,ot,discovery
