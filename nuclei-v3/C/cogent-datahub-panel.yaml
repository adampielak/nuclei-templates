id: cogent-datahub-panel
info:
  name: Cogent DataHub (OPC DataHub) - Panel
  author: rxerium
  severity: info
  description: |
    Cogent DataHub (OPC DataHub) is an industrial middleware platform for OPC connectivity,
    data bridging, and SCADA integration. The embedded web server is commonly exposed on
    port 80 or 443.
  reference:
    - https://www.cogentdatahub.com/products/datahub/
    - https://www.opcdatahub.com/
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^DataHub Web Server"}) || service["http.body"] matches "(?i)You have successfully configured the DataHub to run as a web server"
    max-request: 1
    product: cogent-datahub
    shodan-query: 'http.title:"DataHub Web Server"'
    vendor: Cogent Real-Time Systems
    verified: true
  tags: cogent,datahub,discovery,ics,opc,ot,panel,scada
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'DataHub Web Server'
          - 'dhwebserver.css'
          - 'Cogent'
        condition: or
      - type: status
        status:
          - 200
