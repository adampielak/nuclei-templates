http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - chainlit
    - Assistant
  - part: body
    type: word
    words:
    - og:url" content="https://github.com/Chainlit/chainlit
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: chainlit-panel
info:
  author: rxerium
  description: 'Chainlit panel was detected. Chainlit is an open-source framework
    for building production-ready conversational AI applications.

    '
  metadata:
    max-request: 1
    product: chainlit
    shodan-query: http.html:"chainlit"
    vendor: chainlit
    verified: true
  name: Chainlit Panel - Detect
  reference:
  - https://github.com/Chainlit/chainlit
  - https://chainlit.io/
  severity: info
  tags: panel,chainlit,llm,ai,chatbot,detect,discovery
