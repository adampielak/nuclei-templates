http:
- matchers:
  - part: body
    type: word
    words:
    - <title>Checkmate</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/login'
id: checkmate-panel
info:
  author: theamanrawat
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-668
  description: 'Checkmate administrative login page was found.

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "^Checkmate$" })
  name: Checkmate Login Panel - Detect
  severity: info
  tags: checkmate,panel,discovery,login
