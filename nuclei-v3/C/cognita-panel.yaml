http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - Cognita
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: cognita-panel
info:
  author: rxerium
  description: 'Cognita is an open-source RAG framework by Truefoundry for building
    modular and

    production-ready RAG pipelines.

    '
  metadata:
    max-request: 1
    product: cognita
    shodan-query: http.title:"Cognita"
    vendor: truefoundry
    verified: true
  name: Cognita Panel - Detect
  reference:
  - https://github.com/truefoundry/cognita
  - https://truefoundry.com/cognita
  severity: info
  tags: panel,cognita,llm,ai,rag,detect,discovery
