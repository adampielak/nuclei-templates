http:
- extractors:
  - name: version
    part: body
    regex:
    - Concrete5 ([0-9.]+)
    - Powered by Concrete5 ([0-9.]+)
    type: regex
  - name: concrete5_id
    part: body
    regex:
    - concrete5-site-id=([a-z0-9]+)
    - concrete5\.org/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: body
    type: word
    words:
    - Powered by Concrete5
    - X-Powered-By-Concrete5
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/index.php'
  - '{{BaseURL}}/concrete/js/build/'
  - '{{BaseURL}}/concrete/block/'
  - '{{BaseURL}}/dashboard/'
  stop-at-first-match: true
id: concrete5-detect
info:
  author: Chirag Mistry
  description: 'An instance running Concrete5 is detected by looking for specific
    HTTP headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    verified: true
  name: Concrete5 Detection
  severity: info
  tags: concrete5,detect,tech
