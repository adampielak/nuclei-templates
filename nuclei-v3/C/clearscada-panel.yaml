http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - ClearSCADA Home
    - ClearSCADA
    - /webservices
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: clearscada-panel
info:
  author: rxerium
  description: 'ClearSCADA (now branded as EcoStruxure Geo SCADA Expert) is a Schneider
    Electric

    SCADA platform used in water, oil and gas, and utilities sectors. Exposed instances

    may provide unauthenticated access to industrial process data and control interfaces.

    '
  metadata:
    max-request: 1
    product: clearscada
    runzero-match: service["http.body"] matches `(?:ClearSCADA|Geo SCADA Expert) Home`
    shodan-query: http.title:"ClearSCADA"
    vendor: Schneider Electric
    verified: true
  name: Schneider Electric ClearSCADA - Panel
  reference:
  - https://www.se.com/ww/en/work/products/product-launch/scada/
  - https://www.se.com/us/en/faqs/FA298792/
  severity: info
  tags: clearscada,discovery,ics,panel,scada,schneider
