id: xoops-installer
info:
  name: XOOPS Installation Page - Exposure
  author: princechaddha
  severity: high
  description: |
    Detects exposed XOOPS Installation page.
  classification:
    cpe: cpe:2.3:a:xoops:xoops:*:*:*:*:*:*:*:*
  metadata:
    max-request: 1
    product: xoops
    vendor: xoops
  tags: exposure,install,misconfig,vuln,xoops
http:
  - method: GET
    path:
      - "{{BaseURL}}/install/page_start.php"
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "(?i)(<title>(.*)XOOPS Installation Wizard(.*)</title>)"
          - "(?i)(<title>(.*)XOOPS 安裝精靈(.*)</title>)"
        condition: or
