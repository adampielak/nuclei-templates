id: qualys-cloud-platform-login
info:
  name: Qualys Cloud Platform Login Panel - Detect
  author: rxerium
  severity: info
  description: Qualys Cloud Platform login panel was detected.
  reference:
    - https://www.qualys.com/cloud-platform/
  classification:
    cwe-id: CWE-200
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "^Qualys"})
    max-request: 2
    product: qualys_cloud_platform
    shodan-query: http.title:"Qualys"
    vendor: qualys
  tags: cloud,discovery,login,panel,qualys
http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/fo/login.php"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Qualys - Login</title>"
          - "<title>Qualys&reg;</title>"
        condition: or
      - type: word
        part: body
        words:
          - "top.location='fo/user_login.php'"
          - "/fo/user_login.php"
          - "id=\"myform_UserLogin\""
          - "/images/qualys/product.png"
        condition: or
      - type: status
        status:
          - 200
