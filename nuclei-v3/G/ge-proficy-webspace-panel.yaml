http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Proficy WebSpace
    - BRAND_NAME_PRODUCT
    - brand.js
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: ge-proficy-webspace-panel
info:
  author: rxerium
  description: 'GE Proficy WebSpace is a thin-client delivery platform for GE Proficy

    HMI/SCADA (iFIX, CIMPLICITY) applications over the web. It exposes

    industrial HMI screens via browser on TCP/491 by default. The Server

    header "WebSocket++/0.7.0" is a unique indicator.

    '
  metadata:
    max-request: 1
    product: proficy-webspace
    runzero-match: service["http.body"] matches "(?i)Proficy WebSpace"
    shodan-query: http.title:"Proficy WebSpace"
    vendor: GE
    verified: true
  name: GE Proficy WebSpace - Login Panel
  reference:
  - https://www.ge.com/digital/applications/hmi-scada/proficy-webspace
  severity: info
  tags: cimplicity,discovery,ge,hmi,ics,ifix,panel,proficy,scada,webspace
