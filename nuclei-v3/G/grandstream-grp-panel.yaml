http:
- matchers:
  - condition: and
    type: word
    words:
    - tl.account.ucm.js
    - tl.phoneSettings.js
  - condition: or
    type: word
    words:
    - tl.maintenance.js
    - tl.sysSettings.js
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/login'
id: grandstream-grp-panel
info:
  author: DhiyaneshDk
  classification:
    cpe: cpe:2.3:o:grandstream:ucm6200_firmware:*:*:*:*:*:*:*:*
  description: 'Detected the presence of a Grandstream GRP web management login panel.
    The React-based SPA loads characteristic JavaScript modules including tl.account.ucm.js
    and webpack chunks for UCM modules.

    '
  metadata:
    max-request: 1
    runzero-match: service["http.body"] matches "(?i)tl\\.account\\.ucm\\.js"
    shodan-query: tl.account.ucm.js
    vendor: grandstream
    verified: true
  name: Grandstream GRP Panel - Detect
  severity: info
  tags: detect,grandstream,grp,iot,panel
