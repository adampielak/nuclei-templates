http:
- matchers:
  - condition: or
    part: body
    type: word
    words:
    - graphiql.createFetcher
    - id="graphiql"
    - id='graphiql'
    - /graphiql.css
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/graphiql'
  - '{{BaseURL}}/graphql'
  - '{{BaseURL}}/api/graphql'
  - '{{BaseURL}}/v1/graphql'
  - '{{BaseURL}}/query'
  - '{{BaseURL}}'
  redirects: true
  stop-at-first-match: true
id: graphiql-exposure
info:
  author: Vincent Olagbemide
  description: 'Detected publicly exposed GraphiQL consoles.

    '
  metadata:
    max-request: 6
    runzero-match: service["http.body"] matches "(?i)GraphiQL"
    shodan-query: html:"GraphiQL"
    verified: true
  name: GraphiQL - Exposure
  reference:
  - https://github.com/graphql/graphiql
  severity: low
  tags: misconfig,graphql,graphiql,exposure
