http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Growatt Shinelink
    - datalogsta
    - treeapp.htm
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: growatt-shinelink-panel
info:
  author: rxerium
  description: 'Growatt Shinelink is a web-based data logger and monitoring interface
    for Growatt solar inverters, providing real-time solar energy production data
    and system configuration.

    '
  metadata:
    max-request: 1
    product: shinelink
    shodan-query: http.title:"Growatt Shinelink"
    vendor: Growatt
    verified: true
  name: Growatt Shinelink - Login Panel
  reference:
  - https://www.ginverter.com/en/product/monitor/shinelink-x.html
  severity: info
  tags: panel,growatt,ics,scada,solar,discovery
