id: gogs-registration

info:
  name: Gogs - registration enabled
  author: darses
  severity: info
  description: Gogs registration enabled
  reference:
    - https://gogs.io/
  metadata:
    verified: true
    max-request: 1
    vendor: gogs
    product: gogs
    shodan-query:
      - title:"Sign In - Gogs"
      - http.title:"sign in - gogs"
      - cpe:"cpe:2.3:a:gogs:gogs"
      - "Set-Cookie: i_like_gogs="
      - http.favicon.hash:-449283196
      - http.favicon.hash:917966895
      - http.favicon.hash:1935513730
    google-query:
      - intitle:"Sign In - Gogs"
      - intitle:"sign in - gogs"
    fofa-query:
      - title="sign in - gogs"
      - "Set-Cookie: i_like_gogs="
      - icon_hash="-449283196"
      - icon_hash="917966895"
      - icon_hash="1935513730"
  tags: gogs,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/user/sign_up"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'action="/user/sign_up" method="post"'
          - "</button>"
        condition: and

      - type: status
        status:
          - 200
