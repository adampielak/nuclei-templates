http:
- matchers:
  - condition: and
    type: word
    words:
    - '"enableUserRegistration": true'
    - enableSocialAppsUserRegistration
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/api/settings/'
id: glitchtip-public-signup
info:
  author: DhiyaneshDk
  description: 'A misconfiguration in GlitchTip allows arbitrary users to sign up.

    '
  metadata:
    max-request: 1
    shodan-query: html:"GlitchTip"
    verified: true
  name: Gitea Public Registration Enabled
  reference:
  - https://glitchtip.com/documentation/install
  severity: medium
  tags: glitchtip,misconfig,vuln
