http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - '"response":"success"'
    - '"body":'
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /cgi-bin/access HTTP/1.1

    Host: {{Hostname}}

    X-Requested-With: XMLHttpRequest

    Accept: application/json, text/plain, */*

    Content-Type: application/x-www-form-urlencoded

    Origin: {{RootURL}}

    Referer: {{RootURL}}


    access={{sha256("admin")}}

    '
id: grandstream-grp-default-login
info:
  author: DhiyaneshDK
  description: 'Grandstream GRP series devices use default credentials (admin/admin).
    The web UI login sends a SHA-256 hash of the password to /cgi-bin/access. Successful
    authentication returns a JSON response with a session token, indicating full admin
    access to the device management interface.

    '
  metadata:
    max-request: 1
    runzero-match: service["http.body"] matches "(?i)tl\\.account\\.ucm\\.js"
    shodan-query: tl.account.ucm.js
    vendor: grandstream
    verified: true
  name: Grandstream GRP - Default Login
  remediation: 'Change the default administrator password immediately. Update firmware
    to the latest version which generates random passwords on factory reset.

    '
  severity: high
  tags: default-login,grandstream,grp,iot,vuln
