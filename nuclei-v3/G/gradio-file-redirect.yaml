http:
- matchers:
  - part: header
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?:\/\/|\/\/|\/\\\\|\/\\)(?:[a-zA-Z0-9\-_\.@]*)example\.com\/?(\/|[^.].*)?$
    type: regex
  method: GET
  path:
  - '{{BaseURL}}/gradio_api/file=http://example.com'
  - '{{BaseURL}}/file=http://example.com'
  stop-at-first-match: true
id: gradio-file-redirect
info:
  author: neo-ai-engineer,DhiyaneshDk
  description: 'An open redirect vulnerability in Gradio allows attackers to craft
    malicious URLs that redirect users to external, potentially harmful sites without
    proper validation.

    '
  metadata:
    fofa-query: Gradio
    max-request: 2
    verified: true
  name: Gradio - Open Redirect
  severity: low
  tags: gradio,redirect,vuln,oos
