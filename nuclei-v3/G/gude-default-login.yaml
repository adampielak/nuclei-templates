http:
- headers:
    Authorization: Basic YWRtaW46YWRtaW4=
  matchers:
  - condition: and
    dsl:
    - contains(body, "Control Panel")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/ov.html?'
id: gude-default-login
info:
  author: Bretss
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:C/C:L/I:L/A:L
    cvss-score: 8.3
    cwe-id: CWE-522
  description: GUDE 2301 and 2302 default administrator login credentials (admin:admin)
    were detected.
  metadata:
    fofa-query: body="Expert Net Control"
    max-request: 1
    runzero-match: service["http.body"] matches "(?i)Expert Net Control"
    shodan-query: http.html:"Expert Net Control"
  name: GUDE - Default Login
  reference:
  - https://media.distrelec.com/Web/Downloads/_m/an/Gude_2302-1_ger_man.pdf
  severity: high
  tags: gude,default-login
