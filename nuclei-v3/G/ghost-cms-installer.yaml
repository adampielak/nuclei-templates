http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(content_type, "application/json")
    - contains_all(body, "\"setup\"", "\"status\"", "false")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/ghost/api/admin/authentication/setup/'
  - '{{BaseURL}}/ghost/api/v3/admin/authentication/setup/'
  stop-at-first-match: true
id: ghost-cms-installer
info:
  author: 0x_Akoko
  description: 'Detected Ghost CMS installation setup wizard accessible without authentication.
    An unauthenticated remote attacker can navigate to

    /ghost/#/setup and complete the installation to gain full owner-level administrative
    control of the site.

    '
  metadata:
    fofa-query: app="Ghost-CMS"
    max-request: 1
    runzero-match: service["product"] contains "Ghost:Ghost"
    shodan-query: http.component:"Ghost"
    verified: true
  name: Ghost CMS Installation Setup - Exposure
  reference:
  - https://ghost.org/docs/install/
  - https://ghost.org/docs/config/
  - https://github.com/TryGhost/Ghost
  severity: high
  tags: ghost,cms,exposure,setup,takeover,unauth
