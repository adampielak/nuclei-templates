http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "access_token", "principal_id", "session")
    - contains(content_type, "application/json")
    - status_code == 200
    type: dsl
  raw:
  - 'POST /api/v1/login?include_cookie=true HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"login_identifier":"{{username}}","password":"{{password}}"}

    '
id: gitness-default-login
info:
  author: 0x_Akoko
  description: 'Detected Gitness instance was found using default admin credentials
    (admin/changeit).

    '
  metadata:
    fofa-query: title="Gitness"
    max-request: 2
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Gitness"})
    shodan-query: title:"Gitness"
    verified: true
  name: Gitness - Default Login
  reference:
  - https://docs.gitness.com/
  severity: high
  tags: gitness,default-login
variables:
  password: changeit
  username: admin
