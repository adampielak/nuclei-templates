# gap: gcp-cloud-run-unauthenticated-invocation
id: gcp-cloud-run-unauthenticated-invocation

info:
  name: GCP Cloud Run Service Allows Unauthenticated Invocation
  author: TyrusRC
  severity: high
  description: |
    Detects GCP Cloud Run services that permit unauthenticated HTTP invocations.
    When an allUsers IAM binding is present, a GET request without an Authorization
    header returns HTTP 200 with application content rather than a 403 permission error.
  reference:
    - https://raw.githubusercontent.com/HackTricks-wiki/hacktricks-cloud/master/src/pentesting-cloud/gcp-security/gcp-unauthenticated-enum-and-access/gcp-cloud-run-unauthenticated-enum.md
    - https://cloud.google.com/run/docs/securing/managing-access
  tags: custom,cloud,gcp,cloudrun,misconfig

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "Google Frontend"
      - type: word
        part: body
        negative: true
        words:
          - "Your client does not have permission to get URL"
      - type: dsl
        dsl:
          - 'contains(host, ".run.app")'
