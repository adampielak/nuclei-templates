http:
- extractors:
  - group: 1
    name: user
    part: body
    regex:
    - <loc>https?:\/\/.+\/(?<user>.+)<\/loc>
    type: regex
  matchers:
  - condition: and
    type: word
    words:
    - /schemas/sitemap/
    - lastmod
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/explore/users/sitemap-1.xml'
id: gitea-userenum
info:
  author: icarot
  classification:
    cpe: cpe:2.3:a:gitea:gitea:*:*:*:*:*:-:*:*
  description: 'Enumerates the users registered in the Gitea web application, a self-hosted
    all-in-one software development service, including Git hosting, code review, team
    collaboration, package registry and CI/CD.

    '
  metadata:
    max-request: 1
    product: gitea
    shodan-query: title:"Gitea"
    vendor: gitea
  name: Gitea - User Enumeration
  severity: low
  tags: enumeration,gitea,tech
