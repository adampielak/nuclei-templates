http:
- extractors:
  - internal: true
    name: google_api_key
    part: body
    regex:
    - AIza[0-9A-Za-z\-_]{35}
    type: regex
  method: GET
  path:
  - '{{BaseURL}}'
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - '!contains(body, "error")'
    - '!status_code == 403'
    type: dsl
  method: GET
  path:
  - https://generativelanguage.googleapis.com/v1beta/files?key={{google_api_key}}
id: google-gemini-key-exposure
info:
  author: Mestizo
  description: 'Detects exposed Google API keys and verifies access to the Gemini
    Files API endpoint. Exploitation can result in unauthorized data exposure, quota
    exhaustion, and potential financial loss.

    '
  metadata:
    max-request: 2
    verified: true
  name: Google Gemini API Key - Exposure
  severity: high
  tags: apikey,exposure,gemini,google
