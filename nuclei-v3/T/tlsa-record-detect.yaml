dns:
- extractors:
  - group: 1
    regex:
    - "IN\tTLSA\t(.+)"
    type: regex
  matchers:
  - part: answer
    regex:
    - "IN\tTLSA\t(.+)$"
    type: regex
  name: _443._tcp.{{FQDN}}
  type: TLSA
id: tlsa-record-detect
info:
  author: rxerium
  classification:
    cwe-id: CWE-200
  description: 'A TLSA record was detected. TLSA records are used for DANE (DNS-based
    Authentication of Named Entities) to bind TLS certificates to domain names.

    '
  metadata:
    max-request: 1
  name: TLSA Record - DANE Detection
  reference:
  - https://en.wikipedia.org/wiki/DNS-based_Authentication_of_Named_Entities
  - https://www.internetsociety.org/resources/deploy360/dane/
  severity: info
  tags: dns,tlsa,dane,ssl,discovery
