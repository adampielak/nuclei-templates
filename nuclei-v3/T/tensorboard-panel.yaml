http:
- host-redirects: true
  matchers:
  - part: body
    regex:
    - (?i)<title>[^<]*TensorBoard[^<]*</title>
    type: regex
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: tensorboard-panel
info:
  author: rxerium
  description: 'TensorBoard is TensorFlow''s visualization toolkit for machine learning
    experimentation

    '
  metadata:
    max-request: 1
    product: tensorboard
    runzero-match: any(each(service["html.titles"]), {# matches "TensorBoard"})
    shodan-query: http.title:"TensorBoard"
    vendor: tensorflow
    verified: true
  name: TensorBoard Panel - Detect
  reference:
  - https://github.com/tensorflow/tensorboard
  - https://www.tensorflow.org/tensorboard
  severity: info
  tags: ai,detect,discovery,ml,panel,tensorboard,tensorflow
