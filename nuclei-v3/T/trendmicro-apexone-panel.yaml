http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - Trend Micro
    - TMlogonEncrypted
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/officescan/console/html/cgi/cgiChkMasterPwd.exe'
  - '{{BaseURL}}/SMB/console/html/cgi/cgiChkMasterPwd.exe'
  stop-at-first-match: true
id: trendmicro-apexone-panel
info:
  author: johnk3r,s4e-io
  classification:
    cwe-id: CWE-200
  description: Trend Micro Apex One login panel was detected.
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)officescan"})
    shodan-query: http.title:"officescan"
    verified: true
  name: Trend Micro Apex One Login Panel - Detect
  severity: info
  tags: detect,discovery,login,panel,trendmicro
