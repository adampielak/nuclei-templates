http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(body, "\"ok\":true")
    - contains(to_lower(header), "x-typesense")
    - contains(content_type, "application/json")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/health'
id: typesense-search-server
info:
  author: ChrisJr404
  description: 'Detected Typesense was an open-source typo-tolerant search engine
    often self-hosted on TCP 8108.

    '
  metadata:
    fofa-query: header="x-typesense"
    max-request: 1
    product: typesense
    shodan-query: '"x-typesense"'
    vendor: typesense
    verified: true
  name: Typesense Search Server - Detect
  reference:
  - https://github.com/typesense/typesense
  - https://typesense.org/docs/latest/api/
  severity: info
  tags: detect,search,tech,typesense
