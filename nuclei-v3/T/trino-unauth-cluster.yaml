id: trino-unauth-cluster
info:
  name: Trino Cluster Overview - Unauthenticated Dashboard Exposure
  author: tess
  severity: medium
  description: Cluster Overview dashboard is exposed.
  metadata:
    max-request: 1
    shodan-query: http.title:"Cluster Overview - Trino"
    verified: true
  tags: cluster,misconfig,trino,unauth,vuln
http:
  - method: POST
    path:
      - "{{BaseURL}}/ui/login"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: |
      username={{randstr}}&password=&redirectPath=
    redirects: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Cluster Overview'
          - 'Query Details'
        condition: and
      - type: status
        status:
          - 200
