http:
- host-redirects: true
  matchers:
  - case-insensitive: true
    part: body
    type: word
    words:
    - typebot
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: typebot-panel
info:
  author: rxerium
  description: 'Typebot is an open-source chatbot builder that allows you to create
    advanced

    chatbots visually.

    '
  metadata:
    max-request: 1
    product: typebot
    runzero-match: any(each(service["html.titles"]), {# matches "Typebot"})
    shodan-query: http.title:"Typebot"
    vendor: typebot
    verified: true
  name: Typebot Panel - Detect
  reference:
  - https://github.com/baptisteArno/typebot.io
  - https://typebot.io
  severity: info
  tags: ai,chatbot,detect,discovery,panel,typebot
