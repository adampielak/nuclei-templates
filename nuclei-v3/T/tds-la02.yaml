id: tds-la02

info:
  name: Traffic Distribution System - La02
  severity: high
  author: darses
  description: |
    Traffic Distribution System (TDS) La02 detected. This is a Javascript-based Loader using XOR obfuscation and browser fingerprinting and contains the capability to dynamically load new Javascript code. The TDS is observed mostly on Wordpress website, likely compromised. 
  metadata:
    verified: true
    max-requests: 1
  reference:
    - https://urlscan.io/search/#filename%3A%22la02%22
  tags: vendor

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"use strict";var '
          - '0x0,0x1,0x8,0xff,"length","undefined"'
          - '0x6,"fromCodePoint",0x7'
          - '=new TextDecoder,'
          - '=new Uint8Array('
          - 'function(){return new Function("return this")()}'
        condition: and

      - type: status
        status:
          - 200
