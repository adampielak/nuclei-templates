id: tixeo-panel

info:
  name: Tixeo Login Panel - Detect
  author: righettod
  severity: info
  description: |
    Tixeo login panel was detected.
  reference:
    - https://www.tixeo.com/en/
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)tixeo"})
    verified: true
    max-request: 3
    shodan-query: "http.title:\"tixeo\""
  tags: panel,tixeo,login,detect,discovery
http:
  - method: GET
    path:
      - "{{BaseURL}}/meet/services/json/v1/settings"
      - "{{BaseURL}}/meet/login.html"
      - "{{BaseURL}}/meet/"

    stop-at-first-match: true

    matchers:
      - type: dsl
        dsl:
          - 'contains(header, "Tixeo")'
          - 'contains_any(to_lower(body), "tixeo-button", "tixeoclient")'
        condition: or

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '"applicationVersion"\s*:\s*"([0-9.]+)"'

