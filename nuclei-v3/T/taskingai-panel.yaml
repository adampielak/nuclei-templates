http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - TaskingAI
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: taskingai-panel
info:
  author: rxerium
  description: 'TaskingAI is an open-source platform for building and deploying LLM-based
    agents

    and AI applications with a unified API

    '
  metadata:
    max-request: 1
    product: taskingai
    runzero-match: any(each(service["html.titles"]), {# matches "TaskingAI \\| Console"})
    shodan-query: http.title:"TaskingAI | Console"
    vendor: taskingai
    verified: true
  name: TaskingAI Panel - Detect
  reference:
  - https://github.com/TaskingAI/TaskingAI
  - https://www.tasking.ai
  severity: info
  tags: agents,ai,detect,discovery,llm,panel,taskingai
