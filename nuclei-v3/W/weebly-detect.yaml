http:
- extractors:
  - name: version
    part: body
    regex:
    - Weebly ([0-9.]+)
    - Powered by Weebly ([0-9.]+)
    type: regex
  - name: weebly_id
    part: body
    regex:
    - weebly-site-id=([a-z0-9]+)
    - weebly\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by Weebly
    - weebly.com
    - X-Powered-By-Weebly
  - status:
    - 200
    - 403
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/index.php'
  - '{{BaseURL}}/weebly/'
  - '{{BaseURL}}/site/'
  stop-at-first-match: true
id: weebly-detect
info:
  author: Chirag Mistry
  description: 'An instance running Weebly is detected by looking for specific HTTP
    headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 7
    shodan-query: product:"Weebly"
  name: Weebly Detection
  severity: info
  tags: weebly, detect, tech
