http:
- extractors:
  - group: 1
    name: csp-header
    part: header
    regex:
    - (?i)content-security-policy:\s*([^\r\n]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - contains(to_lower(header), 'content-security-policy:')
    - '!contains(to_lower(header), ''script-src'')'
    - '!contains(to_lower(header), ''default-src'')'
    name: missing-script-src
    type: dsl
  - condition: and
    dsl:
    - contains(to_lower(header), 'content-security-policy:')
    - '!contains(to_lower(header), ''object-src'')'
    - '!contains(to_lower(header), ''default-src'')'
    name: missing-object-src
    type: dsl
  - condition: and
    dsl:
    - contains(to_lower(header), 'content-security-policy:')
    - regex('(?i)script-src[^;]*(unsafe-inline|unsafe-eval|unsafe-hashes|\\*|data:|blob:)',
      header)
    name: unsafe-script-src
    type: dsl
  - condition: and
    dsl:
    - contains(to_lower(header), 'content-security-policy:')
    - regex('(?i)default-src[^;]*(unsafe-inline|unsafe-eval|unsafe-hashes|\\*|data:|blob:)',
      header)
    name: unsafe-default-src
    type: dsl
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}'
id: weak-csp-detect
info:
  author: pussycat0x,celbahraoui
  classification:
    cwe-id:
    - CWE-693
  description: 'Detected misconfigured CSP directives containing unsafe and overly
    permissive keywords that weakened resource loading restrictions. This configuration
    allowed high-risk script behaviors, resulting in reduced protection against XSS
    attacks.

    '
  metadata:
    max-request: 1
    verified: true
  name: Weak Content Security Policy - Detect
  reference:
  - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
  - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/script-src
  - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/object-src
  - https://content-security-policy.com/
  severity: info
  tags: csp,headers,misconfig
