code:
- args:
  - -ExecutionPolicy
  - Bypass
  engine:
  - powershell
  - powershell.exe
  matchers:
  - type: word
    words:
    - 'True'
  pattern: '*.ps1'
  pre-condition: 'IsWindows();

    '
  source: '$au = Get-ItemProperty -Path ''HKLM:\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU''
    -ErrorAction SilentlyContinue; if ($au -and $au.NoAutoUpdate -eq 1) { ''True''
    } else { ''False'' }

    '
id: windows-auto-update-disabled
info:
  author: boonchuan
  description: 'Detected Windows automatic updates were found disabled, leaving the
    system vulnerable to unpatched security flaws.

    '
  impact: 'Systems without automatic updates will miss critical security patches,
    increasing exposure to known vulnerabilities and exploits.

    '
  metadata:
    verified: false
  name: Windows Automatic Updates Disabled
  reference:
  - https://www.cyber.gov.au/acsc/view-all-content/publications/essential-eight-maturity-model
  - https://learn.microsoft.com/en-us/windows/deployment/update/waas-wu-settings
  remediation: 'Enable automatic updates via Group Policy: Computer Configuration
    > Administrative Templates > Windows Components > Windows Update > Configure Automatic
    Updates > set to Auto download and schedule install.

    '
  severity: high
  tags: code,compliance,essential-eight,patching,updates,windows,windows-audit
