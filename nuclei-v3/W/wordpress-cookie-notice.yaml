http:
- extractors:
  - group: 1
    internal: true
    name: internal_detected_version
    part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  - group: 1
    name: detected_version
    part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  matchers:
  - dsl:
    - compare_versions(internal_detected_version, concat("< ", last_version))
    name: outdated_version
    type: dsl
  - part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}/wp-content/plugins/cookie-notice/readme.txt'
  payloads:
    last_version: helpers/wordpress/plugins/cookie-notice.txt
id: wordpress-cookie-notice
info:
  author: ricardomaia
  metadata:
    max-request: 1
    plugin_namespace: cookie-notice
    wpscan: https://wpscan.com/plugin/cookie-notice
  name: Cookie Notice & Compliance for GDPR / CCPA Detection
  reference:
  - https://wordpress.org/plugins/cookie-notice/
  severity: info
  tags: tech,wordpress,wp-plugin,top-100,top-200
