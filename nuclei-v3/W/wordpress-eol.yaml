http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - (?i)<meta[^>]*name=["\']?generator["\']?[^>]*content=["\']?WordPress\s+([0-9.]+)
    - (?i)Version\s+([0-9]+\.[0-9.]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - len(version) > 0
    - compare_versions(version, "<6.9")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
id: wordpress-eol
info:
  author: Shivam Kamboj
  description: 'Detected WordPress versions that have reached End-of-Life (EOL) and
    no longer receive security updates.

    '
  metadata:
    max-request: 1
    runzero-match: service["product"] contains "WordPress:WordPress"
    shodan-query: WordPress
    verified: true
  name: WordPress End-of-Life - Detect
  reference:
  - https://endoflife.date/wordpress
  - https://wordpress.org/documentation/article/wordpress-versions/
  severity: info
  tags: tech,wordpress,eol
