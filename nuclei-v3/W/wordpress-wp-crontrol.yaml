http:
- extractors:
  - group: 1
    internal: true
    name: internal_detected_version
    part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  - group: 1
    name: detected_version
    part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  matchers:
  - dsl:
    - compare_versions(internal_detected_version, concat("< ", last_version))
    name: outdated_version
    type: dsl
  - part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}/wp-content/plugins/wp-crontrol/readme.txt'
  payloads:
    last_version: helpers/wordpress/plugins/wp-crontrol.txt
id: wordpress-wp-crontrol
info:
  author: ricardomaia
  metadata:
    plugin_namespace: wp-crontrol
    wpscan: https://wpscan.com/plugin/wp-crontrol
  name: WP Crontrol Detection
  reference:
  - https://wordpress.org/plugins/wp-crontrol/
  severity: info
  tags: tech,wordpress,wp-plugin,top-200,discovery
