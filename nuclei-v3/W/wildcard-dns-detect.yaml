dns:
- name: '{{randstr}}.{{FQDN}}'
  type: A
- extractors:
  - group: 1
    regex:
    - "IN\tA\t([0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3})"
    type: regex
  matchers:
  - part: answer
    type: word
    words:
    - "IN\tA\t"
  - part: answer
    regex:
    - "IN\tA\t([0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3})"
    type: regex
  matchers-condition: and
  name: '{{randstr}}-{{randstr}}.{{FQDN}}'
  type: A
id: wildcard-dns-detect
info:
  author: rxerium
  classification:
    cwe-id: CWE-200
  description: 'A wildcard DNS configuration was detected. Wildcard DNS records can
    resolve all subdomains to the same IP address, which may indicate a catch-all
    configuration.

    '
  metadata:
    max-request: 2
  name: Wildcard DNS Configuration - Detection
  reference:
  - https://en.wikipedia.org/wiki/Wildcard_DNS_record
  - https://developers.cloudflare.com/dns/manage-dns-records/reference/wildcard-dns-records/
  severity: info
  tags: dns,wildcard,discovery
