id: wp_business_intelligence_lite-b1971bb8-fb24-40f6-bbd8-60b5dc1f0822

info:
  name: >
    WP Business Intelligence Lite <= 3.2.0 - Missing Authorization
  author: topscoder
  severity: low
  description: >
    The WP Business Intelligence Lite plugin for WordPress is vulnerable to unauthorized access due to a missing capability check on a function in versions up to, and including, 3.2.0. This makes it possible for authenticated attackers, with subscriber-level access and above, to perform an unauthorized action.
  reference:
    - https://github.com/topscoder/nuclei-wordfence-cve
    - https://www.wordfence.com/threat-intel/vulnerabilities/id/b1971bb8-fb24-40f6-bbd8-60b5dc1f0822?source=api-prod
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:N
    cvss-score: 4.3
    cve-id: 
  metadata:
    fofa-query: "wp-content/plugins/wp-business-intelligence-lite/"
    google-query: inurl:"/wp-content/plugins/wp-business-intelligence-lite/"
    shodan-query: 'http.html:"wp-content/plugins/wp-business-intelligence-lite/"'
  tags: cve,wordpress,wp-plugin,wp-business-intelligence-lite,low,production

http:
  - method: GET
    redirects: true
    max-redirects: 3
    path:
      - "{{BaseURL}}/wp-content/plugins/wp-business-intelligence-lite/readme.txt"

    extractors:
      - type: regex
        name: version
        part: body
        group: 1
        regex:
          - "(?mi)Stable tag:\\s*([0-9.]+)"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "wp-business-intelligence-lite"
        part: body

      - type: dsl
        dsl:
          - compare_versions(version, '<= 3.2.0')