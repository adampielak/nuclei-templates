http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Weights & Biases
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: weights-biases-detect
info:
  author: rxerium
  description: 'Weights & Biases (W&B) instance was detected. W&B is a popular MLOps
    platform for experiment tracking, model versioning, and collaborative ML development.
    Self-hosted deployments expose the full experiment management interface.

    '
  metadata:
    max-request: 1
    product: weights-and-biases
    shodan-query: http.html:"wandb" http.title:"Weights & Biases"
    vendor: wandb
    verified: true
  name: Weights & Biases - Detect
  reference:
  - https://github.com/wandb/wandb
  - https://wandb.ai/
  severity: info
  tags: ai,detect,discovery,mlops,tech,wandb,weights-biases
