http:
- extractors:
  - group: 1
    name: version
    regex:
    - (?i)generator="?WordPress/([0-9.]+)"?
    type: regex
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - generator=
    - WordPress/
  - part: header
    type: word
    words:
    - text/xml
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/wp-links-opml.php'
id: wp-links-opml
info:
  author: princechaddha
  classification:
    cpe: cpe:2.3:a:wordpress:wordpress:*:*:*:*:*:*:*:*
  description: 'WordPress wp-links-opml.php file was publicly accessible and expossed
    the WordPress version in the generator tag.

    '
  metadata:
    max-request: 1
    product: wordpress
    runzero-match: service["product"] contains "WordPress:WordPress"
    shodan-query:
    - http.component:"wordpress"
    - cpe:"cpe:2.3:a:wordpress:wordpress"
    vendor: wordpress
    verified: true
  name: WordPress wp-links-opml.php - Version Disclosure
  reference:
  - https://www.acunetix.com/vulnerabilities/web/wordpress-version-disclosed/
  - https://wordpress.org/
  severity: info
  tags: exposure,wordpress,wp,version,files
