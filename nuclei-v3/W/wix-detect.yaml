http:
- extractors:
  - name: version
    part: body
    regex:
    - Wix.com ([0-9.]+)
    - Wix version ([0-9.]+)
    - Wix Static Site Version ([0-9.]+)
    type: regex
  - name: wix_id
    part: body
    regex:
    - wix-id=([a-z0-9]+)
    - siteid="([a-zA-Z0-9]+)"
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by Wix
    - X-Wix-Request-Id
    - Wix Static Site
    - wixsite.com
  - condition: or
    status:
    - 200
    - 403
    - 404
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/_static/'
  - '{{BaseURL}}/wix-api'
  - '{{BaseURL}}/user/login'
  - '{{BaseURL}}/wix.js'
  stop-at-first-match: true
id: wix-detect
info:
  author: Chirag Mistry
  description: 'An instance running Wix is detected by looking for specific HTTP headers,
    HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    verified: true
  name: Wix Detection
  severity: info
  tags: wix,detect,tech
