http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>lynx - westermo</title>
    - westermo.com
    - lynx - westermo
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: westermo-router-panel
info:
  author: rxerium
  description: 'Westermo industrial router web interface panel has been detected.

    '
  metadata:
    max-request: 1
    product: lynx-router
    runzero-match: any(each(service["html.titles"]), {# matches "^lynx - westermo"})
    shodan-query: http.html:"Westermo"
    vendor: Westermo
    verified: true
  name: Westermo Industrial Router - Login Panel
  reference:
  - https://www.westermo.com/
  severity: info
  tags: discovery,ics,panel,router,westermo
