http:
- extractors:
  - group: 1
    internal: true
    name: internal_detected_version
    part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  - group: 1
    name: detected_version
    part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  matchers:
  - dsl:
    - compare_versions(internal_detected_version, concat("< ", last_version))
    name: outdated_version
    type: dsl
  - part: body
    regex:
    - (?i)Stable.tag:\s?([\w.]+)
    type: regex
  matchers-condition: or
  method: GET
  path:
  - '{{BaseURL}}/wp-content/plugins/coblocks/readme.txt'
  payloads:
    last_version: helpers/wordpress/plugins/coblocks.txt
id: wordpress-coblocks
info:
  author: ricardomaia
  metadata:
    max-request: 1
    plugin_namespace: coblocks
    wpscan: https://wpscan.com/plugin/coblocks
  name: "Page Builder Gutenberg Blocks \u2013 CoBlocks Detection"
  reference:
  - https://wordpress.org/plugins/coblocks/
  severity: info
  tags: tech,wordpress,wp-plugin,top-200
