http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200 || status_code == 500
    - contains(body, "creame-whatsapp-me")
    - contains_all(body, "Fatal error", "Uncaught Error") || contains_all(body, "Warning:","failed
      to open stream")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/wp-content/plugins/creame-whatsapp-me/includes/class-joinchat-elementor-finder.php'
id: wordpress-joinchat-fpd
info:
  author: DhiyaneshDk
  description: 'WordPress Plugin Joinchat files are publicly accessible without ABSPATH
    protection, exposing sensitive server path information through PHP error messages
    when accessed directly.

    '
  metadata:
    max-request: 1
    publicwww-query: /plugins/creame-whatsapp-me
    verified: true
  name: WordPress Joinchat - Full Path Disclosure
  reference:
  - https://wordpress.org/plugins/creame-whatsapp-me/
  severity: low
  tags: wp,wordpress,wp-plugin,fpd,creame-whatsapp-me,misconfig
