http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "Fatal error", "Uncaught Error:") || contains_all(body, "Warning:",
      "failed to open stream")
    - status_code == 200 || status_code == 500
    - contains(body, "add-to-any")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/wp-content/plugins/add-to-any/add-to-any.php'
  - '{{BaseURL}}/wp-content/plugins/add-to-any/addtoany.php'
  - '{{BaseURL}}/wp-content/plugins/add-to-any/includes/addtoany.class.php'
  - '{{BaseURL}}/wp-content/plugins/add-to-any/admin/class-addtoany-admin.php'
  - '{{BaseURL}}/wp-content/plugins/add-to-any/admin/settings.php'
  stop-at-first-match: true
id: wp-add-to-any-fpd
info:
  author: pussycat0x
  description: 'The AddToAny Share Buttons plugin for WordPress was detected to be
    vulnerable to Full Path Disclosure, allowing unauthenticated access to the full
    application path.

    '
  metadata:
    fofa-query: body="/wp-content/plugins/add-to-any/"
    max-request: 5
    product: add-to-any
    runzero-match: service["http.body"] matches "(?i)/wp-content/plugins/add-to-any/"
    vendor: wordpress
  name: WordPress AddToAny Share Buttons Plugin - Full Path Disclosure
  reference:
  - https://wordpress.org/plugins/add-to-any/
  severity: low
  tags: wordpress,wp,wp-plugin,fpd,disclosure,add-to-any
