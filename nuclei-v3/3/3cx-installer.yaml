http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - 3CX Configuration Tool
    - 3CX Initial Setup
    - Welcome to the 3CX Management Console
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: 3cx-installer
info:
  author: DhiyaneshDk
  classification:
    cwe-id: CWE-668
  description: 'A 3CX Phone System installer or setup wizard page is publicly accessible.
    This web-based configuration tool is used for initial PBX setup including admin
    credential creation, SIP trunk configuration, license activation, and network
    settings. Exposure of this page allows unauthenticated attackers to reconfigure
    or take over the phone system.

    '
  impact: 'An attacker can access the setup wizard to create admin credentials, modify
    SIP trunk settings, or take complete control of the PBX without authentication.

    '
  metadata:
    fofa-query: title="3CX Phone System Management Console"
    max-request: 1
    product: 3cx
    shodan-query: http.title:"3CX Phone System Management Console"
    vendor: 3cx
    verified: true
  name: 3CX Phone System - Installer Page Exposure
  reference:
  - https://www.3cx.com/docs/manual/install/
  - https://www.3cx.com/
  remediation: 'Restrict access to the 3CX installer and configuration pages to trusted
    internal networks only. Ensure the setup wizard port (5015) and management console
    are not exposed to the internet.

    '
  severity: high
  tags: 3cx,exposure,installer,misconfig,panel,voip
