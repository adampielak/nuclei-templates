id: veritas-netbackup-panel

info:
  name: Veritas NetBackup OpsCenter Analytics Login - Detect
  author: rxerium
  severity: info
  description: |
    A Veritas NetBackup OpsCenter Analytics page was detected.
  reference:
    - https://www.veritas.com/
  metadata:
    runzero-match: service["http.body"] matches "(?i)Veritas NetBackup OpsCenter Analytics"
    verified: true
    max-request: 1
    shodan-query: html:"Veritas NetBackup OpsCenter Analytics"
  tags: panel,veritas,netbackup,opscenter,login,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/opscenter/"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Veritas NetBackup OpsCenter Analytics'

      - type: status
        status:
          - 200

