http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - voila-notebooks
  - part: body
    regex:
    - (?i)<title>[^<]*Voil[^<]*</title>
    type: regex
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: voila-panel
info:
  author: rxerium
  description: "Voil\xE0 is an open-source tool that turns Jupyter Notebooks into\
    \ standalone web applications.\nIt is commonly used to share AI/ML dashboards\
    \ and interactive data science tools.\n"
  metadata:
    max-request: 1
    product: "Voil\xE0"
    runzero-match: service["http.body"] matches "(?i)voila-notebooks"
    shodan-query: html:"/voila/"
    vendor: "Voil\xE0"
    verified: true
  name: "Voil\xE0 Panel - Detect"
  reference:
  - https://github.com/voila-dashboards/voila
  - https://voila.readthedocs.io
  severity: info
  tags: ai,detect,discovery,jupyter,notebook,panel,voila
