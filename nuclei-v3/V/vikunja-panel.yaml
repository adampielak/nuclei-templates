http:
- matchers:
  - part: header
    type: word
    words:
    - 'Server: Vikunja'
  - condition: and
    part: body
    type: word
    words:
    - <title>Vikunja</title>
    - The to-do app to organize your life
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: vikunja-panel
info:
  author: matheusalbarello
  description: 'Vikunja login panel was detected. Vikunja is a self-hosted to-do and
    project management application.

    '
  metadata:
    fofa-query: title="Vikunja"
    max-request: 1
    product: vikunja
    runzero-match: any(each(service["html.titles"]), {# matches "^Vikunja$"}) || service["http.head.server"]
      matches "^Vikunja"
    shodan-query: http.title:"vikunja"
    vendor: vikunja
    verified: true
  name: Vikunja Login Panel - Detect
  reference:
  - https://vikunja.io
  - https://github.com/go-vikunja/vikunja
  severity: info
  tags: discovery,login,panel,vikunja
