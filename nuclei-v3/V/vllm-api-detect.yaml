http:
- extractors:
  - group: 1
    part: body
    regex:
    - '"version"\s*:\s*"([^"]+)"'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "vLLM", "/v1/models", "/v1/chat/completions")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
id: vllm-api-detect
info:
  author: ChrisJr404
  description: 'Detected vLLM was a high-throughput LLM serving engine that exposed
    an OpenAI-compatible HTTP API on TCP 8000 with no authentication by default.

    '
  metadata:
    fofa-query: body="vllm" && body="/v1/models"
    max-request: 1
    product: vllm
    shodan-query: '"served-model-name"'
    vendor: vllm-project
    verified: true
  name: vLLM OpenAI-Compatible Server - Detect
  reference:
  - https://github.com/vllm-project/vllm
  - https://docs.vllm.ai/en/latest/serving/openai_compatible_server.html
  severity: info
  tags: ai,detect,llm,ml,openai,tech,vllm
