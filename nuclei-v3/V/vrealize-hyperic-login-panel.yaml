id: vrealize-hyperic-panel
info:
  name: vRealize Hyperic Login Panel - Detect
  author: Charles D
  severity: info
  description: |
    vRealize Hyperic login panel was detected
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
    cpe: cpe:2.3:a:vmware:hyperic_hq:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Sign In - Hyperic"})
    max-request: 1
    product: hyperic_hq
    shodan-query: http.title:"Sign In - Hyperic"
    vendor: vmware
    verified: true
  tags: detect,discovery,hyperic,login,panel,vrealize
http:
  - matchers:
      - part: body
        type: word
        words:
          - Sign In - Hyperic
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/app/login'
