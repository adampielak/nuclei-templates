http:
- host-redirects: true
  matchers:
  - part: body
    regex:
    - (?i)<title>[^<]*Vanna[^<]*</title>
    type: regex
  - part: body
    type: word
    words:
    - vanna-
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: vanna-panel
info:
  author: rxerium
  description: 'Vanna AI is a chat interface for text-to-SQL generation using natural
    language. This template detects the presence of a Vanna AI chat panel.

    '
  metadata:
    max-request: 1
    product: vanna
    runzero-match: any(each(service["html.titles"]), {# matches "Vanna Agents Chat"})
    shodan-query: http.title:"Vanna"
    vendor: vanna-ai
    verified: true
  name: Vanna AI Panel - Detect
  reference:
  - https://github.com/vanna-ai/vanna
  - https://vanna.ai
  severity: info
  tags: ai,chat,detect,discovery,panel,sql,vanna
