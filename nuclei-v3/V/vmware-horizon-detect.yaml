id: vmware-horizon-detect

info:
  name: VMware/Omnissa Horizon Web Portal Detection
  author: thefir
  severity: info
  tags: vmware,horizon,omnissa,tech

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/portal/webclient/index.html"
    matchers:
      - type: word
        part: body
        words:
          - "<title>VMware Horizon</title>"
          - "<title>Omnissa Horizon</title>"
        case-insensitive: true
