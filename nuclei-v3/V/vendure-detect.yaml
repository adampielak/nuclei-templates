http:
- matchers:
  - part: header
    type: word
    words:
    - vendure-auth-token
  - part: body
    type: word
    words:
    - '"data"'
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'POST /shop-api HTTP/1.1

    Host: {{Hostname}}

    Content-Type: application/json


    {"query":"{ __typename }"}

    '
id: vendure-detect
info:
  author: theamanrawat
  description: 'Vendure headless commerce platform was detected via the presence of
    the vendure-auth-token response header on the Shop API endpoint.

    '
  metadata:
    fofa-query: header="vendure-auth-token"
    google-query: inurl:"/shop-api"
    max-request: 1
    shodan-query: http.header:"vendure-auth-token"
    verified: true
  name: Vendure - Detect
  reference:
  - https://github.com/vendure-ecommerce/vendure
  - https://docs.vendure.io/
  severity: info
  tags: detect,tech,vendure
