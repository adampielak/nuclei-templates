http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - VTScada Anywhere
    - VTScada
    - trihedral.com
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: vtscada-panel
info:
  author: rxerium
  description: 'VTScada (by Trihedral Engineering) is a SCADA platform used in water/

    wastewater, oil and gas, and utilities. The Internet Client feature exposes

    a browser-based view of process data, and is commonly deployed by municipal

    water systems across North America.

    '
  metadata:
    max-request: 1
    product: vtscada
    runzero-match: any(each(service["html.titles"]), {# matches "VTScada Internet
      Client from Trihedral"})
    shodan-query: http.title:"VTScada Internet Client from Trihedral"
    vendor: Trihedral
    verified: true
  name: VTScada - Internet Client Panel
  reference:
  - https://www.trihedral.com/vtscada/
  severity: info
  tags: discovery,ics,oil-gas,panel,scada,trihedral,utilities,vtscada,water
