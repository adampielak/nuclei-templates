http:
- extractors:
  - json:
    - .version
    name: version
    type: json
  matchers:
  - condition: and
    type: word
    words:
    - HexStrike
    - telemetry
    - tools_status
    - uptime
    - version
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/health'
id: hexstrike-ai-config
info:
  author: icarot
  description: 'HexStrike AI MCP Agents server config page exposure.

    '
  metadata:
    max-request: 1
    product: hexstrike-ai
    shodan-query: http.html:"HexStrike"
    vendor: hexstrike-ai
  name: HexStrike AI MCP Agents - Config
  reference:
  - https://github.com/0x4m4/hexstrike-ai
  severity: info
  tags: config,exposure,hexstrike-ai
