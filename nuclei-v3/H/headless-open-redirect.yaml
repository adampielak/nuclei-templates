  - action: navigate
    args:
      url: '{{BaseURL}}/{{redirect}}'
  - action: waitload
  stop-at-first-match: true
id: headless-open-redirect
info:
  author: theamanrawat
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 6.1
    cwe-id: CWE-601
  description: 'An open redirect was detected. An attacker can redirect a user to
    a malicious site and possibly obtain sensitive information, modify data, and/or
    execute unauthorized operations.

    '
  name: Open Redirect - Detect
  severity: medium
  tags: redirect,generic,headless
