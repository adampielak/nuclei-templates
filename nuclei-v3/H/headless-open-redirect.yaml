    - '%5C%5Cevil.com/%252e%252e%252f'
    - '%5Cevil.com'
    - '%5cevil.com/%2f%2e%2e'
    - '%5c{{RootURL}}evil.com/%2f%2e%2e'
    - ../evil.com
    - .evil.com
    - /%5cevil.com
    - ////\;@evil.com
    - ////evil.com
    - ///evil.com
    - ///evil.com/%2f%2e%2e
    - ///evil.com@//
    - ///{{RootURL}}evil.com/%2f%2e%2e
    - //;@evil.com
    - //\/evil.com/
    - //\@evil.com
    - //\evil.com
    - //\tevil.com/
    - //evil.com/%2F..
    - //evil.com//
    - //%69%6e%74%65%72%61%63%74%2e%73%68
    - //evil.com@//
    - //evil.com\tevil.com/
    - //https://evil.com@//
    - /<>//evil.com
    - /\/\/evil.com/
    - /\/evil.com
    - /\evil.com
    - /evil.com
    - /evil.com/%2F..
    - /evil.com/
    - /evil.com/..;/css
    - /https:evil.com
    - /{{RootURL}}evil.com/
    - "/\u3031evil.com"
    - "/\u3035evil.com"
    - "/\u309Devil.com"
    - "/\u30FCevil.com"
    - "/\uFF70evil.com"
    - <>//evil.com
    - '@evil.com'
    - '@https://evil.com'
    - \/\/evil.com/
    - evil%E3%80%82com
    - evil.com
    - evil.com/
    - evil.com//
    - evil.com;@
    - https%3a%2f%2fevil.com%2f
    - https:%0a%0devil.com
    - https://%0a%0devil.com
    - https://%09/evil.com
    - https://%2f%2f.evil.com/
    - https://%3F.evil.com/
    - https://%5c%5c.evil.com/
    - https://%5cevil.com@
    - https://%23.evil.com/
    - https://.evil.com
    - https://////evil.com
    - https:///evil.com
    - https:///evil.com/%2e%2e
    - https:///evil.com/%2f%2e%2e
    - https:///evil.com@evil.com/%2e%2e
    - https:///evil.com@evil.com/%2f%2e%2e
    - https://:80#@evil.com/
    - https://:80?@evil.com/
    - https://:@\@evil.com
    - https://:@evil.com\@evil.com
    - https://;@evil.com
    - https://\tevil.com/
    - https://evil.com/evil.com
    - https://evil.com/https://evil.com/
    - https://www.\.evil.com
    - https:/\/\evil.com
    - https:/\evil.com
    - https:/evil.com
    - https:evil.com
    - '{{RootURL}}evil.com'
    - "\u3031evil.com"
    - "\u3035evil.com"
    - "\u309Devil.com"
    - "\u30FCevil.com"
    - "\uFF70evil.com"
