http:
- extractors:
  - group: 1
    name: cluster-uuids
    part: body
    regex:
    - '"uuid":"([^"]+)"'
    type: regex
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - memberVersion
    - members
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/hazelcast/rest/cluster'
id: hazelcast-management-exposure
info:
  author: S3R4PH
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-306
  description: 'Detected poor architectural configurations or unsecured REST API endpoints
    in Hazelcast by checking the cluster endpoint, which exposes internal member IPs,
    UUIDs, and version information.

    '
  metadata:
    shodan-query: html:"hazelcast"
    verified: true
  name: Hazelcast Management Center - Configuration Exposure
  reference:
  - https://docs.hazelcast.com/imdg/latest/management-center/rest-api
  remediation: 'Disable the Hazelcast REST API if not required. If its use is necessary,
    restrict network exposure, enable authentication mechanisms, limit access through
    firewall rules, and allow only trusted hosts to access the service.

    '
  severity: medium
  tags: config,exposure,hazelcast
