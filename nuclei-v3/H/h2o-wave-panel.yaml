http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - h2o-wave
    - H2O Wave
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: h2o-wave-panel
info:
  author: rxerium
  description: 'H2O Wave was detected. H2O Wave was an open-source Python development
    framework for building real-time interactive AI and ML web applications. The Wave
    server hosted applications built on the platform.

    '
  metadata:
    max-request: 1
    product: wave
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)H2O Wave"})
    shodan-query: http.title:"H2O Wave"
    vendor: h2oai
    verified: true
  name: H2O Wave ML Application Server - Detect
  reference:
  - https://github.com/h2oai/wave
  - https://wave.h2o.ai/
  severity: info
  tags: ai,detect,discovery,h2o,h2o-wave,ml,panel
