id: h2o-wave-panel
info:
  name: H2O Wave ML Application Server - Detect
  author: rxerium
  severity: info
  description: |
    H2O Wave was detected. H2O Wave was an open-source Python development framework for building real-time interactive AI and ML web applications. The Wave server hosted applications built on the platform.
  reference:
    - https://github.com/h2oai/wave
    - https://wave.h2o.ai/
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)H2O Wave"})
    max-request: 1
    product: wave
    shodan-query: 'http.title:"H2O Wave"'
    vendor: h2oai
    verified: true
  tags: ai,detect,discovery,h2o,h2o-wave,ml,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "h2o-wave"
          - "H2O Wave"
        condition: or
      - type: status
        status:
          - 200
