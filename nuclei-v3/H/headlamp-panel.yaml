http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - 'contains_all(body, "Headlamp: Kubernetes Web UI", "headlampBaseUrl")'
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/settings/plugins'
  - '{{BaseURL}}/settings/cluster'
  stop-at-first-match: true
id: headlamp-panel
info:
  author: shamo0
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-200
  description: 'Detected Headlamp Kubernetes Web UI panel exposed, which could lead
    to unauthorized access to Kubernetes cluster management if not properly secured.

    '
  metadata:
    fofa-query: body="headlampBaseUrl" && body="Headlamp"
    max-request: 2
    product: headlamp
    runzero-match: service["http.body"] matches "(?i)headlampBaseUrl"
    vendor: kubernetes-sigs
    verified: true
  name: Headlamp Kubernetes UI Panel - Detect
  reference:
  - https://headlamp.dev/
  - https://github.com/kubernetes-sigs/headlamp
  severity: medium
  tags: panel,headlamp,kubernetes,exposure
