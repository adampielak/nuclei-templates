http:
- matchers:
  - part: body
    type: word
    words:
    - AutoPass License Server
  - status:
    - 200
    - 404
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/autopass'
  - https://{{Host}}:5814/autopass
  - https://{{Host}}:5814/autopass/
  redirects: true
  stop-at-first-match: true
id: hpe-autopass-panel
info:
  author: kylianghd
  description: 'Detected an exposed HPE AutoPass License Server web interface on the
    default HTTPS port (5814) by probing the /autopass endpoint.

    '
  metadata:
    max-request: 3
    product: autopass-license-server
    vendor: hpe
  name: HPE AutoPass License Server - Panel Detection
  severity: info
  tags: autopass,exposure,hpe,misconfig,panel
