id: hpe-autopass-panel
info:
  name: HPE AutoPass License Server - Panel Detection
  author: kylianghd
  severity: info
  description: |
    Detected an exposed HPE AutoPass License Server web interface on the default HTTPS port (5814) by probing the /autopass endpoint.
  metadata:
    max-request: 3
    product: autopass-license-server
    vendor: hpe
  tags: autopass,exposure,hpe,misconfig,panel
http:
  - matchers:
      - part: body
        type: word
        words:
          - AutoPass License Server
      - status:
          - 200
          - 404
        # digest: 4a0a00473045022100cbb520073fec0642437bd96138b21fc5f899b7a6d08cc654b0364b2b88db0b8c022047465ad5ac44c63551a842da8ce2f7bf0bd3c798507c4faf7692115bbf62b784:922c64590222798bb761d5b6d8e72950

        type: status
    matchers-condition: and
    max-redirects: 2
    method: GET
    path:
      - '{{BaseURL}}/autopass'
      - https://{{Host}}:5814/autopass
      - https://{{Host}}:5814/autopass/
    redirects: true
    stop-at-first-match: true
