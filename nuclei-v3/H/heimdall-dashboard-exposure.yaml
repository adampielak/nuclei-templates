http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(to_lower(body), "<title>heimdall</title>", "heimdall-logo-small.svg",
      "items/pintoggle", "id=\"pinlist\"")
    - '!contains_any(to_lower(body), "password", "login")'
    type: dsl
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    Accept: text/html

    '
id: heimdall-dashboard-exposure
info:
  author: 0x_Akoko
  description: 'Detected The Heimdall Application Dashboard was accessible without
    authentication.When it was deployed without the protection, the full dashboard-including
    all linked internal services and API credentials-was accessible to unauthenticated
    users.

    '
  metadata:
    fofa-query: title="Heimdall" || body="heimdall-logo-small.svg"
    max-request: 1
    product: heimdall
    shodan-query: http.title:"Heimdall"
    verified: true
  name: Heimdall Application Dashboard - Unauthenticated Access
  reference:
  - https://github.com/linuxserver/Heimdall
  severity: medium
  tags: dashboard,exposure,heimdall,misconfig,unauth
