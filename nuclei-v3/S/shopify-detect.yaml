http:
- extractors:
  - name: version
    part: body
    regex:
    - Shopify ([0-9.]+)
    - Shopify version ([0-9.]+)
    - Coded by Shopify ([0-9.]+)
    - 'Theme: ([A-Za-z0-9_-]+) Shopify'
    type: regex
  - name: shopify_id
    part: body
    regex:
    - shop_id=([0-9]+)
    - shopify://([0-9a-zA-Z]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - X-Shopify-Stage
    - Powered by Shopify
    - cdn.shopify.com
    - Shopify Store
    - Shopify Liquid
  - status:
    - 200
    - 403
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/admin'
  - '{{BaseURL}}/shopify_app'
  - '{{BaseURL}}/shopify_api'
  - '{{BaseURL}}/favicon.ico'
  stop-at-first-match: true
id: shopify-detect
info:
  author: Chirag Mistry
  description: 'An instance running Shopify is detected by looking for specific HTTP
    headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 7
    shodan-query: http.component:"Shopify"
  name: Shopify Detection
  severity: info
  tags: shopify,detect,tech
