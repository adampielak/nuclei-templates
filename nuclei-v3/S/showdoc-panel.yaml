http:
- matchers:
  - part: body
    type: word
    words:
    - <title>ShowDoc</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/web/#/user/login'
id: showdoc-panel
info:
  author: rxerium
  classification:
    cwe-id: CWE-200
  description: 'ShowDoc panel was detected. ShowDoc was a tool for documenting APIs
    and interfaces.

    '
  metadata:
    max-request: 1
    product: showdoc
    runzero-match: service["http.body"] matches "(?i)showdoc"
    shodan-query: http.html:"showdoc"
    vendor: showdoc
  name: ShowDoc Panel Detection
  severity: info
  tags: discovery,panel,showdoc,tech
