http:
- body: '{"login":"{{injection_payload}}","password":"test"}'
  headers:
    Accept: application/json
    Content-Type: application/json
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - SQL error code
    - Dynamic SQL Error
    - Token unknown
    - syntax error
    - mysql_fetch
    - ORA-00933
    - pg_query()
  method: POST
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/api/auth'
