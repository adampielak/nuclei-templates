http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - <TITLE>List of commands</TITLE>
    - /msgserver/commands
  - part: header
    type: word
    words:
    - SAP Message Server
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{RootURL}}/msgserver'
id: sap-message-server-console
info:
  author: LRVT,l4rm4nd
  description: 'Detected the SAP Message Server HTTP console on /msgserver. When accessed
    directly, the message server returns an HTML page.

    '
  metadata:
    max-request: 1
    shodan-query: http.html:SAP Message Server
  name: SAP Message Server Console - Exposure
  severity: info
  tags: sap,console,exposure
