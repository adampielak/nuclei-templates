http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - '"exchanges"'
    - '"request"'
    - '"response"'
  - condition: or
    part: header
    type: word
    words:
    - application/json
    - application/vnd.spring-boot.actuator
    - application/vnd.spring-boot.actuator.v3+json
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/httpexchanges'
  - '{{BaseURL}}/actuator/httpexchanges'
  stop-at-first-match: true
id: springboot-httpexchanges
info:
  author: parkyoungdu
  description: 'The exposed httpexchanges endpoint can leak recent HTTP request/response
    data, including URIs, headers, and status codes.

    '
  metadata:
    max-request: 2
  name: Detects Springboot HTTP Exchanges Actuator
  reference:
  - https://docs.spring.io/spring-boot/docs/3.0.0/actuator-api/htmlsingle/\#httpexchanges
  - https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-3.0-Migration-Guide
  severity: low
  tags: exposure,misconfig,springboot,vuln
