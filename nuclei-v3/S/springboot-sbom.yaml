http:
- host-redirects: true
  matchers:
  - condition: or
    part: header
    type: word
    words:
    - application/json
    - application/vnd.spring-boot.actuator
    - application/vnd.spring-boot.actuator.v1+json
    - application/vnd.spring-boot.actuator.v2+json
    - application/vnd.spring-boot.actuator.v3+json
    - application/vnd.cyclonedx+json
    - application/spdx+json
    - application/vnd.syft+json
  - dsl:
    - contains_all(body, "\"ids\"", "\"application\"") || contains_all(body, "\"bomFormat\"",
      "\"specVersion\"") || contains_all(body, "\"spdxVersion\"", "\"SPDXID\"") ||
      contains_all(body, "\"artifacts\"", "\"source\"")
    type: dsl
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/sbom'
  - '{{BaseURL}}/actuator/sbom'
  - '{{BaseURL}}/sbom/application'
  - '{{BaseURL}}/actuator/sbom/application'
  stop-at-first-match: true
id: springboot-sbom
info:
  author: koungq
  classification:
    cwe-id: CWE-200
  description: 'Spring Boot Actuator SBOM endpoint was detected and is exposed without
    authentication. The endpoint returns a Software Bill of Materials (typically CycloneDX
    or SPDX JSON) listing every dependency and version shipped with the application,
    which lets an attacker enumerate the exact library inventory and trivially map
    it to known CVEs for targeted exploitation.

    '
  metadata:
    framework: spring-boot
    max-request: 4
    product: spring_boot
    shodan-query: http.favicon.hash:116323821
    vendor: vmware
    verified: true
  name: Spring Boot Actuator SBOM - Exposure
  reference:
  - https://docs.spring.io/spring-boot/api/rest/actuator/sbom.html
  - https://docs.spring.io/spring-boot/reference/actuator/endpoints.html#actuator.endpoints.sbom
  - https://cyclonedx.org/specification/overview/
  - https://spdx.github.io/spdx-spec/
  remediation: 'Disable the SBOM actuator endpoint in production or restrict it to
    internal use only. In application.properties set `management.endpoint.sbom.enabled=false`,
    or scope actuator exposure with `management.endpoints.web.exposure.include` to
    only the endpoints you actually need. Place all actuator endpoints behind authentication
    using Spring Security (e.g. require `ROLE_ACTUATOR`) and bind them to a separate,
    non-public management port via `management.server.port` / `management.server.address`.

    '
  severity: low
  tags: actuator,exposure,misconfig,sbom,springboot
