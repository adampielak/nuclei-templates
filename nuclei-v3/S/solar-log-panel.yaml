http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - Solar-Log
    - solar-log.com
    - "Solar-Log\u2122"
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: solar-log-panel
info:
  author: rxerium
  description: 'Solar-Log is a solar plant monitoring system by Solare Datensysteme
    GmbH (Germany)

    used for PV system monitoring, yield optimisation, and fault detection. The web

    interface is commonly exposed on port 80, 81, or non-standard ports.

    '
  metadata:
    max-request: 1
    product: solar-log
    runzero-match: any(each(service["html.titles"]), {# matches "Solar-Log"})
    shodan-query: http.title:"Solar-Log"
    vendor: Solar-Log
    verified: true
  name: Solar-Log - Monitoring Panel
  reference:
  - https://www.solar-log.com/
  severity: info
  tags: discovery,energy,ics,monitoring,ot,panel,solar,solar-log
