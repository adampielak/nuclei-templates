id: solar-log-panel
info:
  name: Solar-Log - Monitoring Panel
  author: rxerium
  severity: info
  description: |
    Solar-Log is a solar plant monitoring system by Solare Datensysteme GmbH (Germany)
    used for PV system monitoring, yield optimisation, and fault detection. The web
    interface is commonly exposed on port 80, 81, or non-standard ports.
  reference:
    - https://www.solar-log.com/
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "Solar-Log"})
    max-request: 1
    product: solar-log
    shodan-query: 'http.title:"Solar-Log"'
    vendor: Solar-Log
    verified: true
  tags: discovery,energy,ics,monitoring,ot,panel,solar,solar-log
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Solar-Log'
          - 'solar-log.com'
          - 'Solar-Log™'
        condition: or
      - type: status
        status:
          - 200
