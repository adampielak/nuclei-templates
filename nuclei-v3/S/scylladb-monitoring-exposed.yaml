# gap: scylladb-monitoring-exposed
id: scylladb-monitoring-exposed

info:
  name: ScyllaDB Monitoring Dashboard Exposed
  author: TyrusRC
  severity: medium
  description: |
    Detects an exposed ScyllaDB monitoring stack served from a pre-configured
    Grafana instance (typically on port 3000). When left publicly reachable
    without authentication, the dashboards leak cluster topology, keyspace
    names, throughput, and node-level performance metrics that aid further
    reconnaissance of the database tier.
  reference:
    - https://hacktricks.wiki/en/network-services-pentesting/
    - https://monitoring.docs.scylladb.com/stable/
  tags: custom,exposures,scylladb,grafana,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        case-insensitive: true
        words:
          - "scylladb"
      - type: word
        part: body
        case-insensitive: true
        words:
          - "grafana"
