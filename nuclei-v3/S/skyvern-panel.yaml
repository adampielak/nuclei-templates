http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - Skyvern
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: skyvern-panel
info:
  author: rxerium
  description: 'Skyvern is an open-source AI agent that automates browser-based workflows
    using

    LLMs and computer vision

    '
  metadata:
    max-request: 1
    product: skyvern
    runzero-match: any(each(service["html.titles"]), {# matches "Skyvern"})
    shodan-query: http.title:"Skyvern"
    vendor: skyvern-ai
    verified: true
  name: Skyvern Panel - Detect
  reference:
  - https://github.com/Skyvern-AI/skyvern
  - https://skyvern.com
  severity: info
  tags: agents,ai,automation,detect,discovery,llm,panel,skyvern
