http:
- matchers:
  - part: body
    type: word
    words:
    - <title>Sonar Poller
    - <label for="sonarUrl" class="sr-only">Sonar Instance URL</label>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: sonar-poller-panel
info:
  author: Th3l0newolf
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: 'Sonar Poller login/interface was discovered.

    '
  metadata:
    max-request: 1
    runzero-match: service["http.body"] matches "(?i)Sonar Poller"
    shodan-query: html:"Sonar Poller"
    verified: true
  name: Sonar Poller Login - Panel Detect
  severity: info
  tags: discovery,login,panel
