http:
- extractors:
  - name: version
    part: body
    regex:
    - SilverStripe ([0-9.]+)
    - Powered by SilverStripe ([0-9.]+)
    type: regex
  - name: silverstripe_id
    part: body
    regex:
    - silverstripe-site-id=([a-z0-9]+)
    - silverstripe\.org/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by SilverStripe
    - X-Powered-By-SilverStripe
  - status:
    - 200
    - 403
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/index.php'
  - '{{BaseURL}}/assets/'
  - '{{BaseURL}}/cms/'
  - '{{BaseURL}}/admin/'
  - '{{BaseURL}}/themes/'
  stop-at-first-match: true
id: silverstripe-detect
info:
  author: Chirag Mistry
  description: 'An instance running SilverStripe is detected by looking for specific
    HTTP headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 9
    shodan-query: http.component:"SilverStripe"
  name: SilverStripe Detection
  severity: info
  tags: silverstripe,detect,tech
