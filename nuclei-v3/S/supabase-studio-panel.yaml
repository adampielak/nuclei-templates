http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(to_lower(body), "<title>supabase studio")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/_login'
  stop-at-first-match: true
id: supabase-studio-panel
info:
  author: ChrisJr404
  description: 'Supabase Studio login panel was detected. The admin dashboard shipped
    with Supabase, the popular open-source Firebase alternative (Postgres + auth +
    realtime + storage + edge functions).

    '
  metadata:
    fofa-query: title="Supabase Studio"
    max-request: 2
    product: supabase
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Supabase Studio"})
    shodan-query: http.title:"Supabase Studio"
    vendor: supabase
    verified: true
  name: Supabase Studio Panel - Detect
  reference:
  - https://github.com/supabase/supabase
  - https://supabase.com/docs/guides/self-hosting
  severity: info
  tags: detect,discovery,login,panel,studio,supabase
