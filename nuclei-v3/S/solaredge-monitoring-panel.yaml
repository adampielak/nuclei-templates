http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - SolarEdge Telematics
    - SolarEdge
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: solaredge-monitoring-panel
info:
  author: rxerium
  description: 'SolarEdge Telematics monitoring panel has been detected.

    '
  metadata:
    max-request: 1
    product: solaredge-telematics
    shodan-query: http.title:"SolarEdge"
    vendor: SolarEdge
    verified: true
  name: SolarEdge Monitoring - Login Panel
  reference:
  - https://www.solaredge.com/
  severity: info
  tags: panel,solaredge,ics,solar,discovery
