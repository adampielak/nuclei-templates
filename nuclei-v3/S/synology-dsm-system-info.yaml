http:
- matchers:
  - condition: and
    dsl:
    - contains_any(body, "SYNO.Core.", "SYNO.FileStation.", "SYNO.DSM.")
    - contains(header, "application/json")
    - contains(body, "success\":true")
    - status_code == 200
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/webapi/entry.cgi?api=SYNO.API.Info&version=1&method=query&query=all'
id: synology-dsm-system-info
info:
  author: DhiyaneshDk
  description: 'Detected the disclosure of Synology DiskStation Manager (DSM) system
    information via the SYNO.API.Info endpoint, identifying all available APIs, versions,
    and installed packages returned without authentication.

    '
  metadata:
    fofa-query: body="Synology&nbsp;DiskStation"
    max-request: 1
    product: diskstation_manager
    runzero-match: asset["hw_vendor"] == "Synology" && asset["type"] == "NAS"
    shodan-query: html:"Synology&nbsp;DiskStation"
    vendor: synology
    verified: true
  name: Synology DSM System Info - Detect
  reference:
  - https://www.synology.com/en-us/dsm
  severity: info
  tags: synology,dsm,misconfig,diskstation-manager,detect
