dns:
- extractors:
  - regex:
    - SRV\s+\d+\s+\d+\s+\d+\s+(.+)
    type: regex
  matchers:
  - part: answer
    type: word
    words:
    - "IN\tSRV"
  name: '{{service}}.{{FQDN}}'
  payloads:
    service:
    - _xmpp-server._tcp
    - _xmpp-client._tcp
    - _xmpps-client._tcp
    - _sip._tcp
    - _sip._udp
    - _sips._tcp
    - _caldav._tcp
    - _carddav._tcp
    - _autodiscover._tcp
    - _minecraft._tcp
    - _teamspeak._tcp
    - _ldap._tcp
    - _ldaps._tcp
    - _kerberos._tcp
    - _kerberos._udp
  type: SRV
id: srv-service-detect
info:
  author: rxerium
  description: 'Detected services via SRV (Service) DNS records. SRV records defined
    the location of servers for specified services.

    '
  metadata:
    max-request: 15
    verified: true
  name: SRV Record Service - Detect
  reference:
  - https://www.rfc-editor.org/rfc/rfc2srv
  - https://en.wikipedia.org/wiki/SRV_record
  severity: info
  tags: dns,srv,service,discovery
