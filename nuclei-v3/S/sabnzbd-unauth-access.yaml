http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "var sabSession =", "configTranslate", "SABnzbd Config")
    - contains(content_type, "text/html")
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}/config/'
id: sabnzbd-unauth-access
info:
  author: 0x_Akoko
  classification:
    cwe-id: CWE-306
  description: 'Detected SABnzbd found with the web interface accessible without authentication.
    The config page is exposed without login, leaking the API key, config file path,
    server parameters, and system information to unauthenticated users.

    '
  metadata:
    fofa-query: title="SABnzbd"
    max-request: 1
    shodan-query: http.title:"SABnzbd"
    verified: true
  name: SABnzbd - Unauthenticated Web Interface Access
  reference:
  - https://sabnzbd.org/wiki/extra/access-denied.html
  - https://sabnzbd.org/wiki/configuration/4.5/api
  severity: high
  tags: exposure,iot,misconfig,sabnzbd,unauth
