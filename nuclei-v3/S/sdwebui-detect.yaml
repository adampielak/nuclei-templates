http:
- matchers:
  - condition: and
    dsl:
    - contains_all(body, "hires_fix.js", "AUTOMATIC1111", "gradio_config")
    - status_code == 200
    type: dsl
  max-redirects: 2
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    '
  redirects: true
id: sdwebui-detect
info:
  author: rxerium
  description: 'Detected AUTOMATIC1111 Stable Diffusion WebUI instance. SD WebUI was
    the mostpopular open-source interface for Stable Diffusion image generation. Exposed
    instancesmay allow unauthenticated access to image generation capabilities and
    model files.

    '
  metadata:
    max-request: 1
    product: stable-diffusion-webui
    shodan-query: http.html:"hires_fix.js"
    vendor: AUTOMATIC1111
    verified: true
  name: Stable Diffusion WebUI - Detect
  reference:
  - https://github.com/AUTOMATIC1111/stable-diffusion-webui
  severity: info
  tags: ai,detect,discovery,image-generation,sdwebui,stable-diffusion,tech
