http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>SillyTavern</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: sillytavern-panel
info:
  author: rxerium
  description: 'SillyTavern was detected. SillyTavern is a character-based AI roleplay
    and chat frontend that connects to local or remote LLM backends. Exposed instances
    may allow unauthenticated access to AI models and conversation history.

    '
  metadata:
    max-request: 1
    product: sillytavern
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)SillyTavern"})
    shodan-query: http.title:"SillyTavern"
    vendor: SillyTavern
    verified: true
  name: SillyTavern Panel - Detect
  reference:
  - https://github.com/SillyTavern/SillyTavern
  - https://docs.sillytavern.app/
  severity: info
  tags: ai,detect,discovery,llm,panel,sillytavern
