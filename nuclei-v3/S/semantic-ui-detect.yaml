http:
- matchers:
  - condition: or
    part: body
    regex:
    - (?i)href=["'][^"']*semantic(?:[\.-]min)?\.css
    - (?i)src=["'][^"']*semantic(?:[\.-]min)?\.js
    type: regex
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: semantic-ui-detect
info:
  author: Shivam Kamboj
  description: 'Detects the presence of Semantic UI, a development framework that
    helps create beautiful, responsive layouts using human-friendly HTML.

    '
  metadata:
    max-request: 1
    shodan-query: html:"semantic.min.css"
    verified: true
  name: Semantic UI Framework - Detect
  reference:
  - https://semantic-ui.com/
  severity: info
  tags: tech,semantic-ui,discovery
