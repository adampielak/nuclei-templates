http:
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(content_type, "text/html")
    - contains_all(body, "<title>Supabase", "Supabase Studio")
    type: dsl
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/project/default'
- matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains(content_type, "application/json")
    - contains_all(body, "primary_email", "organizations", "projects")
    type: dsl
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/api/platform/profile'
id: supabase-studio-exposure
info:
  author: theamanrawat
  description: 'Supabase Studio (the official self-hosted Supabase admin dashboard)
    was detected exposed without authentication.

    '
  metadata:
    fofa-query: body="Supabase Studio"
    max-request: 2
    product: supabase-studio
    shodan-query: http.html:"Supabase Studio"
    vendor: supabase
    verified: true
  name: Supabase Studio - Exposure
  reference:
  - https://supabase.com/docs/guides/self-hosting/docker
  - https://supabase.com/docs/guides/self-hosting#securing-your-services
  severity: high
  tags: exposure,misconfig,panel,supabase,supabase-studio,unauth
