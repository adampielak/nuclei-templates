id: seraphinite-accelerator-plugin-d41d8cd98f00b204e9800998ecf8427e
info:
  author: topscoder
  classification:
    cve-id: null
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:N/I:L/A:N
    cvss-score: 4.3
  description: 'The Seraphinite Accelerator plugin for WordPress is vulnerable to
    Cross-Site Request Forgery in all versions up to, and including, 2.20.31. This
    is due to missing nonce validation on the ''reset'' case of the Init() function,
    the ''settImport'' case of the _on_admin_action_act() function, and the OnInitAdminMode()
    function. This makes it possible for unauthenticated attackers to save, reset,
    and import settings via a forged request granted they can trick a site administrator
    into performing an action such as clicking on a link.

    '
  metadata:
    fofa-query: wp-content/plugins/seraphinite-accelerator/
