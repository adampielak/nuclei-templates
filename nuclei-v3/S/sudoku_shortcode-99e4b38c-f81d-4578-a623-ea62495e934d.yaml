    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:L/I:L/A:N
    cvss-score: 6.4
  description: 'The Sudoku Shortcode plugin for WordPress is vulnerable to Stored
    Cross-Site Scripting via the ''background'' parameter in the ''sudoku-sc'' shortcode
    in all versions up to, and including, 1.0.0 due to insufficient input sanitization
    and output escaping. This makes it possible for authenticated attackers, with
    Contributor-level access and above, to inject arbitrary web scripts in pages that
    will execute whenever a user accesses an injected page.

    '
