file:
- extensions:
  - xml
  matchers:
  - condition: and
    type: word
    words:
    - <system>
    - <hostname></hostname>
    - domain>
  matchers-condition: and
id: set-hostname
info:
  author: pussycat0x
  description: 'Ensure Hostname is set is a process that helps to ensure that the
    computer or device is being identified correctly on a network.

    The hostname is a unique identifier for the device, and it is important that it
    is properly set so that other devices on the network can identify it.

    '
  name: Ensure Hostname is Set
  reference: 'https://docs.netgate.com/pfsense/en/latest/config/general.html

    '
  severity: info
  tags: firewall,config,audit,pfsense,file
