http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - TAC Vista
    - Webstation
    - schneider-electric.com
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/webstation/'
id: schneider-tac-vista-panel
info:
  author: rxerium
  description: 'Schneider TAC Vista building automation panel has been detected.

    '
  metadata:
    max-request: 2
    product: tac-vista
    runzero-match: any(each(service["html.titles"]), {# matches "TAC Vista Webstation"})
    shodan-query: http.title:"TAC Vista"
    vendor: Schneider Electric
    verified: true
  name: Schneider TAC Vista - Login Panel
  reference:
  - https://www.se.com/
  severity: info
  tags: bms,discovery,ics,panel,schneider,tac,vista
