http:
- extractors:
  - group: 1
    part: body
    regex:
    - SmarterMail\s+(?:Enterprise|Professional)\s+([0-9.]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: and
    part: body
    type: word
    words:
    - Login to SmarterMail
    - SmarterTools Inc.
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/Login.aspx'
id: smartermail-panel
info:
  author: rxerium
  classification:
    cpe: cpe:2.3:a:smartertools:smartermail:*:*:*:*:*:*:*:*
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: SmarterMail login panel was detected.
  metadata:
    max-request: 1
    product: smartermail
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)SmarterMail"})
    shodan-query: http.title:"SmarterMail"
    vendor: smartertools
  name: SmarterMail Login Panel - Detect
  reference:
  - https://www.smartertools.com/smartermail/business-email-server
  severity: info
  tags: panel,smartermail,login,detect,discovery
