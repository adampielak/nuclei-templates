http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - Serge - Powered by LLaMA
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: serge-panel
info:
  author: rxerium
  description: 'Serge is a web interface for chatting with Alpaca through llama.cpp.
    This template detects the presence of a Serge chat interface.

    '
  metadata:
    max-request: 1
    product: serge
    runzero-match: any(each(service["html.titles"]), {# matches "Serge - Powered by
      LLaMa"})
    shodan-query: http.title:"Serge" port:8008
    vendor: serge-chat
    verified: true
  name: Serge Panel - Detect
  reference:
  - https://github.com/serge-chat/serge
  - https://serge.chat
  severity: info
  tags: ai,chat,detect,discovery,llm,panel,serge
