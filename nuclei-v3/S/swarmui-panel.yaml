http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - version-display
    - SwarmUI
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/Login'
  stop-at-first-match: true
id: swarmui-panel
info:
  author: rxerium
  description: 'SwarmUI (formerly StableSwarmUI) is a modular Stable Diffusion web
    interface built on ASP.NET Core.

    It provides a feature-rich UI for AI image generation

    '
  metadata:
    max-request: 1
    product: SwarmUI
    runzero-match: any(each(service["html.titles"]), {# matches "SwarmUI"})
    shodan-query: http.title:"SwarmUI"
    vendor: mcmonkeyprojects
    verified: true
  name: SwarmUI Panel - Detect
  reference:
  - https://github.com/mcmonkeyprojects/SwarmUI
  severity: info
  tags: ai,detect,discovery,image-generation,panel,stablediffusion,swarmui
