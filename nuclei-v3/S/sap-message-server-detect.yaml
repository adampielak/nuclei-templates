http:
- extractors:
  - group: 1
    name: version
    part: header
    regex:
    - (?i)server:\s*(SAP Message Server[^\r\n]*)
    type: regex
  matchers:
  - part: header
    type: word
    words:
    - SAP Message Server
  method: GET
  path:
  - '{{RootURL}}'
id: sap-message-server-detect
info:
  author: LRVT,l4rm4nd
  description: 'Detected SAP Message Server by sending an HTTP request to the root
    path and checking for SAP Message Server header.

    '
  metadata:
    max-request: 1
    shodan-query: http.html:SAP Message Server
  name: SAP Message Server HTTP - Detect
  severity: info
  tags: sap,discovery,recon
