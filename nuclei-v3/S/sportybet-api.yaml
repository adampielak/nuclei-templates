http:
- matchers:
  - part: body
    regex:
    - Bearer\s+[A-Za-z0-9_-]{50,}\.[A-Za-z0-9_-]{50,}\.[A-Za-z0-9_-]{50,}
    - token["']?\s*[:=]\s*["']?eyJ[A-Za-z0-9_-]{100,}["']?
    type: regex
  - case-insensitive: true
    condition: or
    part: body
    type: word
    words:
    - sportybet
    - betking
    - bet9ja
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
id: sportybet-api
info:
  author: Lloydcoder
  description: 'Detected exposed internal tokens and administrative endpoints belonging
    to online betting platforms.

    '
  name: SportyBet / BetKing Admin or API Token - Exposure
  severity: info
  tags: exposure,betting,sportybet,betking,token
