flow: http(1) && http(2)
http:
- extractors:
  - group: 1
    internal: true
    name: nuxjs
    part: body
    regex:
    - (?<nuxjs>\/static\/_nuxt\/\w+.js)
    type: regex
  host-redirects: true
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
- matchers:
  - condition: and
    type: word
    words:
    - SysReptor
    - sysreptor
    - Syslifters
  - status:
    - 200
    type: status
  matchers-condition: and
  raw:
  - 'GET {{nuxjs}} HTTP/1.1

    Host: {{BaseURL}}

    Content-type: text/javascript; charset="utf-8"

    '
id: sysreptor-detect
info:
  author: icarot
  description: 'Detects a Sysreptor server, a customizable and powerful penetration
    testing reporting platform for offensive security professionals.

    '
  metadata:
    max-request: 2
    product: sysreptor
    vendor: syslifters
  name: Sysreptor - Detection
  reference:
  - https://github.com/Syslifters/sysreptor
  severity: info
  tags: detect,syslifters,sysreptor,tech
