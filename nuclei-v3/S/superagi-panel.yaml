http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - contains(body, "<title>SuperAGI</title>")
    - status_code == 200 || status_code == 404
    type: dsl
  max-redirects: 2
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    '
id: superagi-panel
info:
  author: rxerium
  description: 'SuperAGI panel was detected. SuperAGI was an open-source autonomous
    AI agent platform that enables building, managing, and running AI agents. Exposed
    instances may allow unauthorized access to agent configurations and execution
    environments.

    '
  metadata:
    fofa-query: icon_hash="-2056571568"
    max-request: 1
    product: superagi
    runzero-match: service["favicon.ico.image.mmh3"] == "-2056571568"
    shodan-query: http.favicon.hash:-2056571568
    vendor: TransformerOptimus
    verified: true
  name: SuperAGI Panel - Detect
  reference:
  - https://github.com/TransformerOptimus/SuperAGI
  - https://superagi.com/
  severity: info
  tags: agent,ai,detect,discovery,panel,superagi
