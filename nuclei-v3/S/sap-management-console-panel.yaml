http:
- matchers:
  - part: body
    type: word
    words:
    - <title>SAP Management Console</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/sapmc/sapmc.html'
id: sap-management-console-panel
info:
  author: LRVT,l4rm4nd
  description: 'Detected the SAP Management Console (SAP MC) web panel by requesting
    /sapmc/sapmc.html and checking for a gSOAP server header the page title.

    '
  metadata:
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)SAP Management
      Console"})
    shodan-query: title:"SAP Management Console"
    verified: true
  name: SAP Management Console - Panel
  severity: info
  tags: panel,sap,sapmc,ui,discovery,login
