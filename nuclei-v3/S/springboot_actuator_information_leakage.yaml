http:
- matchers:
  - status:
    - 200
    type: status
  - condition: or
    part: body
    type: word
    words:
    - _links
    - beans
    - health
    - local.server.port
    - java.runtime
    - activeProfiles
  - condition: or
    part: header
    type: word
    words:
    - application/json
    - application/vnd.spring-boot.actuator
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/actuator'
  - '{{BaseURL}}/env'
  - '{{BaseURL}}/actuator/env'
  stop-at-first-match: true
id: springboot_actuator_information_leakage
info:
  author: yueji0j1anke
  description: Spring Boot Actuator endpoints exposed without authentication
  name: Spring Boot Actuator Information Leakage
  severity: high
  tags: actuator,unauthorized,springboot
