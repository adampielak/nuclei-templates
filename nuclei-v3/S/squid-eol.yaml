http:
- extractors:
  - group: 1
    name: version
    part: header
    regex:
    - (?i)Server:\s*squid/([0-9.]+)
    type: regex
  matchers:
  - condition: and
    dsl:
    - compare_versions(version, '<=6.14')
    - contains(tolower(header), 'squid')
    type: dsl
  method: GET
  path:
  - '{{BaseURL}}'
id: squid-eol
info:
  author: Shivam Kamboj
  description: 'Detected Squid proxy versions that have reached End-of-Life (EOL)
    and no longer receive security updates.

    '
  metadata:
    max-request: 1
    runzero-match: service["product"] contains "Squid Cache:Squid"
    shodan-query: 'Server: squid/'
    verified: true
  name: Squid End-of-Life - Detect
  reference:
  - https://endoflife.date/squid
  - https://www.squid-cache.org/Versions/
  severity: info
  tags: tech,squid,eol
