http:
- extractors:
  - group: 1
    regex:
    - webVersion:\s+'([\d\.\s\w]+)',
    type: regex
  matchers:
  - condition: or
    type: word
    words:
    - <title>SUSE Manager - Sign In</title>
    - <title>SUSE Multi-Linux Manager - Sign In</title>
    - <title>Uyuni - Sign In</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 1
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: suse-manager-panel
info:
  author: darses
  description: 'SUSE Manager login panel detected.

    '
  metadata:
    fofa-query:
    - title="SUSE Manager - Sign In"
    - title="SUSE Multi-Linux Manager - Sign In"
    - title="Uyuni - Sign In"
    - icon_hash="1158194469"
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)SUSE Manager
      - Sign In"}) || any(each(service["html.titles"]), {# matches "(?i)SUSE Multi-Linux
      Manager - Sign In"}) || any(each(service["html.titles"]), {# matches "(?i)Uyuni
      - Sign In"}) || service["favicon.ico.image.mmh3"] == "1158194469"
    shodan-query:
    - title:"SUSE Manager - Sign In"
    - title:"SUSE Multi-Linux Manager - Sign In"
    - title:"Uyuni - Sign In"
    - http.favicon.hash:1158194469
    verify: true
  name: SUSE Manager Server - Panel
  severity: info
  tags: detect,discovery,login,panel,suse
