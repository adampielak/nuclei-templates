http:
- host-redirects: true
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>ScadaBR</title>
    - ScadaBR Software
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: scadabr-panel
info:
  author: rxerium
  description: 'ScadaBR is an open-source SCADA system based on Mango Automation,
    widely

    used in Brazil and Latin America for industrial monitoring. The "powered by

    Mango" tagline in the title is a unique identifier. Instances are often

    internet-facing without authentication controls.

    '
  metadata:
    max-request: 1
    product: scadabr
    shodan-query: http.title:"ScadaBR"
    vendor: ScadaBR
    verified: true
  name: ScadaBR - Login Panel
  reference:
  - https://www.scadabr.com.br/
  - https://github.com/ScadaBR/ScadaBR
  severity: info
  tags: panel,scada,ics,scadabr,mango,open-source,latin-america,discovery
