http:
- extractors:
  - name: version
    part: body
    regex:
    - Squarespace ([0-9.]+)
    - Powered by Squarespace ([0-9.]+)
    type: regex
  - name: squarespace_id
    part: body
    regex:
    - squarespace-site-id=([a-z0-9]+)
    - siteid="([a-zA-Z0-9]+)"
    - squarespace\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by Squarespace
    - X-Squarespace-Request-Id
    - Squarespace Template
  - status:
    - 200
    - 403
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/_static/'
  - '{{BaseURL}}/squarespace.js'
  - '{{BaseURL}}/config.json'
  - '{{BaseURL}}/media-cache'
  stop-at-first-match: true
id: squarespace-detect
info:
  author: Chirag Mistry
  description: 'An instance running Squarespace is detected by looking for specific
    HTTP headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    shodan-query: http.component:"Squarespace"
  name: Squarespace Detection
  severity: info
  tags: squarespace,detect,tech
