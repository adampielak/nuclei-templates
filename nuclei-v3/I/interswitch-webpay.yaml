http:
- matchers:
  - part: body
    regex:
    - macKey["']?\s*[:=]\s*["']?[0-9A-Fa-f]{64}["']?
    - payItemId["']?\s*[:=]\s*["']?\d+["']?
    type: regex
  - case-insensitive: true
    condition: or
    type: word
    words:
    - interswitch
    - webpay
    - macKey
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: interswitch-webpay
info:
  author: Lloydcoder
  description: 'Exposure of Interswitch Webpay product IDs, MAC keys and access tokens.

    '
  name: Interswitch Webpay - Credentials Exposure
  reference:
  - https://docs.interswitchgroup.com/reference/how-to-use-the-reference
  severity: info
  tags: exposure,interswitch,webpay,token
