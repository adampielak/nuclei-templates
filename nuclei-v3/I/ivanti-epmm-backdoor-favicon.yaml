http:
- extractors:
  - kval:
    - last_modified
    name: last_modified
    type: kval
  matchers:
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/favicon.png'
id: ivanti-epmm-backdoor-favicon
info:
  author: darses
  description: 'Ivanti Endpoint Manager Mobile favicon backdoor was detected. This
    backdoor related to the 0-day exploitation wave of CVE-2026-1281. Double check
    the extract timestamp to see if this is within the range of 2026-01-29. This template
    is supposed be tested against a known Ivanti EPMM instance and will most likely
    produce false positive hits on other systems.

    '
  metadata:
    fofa-query:
    - icon_hash="1983356674"
    max-requests: 1
    product: endpoint_manager_mobile
    shodan-query:
    - http.favicon.hash:1983356674
    vendor: ivanti
    verified: true
  name: Ivanti Endpoint Manager Mobile - Backdoor
  reference:
  - hub.ivanti.com/s/article/Analysis-Guidance-Ivanti-Endpoint-Manager-Mobile-EPMM-CVE-2026-1281-CVE-2026-1340
  severity: high
  tags: ivanti,endpoint_manager_mobile,backdoor
