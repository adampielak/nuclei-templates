http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - data-page="
    - '&quot;component&quot;'
    - '&quot;props&quot;'
    - '&quot;url&quot;'
  - part: body
    regex:
    - (?is)data-page\s*=\s*"(?:[^"\\]|\\.)*\\"component\\"(?:[^"\\]|\\.)*\\"props\\"(?:[^"\\]|\\.)*\\"url\\"
    type: regex
  matchers-condition: or
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: inertiajs-detect
info:
  author: antonkulyk
  description: 'Detects Inertia.js, a stack for building single-page apps using classic
    server-side routing. Matching targets the server-rendered page payload embedded
    in the root element''s data-page attribute (JSON with component, props, and url
    keys), which is the default integration pattern for adapters such as Laravel''s
    inertia-laravel.

    '
  metadata:
    max-request: 1
    product: inertia
    shodan-query: html:"&quot;component&quot;" html:"data-page"
    vendor: inertiajs
  name: Inertia.js - Detect
  reference:
  - https://inertiajs.com/
  - https://github.com/inertiajs/inertia
  - https://github.com/inertiajs/inertia-laravel
  severity: info
  tags: inertia,inertiajs,tech
