http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - <title>Xtraction</title>
    - application-name" content="Xtraction
    - dev-extreme-ivanti.css
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/xtraction'
id: ivanti-xtraction-detect
info:
  author: rxerium
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cvss-score: 0.0
    cwe-id: CWE-200
  description: 'Detects Ivanti Xtraction, a reporting and dashboard platform used
    with Ivanti products.

    '
  metadata:
    max-request: 1
    shodan-query: http.title:"Xtraction"
    verified: true
  name: Ivanti Xtraction - Detect
  severity: info
  tags: detect,ivanti,tech,xtraction
