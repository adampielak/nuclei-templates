http:
- extractors:
  - group: 1
    name: version
    part: body
    regex:
    - '"version"\s*:\s*"([0-9.]+(?:\.[A-Za-z0-9-]+)?)"'
    type: regex
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "<title>Console</title>", "/console/main.bundle.js", "pf-m-redhat-font")
    name: console
    type: dsl
  - condition: and
    dsl:
    - status_code == 401
    - contains_all(tolower(header), "www-authenticate", "digest realm=\"default\"")
    name: rest-api
    type: dsl
  matchers-condition: or
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/console/welcome'
  - '{{BaseURL}}/rest/v2/cache-managers/default'
  redirects: true
  stop-at-first-match: true
id: infinispan-detect
info:
  author: DhiyaneshDk
  classification:
    cpe: cpe:/a:redhat:infinispan
  description: 'Infinispan is an open-source in-memory data grid by Red Hat that exposes
    a management console under `/console/welcome` and a REST API under `/rest/v2/`
    on the default port 11222. This template fingerprints Infinispan by matching the
    unique HTML console markers and the Digest authentication challenge from the REST
    API.

    '
  metadata:
    fofa-query: title="Infinispan" || body="/console/main.bundle.js"
    max-request: 2
    product: infinispan
    shodan-query: title:"Infinispan"
    vendor: redhat
  name: Infinispan Console - Detection
  reference:
  - https://infinispan.org/
  - https://infinispan.org/docs/stable/titles/rest/rest.html
  - https://github.com/infinispan/infinispan
  severity: info
  tags: detect,infinispan,redhat,tech
