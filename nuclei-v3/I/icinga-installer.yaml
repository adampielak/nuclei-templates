http:
- matchers:
  - condition: and
    part: body
    type: word
    words:
    - Welcome to the configuration of Icinga Web 2
    - Setup Token
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/icingaweb2/setup'
  - '{{BaseURL}}/setup'
  stop-at-first-match: true
id: icinga-installer
info:
  author: pussycat0x
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
    cwe-id: CWE-200
  description: 'Icinga Web 2 installer/setup wizard is publicly accessible. The setup
    page at /icingaweb2/setup exposes the configuration wizard which guides through
    full application configuration including database credentials, authentication
    backends, and admin account creation. While a setup token is required to proceed,
    the exposure of the installer itself is a serious misconfiguration that signals
    an incomplete or improperly secured installation.

    '
  metadata:
    fofa-query: body="Welcome to the configuration of Icinga Web 2"
    max-request: 2
    product: icinga_web_2
    shodan-query: http.title:"Icinga Web 2"
    vendor: icinga
    verified: true
  name: Icinga Web 2 Installer Exposure
  reference:
  - https://icinga.com/docs/icinga-web/latest/doc/02-Installation/
  severity: high
  tags: exposure,icinga,installer,misconfig
