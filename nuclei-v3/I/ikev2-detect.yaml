id: ikev2-detect
info:
  author: pussycat0x
  description: 'Detects IKEv2 services by sending a crafted IKE_SA_INIT request over
    UDP/500 and analyzing the response. Supports multiple cipher suites and DH groups
    for broad compatibility; any valid IKEv2 reply confirms the service.

    '
  metadata:
    fofa-query: port="500" && protocol="isakmp"
    max-request: 1
    shodan-query: port:500 product:IKE
    verified: true
  name: IKEv2 Service - Detection
  reference:
  - https://www.rfc-editor.org/rfc/rfc7296
  - https://www.iana.org/assignments/ikev2-parameters
  severity: info
  tags: js,network,udp,ikev2,ipsec,vpn,ike,detect,discovery
javascript:
- args:
    Host: '{{Host}}'
    Port: '500'
  code: "let c = require(\"nuclei/net\");\nlet conn = c.Open('udp', `${Host}:${Port}`);\n\
    conn.SetTimeout(10);\n\n// Pre-crafted IKEv2 SA_INIT packet (500 bytes)\nlet packet\
    \ =\n  \"deadbeefc0decafe\" +                // Initiator SPI\n  \"0000000000000000\"\
    \ +                // Responder SPI (empty)\n  \"2120220800000000000001f4\" +\
    \        // IKE Header: Next=SA(21) Ver=2.0(20) ExType=SA_INIT(22) Flags=Init(08)\
    \ MsgID=0 Len=500\n  \"220000ac\" +                        // SA Payload: Next=KE(22)\
    \ Len=172\n  \"0200005001010008\" +                // Proposal 1 (AEAD): More,\
    \ Len=80, #1, IKE, SPIsz=0, 8 transforms\n  \"0300000c01000014800e0100\" +   \
    \     //   ENCR_AES_GCM_16ICV KeyLen=256\n  \"0300000c01000014800e0080\" +   \
    \     //   ENCR_AES_GCM_16ICV KeyLen=128\n  \"0300000802000005\" +           \
    \     //   PRF_HMAC_SHA256\n  \"0300000802000007\" +                //   PRF_HMAC_SHA512\n\
    \  \"0300000803000000\" +                //   INTEG_NONE (AEAD)\n  \"0300000804000014\"\
    \ +                //   DH_GROUP_20 (384-bit ECP)\n  \"0300000804000013\" +  \
    \              //   DH_GROUP_19 (256-bit ECP)\n  \"000000080400000e\" +      \
    \          //   DH_GROUP_14 (2048-bit MODP)\n  \"0000005802010009\" +        \
    \        // Proposal 2 (Classic): Last, Len=88, #2, IKE, SPIsz=0, 9 transforms\n\
    \  \"0300000c0100000c800e0100\" +        //   ENCR_AES_CBC KeyLen=256\n  \"0300000c0100000c800e0080\"\
    \ +        //   ENCR_AES_CBC KeyLen=128\n  \"0300000801000003\" +            \
    \    //   ENCR_3DES\n  \"0300000802000005\" +                //   PRF_HMAC_SHA256\n\
    \  \"0300000802000002\" +                //   PRF_HMAC_SHA1\n  \"030000080300000c\"\
    \ +                //   INTEG_HMAC_SHA256_128\n  \"0300000803000002\" +      \
    \          //   INTEG_HMAC_SHA1_96\n  \"030000080400000e\" +                //\
    \   DH_GROUP_14\n  \"0000000804000002\" +                //   DH_GROUP_2\n  \"\
    28000108000e0000\" +                // KE Payload: Next=Ni(28) Len=264 DHGroup=14\n\
    \  \"000102030405060708090a0b0c0d0e0f\" +\n  \"101112131415161718191a1b1c1d1e1f\"\
    \ +\n  \"202122232425262728292a2b2c2d2e2f\" +\n  \"303132333435363738393a3b3c3d3e3f\"\
    \ +\n  \"404142434445464748494a4b4c4d4e4f\" +\n  \"505152535455565758595a5b5c5d5e5f\"\
    \ +\n  \"606162636465666768696a6b6c6d6e6f\" +\n  \"707172737475767778797a7b7c7d7e7f\"\
    \ +\n  \"808182838485868788898a8b8c8d8e8f\" +\n  \"909192939495969798999a9b9c9d9e9f\"\
    \ +\n  \"a0a1a2a3a4a5a6a7a8a9aaabacadaeaf\" +\n  \"b0b1b2b3b4b5b6b7b8b9babbbcbdbebf\"\
    \ +\n  \"c0c1c2c3c4c5c6c7c8c9cacbcccdcecf\" +\n  \"d0d1d2d3d4d5d6d7d8d9dadbdcdddedf\"\
    \ +\n  \"e0e1e2e3e4e5e6e7e8e9eaebecedeeef\" +\n  \"f0f1f2f3f4f5f6f7f8f9fafbfcfdfeff\"\
    \ +\n  \"00000024\" +                        // Nonce Payload: Next=None(00) Len=36\n\
    \  \"4142434445464748494a4b4c4d4e4f50\" +\n  \"5152535455565758595a414243444546\"\
    ;\n\nconn.SendHex(packet);\nlet raw = conn.Recv(2048);\nlet hexBuf = bytes.NewBuffer();\n\
    hexBuf.Write(raw);\nlet resp = hexBuf.Hex();\nlet result = {};\nresult.raw_hex\
    \ = resp;\nresult.raw_length = resp.length / 2;\n\nif (resp.length >= 56) {\n\
    \  result.initiator_spi = resp.substring(0, 16);\n  result.responder_spi = resp.substring(16,\
    \ 32);\n\n  let ver_byte = parseInt(resp.substring(34, 36), 16);\n  result.ike_major\
    \ = (ver_byte >> 4) & 0x0f;\n  result.ike_minor = ver_byte & 0x0f;\n  result.ike_version\
    \ = result.ike_major + \".\" + result.ike_minor;\n\n  let flags_byte = parseInt(resp.substring(38,\
    \ 40), 16);\n  result.is_response = (flags_byte & 0x20) != 0;\n\n  let extype\
    \ = parseInt(resp.substring(36, 38), 16);\n  if (extype == 34) result.exchange_name\
    \ = \"IKE_SA_INIT\";\n  else if (extype == 35) result.exchange_name = \"IKE_AUTH\"\
    ;\n  else if (extype == 37) result.exchange_name = \"INFORMATIONAL\";\n  else\
    \ result.exchange_name = \"EXCHANGE_\" + extype;\n\n  let nxt = parseInt(resp.substring(32,\
    \ 34), 16);\n  if (nxt == 33) result.first_payload = \"SA\";\n  else if (nxt ==\
    \ 34) result.first_payload = \"KE\";\n  else if (nxt == 40) result.first_payload\
    \ = \"Nonce\";\n  else if (nxt == 41) result.first_payload = \"Notify\";\n  else\
    \ if (nxt == 43) result.first_payload = \"VendorID\";\n  else result.first_payload\
    \ = \"PayloadType_\" + nxt;\n\n  if (nxt == 41 && resp.length >= 72) {\n    let\
    \ notify_type = parseInt(resp.substring(68, 72), 16);\n    if (notify_type ==\
    \ 14) result.notify_message = \"NO_PROPOSAL_CHOSEN\";\n    else if (notify_type\
    \ == 17) result.notify_message = \"INVALID_KE_PAYLOAD\";\n    else if (notify_type\
    \ == 16390) result.notify_message = \"COOKIE\";\n    else if (notify_type == 7)\
    \ result.notify_message = \"INVALID_SYNTAX\";\n    else if (notify_type == 5)\
    \ result.notify_message = \"INVALID_SPI\";\n    else if (notify_type == 24) result.notify_message\
    \ = \"AUTHENTICATION_FAILED\";\n    else result.notify_message = \"NOTIFY_\" +\
    \ notify_type;\n  }\n\n  result.sa_established = result.responder_spi != \"0000000000000000\"\
    ;\n  result.detected = (result.ike_major == 2);\n  result.service = \"IKEv2/IPsec\"\
    ;\n}\n\nExport(result);\n"
  matchers:
  - condition: and
    dsl:
    - success == true
    - contains(response, 'detected:true')
    type: dsl
  pre-condition: 'isUDPPortOpen(Host, Port);

    '
