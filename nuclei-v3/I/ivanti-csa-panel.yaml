id: ivanti-csa-panel

info:
  name: Ivanti(R) Cloud Services Appliance - Panel
  author: rxerium
  severity: info
  description: |
    An Ivanti Cloud Services Appliance panel was detected.
  reference:
    - https://help.ivanti.com/ld/help/en_US/LDMS/10.0/Windows/csa-h-help.htm
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Cloud Services Appliance"})
    verified: true
    max-request: 1
    shodan-query: title:"Cloud Services Appliance"
  tags: ivanti,csa,panel,login,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Ivanti(R) Cloud Services Appliance</title>"

      - type: status
        status:
          - 200

