http:
- extractors:
  - name: version
    part: body
    regex:
    - Bitrix ([0-9.]+)
    - Powered by Bitrix ([0-9.]+)
    type: regex
  - name: bitrix_id
    part: body
    regex:
    - bitrix-site-id=([a-z0-9]+)
    - bitrix\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by Bitrix
    - bitrix.com
    - bitrixjs
    - X-Powered-By-Bitrix
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/bitrix/js/main/core/core_min.js'
  - '{{BaseURL}}/bitrix/admin/'
  - '{{BaseURL}}/bitrix/templates/'
  - '{{BaseURL}}/bitrix/panel/'
  stop-at-first-match: true
id: bitrix-detect
info:
  author: Chirag Mistry
  description: 'An instance running Bitrix is detected by looking for specific HTTP
    headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    verified: true
  name: Bitrix Detection
  severity: info
  tags: bitrix,detect,tech
