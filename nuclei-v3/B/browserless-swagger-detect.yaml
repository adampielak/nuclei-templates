flow: http(1) && http(2)
http:
- matchers:
  - condition: and
    internal: true
    part: body
    type: word
    words:
    - browserless/chrome API
    - browserless Swagger documentation
  - internal: true
    status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/docs/swagger-ui-init.js'
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>Swagger UI
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/docs'
id: browserless-swagger-detect
info:
  author: theamanrawat
  description: 'Detects exposed Browserless API Swagger UI interface. Browserless
    is a headless browser automation service that provides REST APIs for Chrome/Chromium-based
    browser operations including screenshots, PDFs, and web scraping.

    '
  metadata:
    max-request: 4
    shodan-query: browserless
    verified: true
  name: Browserless API Swagger - Detect
  reference:
  - https://github.com/browserless/browserless
  - https://docs.browserless.io/
  severity: info
  tags: api,browserless,swagger,tech
