http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - '@botpress/ui-admin'
    - webpackJsonp
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/admin'
id: botpress-panel
info:
  author: rxerium
  description: 'Botpress admin panel was detected. Botpress is an open-source conversational
    AI platform for building chatbots and virtual assistants.

    '
  metadata:
    max-request: 1
    product: botpress
    shodan-query: http.html:"@botpress/ui-admin"
    vendor: botpress
    verified: true
  name: Botpress Admin Panel - Detect
  reference:
  - https://github.com/botpress/botpress
  - https://botpress.com/
  severity: info
  tags: panel,botpress,chatbot,ai,detect,discovery
