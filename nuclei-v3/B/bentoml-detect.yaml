http:
- host-redirects: true
  matchers:
  - part: body
    type: word
    words:
    - <title>BentoML Prediction Service
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: bentoml-detect
info:
  author: rxerium
  description: 'Detected BentoML Prediction Service interface. BentoML was a platform
    for building, shipping, and scaling AI applications with any ML framework.

    '
  metadata:
    max-request: 1
    shodan-query: html:"BentoML"
    verified: true
  name: BentoML Prediction Service - Detection
  reference:
  - https://www.bentoml.com/
  - https://github.com/bentoml/BentoML
  severity: info
  tags: tech,bentoml,ai,ml,prediction,mlops
