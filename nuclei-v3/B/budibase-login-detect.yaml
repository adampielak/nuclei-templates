http:
- matchers:
  - type: word
    words:
    - <title>Budibase</title>
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/builder/auth/login'
id: budibase-login-detect
info:
  author: theamanrawat
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  description: Budibase login panel was detected.
  metadata:
    max-request: 1
    product: budibase
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)budibase"})
    shodan-query: http.title:"budibase"
    vendor: budibase
  name: Budibase Login Panel - Detect
  reference:
  - https://github.com/Budibase/budibase
  severity: info
  tags: budibase,discovery,login,panel
