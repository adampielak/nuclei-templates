http:
- host-redirects: true
  matchers:
  - condition: and
    part: body
    type: word
    words:
    - TwinCAT
    - Beckhoff
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: beckhoff-twincat-hmi-panel
info:
  author: rxerium
  description: 'Beckhoff TwinCAT HMI (Human Machine Interface) Server is part of the
    TwinCAT

    industrial automation platform used in manufacturing, robotics, and process

    automation. It exposes a web-based HMI accessible via browser for monitoring

    and controlling PLC-driven systems.

    '
  metadata:
    max-request: 1
    product: twincat-hmi
    runzero-match: service["http.body"] matches "(?i)TwinCAT" && service["http.body"]
      matches "(?i)Beckhoff"
    shodan-query: http.html:"TwinCAT" http.html:"Beckhoff"
    vendor: Beckhoff
    verified: true
  name: Beckhoff TwinCAT HMI Server - Login Panel
  reference:
  - https://www.beckhoff.com/en-en/products/automation/twincat/te2xxx-twincat-3-target/te2000.html
  - https://infosys.beckhoff.com/english.php?content=../content/1033/te2000_tc3_hmi_engineering/index.html
  severity: info
  tags: automation,beckhoff,discovery,hmi,ics,panel,plc,scada,twincat
