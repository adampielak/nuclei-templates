http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_any(to_lower(header), "x-bubble-", "__bubble") || contains_any(body,
      "bubble.io", "bubbleapps.io")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: bubble-detect
info:
  author: johnk3r
  description: 'Detected the presence of Bubble, an AI-powered no-code app platform.

    '
  metadata:
    fofa-query: header="X-Bubble"
    max-request: 1
    product: bubble
    shodan-query: X-Bubble-Perf
    vendor: bubble
    verified: true
  name: Bubble - Detect
  reference:
  - https://bubble.io/
  severity: info
  tags: bubble,detect,tech
