id: bigant-db-install
info:
  name: Bigant DataBase - Exposed Installation
  author: pussycat0x
  severity: high
  description: |
    Bigant DataBase Installation page exposure due to misconfiguration.
  metadata:
    fofa-query: body="BigAntSetup"
    max-request: 1
    verified: true
  tags: bigant,database,install,misconfig,vuln
http:
  - matchers:
      - condition: and
        part: body
        type: word
        words:
          - BigAnt Database Upgrade Wizard1
          - //DB-MS
          - <title>BigAntSetup
      - status:
          - 200
        type: status
    matchers-condition: and
    raw:
      - |
        GET /install/update.html  HTTP/1.1
        Host: {{Hostname}}
