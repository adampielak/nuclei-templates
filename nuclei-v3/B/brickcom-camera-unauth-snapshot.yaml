http:
- matchers:
  - status:
    - 200
    type: status
  - part: header
    type: word
    words:
    - image/jpeg
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/ONVIF/media.cgi?action=getSnapshot'
  - '{{BaseURL}}/ONVIF/media.cgi?action=getSnapshot&channel=1'
  stop-at-first-match: true
id: brickcom-camera-unauth-snapshot
info:
  author: 0xr2r
  description: 'Detected Brickcom IP cameras was exposed live camera snapshots without
    authentication via the ONVIF media endpoint.

    '
  metadata:
    max-request: 2
    runzero-match: any(each(service["http.head.wwwAuthentications"]), {# contains
      'realm="Brickcom'})
    shodan-query: realm="Brickcom"
    verified: true
  name: Brickcom Camera - Unauthenticated Snapshot Access
  reference:
  - https://cxsecurity.com/issue/WLB-2026020031
  severity: high
  tags: iot,camera,default-login,exposure,unauth
