http:
- extractors:
  - name: version
    part: body
    regex:
    - Blogger ([0-9.]+)
    - Powered by Blogger ([0-9.]+)
    type: regex
  - name: blogger_id
    part: body
    regex:
    - blogger-id=([a-z0-9]+)
    - blogspot\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by Blogger
    - blogspot.com
    - X-Powered-By-Blogger
    - blogger.com
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/blogger.js'
  - '{{BaseURL}}/feeds/posts/default'
  - '{{BaseURL}}/search'
  stop-at-first-match: true
id: blogger-detect
info:
  author: Chirag Mistry
  description: 'An instance running Blogger is detected by looking for specific HTTP
    headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 7
    verified: true
  name: Blogger Detection
  severity: info
  tags: blogger,detect,tech
