http:
- matchers:
  - status:
    - 200
    type: status
  - condition: and
    part: body
    type: word
    words:
    - var viewer='admin'
    - Brickcom Corporation
    - wledctl.cgi
  matchers-condition: and
  raw:
  - 'GET /index_mjpg.html HTTP/1.1

    Host: {{Hostname}}

    Authorization: Basic YWRtaW46YWRtaW4=

    Connection: close

    '
id: brickcom-camera-default-login
info:
  author: 0x_Akoko
  description: 'Detected Brickcom IP cameras accessible using default credentials
    (admin/admin). Successful authentication exposed full camera configuration, live
    video streams, LED control, and network settings to remote attackers.

    '
  metadata:
    fofa-query: title="Brickcom"
    max-request: 1
    shodan-query: realm="Brickcom"
    verified: true
  name: Brickcom Camera - Default Login
  reference:
  - https://www.brickcom.com/support/faq_contents.php?id=48
  - https://cxsecurity.com/issue/WLB-2026020031
  severity: high
  tags: iot,camera,default-login
