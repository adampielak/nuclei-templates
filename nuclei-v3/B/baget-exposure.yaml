http:
- matchers:
  - condition: or
    type: word
    words:
    - content="BaGet"
    - BaGet.Web
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
  redirects: true
id: baget-exposure
info:
  author: DhiyaneshDk
  description: 'BaGet Package Manager is being exposed.

    '
  metadata:
    max-request: 1
    shodan-query: title:"BaGet"
    verified: true
  name: BaGet - Exposure
  reference:
  - https://loic-sharma.github.io/BaGet/
  severity: medium
  tags: glitchtip,misconfig
