http:
- host-redirects: true
  matchers:
  - condition: and
    dsl:
    - status_code == 200
    - contains_all(body, "<title>Blinko</title>", "Blinko self-hosted personal note")
    type: dsl
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}/signin'
id: blinko-login-panel
info:
  author: 0x_Akoko
  description: 'Detected A Blinko self-hosted personal note application login panel.

    '
  metadata:
    fofa-query: title="Blinko"
    max-request: 1
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)Blinko"})
    shodan-query: title:"Blinko"
    verified: true
  name: Blinko - Login Panel Detection
  reference:
  - https://github.com/blinko-space/blinko
  severity: info
  tags: blinko,detect,login,panel
