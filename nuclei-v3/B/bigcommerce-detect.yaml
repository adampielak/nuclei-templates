http:
- extractors:
  - name: version
    part: body
    regex:
    - BigCommerce ([0-9.]+)
    - Powered by BigCommerce ([0-9.]+)
    type: regex
  - name: bigcommerce_id
    part: body
    regex:
    - bigcommerce-site-id=([a-z0-9]+)
    - bc-site-id="([a-zA-Z0-9]+)"
    - bigcommerce\.com/([^/]+)
    type: regex
  matchers:
  - case-insensitive: true
    condition: or
    part: response
    type: word
    words:
    - Powered by BigCommerce
    - X-BigCommerce-Request-Id
    - bigcommerce.com
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
  - '{{BaseURL}}/robots.txt'
  - '{{BaseURL}}/sitemap.xml'
  - '{{BaseURL}}/favicon.ico'
  - '{{BaseURL}}/bigcommerce.js'
  - '{{BaseURL}}/stores'
  - '{{BaseURL}}/cart'
  - '{{BaseURL}}/admin'
  stop-at-first-match: true
id: bigcommerce-detect
info:
  author: Chirag Mistry
  description: 'An instance running BigCommerce is detected by looking for specific
    HTTP headers, HTML tags, and known endpoints.

    '
  metadata:
    max-request: 8
    verified: true
  name: BigCommerce Detection
  severity: info
  tags: bigcommerce,detect,tech
