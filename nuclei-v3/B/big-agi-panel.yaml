http:
- host-redirects: true
  matchers:
  - case-insensitive: true
    part: body
    type: word
    words:
    - big-AGI
  - status:
    - 200
    type: status
  matchers-condition: and
  max-redirects: 2
  method: GET
  path:
  - '{{BaseURL}}'
id: big-agi-panel
info:
  author: rxerium
  description: 'big-AGI is a generative AI suite for power users, teams, and developers.
    It provides

    an AI chat interface with support for multiple LLM providers

    '
  metadata:
    max-request: 1
    product: big-agi
    shodan-query: http.title:"big-AGI"
    vendor: big-agi
    verified: true
  name: big-AGI Panel - Detect
  reference:
  - https://github.com/enricoros/big-AGI
  - https://big-agi.com
  severity: info
  tags: panel,big-agi,llm,ai,chat,detect,discovery
