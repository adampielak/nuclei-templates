id: eyoucms-installer
info:
  name: EyouCMS - Installation
  author: ritikchaddha
  severity: high
  description: EyouCMS installation is exposed.
  metadata:
    fofa-query: title="eyoucms"
    max-request: 1
    product: eyoucms
    vendor: eyoucms
    verified: true
  tags: eyoucms,install,misconfig,vuln
http:
  - matchers:
      - case-insensitive: true
        condition: and
        part: body
        type: word
        words:
          - EyouCms
          - /install/index.php?step=2
          - 使用协议</p>
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/install/index.php'
