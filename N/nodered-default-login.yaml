id: nodered-default-login

info:
  name: Node-Red - Default Login
  author: savik
  severity: critical
  description: |
    Node-Red default login credentials were discovered.
  reference:
    - https://quentinkaiser.be/pentesting/2018/09/07/node-red-rce/
  classification:
    cpe: cpe:2.3:a:nodered:node-red:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: service["favicon.ico.image.mmh3"] == "321591353"
    verified: true
    max-request: 1
    vendor: nodered
    product: node-red
    shodan-query: http.favicon.hash:321591353
  tags: default-login,node-red,dashboard,vuln

http:
  - raw:
      - |
        POST /auth/token HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded;charset=UTF-8

        client_id=node-red-editor&grant_type=password&scope=&username={{username}}&password={{password}}

    attack: pitchfork
    payloads:
      username:
        - admin
      password:
        - password

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'access_token":'
          - 'expires_in":'
          - 'token_type":'
        condition: and

      - type: word
        part: header
        words:
          - 'application/json'

      - type: status
        status:
          - 200

