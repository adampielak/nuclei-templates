id: unauthenticated-cache-purge
info:
  author: 0xelkomy
  description: As per guideline one should protect purges with ACLs from unauthorized
    hosts.
  name: Varnish Unauthenticated Cache Purge
  reference: https://book.varnish-software.com/4.0/chapters/Cache_Invalidation.html
  severity: low
  tags: varnish,misconfig,cache
requests:
- attack: sniper
  matchers:
  - condition: or
    part: body
    type: word
    words:
    - <title>200 Purged</title>
    - '"status": "ok"'
  - status:
    - 200
    type: status
  matchers-condition: and
  payloads:
    Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt
  raw:
  - 'GET / HTTP/1.1

    Host: {{Subdomains}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0

    Accept-Encoding: gzip, deflate

    Accept: */*

    '
  threads: 100
