          - <link [^>]*href=(?:"|')[^"']*elementor/assets
          - <link [^>]*href=(?:"|')[^"']*uploads/elementor/css
        condition: or
        part: body
      - type: regex
        name: dart
        regex:
          - /(?:<script)[^>]+(?:type="application/dart")/
        condition: or
        part: body
      - type: regex
        name: glyphicons
        regex:
          - (?:<link[^>]* href=[^>]+glyphicons(?:\.min)?\.css|<img[^>]* src=[^>]+glyphicons)
        condition: or
        part: body
      - type: regex
        name: jetshop
        regex:
          - <(?:div|aside) id="jetshop-branding">
        condition: or
        part: body
      - type: regex
        name: business-catalyst
        regex:
          - <!-- BC_OBNW -->
        condition: or
        part: body
      - type: regex
        name: boldgrid
        regex:
          - <link rel=["']stylesheet["'] [^>]+boldgrid
          - <link rel=["']stylesheet["'] [^>]+post-and-page-builder
          - <link[^>]+s\d+\.boldgrid\.com
        condition: or
        part: body
      - type: regex
        name: zurb-foundation
        regex:
          - <link[^>]+foundation[^>"]+css
          - <div [^>]*class="[^"]*(?:small|medium|large)-\d{1,2} columns
        condition: or
