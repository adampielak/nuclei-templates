id: tech-detect
info:
  name: Wappalyzer Technology Detection
  author: hakluke
  severity: info
requests:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: or
    matchers:
      - type: regex
        name: mollom
        regex:
          - <img[^>]+\.mollom\.com
        condition: or
        part: body
      - type: regex
        name: genexus
        regex:
          - <link[^>]+?id="gxtheme_css_reference"
        condition: or
        part: body
      - type: regex
        name: flat-ui
        regex:
          - <link[^>]* href=[^>]+flat-ui(?:\.min)?\.css
        condition: or
        part: body
      - type: regex
        name: dovetailwrp
        regex:
          - <link[^>]* href="\/DovetailWRP\/
        condition: or
        part: body
      - type: regex
        name: highcharts
        regex:
          - <svg[^>]*><desc>Created with Highcharts ([\d.]*)
        condition: or
        part: body
      - type: regex
        name: videojs
        regex:
          - <div[^>]+class="video-js+">
        condition: or
        part: body
      - type: regex
        name: tictail
        regex:
          - <link[^>]*tictail\.com
        condition: or
        part: body
      - type: regex
        name: wikinggruppen
        regex:
          - <!-- WIKINGGRUPPEN
        condition: or
        part: body
      - type: regex
        name: slimbox
        regex:
          - <link [^>]*href="[^/]*slimbox(?:-rtl)?\.css
        condition: or
        part: body
      - type: regex
        name: cs-cart
        regex:
          - '&nbsp;Powered by (?:<a href=[^>]+cs-cart\.com|CS-Cart)'
          - \.cm-noscript[^>]+</style>
        condition: or
        part: body
      - type: regex
        name: directadmin
        regex:
          - <a[^>]+>DirectAdmin</a> Web Control Panel
        condition: or
        part: body
      - type: regex
        name: xenforo
        regex:
          - (?:jQuery\.extend\(true, XenForo|Forum software by XenForo™|<!--XF:branding|<html[^>]+id="XenForo")
          - '<html id="XF" '
        condition: or
        part: body
      - type: regex
        name: imperia-cms
        regex:
          - '<imp:live-info sysid="[0-9a-f-]+"(?: node_id="[0-9/]*")? *\/>'
        condition: or
        part: body
      - type: regex
        name: vanilla
        regex:
          - <body id="(?:DiscussionsPage|vanilla)
        condition: or
        part: body
      - type: regex
        name: kibana
        regex:
          - <title>Kibana</title>
        condition: or
        part: body
      - type: regex
        name: bonfire
        regex:
          - Powered by <a[^>]+href="https?://(?:www\.)?cibonfire\.com[^>]*>Bonfire v([^<]+)
        condition: or
        part: body
      - type: regex
        name: ipb
        regex:
          - <link[^>]+ipb_[^>]+\.css
        condition: or
        part: body
      - type: regex
        name: smf
        regex:
          - credits/?" title="Simple Machines Forum" target="_blank" class="new_win">SMF ([0-9.]+)</a>
        condition: or
        part: body
      - type: regex
        name: xcharts
        regex:
          - <link[^>]* href="[^"]*xcharts(?:\.min)?\.css
        condition: or
        part: body
      - type: regex
        name: proximis-unified-commerce
        regex:
          - <html[^>]+data-ng-app="RbsChangeApp"
        condition: or
        part: body
      - type: regex
        name: arc-publishing
        regex:
          - <div [^>]*id="pb-root"
        condition: or
        part: body
      - type: regex
        name: nvd3
        regex:
          - <link[^>]* href=[^>]+nv\.d3(?:\.min)?\.css
        condition: or
        part: body
      - type: regex
        name: arastta
        regex:
          - Powered by <a [^>]*href="https?://(?:www\.)?arastta\.org[^>]+>Arastta
        condition: or
        part: body
      - type: regex
        name: cgit
        regex:
          - <[^>]+id='cgit'
          - generated by <a href='http://git\.zx2c4\.com/cgit/about/'>cgit v([\d.a-z-]+)</a>
        condition: or
        part: body
      - type: regex
        name: strikingly
        regex:
          - <!-- Powered by Strikingly\.com
        condition: or
        part: body
      - type: regex
        name: contentful
        regex:
          - <[^>]+(?:https?:)?//(?:assets|downloads|images|videos)\.(?:ct?fassets\.net|contentful\.com)
        condition: or
        part: body
      - type: regex
        name: microsoft-asp.net
        regex:
          - <input[^>]+name="__VIEWSTATE
        condition: or
        part: body
      - type: regex
        name: inspectlet
        regex:
          - <!-- (?:Begin|End) Inspectlet Embed Code -->
        condition: or
        part: body
      - type: regex
        name: moodle
        regex:
          - <img[^>]+moodlelogo
        condition: or
        part: body
      - type: regex
        name: minibb
        regex:
          - <a href="[^"]+minibb[^<]+</a>[^<]+\n<!--End of copyright link
        condition: or
        part: body
      - type: regex
        name: handlebars
        regex:
          - <[^>]*type=[^>]text\/x-handlebars-template
        condition: or
        part: body
      - type: regex
        name: materialize-css
        regex:
          - <link[^>]* href="[^"]*materialize(?:\.min)?\.css
        condition: or
        part: body
      - type: regex
        name: orocommerce
        regex:
          - <script [^>]+data-requiremodule="oro/
          - <script [^>]+data-requiremodule="oroui/
        condition: or
        part: body
      - type: regex
        name: lightspeed-ecom
        regex:
          - <!-- \[START\] 'blocks/head\.rain' -->
        condition: or
        part: body
      - type: regex
        name: woocommerce
        regex:
          - <!-- WooCommerce
          - <link rel='[^']+' id='woocommerce-(?:layout|smallscreen|general)-css'  href='https?://[^/]+/wp-content/plugins/woocommerce/assets/css/woocommerce(?:-layout|-smallscreen)?\.css?ver=([\d.]+)'
        condition: or
        part: body
      - type: regex
        name: cpanel
        regex:
          - <!-- cPanel
        condition: or
        part: body
      - type: regex
        name: phpmyadmin
        regex:
          - '!\[CDATA\[[^<]*PMA_VERSION:\"([\d.]+)'
          - '(?: \| phpMyAdmin ([\d.]+)<\/title>|PMA_sendHeaderLocation\(|<link [^>]*href="[^"]*phpmyadmin\.css\.php)'
        condition: or
        part: body
      - type: regex
        name: hcaptcha
        regex:
          - <style[^>]+[^<]+#cf-hcaptcha-container[^<]+</style>
        condition: or
        part: body
      - type: regex
        name: styled-components
        regex:
          - <style[^>]*data-styled(?:-components)?[\s"]
          - <style[^>]+data-styled-version="([0-9]+)"
          - "<[^>]+sc-component-id: sc-"
        condition: or
        part: body
      - type: regex
        name: prestashop
        regex:
          - Powered by <a\s+[^>]+>PrestaShop
          - <!-- /Block [a-z ]+ module (?:HEADER|TOP)?\s?-->
          - <!-- /Module Block [a-z ]+ -->
        condition: or
        part: body
      - type: regex
        name: youtrack
        regex:
          - no-title="YouTrack">
          - data-reactid="[^"]+">youTrack ([0-9.]+)<
          - type="application/opensearchdescription\+xml" title="YouTrack"/>
        condition: or
        part: body
      - type: regex
        name: grandnode
        regex:
          - "(?:<!--GrandNode |<a[^>]+grandnode - Powered by |Powered by: <a[^>]+nopcommerce)"
        condition: or
        part: body
      - type: regex
        name: oxid-eshop
        regex:
          - <!--[^-]*OXID eShop
        condition: or
        part: body
      - type: regex
        name: doxygen
        regex:
          - (?:<!-- Generated by Doxygen ([\d.]+)|<link[^>]+doxygen\.css)
        condition: or
        part: body
      - type: regex
        name: afterbuy
        regex:
          - <dd>This OnlineStore is brought to you by ViA-Online GmbH Afterbuy\. Information and contribution at https://www\.afterbuy\.de</dd>
        condition: or
        part: body
      - type: regex
        name: chevereto
        regex:
          - Powered by <a href="https?://chevereto\.com">
        condition: or
        part: body
      - type: regex
        name: gallery
        regex:
          - <div id="gsNavBar" class="gcBorder1">
          - <a href="http://gallery\.sourceforge\.net"><img[^>]+Powered by Gallery\s*(?:(?:v|Version)\s*([0-9.]+))?
        condition: or
        part: body
      - type: regex
        name: redoc
        regex:
          - "<redoc "
        condition: or
        part: body
      - type: regex
        name: open-web-analytics
        regex:
          - <!-- (?:Start|End) Open Web Analytics Tracker -->
        condition: or
        part: body
      - type: regex
        name: jsdelivr
        regex:
          - <[^>]+?//cdn\.jsdelivr\.net/
        condition: or
        part: body
      - type: regex
        name: user.com
        regex:
          - <div[^>]+/id="ue_widget"
        condition: or
        part: body
      - type: regex
        name: smart-ad-server
        regex:
          - <img[^>]+smartadserver\.com\/call
        condition: or
        part: body
      - type: regex
        name: wordpress-super-cache
        regex:
          - <!--[^>]+WP-Super-Cache
        condition: or
        part: body
      - type: regex
        name: comandia
        regex:
          - <link[^>]+=['"]//cdn\.mycomandia\.com
        condition: or
        part: body
      - type: regex
        name: shellinabox
        regex:
          - <title>Shell In A Box</title>
          - must be enabled for ShellInABox</noscript>
        condition: or
        part: body
      - type: regex
        name: websocket
        regex:
          - <link[^>]+rel=["']web-socket["']
          - <(?:link|a)[^>]+href=["']wss?://
        condition: or
        part: body
      - type: regex
        name: gravatar
        regex:
          - <[^>]+gravatar\.com/avatar/
        condition: or
        part: body
      - type: regex
        name: php-nuke
        regex:
          - <[^>]+Powered by PHP-Nuke
        condition: or
        part: body
      - type: regex
        name: essential-js-2
        regex:
          - '<[^>]+ class ?= ?"(?:e-control|[^"]+ e-control)(?: )[^"]* e-lib\b'
        condition: or
        part: body
      - type: regex
        name: wolf-cms
        regex:
          - (?:<a href="[^>]+wolfcms\.org[^>]+>Wolf CMS(?:</a>)? inside|Thank you for using <a[^>]+>Wolf CMS)
        condition: or
        part: body
      - type: regex
        name: shapecss
        regex:
          - <link[^>]* href="[^"]*shapecss(?:\.min)?\.css
        condition: or
        part: body
      - type: regex
        name: zabbix
        regex:
          - <body[^>]+zbxCallPostScripts
        condition: or
        part: body
      - type: regex
        name: phpbb
        regex:
          - Powered by <a[^>]+phpBB
          - <div class=phpbb_copyright>
          - <[^>]+styles/(?:sub|pro)silver/theme
          - <img[^>]+i_icon_mini
          - <table class="[^"]*forumline
        condition: or
        part: body
      - type: regex
        name: sweetalert
        regex:
          - <link[^>]+?href="[^"]+sweet-alert(?:\.min)?\.css
        condition: or
        part: body
      - type: regex
        name: semantic-ui
        regex:
          - <link[^>]+semantic(?:\.min)\.css"
        condition: or
        part: body
      - type: regex
        name: teamcity
        regex:
          - <span class="versionTag"><span class="vWord">Version</span> ([\d\.]+)
        condition: or
        part: body
      - type: regex
        name: sapper
        regex:
          - <script[^>]*>__SAPPER__
        condition: or
        part: body
      - type: regex
        name: contao
        regex:
          - <!--[^>]+powered by (?:TYPOlight|Contao)[^>]*-->
          - <link[^>]+(?:typolight|contao)\.css
        condition: or
        part: body
      - type: regex
        name: wpcache
        regex:
          - <!--[^>]+wpCache
        condition: or
        part: body
      - type: regex
        name: yii
        regex:
          - Powered by <a href="http://www\.yiiframework\.com/" rel="external">Yii Framework</a>
          - <input type="hidden" value="[a-zA-Z0-9]{40}" name="YII_CSRF_TOKEN" \/>
          - <!\[CDATA\[YII-BLOCK-(?:HEAD|BODY-BEGIN|BODY-END)\]
        condition: or
        part: body
      - type: regex
        name: bugzilla
        regex:
          - href="enter_bug\.cgi">
          - <main id="bugzilla-body"
          - <a href="https?://www\.bugzilla\.org/docs/([0-9.]+)/[^>]+>Help<
          - <span id="information" class="header_addl_info">version ([\d.]+)<
        condition: or
        part: body
      - type: regex
        name: adriver
        regex:
          - (?:<embed[^>]+(?:src="https?://mh\d?\.adriver\.ru/|flashvars="[^"]*(?:http:%3A//(?:ad|mh\d?)\.adriver\.ru/|adriver_banner))|<(?:(?:iframe|img)[^>]+src|a[^>]+href)="https?://ad\.adriver\.ru/)
        condition: or
        part: body
      - type: regex
        name: papaya-cms
        regex:
          - <link[^>]*/papaya-themes/
        condition: or
        part: body
      - type: regex
        name: posterous
        regex:
          - <div class="posterous
        condition: or
        part: body
      - type: regex
        name: umbraco
        regex:
          - powered by <a href=[^>]+umbraco
        condition: or
        part: body
      - type: regex
        name: strato
        regex:
          - <a href="http://www\.strato\.de/" target="_blank">
        condition: or
