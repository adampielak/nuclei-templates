      - type: regex
        name: coinhive-captcha
        regex:
          - (?:<div[^>]+class="coinhive-captcha[^>]+data-key|<div[^>]+data-key[^>]+class="coinhive-captcha)
        condition: or
        part: body
      - type: regex
        name: adminer
        regex:
          - Adminer</a> <span class="version">([\d.]+)</span>
          - onclick="bodyClick\(event\);" onload="verifyVersion\('([\d.]+)'\);">
