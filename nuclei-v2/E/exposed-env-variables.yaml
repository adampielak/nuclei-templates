id: exposed-env-variables
info:
  author: SirBugs
  name: Exposed Environment Variables
  severity: high
requests:
- matchers:
  - status:
    - 200
    type: status
  - condition: and
    part: body
    type: word
    words:
    - MAIL_HOST=
    - MAIL_FROM_ADDRESS=
  - negative: true
    part: header
    type: word
    words:
    - text/html
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/api/.env'
