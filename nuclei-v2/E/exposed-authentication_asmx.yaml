id: exposed-authentication.asmx
info:
  author: DhiyaneshDk
  name: Exposed Authentication.asmx
  reference: https://www.exploit-db.com/ghdb/6604
  severity: low
  tags: config,exposure
requests:
- attack: sniper
  matchers:
  - part: body
    type: word
    words:
    - Authentication Web Service
  - status:
    - 200
    type: status
  matchers-condition: and
  payloads:
    Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt
  raw:
  - 'GET /_vti_bin/Authentication.asmx?op=Mode HTTP/1.1

    Host: {{Subdomains}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:55.0) Gecko/20100101
    Firefox/55

    '
  threads: 100
