id: exposed-metrics
info:
  author: dhiyaneshDK
  name: Exposed metrics
  reference: https://hackerone.com/reports/1026196
  severity: low
  tags: config,exposure
requests:
- matchers:
  - condition: and
    type: word
    words:
    - cpu_seconds_total
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}/metrics'
