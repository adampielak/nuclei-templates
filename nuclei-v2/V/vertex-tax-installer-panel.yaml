id: vertex-tax-installer-panel
info:
  author: ritikchaddha
  metadata:
    shodan-query: http.html:"Vertex Tax Installer"
    verified: true
  name: Vertex Tax Installer Panel
  severity: info
  tags: panel,vertex
requests:
- matchers:
  - part: body
    type: word
    words:
    - Vertex Tax Installer
  - status:
    - 200
    type: status
  matchers-condition: and
  method: GET
  path:
  - '{{BaseURL}}'
