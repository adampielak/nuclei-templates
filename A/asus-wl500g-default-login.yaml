id: asus-wl500g-default-login
info:
  name: ASUS WL-500G - Default Login
  author: ritikchaddha
  severity: high
  description: |
    ASUS WL-500 contains a default login vulnerability. Default admin login password 'admin' was found.
  metadata:
    runzero-match: any(each(service["http.head.wwwAuthentications"]), {# matches '(?i)realm="WL-500G'})
    max-request: 1
    shodan-query: WL-500G
    verified: true
  tags: asus,default-login,vuln,wl-500
http:
  - attack: pitchfork
    matchers:
      - negative: true
        part: body
        type: word
        words:
          - 401 Unauthorized
      - condition: and
        part: body
        type: word
        words:
          - '"Main_Index_AccessPoint.asp'
          - Main_List.asp
      - status:
          - 200
        type: status
    matchers-condition: and
    payloads:
      password:
        - admin
      username:
        - admin
    raw:
      - |
        GET /index.asp HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64(username + ':' + password)}}
