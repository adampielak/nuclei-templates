id: apache-activemq-artemis-detect
info:
  name: Apache ActiveMQ Artemis - Detection
  author: icarot
  severity: info
  description: |
    Detects a Apache ActiveMQ Artemis Console, the next generation message broker by ActiveMQ.
  reference:
    - https://github.com/apache/activemq-artemis/
  metadata:
    max-request: 1
    product: activemq
    shodan-query: title:"ActiveMQ Artemis Console"
    vendor: apache
  tags: activemq,apache,artemis,detect,discovery,tech
http:
  - extractors:
      - group: 1
        name: version
        part: body
        regex:
          - '"productInfo":.*"value":\s*"(.*)"'
        type: regex
    matchers:
      - condition: or
        type: word
        words:
          - img/activemq.png
          - ActiveMQ Artemis
          - Apache Artemis
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/console/hawtconfig.json'
