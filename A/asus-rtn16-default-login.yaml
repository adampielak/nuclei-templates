id: asus-rtn16-default-login
info:
  name: ASUS RT-N16 - Default Login
  author: ritikchaddha
  severity: high
  description: |
    ASUS RT-N16 contains a default login vulnerability. Default admin login password 'admin' was found.
  classification:
    cpe: cpe:2.3:h:asus:rt-n16:*:*:*:*:*:*:*:*
  metadata:
    runzero-match: any(each(service["http.head.wwwAuthentications"]), {# contains 'realm="RT-N16'})
    max-request: 1
    product: rt-n16
    shodan-query: RT-N16
    vendor: asus
    verified: true
  tags: asus,default-login,rt-n16,vuln
http:
  - attack: pitchfork
    headers:
      Authorization: Basic {{base64(username + ':' + password)}}
    matchers:
      - condition: and
        part: body
        type: word
        words:
          - ASUS
          - RT-N16
          - System Status
          - Network Map
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/'
    payloads:
      password:
        - admin
      username:
        - admin
