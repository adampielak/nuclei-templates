id: anythingllm-panel
info:
  name: AnythingLLM Panel - Detect
  author: rxerium
  severity: info
  description: |
    Detects the AnythingLLM web interface.
  reference:
    - https://github.com/Mintplex-Labs/anything-llm
    - https://anythingllm.com/
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)AnythingLLM \\| Your personal LLM trained on anything"})
    max-request: 1
    product: anything-llm
    shodan-query: http.title:"AnythingLLM | Your personal LLM trained on anything"
    vendor: mintplex-labs
    verified: true
  tags: ai,anythingllm,detect,discovery,llm,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "AnythingLLM | Your personal LLM trained on anything"
      - type: status
        status:
          - 200
