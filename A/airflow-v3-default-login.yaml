id: airflow-v3-default-login
info:
  name: Apache Airflow v3 Default Login
  author: pdteam
  severity: high
  description: Apache Airflow v3 default login credentials were discovered.
  reference:
    - https://airflow.apache.org/docs/apache-airflow/stable/start/docker.html
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:C/C:L/I:L/A:L
    cvss-score: 8.3
    cwe-id: CWE-522
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "Airflow"})
    max-request: 2
    product: airflow
    shodan-query: title:"Airflow"
    vendor: apache
  tags: airflow,apache,default-login,vuln
http:
  - attack: pitchfork
    extractors:
      - group: 1
        internal: true
        name: csrf_token
        regex:
          - type="hidden" value="(.*?)">
        type: regex
    matchers:
      - condition: and
        dsl:
          - contains(body_1, "Airflow") && status_code_2 == 302
          - contains(body_2, "You should be redirected automatically")
          - contains(header_2, "session=")
          - '!contains(location_2, "/login")'
        type: dsl
    matchers-condition: and
    payloads:
      password:
        - airflow
      username:
        - airflow
    raw:
      - |
        GET /auth/login/ HTTP/1.1
        Host: {{Hostname}}
        Origin: {{BaseURL}}
      - |
        POST /auth/login/ HTTP/1.1
        Host: {{Hostname}}
        Origin: {{BaseURL}}
        Content-Type: application/x-www-form-urlencoded
        Referer: {{BaseURL}}/auth/login

        username={{username}}&password={{password}}&_csrf_token={{csrf_token}}
