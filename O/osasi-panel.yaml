id: osasi-panel
info:
  name: OSASI Login - Panel
  author: biero-el-corridor
  severity: info
  description: |
    OSASI Login panel was discovered.
  metadata:
    runzero-match: service["http.body"] matches "(?i)/css/osasiasp\\.css"
    max-request: 1
    shodan-query: html:"/css/osasiasp.css"
    verified: true
  tags: detect,discovery,login,osasi,panel
http:
  - matchers:
      - condition: and
        part: body
        type: word
        words:
          - /img/osasil_logo_f.png
          - UserLoginid
      - status:
          - 200
        type: status
    matchers-condition: and
    method: GET
    path:
      - '{{BaseURL}}/users/login'
