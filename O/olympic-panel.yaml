id: olympic-panel

info:
  name: OLYMPIC Banking System Login Panel - Detect
  author: righettod
  severity: info
  description: OLYMPIC Banking System was detected.
  reference:
    - https://www.olympicbankingsystem.com/en/
  metadata:
    runzero-match: any(each(service["html.titles"]), {# matches "(?i)olympic banking system"})
    max-request: 2
    shodan-query: http.title:"olympic banking system"
  tags: panel,olympic,login,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/Connect.do"
      - "{{BaseURL}}/javaScript/responsive/portal.js"

    stop-at-first-match: true
    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_any(to_lower(body), "olympic banking system", "olympic.action=")'
        condition: and

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '&#169;([0-9]+)-'

